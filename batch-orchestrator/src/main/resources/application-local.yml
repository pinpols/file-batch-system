# 本地联调：仓库根目录先执行 `mvn package/install`；IDEA 直接运行主类时读取 `db/migration`。
# 本地联调默认要求“干净库 + 从 V1 开始完整迁移”。
# 如果旧数据卷里已经残留了 `flyway_schema_history`，请先 `docker compose down -v` 再启动。
server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:15432/batch_platform
    username: batch_user
    password: batch_pass_123
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: localhost:9092
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: batch
    schemas:
      - batch
      - quartz
    baseline-on-migrate: true
    # baseline-version 固定为 1：仅表示「V1（建 schema）已由 Docker init 等预置」，勿改成当前最新迁移号（V34/V35…）。
    baseline-version: 1
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.batch.orchestrator.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

batch:
  shedlock:
    auto-create: true
  security:
    testing-open: true
    kms:
      default-key-ref: DEFAULT_TEST
      keys:
        DEFAULT_TEST: AAAAAAAAAAAAAAAAAAAAAA==
  outbox:
    batch-size: 100
    poll-interval-millis: 5000
    retry-delay-seconds: 60
    max-retry-attempts: 5
    circuit-breaker-enabled: true
    circuit-breaker-failure-threshold-consecutive-polls: 3
    circuit-breaker-cooldown-millis: 60000
  partition-lease:
    expire-seconds: 60
    reclaim-interval-millis: 15000
  retry:
    batch-size: 100
    poll-interval-millis: 10000
    fixed-delay-seconds: 60
    exponential-multiplier: 2
    max-delay-seconds: 3600
    default-max-retry-count: 3
  resource-scheduler:
    waiting-dispatch-batch-size: 100
    waiting-dispatch-interval-millis: 10000
    global-max-running-jobs: ${BATCH_RESOURCE_SCHEDULER_GLOBAL_MAX_RUNNING_JOBS:0}
  rate-limit:
    enabled: ${BATCH_RATE_LIMIT_ENABLED:false}
    max-new-requests-per-tenant-per-minute: ${BATCH_RATE_LIMIT_MAX_NEW_PER_TENANT_PER_MINUTE:0}
    max-release-requests-per-tenant-per-minute: ${BATCH_RATE_LIMIT_MAX_RELEASE_PER_TENANT_PER_MINUTE:0}
  sla:
    enabled: true
    poll-interval-millis: 30000
    batch-size: 200
  file-governance:
    latency:
      enabled: true
      poll-interval-millis: 30000
      arrival-delay-threshold-seconds: 600
      processing-delay-threshold-seconds: 900
      sample-size: 20
    archive:
      enabled: true
      cleanup-interval-millis: 60000
      cleanup-batch-size: 100
      retention-days: 7
    reconcile:
      enabled: true
      poll-interval-millis: 60000
      batch-size: 200
      default-tenant-id: default-tenant
      prefix:
      include-temporary-objects: false
    arrival:
      enabled: true
      poll-interval-millis: 30000
      batch-size: 200
      default-timeout-action: MANUAL_CONFIRM
      trigger-on-complete: true
      manual-wait-extension-seconds: 1800
    access:
      enabled: true
      presign-expiry-seconds: 600
  storage:
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin123
      bucket: batch-dev
  mq:
    topics:
      import-dispatch: batch.task.dispatch.import
      export-dispatch: batch.task.dispatch.export
      dispatch-dispatch: batch.task.dispatch.dispatch
      task-result: batch.task.result
      task-retry: batch.task.retry
      dead-letter: batch.task.dead-letter
