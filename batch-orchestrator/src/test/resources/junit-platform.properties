# class 间顺序统一由根 pom.xml surefire `runOrder=alphabetical` 控制(全 reactor),
# 不再用 junit.jupiter.testclass.order.default。
#
# 历史(2026-05-22 前): 3 个 IT 类标 @Order(1-3) — ConcurrentTaskClaim /
# WorkerClaimProgressComplete / OutboxEventToKafkaDispatch, 配 ClassOrderer$OrderAnnotation
# 真生效(reuseForks=true 单 JVM 串多 class)。但 "敏感用例先后" 无文档化依赖,
# 统一到 surefire runOrder 一处消除歧义。
# 改 alphabetical 后顺序: ConcurrentTaskClaim → OutboxEventToKafkaDispatch
# → WorkerClaimProgressComplete(原 1-2-3 顺序中 2/3 互换)。
#
# 单 IT class 内方法序仍由 JUnit5 @TestMethodOrder + @Order(n) 控制(method 级)。
