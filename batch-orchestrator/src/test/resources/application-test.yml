# 稳定 orchestrator 集成测试：减少后台任务干扰，测试基础设施与 AbstractIntegrationTest 保持一致。
spring:
  config:
    # 在 CI / 本地开发中，测试可能只构建当前模块。
    # 如果共享默认配置（依赖产物）过期或缺失，这里用 optional import 避免测试直接失败。
    import: "optional:classpath:batch-defaults.yml"
  flyway:
    # 集成测试使用独立的迁移脚本目录，避免与正式环境迁移互相影响
    locations: classpath:db/migration
    # platform-init.sql 仅建 batch/quartz schema；表结构一律由本目录迁移从头应用，无需 baseline。

mybatis:
  # 即使 batch-defaults.yml 不在 classpath，也要保证测试可自包含运行
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    # 测试输出 SQL 日志到 stdout，便于排查
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

batch:
  sla:
    # 测试关闭 SLA 扫描，避免后台线程影响测试稳定性
    enabled: false
  worker:
    drain:
      # 测试关闭 drain，减少状态机/轮询干扰
      enabled: false
  file-governance:
    latency:
      # 测试关闭文件治理（延迟）
      enabled: false
    archive:
      # 测试关闭文件治理（归档清理）
      enabled: false
    reconcile:
      # 测试关闭文件治理（对账）
      enabled: false
    arrival:
      # 测试关闭文件治理（到达检测）
      enabled: false
    access:
      # 测试关闭文件治理（访问控制/预签名）
      enabled: false
  outbox:
    # 拉长轮询周期，避免测试时频繁跑后台任务
    poll-interval-millis: 600000
    # OutboxPollScheduler 自适应间隔的下限：默认 200ms 会让测试期手动 publish 后被 scheduler 二次 publish
    # 产生重复 event_delivery_log 行；测试拉到 10 分钟同时锁住上下限。
    min-poll-interval-millis: 600000
    # P3-3 archive: 测试禁用，避免后台 cron 干扰主测时序
    archive:
      enabled: false
  workflow:
    archive:
      enabled: false
  job-instance:
    archive:
      enabled: false
  # P2-5: 测试锁定 SINGLE 模式（IT 期望的 Kafka topic 是 base topic，无 tenant 后缀）
  mq:
    routing:
      mode: SINGLE
  retry:
    # 拉长轮询周期，避免测试时频繁跑后台任务
    poll-interval-millis: 600000
  partition-lease:
    # 拉长回收扫描周期，降低并发时序干扰
    reclaim-interval-millis: 600000
  resource-scheduler:
    # 拉长扫描周期，避免测试时频繁跑后台任务
    waiting-dispatch-interval-millis: 600000
    # 拉长扫描周期，避免测试时频繁跑后台任务
    quota-reset-scan-interval-millis: 600000
    # 测试关闭配额重置逻辑
    quota-reset-enabled: false
  scheduler:
    # 测试关闭快照持久化，避免写库与时序影响
    snapshot-persist-enabled: false
    # 拉长周期（理论上不应触发），兜底避免误触发
    snapshot-persist-ms: 600000
    # P2-3: 测试禁用 WorkerSelector Redis 缓存，避免缓存的 worker 列表与测试动态创建的 worker 时序不一致
    worker-cache:
      enabled: false
