server:
  port: 18087

spring:
  main:
    # 同 pipeline worker:关懒加载,保证 @KafkaListener container 启动期实例化 + 订阅 topic
    lazy-initialization: false
  datasource:
    url: jdbc:postgresql://localhost:15432/batch_platform
    username: batch_user
    password: batch_pass_123
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: localhost:19092
  data:
    redis:
      host: localhost
      port: 16379
      repositories:
        enabled: false

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.batch.worker.atomic.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{service:-} %X{tenantId:-} %X{traceId:-} %X{requestId:-} %X{jobInstanceId:-} %X{fileId:-}] %logger{40} - %msg%n"

batch:
  shedlock:
    auto-create: true
  security:
    bypass-mode: true
    kms:
      default-key-ref: DEFAULT_TEST
      keys:
        DEFAULT_TEST: AAAAAAAAAAAAAAAAAAAAAA==
  orchestrator:
    base-url: http://localhost:18082
  worker:
    registry:
      fail-fast-on-startup: false
    type: ATOMIC
    lease:
      renew-interval-millis: 10000
    task-client:
      base-url: http://localhost:18082
    atomic:
      worker-code: atomic-node-1
      worker-type: ATOMIC
      tenant-id: default-tenant
      heartbeat-interval-millis: 15000
      topic: batch.task.dispatch.atomic
      consumer-group-id: batch-worker-atomic
      capability-tags:
        - atomic-task
    # 本地联调开启的 原子任务执行器(生产默认全关,按需开 + 配白名单/schema)
    executors:
      sql:
        enabled: true
        forbid-os-capable-role: false  # 本地角色可能高权限;生产默认 true 兜底
      shell:
        enabled: true
      stored-proc:
        enabled: true
        # 本地放行 batch schema 下的过程(生产应精确到过程白名单)
        allowed-schemas:
          - batch
        # 本地 dev:关 OS 角色闸(本地角色可能高权限);生产用最小权限角色,默认 true 兜底
        forbid-os-capable-role: false
      http:
        enabled: true
        # 仅本地:dev 机器上没有云 metadata 威胁、目标就是 localhost 自身服务,清空 SSRF 黑名单。
        # 生产保留默认黑名单(localhost/127.*/169.254.169.254/metadata.*),见 HttpExecutorProperties。
        blocked-host-patterns: []
        allowed-host-patterns: []
  datasource:
    business:
      url: jdbc:postgresql://localhost:15432/batch_business
      username: batch_user
      password: batch_pass_123
      schema: biz
  storage:
    s3:
      endpoint: http://localhost:19000
      access-key: minioadmin
      secret-key: minioadmin123
      bucket: batch-dev
