server:
  # Dispatch Worker 端口：优先读取环境变量 BATCH_WORKER_DISPATCH_PORT（通常仅用于健康检查/指标）
  port: ${BATCH_WORKER_DISPATCH_PORT:18085}

spring:
  application:
    # Spring 应用名（用于日志/链路追踪/注册等）
    name: batch-worker-dispatch
  flyway:
    enabled: false
  config:
    # 引入共享默认配置基线（DB/Kafka/日志/通用 batch.* 等）
    import: "classpath:batch-defaults.yml"
  kafka:
    listener:
      # 每实例消费者并发线程数：建议 ≤ topic partition 数，否则多余线程空转
      concurrency: ${BATCH_WORKER_DISPATCH_KAFKA_CONCURRENCY:4}
      # 注：ack-mode=manual_immediate 已抽到 batch-defaults.yml 统一管理
    consumer:
      # dispatch 任务通常较轻：每次 poll 拉取条数可略大，提升吞吐
      max-poll-records: ${BATCH_WORKER_DISPATCH_KAFKA_MAX_POLL_RECORDS:10}
      fetch-min-size: ${BATCH_WORKER_DISPATCH_KAFKA_FETCH_MIN_SIZE:1}
      fetch-max-wait: ${BATCH_WORKER_DISPATCH_KAFKA_FETCH_MAX_WAIT:500}
      # PATTERN/REGEX topic 订阅须等 metadata 刷新才能发现新 topic。Kafka 客户端默认 5min，
      # WorkerProcessRestartRecoveryE2eIT 测试 await=5min subprocess Worker 5min 才发现新 topic 已超时。
      # 注意：KafkaConsumerConfiguration 的 @Value 默认 30s 在 subprocess 不生效（Spring Boot
      # 的 KafkaProperties auto-binding 优先于 @Value），必须经 spring.kafka.consumer.* 显式覆盖。
      metadata-max-age-ms: ${BATCH_WORKER_DISPATCH_KAFKA_METADATA_MAX_AGE_MS:30000}
  datasource:
    hikari:
      # dispatch worker platform pool（dispatch 无 business DB，platform DB 是唯一 JDBC 连接池）
      # 包含：file_record 读写、channel_config 查询、任务状态更新、审计写入
      maximum-pool-size: ${BATCH_WORKER_DISPATCH_PLATFORM_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${BATCH_WORKER_DISPATCH_PLATFORM_DB_MIN_IDLE:3}
      connection-timeout: ${BATCH_WORKER_DISPATCH_PLATFORM_DB_CONNECTION_TIMEOUT_MS:3000}

mybatis:
  # MyBatis domain 别名包（用于 mapper XML 简化类型引用）
  type-aliases-package: io.github.pinpols.batch.worker.dispatchs.domain

batch:
  worker:
    # ADR-029 classpath 隔离守护:本 worker 不应携带 batch-worker-atomic 模块的 dual-use executor 类。
    # 若 pom.xml 误引 batch-worker-atomic 依赖,启动期 fail-fast(默认关 + 本处显式 opt-in)。
    atomic:
      isolation-check:
        enabled: true
    # Worker 类型（IMPORT/EXPORT/DISPATCH）
    type: DISPATCH
    # 实例内并发上限（背压）：dispatch 通常较轻，默认略大
    max-concurrent-tasks: ${BATCH_WORKER_DISPATCH_MAX_CONCURRENT_TASKS:8}
    # P2-5 Kafka 订阅模式（PATTERN/FIXED/TENANT_SCOPED）；详见 batch-worker-import yml 注释
    kafka:
      subscribe-mode: ${BATCH_WORKER_KAFKA_SUBSCRIBE_MODE:PATTERN}
      tenant-allowlist: ${BATCH_WORKER_KAFKA_TENANT_ALLOWLIST:}
    dispatch:
      # Worker 唯一标识
      worker-code: ${BATCH_WORKER_DISPATCH_CODE:dispatch-node-1}
      # Worker 业务类型（与 batch.worker.type 一致）
      worker-type: DISPATCH
      # 租户隔离标识
      tenant-id: ${BATCH_WORKER_DISPATCH_TENANT_ID:default-tenant}
      # 心跳间隔（毫秒）
      heartbeat-interval-millis: ${BATCH_WORKER_DISPATCH_HEARTBEAT_INTERVAL_MILLIS:15000}
      # 消费的派发 Topic（默认值在 batch-defaults.yml）
      topic: ${BATCH_TOPIC_DISPATCH_DISPATCH:batch.task.dispatch.dispatch}
      # Kafka consumer group（同类 worker 负载均衡）
      consumer-group-id: ${BATCH_WORKER_DISPATCH_CONSUMER_GROUP_ID:batch-worker-dispatch}
      circuit-breaker:
        # 断路器：连续失败达到阈值后进入冷却，防止雪崩
        enabled: true
        # 失败阈值（次数）
        failure-threshold: 5
        # 冷却时间（毫秒）
        cooldown-millis: ${BATCH_DISPATCH_CB_COOLDOWN_MS:60000}
      health:
        # 健康探测：对下游通道（NAS/OSS 等）做探测并按退避策略调整
        enabled: true
        # 探测间隔（毫秒）
        probe-interval-millis: ${BATCH_DISPATCH_HEALTH_PROBE_INTERVAL_MS:60000}
        # 最大退避上限（毫秒）
        max-backoff-millis: ${BATCH_DISPATCH_HEALTH_MAX_BACKOFF_MS:900000}
        # 探测通道类型列表（按实现约定）
        probe-channel-types:
          - NAS
          - OSS
      receipt-poll:
        # 回执轮询：定期拉取/确认回执状态
        enabled: true
        # 轮询间隔（毫秒）
        interval-millis: ${BATCH_DISPATCH_RECEIPT_POLL_MS:60000}
        # 单次轮询批大小
        batch-size: ${BATCH_DISPATCH_RECEIPT_POLL_BATCH:50}

