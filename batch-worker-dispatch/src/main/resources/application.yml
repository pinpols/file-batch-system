server:
  # Dispatch Worker 端口：优先读取环境变量 BATCH_WORKER_DISPATCH_PORT（通常仅用于健康检查/指标）
  port: ${BATCH_WORKER_DISPATCH_PORT:8085}

spring:
  application:
    # Spring 应用名（用于日志/链路追踪/注册等）
    name: batch-worker-dispatch
  config:
    # 引入共享默认配置基线（DB/Kafka/日志/通用 batch.* 等）
    import: "classpath:batch-defaults.yml"

mybatis:
  # MyBatis domain 别名包（用于 mapper XML 简化类型引用）
  type-aliases-package: com.example.batch.worker.dispatchs.domain

batch:
  worker:
    # Worker 类型（IMPORT/EXPORT/DISPATCH）
    type: DISPATCH
    dispatch:
      # Worker 唯一标识
      worker-code: ${BATCH_WORKER_DISPATCH_CODE:dispatch-node-1}
      # Worker 业务类型（与 batch.worker.type 一致）
      worker-type: DISPATCH
      # 租户隔离标识
      tenant-id: ${BATCH_WORKER_DISPATCH_TENANT_ID:default-tenant}
      # 心跳间隔（毫秒）
      heartbeat-interval-millis: ${BATCH_WORKER_DISPATCH_HEARTBEAT_INTERVAL_MILLIS:15000}
      # 消费的派发 Topic（默认值在 batch-defaults.yml）
      topic: ${BATCH_TOPIC_DISPATCH_DISPATCH:batch.task.dispatch.dispatch}
      # Kafka consumer group
      consumer-group-id: ${BATCH_WORKER_DISPATCH_CONSUMER_GROUP_ID:batch-worker-dispatch}
      circuit-breaker:
        # 断路器：连续失败达到阈值后进入冷却，防止雪崩
        enabled: true
        # 失败阈值（次数）
        failure-threshold: 5
        # 冷却时间（毫秒）
        cooldown-millis: ${BATCH_DISPATCH_CB_COOLDOWN_MS:60000}
      health:
        # 健康探测：对下游通道（NAS/OSS 等）做探测并按退避策略调整
        enabled: true
        # 探测间隔（毫秒）
        probe-interval-millis: ${BATCH_DISPATCH_HEALTH_PROBE_INTERVAL_MS:60000}
        # 最大退避上限（毫秒）
        max-backoff-millis: ${BATCH_DISPATCH_HEALTH_MAX_BACKOFF_MS:900000}
        # 探测通道类型列表（按实现约定）
        probe-channel-types:
          - NAS
          - OSS
      receipt-poll:
        # 回执轮询：定期拉取/确认回执状态
        enabled: true
        # 轮询间隔（毫秒）
        interval-millis: ${BATCH_DISPATCH_RECEIPT_POLL_MS:60000}
        # 单次轮询批大小
        batch-size: ${BATCH_DISPATCH_RECEIPT_POLL_BATCH:50}
