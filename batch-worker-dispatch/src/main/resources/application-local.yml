server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://localhost:15432/batch_platform
    username: batch_user
    password: batch_pass_123
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: localhost:9092

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.batch.worker.dispatchs.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{service:-} %X{tenantId:-} %X{traceId:-} %X{requestId:-} %X{jobInstanceId:-} %X{fileId:-}] %logger{40} - %msg%n"

batch:
  security:
    testing-open: true
    kms:
      default-key-ref: DEFAULT_TEST
      keys:
        DEFAULT_TEST: AAAAAAAAAAAAAAAAAAAAAA==
  orchestrator:
    base-url: http://localhost:8082
  worker:
    type: DISPATCH
    lease:
      renew-interval-millis: 10000
    task-client:
      base-url: http://localhost:8082
    dispatch:
      worker-code: dispatch-node-1
      worker-type: DISPATCH
      tenant-id: default-tenant
      heartbeat-interval-millis: 15000
      topic: batch.task.dispatch.dispatch
      consumer-group-id: batch-worker-dispatch
  datasource:
    business:
      url: jdbc:postgresql://localhost:15432/batch_business
      username: batch_user
      password: batch_pass_123
      schema: biz
  storage:
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin123
      bucket: batch-dev
