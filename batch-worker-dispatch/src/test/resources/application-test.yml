spring:
  flyway:
    locations: classpath:db/migration

batch:
  scheduling:
    # IT 不验证 Spring @Scheduled 线程池的优雅收尾；关闭时立即取消，避免 surefire fork 退出超时。
    wait-for-tasks-to-complete-on-shutdown: false
    await-termination-seconds: 1
  worker:
    dispatch:
      heartbeat-interval-millis: 600000
      health:
        probe-interval-millis: 600000
      receipt-poll:
        interval-millis: 600000
