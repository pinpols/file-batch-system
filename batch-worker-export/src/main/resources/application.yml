server:
  # Export Worker 端口：优先读取环境变量 BATCH_WORKER_EXPORT_PORT（通常仅用于健康检查/指标）
  port: ${BATCH_WORKER_EXPORT_PORT:18084}

spring:
  application:
    # Spring 应用名（用于日志/链路追踪/注册等）
    name: batch-worker-export
  flyway:
    enabled: false
  config:
    # 引入共享默认配置基线（DB/Kafka/日志/通用 batch.* 等）
    import: "classpath:batch-defaults.yml"
  kafka:
    listener:
      # 每实例消费者并发线程数：建议 ≤ topic partition 数，否则多余线程空转
      concurrency: ${BATCH_WORKER_EXPORT_KAFKA_CONCURRENCY:4}
      # 注：ack-mode=manual_immediate 已抽到 batch-defaults.yml 统一管理
    consumer:
      # 长任务 worker 一次 poll 只取一条；否则同一 consumer 批内串行处理多条会超过 max.poll.interval 并触发 rebalance
      max-poll-records: ${BATCH_WORKER_EXPORT_KAFKA_MAX_POLL_RECORDS:1}
      # Broker 至少积累此字节数才响应 fetch，减少空轮询网络往返
      fetch-min-size: ${BATCH_WORKER_EXPORT_KAFKA_FETCH_MIN_SIZE:1024}
      fetch-max-wait: ${BATCH_WORKER_EXPORT_KAFKA_FETCH_MAX_WAIT:500}
      # 两次 poll 之间允许的最大处理时长；需大于单批 max-poll-records 条任务的最长执行时间
      max-poll-interval-ms: ${BATCH_WORKER_EXPORT_KAFKA_MAX_POLL_INTERVAL_MS:1200000}

batch:
  worker:
    # ADR-029 classpath 隔离守护:本 worker 不应携带 batch-worker-atomic 模块的 dual-use executor 类。
    # 若 pom.xml 误引 batch-worker-atomic 依赖,启动期 fail-fast(默认关 + 本处显式 opt-in)。
    atomic:
      isolation-check:
        enabled: true
    # Worker 类型（IMPORT/EXPORT/DISPATCH）
    type: EXPORT
    # 实例内并发上限（背压）：建议按任务重量与 DB 连接池匹配
    max-concurrent-tasks: ${BATCH_WORKER_EXPORT_MAX_CONCURRENT_TASKS:4}
    # P2-5 Kafka 订阅模式（PATTERN/FIXED/TENANT_SCOPED）；详见 batch-worker-import yml 注释
    kafka:
      subscribe-mode: ${BATCH_WORKER_KAFKA_SUBSCRIBE_MODE:PATTERN}
      tenant-allowlist: ${BATCH_WORKER_KAFKA_TENANT_ALLOWLIST:}
    export:
      # Worker 唯一标识
      worker-code: ${BATCH_WORKER_EXPORT_CODE:export-node-1}
      # Worker 业务类型（与 batch.worker.type 一致）
      worker-type: EXPORT
      # 租户隔离标识
      tenant-id: ${BATCH_WORKER_EXPORT_TENANT_ID:default-tenant}
      # 心跳间隔（毫秒）
      heartbeat-interval-millis: ${BATCH_WORKER_EXPORT_HEARTBEAT_INTERVAL_MILLIS:15000}
      # 消费的派发 Topic（默认值在 batch-defaults.yml）
      topic: ${BATCH_TOPIC_EXPORT_DISPATCH:batch.task.dispatch.export}
      # Kafka consumer group
      consumer-group-id: ${BATCH_WORKER_EXPORT_CONSUMER_GROUP_ID:batch-worker-export}
      # H-8: 每次导出最大行数，防止无限制查询导致堆内存耗尽；0 表示不限制（不推荐生产使用）
      max-export-rows: ${BATCH_WORKER_EXPORT_MAX_EXPORT_ROWS:500000}
      file-processing:
        # 流式处理开关
        streaming-enabled: ${BATCH_WORKER_EXPORT_STREAMING_ENABLED:true}
        # 分页读取 page-size
        page-size: ${BATCH_WORKER_EXPORT_PAGE_SIZE:1000}
        # JDBC fetch-size
        fetch-size: ${BATCH_WORKER_EXPORT_FETCH_SIZE:1000}
        # 业务处理 chunk-size
        chunk-size: ${BATCH_WORKER_EXPORT_CHUNK_SIZE:500}
      jdbc-mapped:
        # 允许访问的业务 schema 白名单
        allowed-schemas:
          - biz
      sql-template:
        # 允许引用的 schema 白名单，防止 SQL 模板越权访问 batch/quartz 等内部 schema
        allowed-schemas:
          - biz

  datasource:
    hikari:
      # export worker platform pool（写任务状态/审计/file_record，负载低于 business pool）
      maximum-pool-size: ${BATCH_WORKER_EXPORT_PLATFORM_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${BATCH_WORKER_EXPORT_PLATFORM_DB_MIN_IDLE:3}
      connection-timeout: ${BATCH_WORKER_EXPORT_PLATFORM_DB_CONNECTION_TIMEOUT_MS:3000}
    business:
      hikari:
        # export worker business pool（导出大 SQL 可能长时间占用连接）
        maximum-pool-size: ${BATCH_WORKER_EXPORT_BUSINESS_DB_MAX_POOL_SIZE:20}
        minimum-idle: ${BATCH_WORKER_EXPORT_BUSINESS_DB_MIN_IDLE:5}
        leak-detection-threshold: ${BATCH_WORKER_EXPORT_BUSINESS_DB_LEAK_DETECTION_THRESHOLD_MS:60000}
