# 与 docker-compose.yml 叠加以 `--profile apps` 启动 Java 服务。
# 宿主机端口由 .env 中
# CONSOLE_API_PORT / TRIGGER_PORT / ORCHESTRATOR_PORT 及 worker 端口变量映射；容器内仍为 8080–8085。
# 库地址、Kafka、MinIO 使用 Docker 网络名（postgres:5432、kafka:29092、minio:9000）；15432 仅宿主机映射。
x-app-runtime-env: &app-runtime-env
  BATCH_TIMEZONE_DEFAULT_ZONE: ${BATCH_TIMEZONE_DEFAULT_ZONE:-Asia/Shanghai}
  TZ: ${BATCH_TIMEZONE_DEFAULT_ZONE:-Asia/Shanghai}
  BATCH_LOCALE: ${BATCH_LOCALE:-C.UTF-8}
  LANG: ${BATCH_LOCALE:-C.UTF-8}
  LC_ALL: ${BATCH_LOCALE:-C.UTF-8}

services:
  console-api:
    profiles: ["apps"]
    image: batch-console-api:${APP_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        MODULE: batch-console-api
    container_name: batch-console-api
    restart: unless-stopped
    environment:
      <<: *app-runtime-env
      JAVA_OPTS: ${BATCH_APP_JAVA_OPTS:---enable-native-access=ALL-UNNAMED -Xms128m -Xmx512m -XX:MaxMetaspaceSize=192m}
      SPRING_FLYWAY_ENABLED: "false"
      BATCH_CONSOLE_INSTANCE_ID: ${BATCH_CONSOLE_INSTANCE_ID:-batch-console-api-local}
      BATCH_CONSOLE_REALTIME_REPLAY_MAX_ENTRIES: ${BATCH_CONSOLE_REALTIME_REPLAY_MAX_ENTRIES:-20000}
      BATCH_CONSOLE_REALTIME_REPLAY_TTL: ${BATCH_CONSOLE_REALTIME_REPLAY_TTL:-24h}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-dummy-openai-key}
      BATCH_PLATFORM_DB_URL: ${BATCH_PLATFORM_DB_URL:-jdbc:postgresql://postgres:5432/batch_platform}
      BATCH_PLATFORM_DB_USERNAME: ${BATCH_PLATFORM_DB_USERNAME:-batch_user}
      BATCH_PLATFORM_DB_PASSWORD: ${BATCH_PLATFORM_DB_PASSWORD:?BATCH_PLATFORM_DB_PASSWORD is required}
      # P2-4: 读写分离开关 — 跟 application.yml fallback 一致默认 true。`up-apps.sh`
      # 已带 --profile replica 把 postgres-replica 一起拉起来；fail-open 已就位，从库挂
      # 也会自动降级主库。如需关闭，在 .env 显式置 false。
      BATCH_CONSOLE_READ_REPLICA_ENABLED: ${BATCH_CONSOLE_READ_REPLICA_ENABLED:-true}
      BATCH_CONSOLE_PRIMARY_URL: ${BATCH_CONSOLE_PRIMARY_URL:-jdbc:postgresql://postgres:5432/batch_platform}
      BATCH_CONSOLE_PRIMARY_USER: ${BATCH_CONSOLE_PRIMARY_USER:-batch_user}
      BATCH_CONSOLE_PRIMARY_PASSWORD: ${BATCH_CONSOLE_PRIMARY_PASSWORD:-${BATCH_PLATFORM_DB_PASSWORD}}
      BATCH_CONSOLE_REPLICA_URL: ${BATCH_CONSOLE_REPLICA_URL:-jdbc:postgresql://postgres-replica:5432/batch_platform}
      BATCH_CONSOLE_REPLICA_USER: ${BATCH_CONSOLE_REPLICA_USER:-batch_user}
      BATCH_CONSOLE_REPLICA_PASSWORD: ${BATCH_CONSOLE_REPLICA_PASSWORD:-${BATCH_PLATFORM_DB_PASSWORD}}
      BATCH_REDIS_HOST: ${BATCH_REDIS_HOST:-redis}
      BATCH_REDIS_PORT: 6379
      LOGGING_FILE_NAME: /app/logs/batch-console-api.log
      BATCH_ORCHESTRATOR_BASE_URL: ${BATCH_ORCHESTRATOR_BASE_URL:-http://orchestrator:8082}
      BATCH_MINIO_ENDPOINT: ${BATCH_MINIO_ENDPOINT:-http://minio:9000}
      BATCH_MINIO_ACCESS_KEY: ${BATCH_MINIO_ACCESS_KEY:-minioadmin}
      BATCH_MINIO_SECRET_KEY: ${BATCH_MINIO_SECRET_KEY:?BATCH_MINIO_SECRET_KEY is required}
      BATCH_MINIO_BUCKET: ${BATCH_MINIO_BUCKET:-batch-dev}
      BATCH_SECURITY_BYPASS_MODE: ${BATCH_SECURITY_BYPASS_MODE:-false}
      SERVER_PORT: 8080
      MANAGEMENT_SERVER_PORT: 8080
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:-health,info,prometheus}
    volumes:
      - ./logs/docker:/app/logs
    ports:
      - "${CONSOLE_API_PORT:-18080}:8080"
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      orchestrator:
        condition: service_healthy

  trigger:
    profiles: ["apps"]
    image: batch-trigger:${APP_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        MODULE: batch-trigger
    container_name: batch-trigger
    restart: unless-stopped
    environment:
      <<: *app-runtime-env
      JAVA_OPTS: ${BATCH_APP_JAVA_OPTS:---enable-native-access=ALL-UNNAMED -Xms128m -Xmx512m -XX:MaxMetaspaceSize=192m}
      SPRING_FLYWAY_ENABLED: "false"
      BATCH_PLATFORM_DB_URL: ${BATCH_PLATFORM_DB_URL:-jdbc:postgresql://postgres:5432/batch_platform}
      BATCH_PLATFORM_DB_USERNAME: ${BATCH_PLATFORM_DB_USERNAME:-batch_user}
      BATCH_PLATFORM_DB_PASSWORD: ${BATCH_PLATFORM_DB_PASSWORD:?BATCH_PLATFORM_DB_PASSWORD is required}
      BATCH_ORCHESTRATOR_BASE_URL: ${BATCH_ORCHESTRATOR_BASE_URL:-http://orchestrator:8082}
      # ADR-010 Stage 4: trigger 通过 Kafka topic batch.trigger.launch.v1 异步发布 launch 事件,
      # 容器内必须用容器网络名 kafka:29092 而非宿主机 localhost:19092。
      BATCH_KAFKA_BOOTSTRAP_SERVERS: ${BATCH_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      LOGGING_FILE_NAME: /app/logs/batch-trigger.log
      SERVER_PORT: 8081
      MANAGEMENT_SERVER_PORT: 8081
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:-health,info,prometheus}
    ports:
      - "${TRIGGER_PORT:-18081}:8081"
    volumes:
      - ./logs/docker:/app/logs
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      orchestrator:
        condition: service_healthy

  orchestrator:
    profiles: ["apps"]
    image: batch-orchestrator:${APP_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        MODULE: batch-orchestrator
    container_name: batch-orchestrator
    restart: unless-stopped
    environment:
      <<: *app-runtime-env
      JAVA_OPTS: ${BATCH_ORCHESTRATOR_JAVA_OPTS:---enable-native-access=ALL-UNNAMED -Xms256m -Xmx768m -XX:MaxMetaspaceSize=256m}
      BATCH_PLATFORM_DB_URL: ${BATCH_PLATFORM_DB_URL:-jdbc:postgresql://postgres:5432/batch_platform}
      BATCH_PLATFORM_DB_USERNAME: ${BATCH_PLATFORM_DB_USERNAME:-batch_user}
      BATCH_PLATFORM_DB_PASSWORD: ${BATCH_PLATFORM_DB_PASSWORD:?BATCH_PLATFORM_DB_PASSWORD is required}
      BATCH_ORCHESTRATOR_BASE_URL: ${BATCH_ORCHESTRATOR_BASE_URL:-http://orchestrator:8082}
      BATCH_KAFKA_BOOTSTRAP_SERVERS: ${BATCH_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      BATCH_MINIO_ENDPOINT: ${BATCH_MINIO_ENDPOINT:-http://minio:9000}
      BATCH_MINIO_ACCESS_KEY: ${BATCH_MINIO_ACCESS_KEY:-minioadmin}
      BATCH_MINIO_SECRET_KEY: ${BATCH_MINIO_SECRET_KEY:?BATCH_MINIO_SECRET_KEY is required}
      BATCH_MINIO_BUCKET: ${BATCH_MINIO_BUCKET:-batch-dev}
      BATCH_SECURITY_BYPASS_MODE: ${BATCH_SECURITY_BYPASS_MODE:-false}
      BATCH_REDIS_HOST: ${BATCH_REDIS_HOST:-redis}
      BATCH_REDIS_PORT: 6379
      LOGGING_FILE_NAME: /app/logs/batch-orchestrator.log
      SERVER_PORT: 8082
      MANAGEMENT_SERVER_PORT: 8082
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:-health,info,prometheus}
    ports:
      - "${ORCHESTRATOR_PORT:-18082}:8082"
    volumes:
      - ./logs/docker:/app/logs
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  worker-import:
    profiles: ["apps"]
    image: batch-worker-import:${APP_IMAGE_TAG:-local}
