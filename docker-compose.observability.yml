# ============================================================
# 可观测性基础设施叠加层
#
# 说明：
# - 这份 compose 只负责观测组件，不再和业务容器混在一起。
# - 业务容器请通过 scripts/docker/up-apps.sh 或 scripts/local/start-all.sh 单独启动。
# - 观测组件通过共享的 batch-network 直接抓取业务容器和 exporter。
#
# 启动方式：
#   docker compose --env-file .env.local \
#                  -f docker-compose.observability.yml \
#                  --profile observability up -d
#
# 访问地址：
#   Prometheus：http://localhost:19090
#   Grafana：http://localhost:3000（默认 admin / admin）
#   Jaeger：http://localhost:16686
#   Loki：http://localhost:3100
# ============================================================

services:
  # ── Prometheus（指标抓取与规则评估）──────────────────────────────
  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG:-v2.55.1}
    container_name: batch-prometheus
    profiles: [observability]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./docs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/observability/prometheus-batch-rules.yml:/etc/prometheus/rules/batch.yml:ro
    networks:
      - batch-network
    restart: unless-stopped

  # ── PostgreSQL exporter ────────────────────────────────────────
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:${POSTGRES_EXPORTER_IMAGE_TAG:-v0.15.0}
    container_name: batch-postgres-exporter
    profiles: [observability]
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-batch_user}:${POSTGRES_PASSWORD:-batch_pass_123}@postgres:5432/${POSTGRES_DB:-batch_platform}?sslmode=disable
    ports:
      - "${POSTGRES_EXPORTER_PORT:-19187}:9187"
    networks:
      - batch-network
    restart: unless-stopped

  # ── Redis exporter ─────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:${REDIS_EXPORTER_IMAGE_TAG:-v1.67.0}
    container_name: batch-redis-exporter
    profiles: [observability]
    command:
      - --redis.addr=redis://redis:6379
    ports:
      - "${REDIS_EXPORTER_PORT:-19121}:9121"
    networks:
      - batch-network
    restart: unless-stopped

  # ── Kafka exporter ─────────────────────────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:${KAFKA_EXPORTER_IMAGE_TAG:-v1.8.0}
    container_name: batch-kafka-exporter
    profiles: [observability]
    command:
      - --kafka.server=kafka:29092
      - --web.listen-address=:9308
    ports:
      - "${KAFKA_EXPORTER_PORT:-19308}:9308"
    networks:
      - batch-network
    restart: unless-stopped

  # ── Node Exporter（主机 CPU / 内存 / 磁盘 / 网络）─────────────────
  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_IMAGE_TAG:-v1.8.1}
    container_name: batch-node-exporter
    profiles: [observability]
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/.+|host|etc)($|/)
    ports:
      - "${NODE_EXPORTER_PORT:-19100}:9100"
    volumes:
      - /:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - batch-network
    restart: unless-stopped

  # ── cAdvisor（容器 CPU / 内存 / 网络 / 文件系统）────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_IMAGE_TAG:-v0.49.1}
    container_name: batch-cadvisor
    profiles: [observability]
    command:
      - --docker_only=true
    ports:
      - "${CADVISOR_PORT:-19101}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    networks:
      - batch-network
    restart: unless-stopped

  # ── OpenTelemetry 采集器（Collector）────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_IMAGE_TAG:-0.116.0}
    container_name: batch-otel-collector
    profiles: [observability]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docs/observability/otel-collector.yml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "8888:8888"
      - "13133:13133"
    environment:
      - DEPLOYMENT_ENVIRONMENT=${DEPLOYMENT_ENVIRONMENT:-local}
    depends_on:
      jaeger:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - batch-network
    restart: unless-stopped

  # ── Jaeger（分布式追踪 UI）─────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:${JAEGER_IMAGE_TAG:-1.62}
    container_name: batch-jaeger
    profiles: [observability]
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - TZ=${TZ:-Asia/Shanghai}
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "4317:4317"
      - "14250:14250"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - batch-network
    restart: unless-stopped

  # ── Loki（日志存储）────────────────────────────────────────────
  loki:
    image: grafana/loki:${LOKI_IMAGE_TAG:-3.3.2}
    container_name: batch-loki
    profiles: [observability]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - batch-network
    restart: unless-stopped

  # ── Grafana（统一可视化：指标 + 链路 + 日志）────────────────────
  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG:-11.4.0}
    container_name: batch-grafana
    profiles: [observability]
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - TZ=${TZ:-Asia/Shanghai}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docs/observability/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - batch-network
    restart: unless-stopped

volumes:
  prometheus-data:
    driver: local
  loki-data:
    driver: local
  grafana-data:
    driver: local

networks:
  batch-network:
    name: ${COMPOSE_PROJECT_NAME:-batch-local}_batch-network
