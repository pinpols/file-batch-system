# 与 orchestrator 集成测试对齐：Flyway 使用与 orchestrator 相同的 db/migration（经 testResource 复制）；后台任务尽量静默。
spring:
  flyway:
    locations: classpath:db/migration
    # platform-init.sql 仅建 schema；迁移由 classpath:db/migration 完整执行。

batch:
  sla:
    enabled: false
  scheduler:
    snapshot-persist-enabled: false
    snapshot-persist-ms: 600000
  worker:
    drain:
      enabled: false
  file-governance:
    latency:
      enabled: false
    archive:
      enabled: false
    reconcile:
      enabled: false
    arrival:
      enabled: false
    access:
      enabled: false
  outbox:
    poll-interval-millis: 600000
  retry:
    poll-interval-millis: 600000
  partition-lease:
    reclaim-interval-millis: 600000
  resource-scheduler:
    waiting-dispatch-interval-millis: 600000
    quota-reset-scan-interval-millis: 600000
    quota-reset-enabled: false
