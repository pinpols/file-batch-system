# batch-e2e-tests 用 surefire forkCount=1 + reuseForks=false(见 pom.xml:146-147)
# — **每个 IT class 独立 JVM**,JUnit5 ClassOrderer 在每 fork 内只见到 1 个 class,
# 排序无意义。class 间顺序由 surefire `runOrder=alphabetical`(pom.xml) 决定,
# 不再用 junit.jupiter.testclass.order.default。
#
# 历史:之前配 ClassOrderer$OrderAnnotation + 4 个 IT 类标 @Order(1-4),
# 但自 fork 隔离方案落地起就**未真生效**(隐性死代码),已在 2026-05-22 同 PR 清理。
#
# 单 IT class 内方法序仍由 JUnit5 @TestMethodOrder + @Order(n) 控制(method 级)。
