# 合并 orchestrator 与 worker：对外提供 /internal/tasks（领取/上报）HTTP，worker 本体仍非 Web。
spring:
  main:
    web-application-type: servlet
  kafka:
    consumer:
      auto-offset-reset: earliest
      # KafkaConsumerConfiguration 默认 30s；e2e 进一步缩到 5s 加快 PATTERN 订阅发现新 topic
      metadata-max-age-ms: 5000

batch:
  retry:
    # E2E 加快重试节奏（分区重试不必等待数分钟）。
    fixed-delay-seconds: 1
    poll-interval-millis: 400
  orchestrator:
    base-url: http://127.0.0.1:${local.server.port}
  console:
    orchestrator:
      base-url: http://127.0.0.1:${local.server.port}
    trigger:
      base-url: http://127.0.0.1:${local.server.port}
    security:
      # E2E bypass-mode 兜底默认授权(无 role header 时使用)
      default-authorities:
        - ROLE_ADMIN
        - ROLE_AUDITOR
        - ROLE_CONFIG_ADMIN
  worker:
    task-client:
      base-url: http://127.0.0.1:${local.server.port}
      connect-timeout-millis: 3000
      read-timeout-millis: 30000
      report-max-attempts: 4
      report-initial-backoff-millis: 100
      report-max-backoff-millis: 800
      claim-max-attempts: 4
      claim-initial-backoff-millis: 100
      claim-max-backoff-millis: 800
    import:
      tenant-id: t1
      worker-code: e2e-import-1
      worker-type: IMPORT
      heartbeat-interval-millis: 600000
      topic: batch.task.dispatch.import
      consumer-group-id: batch-worker-import-e2e
      scanner:
        enabled: false
    export:
      tenant-id: t1
      worker-code: e2e-export-1
      worker-type: EXPORT
      heartbeat-interval-millis: 600000
      topic: batch.task.dispatch.export
      consumer-group-id: batch-worker-export-e2e
    process:
      tenant-id: t1
      worker-code: e2e-process-1
      worker-type: PROCESS
      heartbeat-interval-millis: 600000
      topic: batch.task.dispatch.process
      consumer-group-id: batch-worker-process-e2e
    dispatch:
      tenant-id: t1
      worker-code: e2e-dispatch-1
      worker-type: DISPATCH
      heartbeat-interval-millis: 600000
      topic: batch.task.dispatch.dispatch
      consumer-group-id: batch-worker-dispatch-e2e
      circuit-breaker:
        enabled: false
      health:
        enabled: false
      receipt-poll:
        enabled: false
    # ADR-029 专用 SPI worker(仅 E2eSpiApplication 上下文绑定;其它 e2e app 无 SpiWorkerConfiguration bean,此块惰性忽略)
    spi:
      tenant-id: t1
      worker-code: e2e-spi-1
      worker-type: SPI
      heartbeat-interval-millis: 600000
      topic: batch.task.dispatch.spi
      consumer-group-id: batch-worker-spi-e2e
    # SPI 执行器:e2e 全开 4 类做全链验证;仅在 batch-worker-spi 被扫描的 E2eSpiApplication 上下文生效
    executors:
      sql:
        enabled: true
        allowed-statement-types:
          - SELECT
      shell:
        enabled: true
        # command-whitelist 留空 = 信任环境允许全部(e2e 只跑 /bin/echo)
      stored-proc:
        enabled: true
        allowed-schemas:
          - batch
      http:
        enabled: true
        # e2e 打本地 JDK HttpServer(127.0.0.1),需清掉默认 SSRF 黑名单(含 localhost/127.*);仅测试 profile
        blocked-host-patterns: []
        allowed-host-patterns: []
  datasource:
    business:
      url: ${spring.datasource.url}
      username: ${spring.datasource.username}
      password: ${spring.datasource.password}
      schema: biz
