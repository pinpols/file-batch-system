# 合并 orchestrator 与 worker：对外提供 /internal/tasks（领取/上报）HTTP，worker 本体仍非 Web。
spring:
  main:
    web-application-type: servlet
  kafka:
    consumer:
      auto-offset-reset: earliest

batch:
  retry:
    # E2E 加快重试节奏（分区重试不必等待数分钟）。
    fixed-delay-seconds: 1
    poll-interval-millis: 400
  orchestrator:
    base-url: http://127.0.0.1:${local.server.port}
  console:
    orchestrator:
      base-url: http://127.0.0.1:${local.server.port}
    trigger:
      base-url: http://127.0.0.1:${local.server.port}
  worker:
    task-client:
      base-url: http://127.0.0.1:${local.server.port}
      connect-timeout-millis: 3000
      read-timeout-millis: 30000
      report-max-attempts: 4
      report-initial-backoff-millis: 100
      report-max-backoff-millis: 800
      claim-max-attempts: 4
      claim-initial-backoff-millis: 100
      claim-max-backoff-millis: 800
    import:
      tenant-id: t1
      worker-code: e2e-import-1
      worker-type: IMPORT
      heartbeat-interval-millis: 600000
      topic: batch.task.dispatch.import
      consumer-group-id: batch-worker-import-e2e
      scanner:
        enabled: false
    export:
      tenant-id: t1
      worker-code: e2e-export-1
      worker-type: EXPORT
      heartbeat-interval-millis: 600000
      topic: batch.task.dispatch.export
      consumer-group-id: batch-worker-export-e2e
    dispatch:
      tenant-id: t1
      worker-code: e2e-dispatch-1
      worker-type: DISPATCH
      heartbeat-interval-millis: 600000
      topic: batch.task.dispatch.dispatch
      consumer-group-id: batch-worker-dispatch-e2e
      circuit-breaker:
        enabled: false
      health:
        enabled: false
      receipt-poll:
        enabled: false
  datasource:
    business:
      url: ${spring.datasource.url}
      username: ${spring.datasource.username}
      password: ${spring.datasource.password}
      schema: biz
