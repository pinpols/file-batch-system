name: Setup Build Environment
description: Shared setup for CI workflows — Java, Maven cache, OpenAPI validation

inputs:
  java-version:
    description: JDK version
    required: false
    default: "25"
  compile-load-tests:
    description: Whether to compile load-tests module
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Verify console OpenAPI matches controllers
      shell: bash
      run: |
        python3 -m pip install --quiet pyyaml
        python3 scripts/ci/check-console-openapi-paths.py

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
        cache: maven

    - name: Cache testcontainer Docker images
      id: tc-image-cache
      uses: actions/cache@v4
      with:
        path: /tmp/tc-images
        key: tc-images-${{ hashFiles('batch-common/src/test/java/com/example/batch/testing/AbstractIntegrationTest.java') }}

    - name: Restore testcontainer images from cache
      if: steps.tc-image-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        for f in /tmp/tc-images/*.tar; do
          [ -f "$f" ] && docker load -i "$f" || true
        done

    - name: Pull and save testcontainer images
      if: steps.tc-image-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p /tmp/tc-images
        for img in apache/kafka:4.1.2 postgres:17 redis:7.4 minio/minio:RELEASE.2025-10-15T17-29-55Z; do
          docker pull "$img" || continue
          safe=$(echo "$img" | tr '/:' '__')
          docker save "$img" -o "/tmp/tc-images/${safe}.tar" || true
        done

    - name: Compile load-tests module
      if: inputs.compile-load-tests == 'true'
      shell: bash
      run: |
        mvn -q -f load-tests/pom.xml test-compile
