name: sdk-python

# Python SDK (sdk-python/) CI.
#
# Triggered ONLY by Python SDK or shared contract-fixture changes — Java
# CI (pr-gate / full-ci-gate) has matching paths-ignore entries for
# sdk-python/** so we never double-fire Maven on a Python-only PR.
#
# Phase 0: lint + smoke test + contract-stub (all xfail). Each job is
# independent and uses Python 3.12 on ubuntu-latest. No matrix yet —
# we add 3.13 once dependencies are stable.

on:
  pull_request:
    paths:
      - 'sdk-python/**'
      - 'docs/api/sdk-contract-fixtures/**'
      - '.github/workflows/sdk-python.yml'
  push:
    branches:
      - main
    paths:
      - 'sdk-python/**'
      - 'docs/api/sdk-contract-fixtures/**'
      - '.github/workflows/sdk-python.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-python-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: sdk-python

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdk-python/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: ruff check
        run: ruff check src tests
      - name: ruff format --check
        run: ruff format --check src tests
      - name: mypy
        run: mypy src

  test:
    name: pytest (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdk-python/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: pytest (excluding contract/)
        # contract/ is exercised by the dedicated contract-stub job below
        run: pytest -v --ignore=tests/contract

  contract-stub:
    name: contract stub (xfail until P1+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdk-python/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run contract runner
        run: bash scripts/run-contract.sh
