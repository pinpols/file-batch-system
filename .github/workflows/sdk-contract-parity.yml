name: sdk-contract-parity

# Lane P (drift guard): enforce Java SDK ↔ Python SDK ↔ (future Go/TS/Rust BYO SDKs)
# ↔ shared-constants/fixtures stay in lockstep. Each language runs an independent
# contract job in parallel; any one failing blocks the PR.
#
# Conformance contract (what makes a BYO SDK compliant) is pinned in
# docs/sdk/byo-conformance-contract.md. Every new-language SDK MUST:
#   (a) consume docs/api/sdk-shared-constants.yaml (no re-authored literals),
#   (b) pass every fixture's machine-assertable `then.expect` block,
#   (c) add its `<lang>-contract` job (gated on the `changes` job) here.
#
# 触发:总是触发(去 on.paths),由 `changes` job(dorny/paths-filter)探测 sdk 相关
# 变更 → 各 contract job `needs: changes` 条件执行。无关 PR 上各 job skip(skip=success),
# 不付 Maven/toolchain 冷启动成本,但 required check 仍上报状态(不会卡住无关 PR)。
# 仅正向 glob 触发(去掉了会反向误判的 !sdk/**/*.md 负向模式)。
#
# Ruleset required(2026-06-22):validate-fixtures + {java,python,go,rust,typescript}
# contract 已设为阻塞门禁。sdk-live-transport(真 kafka,偶发 flake)与 parity-report
# 保持非必需信号(PR 上非阻塞)。
#
# nightly 常态化(2026-07-15):sdk-live-transport 这条五语言 live-Kafka 一致性 gate
# 原先只在碰 sdk 路径的 PR 上跑 → 数周无 sdk PR 时长期 dormant,withhold/HOL 这类
# 五语言集体回归会潜伏到某个偶然 PR 才暴露。故加 schedule cron:每天在 main 全跑一次
# (含 live-transport),把潜伏回归压到 24h 内暴露。schedule 无 base diff → 走与
# merge_group/workflow_dispatch 相同的「非 PR 事件回退全跑」路径(见 `changes` job)。

on:
  # 2026-06-22:契约检查升为 ruleset required(阻塞合并)。required check 必须在
  # **每个** PR 上都上报状态,否则不碰 sdk 的 PR 会因「检查从未上报」被永久卡住。
  # 故去掉 on.paths(改为总触发),由下方 `changes` job 用 dorny/paths-filter 探测
  # sdk 相关变更 → 各 job `needs: changes` 条件执行:无关变更时 skip(skip=success,
  # 满足 required),sdk 变更时真跑。镜像 pr-gate 的同款机制。
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:
  schedule:
    # 每天 16:00 UTC(北京 00:00)在 main 全跑一次,专治 live-transport 长期 dormant。
    # 低峰、每日一次(非每小时);与 sdk-orchestrator-e2e / staging-gate 的 18:00 错峰,
    # 避免同时段抢 runner。schedule 事件默认在默认分支(main)上运行。
    - cron: '0 16 * * *'

permissions:
  contents: read

concurrency:
  group: sdk-contract-parity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Job 0:探测 sdk 相关变更。PR 事件按 base diff 判定;非 PR 事件(merge_group /
  # workflow_dispatch / schedule)无 base diff,dorny/paths-filter 对非 PR 事件返回
  # true → 各下游 job 的 `if: ... || github.event_name != 'pull_request'` 再兜一层 →
  # 回退全跑(安全)。schedule(nightly)即走此路径:全语言 contract + live-transport 都真跑。
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Detect sdk changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # 仅正向 glob:命中任一即 sdk=true。**不要**加 '!sdk/**/*.md' 之类独立负向模式——
          # dorny/paths-filter(micromatch)对含负向的列表会把「不匹配该负向」的文件也判为命中,
          # 导致任何非-sdk-md 改动(如 batch-worker/**)都误判 sdk=true → 触发全套 SDK 契约 CI。
          # 代价:sdk 下 .md 文档改动也会触发 sdk CI(罕见、无害),换取过滤正确性。
          filters: |
            sdk:
              - 'sdk/**'
              - 'batch-common/src/main/java/io/github/pinpols/batch/common/enums/**'
              - 'batch-common/src/main/java/io/github/pinpols/batch/common/security/**'
              - 'docs/api/sdk-contract-fixtures/**'
              - 'docs/api/sdk-shared-constants.yaml'
              - 'docs/api/orchestrator-internal.openapi.yaml'
              - 'docs/sdk/byo-conformance-contract.md'
              - '.github/workflows/sdk-contract-parity.yml'

  validate-fixtures:
    name: validate fixtures (JSON Schema)
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install jsonschema
        run: python -m pip install --upgrade pip jsonschema
      - name: Validate every fixture
        run: bash docs/api/sdk-contract-fixtures/validate.sh

  java-contract:
    name: java contract + shared-constants parity
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run JsonFixtureContractTest + request-side + SharedConstantsParityTest
        run: |
          ./mvnw -B -pl sdk/java/core -am \
            -DskipITs \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -Dtest='JsonFixtureContractTest,JsonFixtureRequestSideContractTest,SharedConstantsParityTest' \
            test

  python-contract:
    name: python contract + shared-constants parity
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run contract runner
        run: pytest tests/contract -v
      - name: Run shared-constants parity
        run: pytest tests/test_shared_constants_parity.py -v

  # --- BYO SDKs (Go / TypeScript / Rust): each runs its own conformance runner
  # over the shared fixtures' then.expect + shared-constants parity. Contract:
  # docs/sdk/byo-conformance-contract.md §1.3.
  typescript-contract:
    name: typescript contract (decision core + conformance)
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Unit + conformance live under test/; the broker integration test (kafka/*.integration.test.ts)
      # needs kafkajs + a live broker and is run locally/manually, NOT in this broker-free job.
      - name: Run conformance + parity (node --test, type-stripped)
        run: node --test --experimental-strip-types 'sdk/typescript/tests/**/*.test.ts'

  go-contract:
    name: go contract (decision core + conformance)
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run conformance + parity + unit (root module, zero-dep)
        working-directory: sdk/go
        run: go vet ./... && go test ./...
      - name: Build Kafka adapter (nested module, segmentio/kafka-go)
        working-directory: sdk/go/kafka
        run: go build ./... && go vet ./...

  rust-contract:
    name: rust contract (decision core + conformance)
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust (stable)
        run: rustup toolchain install stable --profile minimal --no-self-update && rustup default stable
      - name: Run conformance + parity + unit (default features, zero-dep)
        working-directory: sdk/rust
        run: cargo test
      # Real reqwest HTTP transport is feature-gated (`http`, rustls-tls → no
      # system OpenSSL needed). Run its wire-contract tests (Idempotency-Key
      # freshness, protocolVersion, path/auth headers) — they were dead in CI
      # while only default features ran, so the production transport could rot.
      - name: Run reqwest HTTP transport tests (--features http)
        working-directory: sdk/rust
        run: cargo test --features http
      # Kafka adapter is feature-gated (rdkafka builds librdkafka via cmake).
      # Live broker behavior is hard-gated by sdk-live-transport below; this job
      # keeps a cheap compile check close to the Rust contract suite.
      - name: Install librdkafka build deps
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev libssl-dev
      - name: Compile-check Kafka adapter (--features kafka)
        working-directory: sdk/rust
        run: cargo check --features kafka

  sdk-live-transport:
    name: sdk live transport (Kafka + HTTP fake)
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal --no-self-update && rustup default stable

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev libssl-dev netcat-openbsd

      - name: Start Kafka broker (KRaft single node)
        # apache/kafka(Apache-2.0)取代 redpandadata/redpanda(BSL)。KRaft 单节点、
        # 无 ZooKeeper。端口映射保持 -p 19092:9092(host 19092 → container 9092),
        # 与下游 KAFKA_BOOTSTRAP=localhost:19092 一致;broker 对外 advertise
        # PLAINTEXT://localhost:19092,使 host 侧客户端收到可回连的地址。
        run: |
          docker run -d --name sdk-live-kafka \
            -p 19092:9092 \
            -e KAFKA_NODE_ID=0 \
            -e KAFKA_PROCESS_ROLES=broker,controller \
            -e KAFKA_CONTROLLER_QUORUM_VOTERS=0@localhost:9093 \
            -e KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093 \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:19092 \
            -e KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            -e KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS=1 \
            -e KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0 \
            -e KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1 \
            -e CLUSTER_ID=5L6g3nShT-eMCtK--X86sw \
            apache/kafka:3.9.1

      - name: Wait for Kafka broker readiness
        # 就绪等待 ONLY(绝不重试测试掩盖真 bug)。仅 `nc -z` 探端口不够:socket 一 bind
        # 就通过——但此时 KRaft 还没选出 leader / Kafka API 尚不可服务,下游各语言 harness
        # 的 waitFor 便偶发超时(nightly flake 根因)。改为在容器内轮询
        # kafka-broker-api-versions.sh 直到 broker 真正响应 Kafka API,再确认 runner 侧
        # advertised host:port 可达。超时放宽到 240s(镜像冷拉 + KRaft 格式化更慢)。
        run: |
          deadline=240
          until docker exec sdk-live-kafka \
              /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1; do
            deadline=$((deadline - 3))
            if (( deadline <= 0 )); then
              echo "Kafka did not become ready within timeout"
              docker logs sdk-live-kafka || true
              exit 1
            fi
            sleep 3
          done
          # advertised endpoint 从 runner host 可达性二次确认(上面在容器内自查,这里查外侧映射)。
          for _ in $(seq 1 30); do
            nc -z 127.0.0.1 19092 && { echo "Kafka ready and reachable on 127.0.0.1:19092"; exit 0; }
            sleep 2
          done
          echo "Kafka ready in-container but advertised port not reachable from runner"
          docker logs sdk-live-kafka || true
          exit 1

      - name: Run SDK live transport gate
        env:
          KAFKA_BOOTSTRAP: localhost:19092
        run: bash scripts/ci/run-sdk-live-transport-gate.sh

      - name: Dump broker logs on failure
        if: failure()
        run: |
          echo "::group::kafka"; docker logs sdk-live-kafka --tail 200 2>/dev/null || true; echo "::endgroup::"
          docker ps -a || true

  # Parity report — soft-mode: log diff between Java and Python pass sets,
  # but never fail the build (Python is xfail until Lane Q lands). When
  # Lane Q is done and we expect symmetric pass sets, remove `|| true`.
  parity-report:
    name: parity report (log-only)
    runs-on: ubuntu-latest
    needs:
      [
        java-contract,
        python-contract,
        typescript-contract,
        go-contract,
        rust-contract,
        sdk-live-transport,
      ]
    # log-only 聚合器:always() 以便任一 contract job 失败/跳过时仍汇总。不套 sdk gate。
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Summarize
        env:
          JAVA_RESULT: ${{ needs.java-contract.result }}
          PYTHON_RESULT: ${{ needs.python-contract.result }}
          TS_RESULT: ${{ needs.typescript-contract.result }}
          GO_RESULT: ${{ needs.go-contract.result }}
          RUST_RESULT: ${{ needs.rust-contract.result }}
          LIVE_RESULT: ${{ needs.sdk-live-transport.result }}
        run: |
          {
            echo "## SDK contract parity (log-only)"
            echo ""
            echo "- Java contract job: ${JAVA_RESULT}"
            echo "- Python contract job: ${PYTHON_RESULT}"
            echo "- TypeScript contract job: ${TS_RESULT}"
            echo "- Go contract job: ${GO_RESULT}"
            echo "- Rust contract job: ${RUST_RESULT}"
            echo "- SDK live transport job: ${LIVE_RESULT}"
            echo ""
            echo "Python is xfail until Lane Q completes. Go/TS/Rust are hard-gated by their own jobs above."
          } >> "$GITHUB_STEP_SUMMARY"
