name: sdk-contract-parity

# Lane P (drift guard): enforce Java SDK ↔ Python SDK ↔ shared-constants/fixtures
# stay in lockstep. Three independent jobs run in parallel; any one failing
# blocks the PR.
#
# Triggered ONLY by Java SDK, Python SDK, fixture or shared-constants changes —
# unrelated PRs do not pay the Maven cold-start cost. Matches the pr-gate
# paths-ignore for `.github/workflows/**` so a workflow-only PR still runs
# this file via the workflow-lint pipeline rather than re-triggering Maven.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'batch-worker-sdk/**'
      - 'batch-common/src/main/java/com/example/batch/common/enums/**'
      - 'batch-common/src/main/java/com/example/batch/common/security/**'
      - 'batch-worker-sdk-python/**'
      - 'docs/api/sdk-contract-fixtures/**'
      - 'docs/api/sdk-shared-constants.yaml'
      - 'docs/api/orchestrator-internal.openapi.yaml'
      - '.github/workflows/sdk-contract-parity.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-contract-parity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-fixtures:
    name: validate fixtures (JSON Schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install jsonschema
        run: python -m pip install --upgrade pip jsonschema
      - name: Validate every fixture
        run: bash docs/api/sdk-contract-fixtures/validate.sh

  java-contract:
    name: java contract + shared-constants parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Run JsonFixtureContractTest + SharedConstantsParityTest
        run: |
          mvn -B -pl batch-worker-sdk -am \
            -DskipITs \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -Dtest='JsonFixtureContractTest,SharedConstantsParityTest' \
            test

  python-contract:
    name: python contract stub (xfail) + parity stub
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: batch-worker-sdk-python
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: batch-worker-sdk-python/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run contract runner (xfail tolerated)
        run: pytest tests/contract -v
      - name: Run shared-constants parity stub
        run: pytest tests/test_shared_constants_parity.py -v

  # Parity report — soft-mode: log diff between Java and Python pass sets,
  # but never fail the build (Python is xfail until Lane Q lands). When
  # Lane Q is done and we expect symmetric pass sets, remove `|| true`.
  parity-report:
    name: parity report (log-only)
    runs-on: ubuntu-latest
    needs: [java-contract, python-contract]
    if: always() && (needs.java-contract.result == 'success' || needs.python-contract.result == 'success')
    steps:
      - uses: actions/checkout@v4
      - name: Summarize
        env:
          JAVA_RESULT: ${{ needs.java-contract.result }}
          PYTHON_RESULT: ${{ needs.python-contract.result }}
        run: |
          {
            echo "## SDK contract parity (log-only)"
            echo ""
            echo "- Java contract job: ${JAVA_RESULT}"
            echo "- Python contract job: ${PYTHON_RESULT}"
            echo ""
            echo "Python is xfail until Lane Q completes. Once Lane Q closes, tighten this job to fail on pass-set diff."
          } >> "$GITHUB_STEP_SUMMARY"
