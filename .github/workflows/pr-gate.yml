name: pr-gate

# 完全对齐 full-ci-gate 结构:4-5 job 立刻并发(零 needs 链),不做 affected scope
# 探测(本就只在 partial 时省时间,常见 PR 改 batch-common 总是 full 兜底)。
# wall-clock 由最慢 job 决定(通常 unit-it-b ~6-7min)。
#
# affected 极小化代替方案:paths-ignore 直接在 workflow 触发层拦"纯文档/yml"改动。

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main          # main push 由 full-ci-gate 接管
    paths-ignore:
      - 'docs/runbook/**'
      - 'docs/analysis/**'
      - 'docs/architecture/**'
      - 'docs/design/**'
      - 'docs/backlog/**'
      - 'docs/review/**'
      - 'docs/changelog.md'
      - '*.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.editorconfig'
      - '.claude/**'
      # workflow yml 改动由 workflow-lint / codeql / actionlint / zizmor 独立 workflow 覆盖,
      # 不需要 pr-gate 重跑 maven。
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/CODEOWNERS'
      - '.github/zizmor.yml'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: static-checks — yml/dict/openapi/PMD/Spotless 等静态校验
  # 不依赖任何下游,与所有 maven job 并发起跑
  # ===========================================================================
  static-checks:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Validate KAFKA_TOPICS sync (.env.example ↔ BatchTopics.java)
        shell: bash
        # CI 没有 .env.prod / .env.local(均 gitignored),把 .env.example 作为
        # canonical 源(本就是 prod 的 1:1 模板)。本地仍用脚本默认 .env.prod。
        run: bash scripts/ci/validate-kafka-topics.sh .env.example

      - name: Validate Flyway schema (parse + checksum drift detection)
        shell: bash
        run: bash scripts/ci/validate-flyway-schema.sh

      - name: Verify generated dicts in sync
        shell: bash
        run: python3 scripts/codegen/gen-error-codes-dict.py --check

      - name: Verify yml ↔ docker-compose default sync
        shell: bash
        run: python3 scripts/ci/check-config-defaults-sync.py --check

      - name: Verify Console controller ↔ OpenAPI route sync
        shell: bash
        # 拦 BE 加 controller 端点但漏更 docs/api/console-api.openapi.yaml 的漂移。
        run: python3 scripts/ci/check-console-openapi-paths.py

      - name: PMD + Spotless + dependency boundary
        shell: bash
        # test-compile 必要(PMD 需要 class 文件分析),不跑 surefire
        run: mvn -DskipTests test-compile pmd:check spotless:check -fae -B

  # ===========================================================================
  # 3 个 maven shard 按"压力均匀"分配,不按业务领域分:
  # 实测 orchestrator + console-api IT 最重,把它们配轻模块拉平 wall-clock。
  #
  # Job 2: it-shard-1 — orchestrator(重)+ worker-core(轻),预估 ~4min
  # ===========================================================================
  unit-it-a:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Cleanup orphan testcontainers (pre-IT)
        shell: bash
        run: |
          docker ps --filter "label=org.testcontainers=true" \
            --format '{{.ID}} {{.Labels}}' | \
            awk '$0 !~ /reuse-hash/ {print $1}' | \
            xargs -r docker rm -f >/dev/null 2>&1 || true

      - name: Run unit + IT (orchestrator + worker-core)
        shell: bash
        # -am 编译上游;跳 PMD/Spotless(在 static-checks job)
        run: |
          mvn verify -pl batch-orchestrator,batch-worker-core -am \
            -DskipITs=false -Dspotless.check.skip=true -Dpmd.skip=true \
            -fae -B

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-unit-it-a-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          retention-days: 14

  # ===========================================================================
  # Job 3: it-shard-2 — common + trigger + worker-process + worker-dispatch
  # 4 个轻模块凑 ~5min
  # ===========================================================================
  unit-it-b1:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Cleanup orphan testcontainers (pre-IT)
        shell: bash
        run: |
          docker ps --filter "label=org.testcontainers=true" \
            --format '{{.ID}} {{.Labels}}' | \
            awk '$0 !~ /reuse-hash/ {print $1}' | \
            xargs -r docker rm -f >/dev/null 2>&1 || true

      - name: Run unit + IT (common + trigger + worker-process + worker-dispatch)
        shell: bash
        run: |
          mvn verify -pl batch-common,batch-trigger,batch-worker-process,batch-worker-dispatch -am \
            -DskipITs=false -Dspotless.check.skip=true -Dpmd.skip=true \
            -Dit.test='!*E2eIT' \
            -fae -B

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-unit-it-b1-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          retention-days: 14

  # ===========================================================================
  # Job 4: it-shard-3 — worker-import + worker-export + console-api(中等 ~5min)
  # ===========================================================================
  unit-it-b2:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Cleanup orphan testcontainers (pre-IT)
        shell: bash
        run: |
          docker ps --filter "label=org.testcontainers=true" \
            --format '{{.ID}} {{.Labels}}' | \
            awk '$0 !~ /reuse-hash/ {print $1}' | \
            xargs -r docker rm -f >/dev/null 2>&1 || true

      - name: Run unit + IT (worker-import + worker-export + console-api)
        shell: bash
        run: |
          mvn verify -pl batch-worker-import,batch-worker-export,batch-console-api -am \
            -DskipITs=false -Dspotless.check.skip=true -Dpmd.skip=true \
            -Dit.test='!*E2eIT' \
            -fae -B

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-unit-it-b2-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          retention-days: 14

  # ===========================================================================
  # Job 4: security — secret scan(并发)
  # ===========================================================================
  security:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Install gitleaks
        shell: bash
        # security-scan jar 内部 fork 调 gitleaks 二进制(不内嵌),misc job 必须先装
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -fsSL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Security scan — secrets
        shell: bash
        # --skip-tests:绕开 security-scan 子模块单测(纯内部 orchestrator/options 逻辑,
        # 跟 scan 业务正确性无关;Java 25 + mockito javaagent 偶发 JVM crash 会让 PR 误挂)。
        # 单测仍由 main 的 full-ci-gate security-scan job 兜底覆盖。
        run: bash scripts/ci/security-scan.sh --skip-tests -- --mode=secret
