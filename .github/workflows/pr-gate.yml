name: pr-gate

on:
  workflow_dispatch:
  # feature 分支 push 即增量跑(scope 探测 partial/skip/full 三态,reflow 已 handle 非 PR 走 full)。
  # 让长生命周期 feature 分支 push 即知挂没挂,不用等开 PR 才发现,反馈延迟从 days → 15-25 min。
  # 同 full-ci-gate 同款 paths-ignore:纯文档/配置 commit 不触发。
  push:
    branches-ignore:
      - main          # main push 由 full-ci-gate 接管,本 workflow 不跑 main
    paths-ignore:
      - 'docs/runbook/**'
      - 'docs/analysis/**'
      - 'docs/architecture/**'
      - 'docs/design/**'
      - 'docs/backlog/**'
      - 'docs/review/**'
      - 'docs/changelog.md'
      - '*.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.editorconfig'
      - '.claude/**'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

# 同分支同时被 push + pull_request 触发(开了 PR 的 feature 分支再 push)时,
# 两个事件 ref 不同(push=refs/heads/<branch>, PR=<PR-number>),concurrency group 名也不同,
# 会跑 2 个并发 run。可接受 — 都用 scope 探测增量模式,实际开销小;cancel-in-progress
# 保证同事件 / 同 PR 内的旧 run 取消,不会堆积。
concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Detect affected scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          # PR 事件:base.sha 是目标分支(main)的最新 commit;push 事件:event.before 是上次 push 的 sha。
          # workflow_dispatch:无 base 概念,走 full reactor 兜底。
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          all_modules="batch-common,batch-trigger,batch-orchestrator,batch-worker-core,batch-worker-import,batch-worker-export,batch-worker-process,batch-worker-dispatch,batch-console-api,batch-e2e-tests"
          module_order=(
            batch-trigger
            batch-orchestrator
            batch-worker-core
            batch-worker-import
            batch-worker-export
            batch-worker-process
            batch-worker-dispatch
            batch-console-api
            batch-e2e-tests
          )

          # workflow_dispatch 手动触发或 BASE_SHA 缺失(分支首次 push, event.before 全 0) → full reactor 兜底
          if [[ "$EVENT_NAME" == "workflow_dispatch" || -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "maven_scope=full" >> "$GITHUB_OUTPUT"
            echo "maven_modules=$all_modules" >> "$GITHUB_OUTPUT"
            echo "run_load_tests_build=true" >> "$GITHUB_OUTPUT"
            {
              echo "## PR Gate Scope"
              echo
              echo "- Event: $EVENT_NAME"
              echo "- Scope: full reactor (no base ref / dispatch)"
              echo "- Modules: $all_modules"
              echo "- load-tests: test-compile"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # PR + push (feature 分支增量) 都走 scope 探测
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if (( ${#changed_files[@]} == 0 )); then
            echo "maven_scope=skip" >> "$GITHUB_OUTPUT"
            echo "maven_modules=" >> "$GITHUB_OUTPUT"
            echo "run_load_tests_build=false" >> "$GITHUB_OUTPUT"
            {
              echo "## PR Gate Scope"
              echo
              echo "- Event: $EVENT_NAME"
              echo "- Scope: skip"
              echo "- Reason: no changed files detected"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          declare -A selected_modules=()
          full_scope=false
          run_load_tests_build=false

          for file in "${changed_files[@]}"; do
            case "$file" in
              pom.xml|.mvn/*|.github/workflows/*|scripts/ci/*|scripts/local/*|helm/*|docker-compose.yml|batch-common/*)
                full_scope=true
                run_load_tests_build=true
                ;;
              batch-trigger/*)
                selected_modules[batch-trigger]=1
                ;;
              batch-orchestrator/*)
                selected_modules[batch-orchestrator]=1
                ;;
              batch-worker-core/*)
                selected_modules[batch-worker-core]=1
                ;;
              batch-worker-import/*)
                selected_modules[batch-worker-import]=1
                ;;
              batch-worker-export/*)
                selected_modules[batch-worker-export]=1
                ;;
              batch-worker-process/*)
                selected_modules[batch-worker-process]=1
                ;;
              batch-worker-dispatch/*)
                selected_modules[batch-worker-dispatch]=1
                ;;
              batch-console-api/*)
                selected_modules[batch-console-api]=1
                ;;
              batch-e2e-tests/*)
                selected_modules[batch-e2e-tests]=1
                ;;
              load-tests/*)
                run_load_tests_build=true
                ;;
            esac
          done

          if [[ "$full_scope" == "true" ]]; then
            maven_scope="full"
            maven_modules="$all_modules"
          else
            modules_csv=""
            for module in "${module_order[@]}"; do
              if [[ -n "${selected_modules[$module]:-}" ]]; then
                if [[ -z "$modules_csv" ]]; then
                  modules_csv="$module"
                else
                  modules_csv="$modules_csv,$module"
                fi
              fi
            done

            if [[ -n "$modules_csv" ]]; then
              maven_scope="partial"
              maven_modules="$modules_csv"
            else
              maven_scope="skip"
              maven_modules=""
            fi
          fi

          echo "maven_scope=$maven_scope" >> "$GITHUB_OUTPUT"
          echo "maven_modules=$maven_modules" >> "$GITHUB_OUTPUT"
          echo "run_load_tests_build=$run_load_tests_build" >> "$GITHUB_OUTPUT"

          {
            echo "## PR Gate Scope"
            echo
            echo "- Event: $EVENT_NAME"
            echo "- Changed files:"
            for file in "${changed_files[@]}"; do
              echo "  - $file"
            done
            echo "- Maven scope: $maven_scope"
            echo "- Maven modules: $maven_modules"
            echo "- load-tests: $run_load_tests_build"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate KAFKA_TOPICS sync (.env.prod ↔ BatchTopics.java ↔ .env.example/.env.local)
        shell: bash
        run: bash scripts/ci/validate-kafka-topics.sh

      - name: Validate Flyway schema (parse + checksum drift detection)
        shell: bash
        run: bash scripts/ci/validate-flyway-schema.sh

      - name: Run PR gate for full reactor
        if: steps.scope.outputs.maven_scope == 'full'
        shell: bash
        run: |
          bash scripts/ci/run-full-regression.sh --skip-it-suite

      - name: Run PR gate for affected modules
        if: steps.scope.outputs.maven_scope == 'partial'
        shell: bash
        run: |
          bash scripts/ci/run-full-regression.sh \
            --skip-it-suite \
            -- --pl "${{ steps.scope.outputs.maven_modules }}" -am -amd

      - name: Compile load-tests module
        if: steps.scope.outputs.run_load_tests_build == 'true'
        shell: bash
        run: |
          mvn -q -f load-tests/pom.xml test-compile

      - name: Report skipped Maven gate
        if: steps.scope.outputs.maven_scope == 'skip' && steps.scope.outputs.run_load_tests_build != 'true'
        shell: bash
        run: |
          echo "No reactor modules or load-tests sources were affected; skipping Maven gate."

      - name: Security scan — secrets
        if: steps.scope.outputs.maven_scope != 'skip'
        shell: bash
        # P1-4(2026-05-16):去掉 --skip-build。security-scan 不在根 reactor,fresh CI runner
        # 没有预构建的 jar,带 --skip-build 会直接 exit 1。让脚本内部 mvn package。
        run: bash scripts/ci/security-scan.sh -- --mode=secret

      - name: Verify generated dicts in sync
        shell: bash
        run: python3 scripts/codegen/gen-error-codes-dict.py --check

      - name: Verify yml ↔ docker-compose default sync
        shell: bash
        run: python3 scripts/ci/check-config-defaults-sync.py --check

      - name: Verify Console controller ↔ OpenAPI route sync
        shell: bash
        # 拦 BE 加 controller 端点但漏更 docs/api/console-api.openapi.yaml 的漂移。
        # 历史上多次出现:Web Push / Mermaid / admin/test-data 等端点写了 controller
        # 但 yaml 漏更,FE 跑 gen:api 拿不到 type,联调时才发现。
        run: python3 scripts/ci/check-console-openapi-paths.py

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-surefire-reports
          path: |
            **/target/surefire-reports/**
          retention-days: 14
