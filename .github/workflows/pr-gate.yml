name: pr-gate

# C 方案(2026-06-02):PR 只跑 unit + 文档全跳 + Merge Queue 入口。
# 历史背景:Round-1 TOP-7 把 e2e 分级到 smoke(本 workflow)+ regression(staging-gate)。
# C 方案进一步把 IT 也从 PR-gate 移除,IT/E2E 全部交给 full-ci-gate(main push 后兜底)+
# staging-gate(nightly)。PR-gate 只保留 static-checks + unit + security 三类快速反馈。
# 风险:main 偶尔会被 full-ci-gate 拦,该 PR 作者负责立即 revert + 修复。
# 详见 docs/runbook/ci-speedup-2026-06-02.md。
#
# Job 名(unit-it-a / unit-it-b1 / unit-it-b2)不动,因为 ruleset required check 配置在
# 这 3 个名字上;改名会导致 ruleset 失配。命令从 `mvn verify`(failsafe IT)改成
# `mvn test`(只跑 surefire unit)。
#
# affected 极小化:paths-ignore 在触发层拦"纯文档/yml/配置"改动;细粒度 docs-only PR
# 由 `changes` job 的 dorny/paths-filter 二次判定后跳过 3 个 unit job
# (skipped == SUCCESS,ruleset required check 不挂)。

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main          # main push 由 full-ci-gate 接管
    paths-ignore:
      - 'docs/runbook/**'
      - 'docs/analysis/**'
      - 'docs/architecture/**'
      - 'docs/design/**'
      - 'docs/backlog/**'
      - 'docs/review/**'
      - 'docs/changelog.md'
      - '*.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.editorconfig'
      - '.claude/**'
      # workflow yml 改动由 workflow-lint / codeql / actionlint / zizmor 独立 workflow 覆盖,
      # 不需要 pr-gate 重跑 maven。
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/CODEOWNERS'
      - '.github/zizmor.yml'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  # GitHub Merge Queue 入口(C 方案 #4):必须 list 在这里,merge queue 才会调用
  # pr-gate 作为 required check;ruleset required check 同时支持 PR 和 merge_group。
  # 启用 Merge Queue 后,合并通过 queue 串行化,可消除 main 被 broken 风险。
  # 启用指引见 docs/runbook/ci-speedup-2026-06-02.md。
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 0: changes — dorny/paths-filter 判定 docs-only PR(C 方案 #2)
  # 文档/示例-only PR 跳过 3 个 unit job(GitHub 把 skipped 算 SUCCESS,ruleset
  # required check 不挂),只保留 static-checks + security 兜底。
  # ===========================================================================
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # 任一 code 路径命中 => docs-only=false;全无命中 => docs-only=true。
      # merge_group / push 事件无 PR diff,paths-filter 直接判 true(执行 unit)。
      docs-only: ${{ steps.filter.outputs.code == 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # PR base 判 diff;非 PR 事件(merge_group / push)无 base,filter 视为 changed=true
          # (即 code=true / docs-only=false),保证安全 — 兜底跑 unit。
          filters: |
            code:
              - 'batch-*/**'
              - 'batch-worker-sdk-python/**'
              - 'db/migration/**'
              - 'scripts/**'
              - 'pom.xml'
              - '**/pom.xml'
              - '.github/workflows/**'
              - '.github/actions/**'

  # ===========================================================================
  # Job 1: static-checks — yml/dict/openapi/PMD/Spotless 等静态校验
  # 不依赖任何下游,与所有 maven job 并发起跑
  # ===========================================================================
  static-checks:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          # 0 = 全历史:migration-safety / openapi-breaking 守护要相对 base 做 diff。
          fetch-depth: 0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Install squawk + oasdiff (迁移/契约守护工具)
        shell: bash
        run: |
          npm install -g squawk-cli@2.58.0
          OASDIFF_VERSION=1.19.0
          curl -fsSL "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oasdiff
          squawk --version && oasdiff --version

      - name: Resolve guard base ref
        shell: bash
        run: |
          BASE="${{ github.base_ref || 'main' }}"
          git fetch --no-tags --depth=200 origin "$BASE" || git fetch --no-tags origin "$BASE"
          echo "GUARD_BASE=origin/${BASE}" >> "$GITHUB_ENV"

      - name: Validate KAFKA_TOPICS sync (.env.example ↔ BatchTopics.java)
        shell: bash
        # CI 没有 .env.prod / .env.local(均 gitignored),把 .env.example 作为
        # canonical 源(本就是 prod 的 1:1 模板)。本地仍用脚本默认 .env.prod。
        run: bash scripts/ci/validate-kafka-topics.sh .env.example

      - name: Validate Flyway schema (parse + checksum drift detection)
        shell: bash
        run: bash scripts/ci/validate-flyway-schema.sh

      - name: Verify generated dicts in sync
        shell: bash
        run: python3 scripts/codegen/gen-error-codes-dict.py --check

      - name: Verify yml ↔ docker-compose default sync
        shell: bash
        run: python3 scripts/ci/check-config-defaults-sync.py --check

      - name: Verify Console controller ↔ OpenAPI route sync
        shell: bash
        # 拦 BE 加 controller 端点但漏更 docs/api/console-api.openapi.yaml 的漂移。
        run: python3 scripts/ci/check-console-openapi-paths.py

      - name: Verify SQL/config placement boundaries
        shell: bash
        run: bash scripts/ci/check-sql-config-boundaries.sh

      - name: No JDK preview flags in prod build/run config
        shell: bash
        # 拦 JDK preview 启用标记进入生产构建/运行(load-tests benchmark 豁免)。脚本内有详细说明。
        run: bash scripts/ci/check-no-enable-preview.sh

      - name: Verify e2e shard lists cover all *E2eIT
        shell: bash
        # 守护 full-ci-gate / staging-gate 的硬编码 e2e shard 清单与实际 *E2eIT 一致,
        # 防新增 / 重命名后被静默漏跑(2026-06-14 实测漏 5 个)。
        run: bash scripts/ci/check-e2e-shard-coverage.sh

      - name: Verify CI -pl covers all tested reactor modules
        shell: bash
        # 守护根 reactor 里有测试的模块都被某 unit shard 的 -pl 覆盖,
        # 防新模块漏进 shard 被静默跳过(2026-06-14 实测 sdk×3 共 ~370 测试从未跑)。
        run: bash scripts/ci/check-module-test-coverage.sh

      - name: Migration safety lint (squawk, diff-only)
        shell: bash
        # 只扫本 PR 新增/改动的 db/migration,拦危险 DDL(DROP COLUMN / 改类型 / 加 UNIQUE 长锁等)。
        run: bash scripts/ci/check-migration-safety.sh "$GUARD_BASE"

      - name: OpenAPI breaking-change (oasdiff)
        shell: bash
        # 比 base 的 openapi,删端点/删必填/改类型等 ERR 级破坏即 fail。
        run: bash scripts/ci/check-openapi-breaking.sh "$GUARD_BASE"

      - name: Biz table multi-tenant + RLS guard
        shell: bash
        # biz.* 基表必须含 tenant_id 且进 strict RLS tables[] 数组。
        run: python3 scripts/ci/check-biz-table-tenant-rls.py

      - name: No silently-disabled tests
        shell: bash
        # @Disabled 必须带非空 reason(防覆盖率被静默掏空)。
        run: bash scripts/ci/check-no-silent-disabled-tests.sh

      - name: PMD + Spotless + dependency boundary
        shell: bash
        # test-compile 必要(PMD 需要 class 文件分析),不跑 surefire
        run: mvn -DskipTests test-compile pmd:check spotless:check -fae -B

  # ===========================================================================
  # 3 个 maven unit shard 按"压力均匀"分配,不按业务领域分。
  # C 方案(2026-06-02):只跑 surefire unit(`mvn test -DskipITs`),IT 已搬到
  # full-ci-gate(main push 兜底)+ staging-gate(nightly)。
  # job 名 unit-it-a / unit-it-b1 / unit-it-b2 保留(ruleset required check 锁定)。
  #
  # Job 2: unit-shard-1 — orchestrator + worker-core
  # ===========================================================================
  unit-it-a:
    needs: changes
    # docs-only PR skip(skipped == SUCCESS,ruleset 不挂);非 PR 事件 docs-only=false 必跑
    if: |
      needs.changes.outputs.docs-only != 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Run unit tests (orchestrator + worker-core + sdk×3)
        shell: bash
        # -am 编译上游;-DskipITs=true 跳 failsafe IT;跳 PMD/Spotless(在 static-checks job)
        # IT 由 full-ci-gate(main push 后)+ staging-gate(nightly)兜底
        run: |
          mvn test -pl batch-orchestrator,batch-worker-core,batch-worker-sdk,batch-worker-sdk-spring-boot-starter,batch-worker-sdk-testkit -am \
            -DskipITs=true -Dspotless.check.skip=true -Dpmd.skip=true \
            -fae -B

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-gate-unit-it-a-reports
          path: |
            **/target/surefire-reports/**
          retention-days: 14

  # ===========================================================================
  # Job 3: unit-shard-2 — common + trigger + worker-process + worker-dispatch
  # ===========================================================================
  unit-it-b1:
    needs: changes
    if: |
      needs.changes.outputs.docs-only != 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Run unit tests (common + trigger + worker-process + worker-dispatch)
        shell: bash
        run: |
          mvn test -pl batch-common,batch-trigger,batch-worker-process,batch-worker-dispatch -am \
            -DskipITs=true -Dspotless.check.skip=true -Dpmd.skip=true \
            -fae -B

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-gate-unit-it-b1-reports
          path: |
            **/target/surefire-reports/**
          retention-days: 14

  # ===========================================================================
  # Job 4: unit-shard-3 — worker-import + worker-export + worker-atomic + console-api
  # ===========================================================================
  unit-it-b2:
    needs: changes
    if: |
      needs.changes.outputs.docs-only != 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Run unit tests (worker-import + worker-export + worker-atomic + console-api)
        shell: bash
        run: |
          mvn test -pl batch-worker-import,batch-worker-export,batch-worker-atomic,batch-console-api -am \
            -DskipITs=true -Dspotless.check.skip=true -Dpmd.skip=true \
            -fae -B

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-gate-unit-it-b2-reports
          path: |
            **/target/surefire-reports/**
          retention-days: 14

  # ===========================================================================
  # NOTE: e2e-smoke 已从 pr-gate 移除(C 方案 #1)。
  # E2E(smoke + regression)全部交给 staging-gate.yml(nightly,4 shard 并发)
  # 和 full-ci-gate.yml(main push 后兜底)。
  # 如需 PR 阶段重新引入 smoke,从 git history 恢复 e2e-smoke job。
  # ===========================================================================

  # ===========================================================================
  # Job 5: security — secret scan(并发)
  # ===========================================================================
  security:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Install gitleaks
        shell: bash
        # security-scan jar 内部 fork 调 gitleaks 二进制(不内嵌),misc job 必须先装
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -fsSL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Security scan — secrets
        shell: bash
        # --skip-tests:绕开 security-scan 子模块单测(纯内部 orchestrator/options 逻辑,
        # 跟 scan 业务正确性无关;Java 25 + mockito javaagent 偶发 JVM crash 会让 PR 误挂)。
        # 单测仍由 main 的 full-ci-gate security-scan job 兜底覆盖。
        run: bash scripts/ci/security-scan.sh --skip-tests -- --mode=secret
