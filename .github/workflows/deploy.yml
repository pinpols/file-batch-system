name: deploy

# build-image 成功 → 自托管 runner 在部署机本地 docker compose build 构建镜像并重启本地 compose。
# (不再从 GHCR 拉镜像:镜像私有 + 本机走 VPN 代理拉取慢/常卡;部署机即构建机,本地 build 更稳。
#  代价:构建的是 checkout 出来的 feature/docker-deploy 源码 → 该分支需与 main 保持同步才是最新代码。)
#
# 配置注入:所有部署变量改从仓库 Variables / Secrets 读,经 job env 块透传给 docker compose
#   (compose 直接从进程环境插值 ${VAR},不再 --env-file .env.local)。
#   原因:.env.local 被 .gitignore,CI checkout 取不到 → 老写法 --env-file 必然 file-not-found,
#   且 ${POSTGRES_PASSWORD} 等会插值成空 → up -d 判定配置漂移重建基础设施,毁掉正在跑的库。
#   变量值的权威源是仓库 Settings → Secrets and variables → Actions(首次从 .env.local 灌入)。
#
# 前提:
#   1) 自托管 runner 装在部署机,labels = [self-hosted, deploy, windows]。
#   2) 部署机的 docker daemon 在跑(Docker Desktop 启动状态)。
#   3) 仓库已配齐下方 env 块引用的 Variables(34)+ Secrets(8)。缺任一关键项,
#      下面「校验关键变量」步骤会 fail-fast,不会带空值去 up。
#   4) 本地构建,无需 GHCR 登录 / packages:read（部署机需能拉 docker.io 基础镜像 + Maven 依赖）。
#
# 触发:
#   - workflow_run: 监听 build-image 成功(只 main 分支)
#   - workflow_dispatch: 手动重跑(回滚/调试用)

on:
  workflow_run:
    workflows: ["build-image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像 tag (默认 latest,可填 sha-<full> 精确部署某次构建)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-main
  cancel-in-progress: false   # 部署串行,不打断进行中的

jobs:
  deploy:
    # 仅当 build-image 成功(或手动触发)才部署
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, deploy, windows]
    timeout-minutes: 20

    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}

      # ── 全局 / compose ──（COMPOSE_PROJECT_NAME 必须对齐现有 stack,否则会另起一套新栈）
      COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
      BATCH_TIMEZONE_DEFAULT_ZONE: ${{ vars.BATCH_TIMEZONE_DEFAULT_ZONE }}
      BATCH_LOCALE: ${{ vars.BATCH_LOCALE }}

      # ── Postgres 主库 ──
      POSTGRES_IMAGE_TAG: ${{ vars.POSTGRES_IMAGE_TAG }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      # ── Postgres 只读副本(profile: replica）──
      POSTGRES_REPLICATION_USER: ${{ vars.POSTGRES_REPLICATION_USER }}
      POSTGRES_REPLICA_PORT: ${{ vars.POSTGRES_REPLICA_PORT }}
      POSTGRES_REPLICATION_PASSWORD: ${{ secrets.POSTGRES_REPLICATION_PASSWORD }}
      BATCH_CONSOLE_READ_REPLICA_ENABLED: ${{ vars.BATCH_CONSOLE_READ_REPLICA_ENABLED }}
      BATCH_CONSOLE_REPLICA_URL: ${{ vars.BATCH_CONSOLE_REPLICA_URL }}
      BATCH_CONSOLE_REPLICA_USER: ${{ vars.BATCH_CONSOLE_REPLICA_USER }}
      BATCH_CONSOLE_REPLICA_PASSWORD: ${{ secrets.BATCH_CONSOLE_REPLICA_PASSWORD }}

      # ── Kafka ──
      KAFKA_IMAGE_TAG: ${{ vars.KAFKA_IMAGE_TAG }}
      KAFKA_HOST_PORT: ${{ vars.KAFKA_HOST_PORT }}
      KAFKA_DEFAULT_PARTITIONS: ${{ vars.KAFKA_DEFAULT_PARTITIONS }}
      KAFKA_TOPICS: ${{ vars.KAFKA_TOPICS }}

      # ── MinIO ──
      MINIO_API_PORT: ${{ vars.MINIO_API_PORT }}
      MINIO_CONSOLE_PORT: ${{ vars.MINIO_CONSOLE_PORT }}
      MINIO_IMAGE_TAG: ${{ vars.MINIO_IMAGE_TAG }}
      MINIO_MC_IMAGE_TAG: ${{ vars.MINIO_MC_IMAGE_TAG }}
      MINIO_PROMETHEUS_AUTH_TYPE: ${{ vars.MINIO_PROMETHEUS_AUTH_TYPE }}
      MINIO_ROOT_USER: ${{ vars.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
      MINIO_BUCKET: ${{ vars.MINIO_BUCKET }}

      # ── Redis ──
      REDIS_IMAGE_TAG: ${{ vars.REDIS_IMAGE_TAG }}
      REDIS_PORT: ${{ vars.REDIS_PORT }}
      BATCH_REDIS_HOST: ${{ vars.BATCH_REDIS_HOST }}

      # ── console-api / 业务开关 ──
      CONSOLE_API_PORT: ${{ vars.CONSOLE_API_PORT }}
      BATCH_CONSOLE_INSTANCE_ID: ${{ vars.BATCH_CONSOLE_INSTANCE_ID }}
      BATCH_CONSOLE_REALTIME_REPLAY_MAX_ENTRIES: ${{ vars.BATCH_CONSOLE_REALTIME_REPLAY_MAX_ENTRIES }}
      BATCH_CONSOLE_REALTIME_REPLAY_TTL: ${{ vars.BATCH_CONSOLE_REALTIME_REPLAY_TTL }}
      BATCH_SECURITY_BYPASS_MODE: ${{ vars.BATCH_SECURITY_BYPASS_MODE }}

      # ── 应用对外端口 ──
      TRIGGER_PORT: ${{ vars.TRIGGER_PORT }}
      ORCHESTRATOR_PORT: ${{ vars.ORCHESTRATOR_PORT }}

      # ── MinIO 应用侧凭证 + 其它必填密码 ──
      BATCH_MINIO_ACCESS_KEY: ${{ vars.BATCH_MINIO_ACCESS_KEY }}
      BATCH_MINIO_SECRET_KEY: ${{ secrets.BATCH_MINIO_SECRET_KEY }}
      BATCH_PLATFORM_DB_PASSWORD: ${{ secrets.BATCH_PLATFORM_DB_PASSWORD }}
      BATCH_BUSINESS_DB_PASSWORD: ${{ secrets.BATCH_BUSINESS_DB_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout 部署分支 (含 compose / PS 脚本)
        uses: actions/checkout@v4
        with:
          ref: feature/docker-deploy

      - name: 校验关键变量非空 (防空值带去 up 重建基础设施)
        shell: pwsh
        run: |
          $req = [ordered]@{
            COMPOSE_PROJECT_NAME = $env:COMPOSE_PROJECT_NAME
            CONSOLE_API_PORT     = $env:CONSOLE_API_PORT
            POSTGRES_DB          = $env:POSTGRES_DB
            POSTGRES_USER        = $env:POSTGRES_USER
            POSTGRES_PASSWORD    = $env:POSTGRES_PASSWORD
            POSTGRES_PORT        = $env:POSTGRES_PORT
            KAFKA_HOST_PORT      = $env:KAFKA_HOST_PORT
            MINIO_ROOT_PASSWORD  = $env:MINIO_ROOT_PASSWORD
          }
          $missing = $req.GetEnumerator() | Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } | ForEach-Object { $_.Key }
          if ($missing) { throw "关键变量为空(去仓库 Settings → Secrets and variables → Actions 补): $($missing -join ', ')" }
          Write-Host "✔ 关键变量齐全; COMPOSE_PROJECT_NAME=$env:COMPOSE_PROJECT_NAME CONSOLE_API_PORT=$env:CONSOLE_API_PORT"

      - name: 显示部署上下文
        shell: pwsh
        run: |
          Write-Host "触发:        $env:GITHUB_EVENT_NAME"
          Write-Host "镜像 tag:    $env:IMAGE_TAG"
          Write-Host "ref:         $env:GITHUB_REF"
          Write-Host "sha:         $env:GITHUB_SHA"
          docker version --format '{{.Server.Version}}' | ForEach-Object { "docker:       $_" }

      - name: 本地构建镜像 (apps + replica;部署机本地 build,不从 GHCR 拉)
        shell: pwsh
        run: |
          docker compose `
            -f docker-compose.yml `
            -f docker/compose/app.yml `
            --profile apps --profile replica `
            build

      - name: 重启服务 (apps + replica)
        shell: pwsh
        run: |
          docker compose `
            -f docker-compose.yml `
            -f docker/compose/app.yml `
            --profile apps --profile replica `
            up -d --no-build --remove-orphans --wait --wait-timeout 300

      - name: 验证健康
        shell: pwsh
        run: |
          docker compose `
            -f docker-compose.yml `
            -f docker/compose/app.yml `
            --profile apps --profile replica `
            ps
          # console-api 是前端唯一直接调用的对外面,单独再 probe 一下(端口直接读 env)
          $port = $env:CONSOLE_API_PORT
          Write-Host "probe http://localhost:$port/actuator/health"
          $r = Invoke-WebRequest "http://localhost:$port/actuator/health" -UseBasicParsing -TimeoutSec 10
          # actuator 响应 Content-Type 非纯文本,PowerShell 把 .Content 返成 byte[] → 先 UTF8 解码再匹配,否则正则恒不中→误判 not UP
          $body = if ($r.Content -is [byte[]]) { [System.Text.Encoding]::UTF8.GetString($r.Content) } else { [string]$r.Content }
          if ($body -notmatch '"status"\s*:\s*"UP"') { throw "console-api 不 UP: $body" }
          Write-Host "✔ console-api UP"

      - name: 清理悬挂镜像
        if: always()
        shell: pwsh
        run: docker image prune -f
