name: sdk-orchestrator-e2e

# =============================================================================
# BYO SDK 样例 worker × 真 orchestrator 端到端(nightly / 非阻塞)
#
# 补 SDK 测试最大缺口:per-PR 的 sdk-contract-parity / live-transport 只打 fake HTTP
# stub + 真 Kafka;真实 orchestrator 的鉴权 / worker 注册 / 心跳 directive 往返从未
# 被覆盖。本 wf 起真 orchestrator + trigger + 基础设施,让一个真实样例 worker
# (examples/self-hosted-sdk/sample-tenant-worker-<lang>)用真 API-key 连真 orchestrator。
#
# 断言分两阶段(见 scripts/ci/run-sdk-orchestrator-e2e.sh):
#   A 硬断言(路由无关):worker 用真 API-key 注册 + 心跳 → worker_registry 落行。
#     ⇒ 直接覆盖审计点名的"真鉴权/注册/心跳从未测,只有 fake stub"。
#   B best-effort:触发 launch + 轮询 job_instance,首跑摸排派单链路(只记录不硬挂)。
#
# **非阻塞**:本 wf **不**进分支保护 required checks。v1 触发 = nightly cron + 手动
# (workflow_dispatch);PR-path 触发待首跑校准后再加。e2e 真栈本就不适合当每-PR
# 硬门禁(~数分钟启动 + 偶发 flaky)。
#
# ⚠ 首跑摸排:全栈无法在开发机本地起(已知 mac JDK25 fat-jar loader 卡死 + 需整套
# docker);本 wf 基于已验证的 up-apps.sh 启动 + load-system-test-data.sh 播种构建,
# 首次 workflow_dispatch 运行用于校准阶段 B 的派单路由(SDK 消费 tenant 通配 +
# 与内建 worker 竞争 claim)。诊断(容器日志 / DB 行 / worker 日志)失败时全量打印。
# =============================================================================

on:
  schedule:
    - cron: '0 18 * * *'   # 每日 02:00 Asia/Shanghai(UTC 18:00)
  workflow_dispatch:
  # 注:v1 仅 schedule + 手动。pull_request(改 sdk/examples 路径)触发待首次
  # workflow_dispatch 跑通、阶段 B 派单路由校准后再加(否则每个 SDK PR 都会看到一
  # 条尚未校准的红 e2e check)。本 lane 始终**非阻塞**(不进分支保护 required checks)。

permissions:
  contents: read

concurrency:
  group: sdk-orchestrator-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk-orchestrator-e2e:
    name: sdk e2e (${{ matrix.lang }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # java 是新接入的第 3 条腿(#649 GA 对齐):先 non-blocking 跑一轮验证真 orchestrator
    # 往返(register/claim/report),绿稳后再去掉本行转阻塞。go/python 仍阻塞。
    continue-on-error: ${{ matrix.lang == 'java' }}
    strategy:
      fail-fast: false
      matrix:
        lang: [go, python, java]
    env:
      # 与 .env.example 对齐(本地/CI 同一套 dev 默认)。
      BATCH_PLATFORM_DB_PASSWORD: batch_pass_123
      POSTGRES_PORT: '15432'
      KAFKA_HOST_PORT: '19092'
      KAFKA_CONTAINER: batch-kafka
      TENANT: default-tenant
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Python
        if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 25
        if: matrix.lang == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Prepare env file
        # .env.example 故意不含 3 个 :? required 密钥(BATCH_PLATFORM/BUSINESS_DB_PASSWORD、
        # BATCH_INTERNAL_SECRET);compose 解析全量 service(含 worker-export)时即便只起
        # orchestrator+trigger 也要这些插值齐全,否则 boot 直接挂。CI 用 dev 占位补齐。
        run: |
          cp .env.example .env.local
          {
            echo "BATCH_PLATFORM_DB_PASSWORD=batch_pass_123"
            echo "BATCH_BUSINESS_DB_PASSWORD=batch_pass_123"
            echo "BATCH_INTERNAL_SECRET=ci-e2e-internal-secret-0123456789abcdef"
            # 容器用 ci profile(BatchProfileSupport.NON_PROD_PROFILES 之一 → 不触发
            # 强密钥 fail-fast;且无 application-ci.yml → 只走 application.yml + batch-defaults
            # 的 env 驱动 URL,compose 已把这些 env 默认成容器地址 postgres-primary/kafka/minio)。
            # ⚠ 不能用 local(application-local.yml 硬编码 localhost:15432 + bypass-mode=true,
            # 容器连不上 DB 且会绕过鉴权);不能用未知名如 docker(fail-secure 当 prod → 强密钥拒启)。
            echo "SPRING_PROFILES_ACTIVE=ci"
          } >> .env.local

      - name: Use Maven Central for image build (CI runners)
        # Dockerfile.app COPY docker/settings.xml 强制 aliyun mirror(为团队 China dev
        # 环境避开其 18081 代理下的 Central 不稳);但 GitHub US runner 打 aliyun 反而
        # 频繁 502 / 慢。CI 里覆盖成无 mirror 的默认 settings,走 Maven Central(GH→Central
        # 稳定且有缓存)。仅改本次 checkout 工作副本,不影响仓库提交的 dev 默认。
        # 无 <?xml?> 声明的最简 settings(根元素前的空白无害,避免 heredoc 缩进破坏声明)。
        run: echo '<settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"></settings>' > docker/settings.xml

      - name: Boot orchestrator (owns Flyway; migrates platform schema on start)
        # orchestrator 自带 Flyway(compose 未对它 disable),启动即迁移 batch.* 全 schema。
        # trigger 的 Flyway 是 disabled,依赖 orchestrator 先迁好,故 orchestrator 先起、
        # 等它 healthy(= 迁移完成)再起 trigger。compose build 在 runner 上构建镜像(较慢)。
        run: bash scripts/docker/up-apps.sh orchestrator

      - name: Wait for orchestrator health (schema migrated)
        run: |
          for _ in $(seq 1 100); do
            curl -fsS http://localhost:18082/actuator/health 2>/dev/null | grep -q '"status":"UP"' && { echo "orchestrator UP"; break; }
            sleep 5
          done
          curl -fsS http://localhost:18082/actuator/health | grep -q '"status":"UP"' || { echo "orchestrator not UP"; docker logs batch-orchestrator --tail 120 || true; exit 1; }

      - name: Boot trigger (schema ready)
        run: bash scripts/docker/up-apps.sh trigger

      - name: Wait for orchestrator + trigger health
        run: |
          for _ in $(seq 1 80); do
            curl -fsS http://localhost:18082/actuator/health 2>/dev/null | grep -q '"status":"UP"' && \
            curl -fsS http://localhost:18081/actuator/health 2>/dev/null | grep -q '"status":"UP"' && \
              { echo "orchestrator + trigger UP"; break; }
            sleep 5
          done
          curl -fsS http://localhost:18082/actuator/health | grep -q '"status":"UP"' || { echo "orchestrator not UP"; docker logs batch-orchestrator --tail 80 || true; exit 1; }

      - name: Seed system test data (best-effort; stage B needs job defs)
        # 阶段 A(注册断言)不依赖 seed;阶段 B 的 atomic_shell_demo job 需 platform_seed。
        # MinIO/business 部分在 CI 偶有缺工具,失败不阻断(阶段 A 仍跑)。
        run: |
          bash scripts/data/load-system-test-data.sh || echo "WARN: seed partial (stage B may be limited)"

      - name: Run SDK × real-orchestrator e2e (${{ matrix.lang }})
        run: bash scripts/ci/run-sdk-orchestrator-e2e.sh "${{ matrix.lang }}"

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::orchestrator"; docker logs batch-orchestrator --tail 200 2>/dev/null || true; echo "::endgroup::"
          echo "::group::trigger"; docker logs batch-trigger --tail 120 2>/dev/null || true; echo "::endgroup::"
          docker ps -a || true

      - name: Tear down
        if: always()
        run: |
          docker compose --env-file .env.local -f docker-compose.yml -f docker/compose/app.yml \
            --profile apps --profile replica down -v --remove-orphans || true
