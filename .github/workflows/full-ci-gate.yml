name: full-ci-gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    # 纯文档 / 许可证 / 编辑器配置 改动不触发 full reactor(75min) + 后续 staging-gate(90min)。
    # 注意:docs/api/** 是契约文档(OpenAPI + protocol),不在 ignore 列表 — schema 漂移仍要 CI 兜底。
    # 注意:db/migration/** / helm/** / scripts/** / pom.xml / .github/workflows/** 都不 ignore。
    paths-ignore:
      - 'docs/runbook/**'
      - 'docs/analysis/**'
      - 'docs/architecture/**'
      - 'docs/design/**'
      - 'docs/backlog/**'
      - 'docs/review/**'
      - 'docs/changelog.md'
      - '*.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.editorconfig'
      - '.claude/**'

permissions:
  contents: read

concurrency:
  group: full-ci-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: 静态检查(PMD + Spotless + dependency boundary)。
  # 独立小 job(~3-5 min),跟 unit-it 测试并发跑。
  # ===========================================================================
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: PMD + Spotless + dependency boundary
        shell: bash
        run: |
          # test-compile 必要(PMD 需要 class 文件分析),不跑 surefire
          mvn -DskipTests test-compile pmd:check spotless:check -fae -B

  # ===========================================================================
  # Job 2: unit-it-a — common + trigger + orchestrator(大头是 orchestrator IT)
  # 本地 ~6 min,CI ~12-14 min(含 m2 cache cold + testcontainer pull)。
  # ===========================================================================
  unit-it-a:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Cleanup orphan testcontainers (pre-IT)
        shell: bash
        run: |
          docker ps --filter "label=org.testcontainers=true" \
            --format '{{.ID}} {{.Labels}}' | \
            awk '$0 !~ /reuse-hash/ {print $1}' | \
            xargs -r docker rm -f >/dev/null 2>&1 || true

      - name: Run unit + IT (common + trigger + orchestrator)
        shell: bash
        # -am 编译上游(本组无上游,但安全起见)。-fae 让所有 module 跑完再退出。
        # 跳 PMD/Spotless(已在 static-checks job)。
        run: |
          mvn verify -pl batch-common,batch-trigger,batch-orchestrator -am \
            -DskipITs=false -Dspotless.check.skip=true -Dpmd.skip=true \
            -fae -B

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-unit-it-a-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          retention-days: 14

  # ===========================================================================
  # Job 3: unit-it-b — worker-* + console-api
  # 本地 ~7:30,CI ~12-14 min。
  # ===========================================================================
  unit-it-b:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Cleanup orphan testcontainers (pre-IT)
        shell: bash
        run: |
          docker ps --filter "label=org.testcontainers=true" \
            --format '{{.ID}} {{.Labels}}' | \
            awk '$0 !~ /reuse-hash/ {print $1}' | \
            xargs -r docker rm -f >/dev/null 2>&1 || true

      - name: Run unit + IT (worker-* + console-api)
        shell: bash
        # -am 让 worker / console-api 上游(common)被编译,不跑上游测试
        run: |
          mvn verify -pl batch-worker-core,batch-worker-import,batch-worker-export,batch-worker-process,batch-worker-dispatch,batch-console-api -am \
            -DskipITs=false -Dspotless.check.skip=true -Dpmd.skip=true \
            -fae -B

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-unit-it-b-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          retention-days: 14

  # ===========================================================================
  # Job 2: security scans — 拆独立 job 跟 unit-it 并发跑,省 2-3 min wall-clock。
  # 4 个扫描串行(单 job 内): gitleaks secret / mvn deps / hadolint / trivy fs。
  # 不依赖 unit-it 跑结果,失败独立报错不阻塞测试 job 上传 surefire。
  # ===========================================================================
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Install gitleaks
        shell: bash
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -fsSL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Security scan — secrets
        shell: bash
        run: bash scripts/ci/security-scan.sh -- --mode=secret

      - name: Install trivy
        shell: bash
        run: |
          TRIVY_VERSION=0.70.0
          curl -fsSL -o /tmp/trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Security scan — dependencies
        shell: bash
        run: bash scripts/ci/security-scan.sh --skip-build -- --mode=deps

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.app
          failure-threshold: warning

      - name: Container security scan — Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: vuln,config

  # ===========================================================================
  # Job 3: e2e shard matrix。22 个 *E2eIT 按 LPT 均衡分成 4 组,并发跑。
  # 单 shard 预期 ~6-8 min(含 setup + testcontainers 启动)。
  # 4 shard 并发:总 wall-clock ~8-10 min,而非串行 25 min。
  #
  # 分组 baseline 数据来自 docs/runbook/e2e-it-optimization-2026-05-22.md:
  #   shard1: 338s   shard2: 292s   shard3: 334s   shard4: 334s
  # ===========================================================================
  e2e-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    strategy:
      fail-fast: false
      matrix:
        shard:
          - id: 1
            label: "338s ←最长 shard"
            tests: >-
              WorkerProcessRestartRecoveryE2eIT,
              ExportFailurePipelineE2eIT,
              WorkerDrainE2eIT,
              ProcessPipelineE2eIT,
              OutboxForwarderRetryE2eIT
          - id: 2
            label: "292s"
            tests: >-
              ImportFailureE2eIT,
              FullChainTenantPropagationE2eIT,
              ImportFailurePipelineE2eIT,
              ExportPipelineE2eIT,
              TriggerAsyncLaunchFullChainE2eIT
          - id: 3
            label: "334s"
            tests: >-
              DeadLetterApprovalReplayE2eIT,
              DispatchFailurePipelineE2eIT,
              MultiTenantConcurrentE2eIT,
              ProcessFailurePipelineE2eIT,
              OutboxForwarderE2eIT,
              SensorWaitFixtureE2eIT
          - id: 4
            label: "334s"
            tests: >-
              ExportStorageFailureE2eIT,
              DispatchPipelineE2eIT,
              ExportContentVerificationE2eIT,
              ImportPipelineE2eIT,
              DedupJobLaunchE2eIT,
              OutboxPollMarginsYamlE2eIT
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Install upstream modules to ~/.m2 (skip tests)
        shell: bash
        # `test-compile` 不够:e2e-tests 跑 surefire 时 Maven 从 ~/.m2 解析 sibling
        # module(batch-worker-dispatch / batch-common:tests 等)的 jar/test-jar,
        # 必须 install 到本地仓库。
        # `-pl !batch-e2e-tests`:排除 e2e-tests 自身(它没有 surefire 跳过后的 jar
        # artifact,直接 install 会因「packaging plugin did not assign a file」失败)。
        # `-DskipTests` 跳上游测试(unit-it job 已跑过),只取 jar/test-jar。
        run: |
          mvn install -DskipTests -pl '!batch-e2e-tests' -B

      - name: Run E2E shard ${{ matrix.shard.id }} (${{ matrix.shard.label }})
        shell: bash
        run: |
          # `-Dtest=` 给 surefire 指定要跑的 IT class 列表(逗号分隔)。
          # batch-e2e-tests 用 surefire 而非 failsafe 跑 *E2eIT(见该 module pom)。
          TESTS="${{ matrix.shard.tests }}"
          # 去掉 YAML 折行引入的空白
          TESTS=$(echo "$TESTS" | tr -d ' \n')
          mvn test -pl batch-e2e-tests \
            -Dtest="$TESTS" \
            -Dsurefire.failIfNoSpecifiedTests=false -B

      - name: Upload E2E shard ${{ matrix.shard.id }} reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-e2e-shard-${{ matrix.shard.id }}-reports
          path: |
            batch-e2e-tests/target/surefire-reports/**
          retention-days: 14
