name: full-ci-gate

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: full-ci-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-ci-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          compile-load-tests: "true"

      - name: Run full CI gate
        shell: bash
        run: |
          bash scripts/ci/run-full-regression.sh

      - name: Security scan — secrets
        continue-on-error: true
        shell: bash
        run: bash scripts/ci/security-scan.sh -- --mode=secret

      - name: Security scan — dependencies
        continue-on-error: true
        shell: bash
        run: bash scripts/ci/security-scan.sh --skip-build -- --mode=deps

      - name: Lint Dockerfile
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.app
          failure-threshold: warning

      - name: Container security scan — Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          scanners: vuln,config

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-surefire-reports
          path: |
            **/target/surefire-reports/**
          retention-days: 14
