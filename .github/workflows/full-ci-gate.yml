name: full-ci-gate

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: full-ci-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-ci-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          compile-load-tests: "true"

      - name: Run full CI gate
        shell: bash
        run: |
          bash scripts/ci/run-full-regression.sh

      - name: Install gitleaks
        shell: bash
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -fsSL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Security scan — secrets
        shell: bash
        run: bash scripts/ci/security-scan.sh -- --mode=secret

      - name: Install trivy
        shell: bash
        run: |
          TRIVY_VERSION=0.55.2
          curl -fsSL -o /tmp/trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Security scan — dependencies
        shell: bash
        run: bash scripts/ci/security-scan.sh --skip-build -- --mode=deps

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.app
          failure-threshold: warning

      - name: Container security scan — Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: vuln,config

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-surefire-reports
          path: |
            **/target/surefire-reports/**
          retention-days: 14
