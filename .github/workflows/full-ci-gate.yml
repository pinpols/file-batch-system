name: full-ci-gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    # 纯文档 / 许可证 / 编辑器配置 改动不触发 full reactor(75min) + 后续 staging-gate(90min)。
    # 注意:docs/api/** 是契约文档(OpenAPI + protocol),不在 ignore 列表 — schema 漂移仍要 CI 兜底。
    # 注意:db/migration/** / helm/** / scripts/** / pom.xml / .github/workflows/** 都不 ignore。
    paths-ignore:
      - 'docs/runbook/**'
      - 'docs/analysis/**'
      - 'docs/architecture/**'
      - 'docs/design/**'
      - 'docs/backlog/**'
      - 'docs/review/**'
      - 'docs/changelog.md'
      - '*.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.editorconfig'
      - '.claude/**'

permissions:
  contents: read

concurrency:
  group: full-ci-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: unit + IT(剔除 batch-e2e-tests)+ security scans
  # 预期 ~14-18 min。e2e suite 拆到 e2e-shard job 并发跑。
  # ===========================================================================
  unit-it:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          compile-load-tests: "true"

      - name: Run unit + IT (skip e2e suite)
        shell: bash
        run: |
          bash scripts/ci/run-full-regression.sh --skip-it-suite

      - name: Install gitleaks
        shell: bash
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -fsSL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Security scan — secrets
        shell: bash
        run: bash scripts/ci/security-scan.sh -- --mode=secret

      - name: Install trivy
        shell: bash
        run: |
          TRIVY_VERSION=0.55.2
          curl -fsSL -o /tmp/trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Security scan — dependencies
        shell: bash
        run: bash scripts/ci/security-scan.sh --skip-build -- --mode=deps

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.app
          failure-threshold: warning

      - name: Container security scan — Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: vuln,config

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-unit-it-reports
          path: |
            **/target/surefire-reports/**
          retention-days: 14

  # ===========================================================================
  # Job 2: e2e shard matrix。22 个 *E2eIT 按 LPT 均衡分成 4 组,并发跑。
  # 单 shard 预期 ~6-8 min(含 setup + testcontainers 启动)。
  # 4 shard 并发:总 wall-clock ~8-10 min,而非串行 25 min。
  #
  # 分组 baseline 数据来自 docs/runbook/e2e-it-optimization-2026-05-22.md:
  #   shard1: 338s   shard2: 292s   shard3: 334s   shard4: 334s
  # ===========================================================================
  e2e-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    strategy:
      fail-fast: false
      matrix:
        shard:
          - id: 1
            label: "338s ←最长 shard"
            tests: >-
              WorkerProcessRestartRecoveryE2eIT,
              ExportFailurePipelineE2eIT,
              WorkerDrainE2eIT,
              ProcessPipelineE2eIT,
              OutboxForwarderRetryE2eIT
          - id: 2
            label: "292s"
            tests: >-
              ImportFailureE2eIT,
              FullChainTenantPropagationE2eIT,
              ImportFailurePipelineE2eIT,
              ExportPipelineE2eIT,
              TriggerAsyncLaunchFullChainE2eIT
          - id: 3
            label: "334s"
            tests: >-
              DeadLetterApprovalReplayE2eIT,
              DispatchFailurePipelineE2eIT,
              MultiTenantConcurrentE2eIT,
              ProcessFailurePipelineE2eIT,
              OutboxForwarderE2eIT,
              SensorWaitFixtureE2eIT
          - id: 4
            label: "334s"
            tests: >-
              ExportStorageFailureE2eIT,
              DispatchPipelineE2eIT,
              ExportContentVerificationE2eIT,
              ImportPipelineE2eIT,
              DedupJobLaunchE2eIT,
              OutboxPollMarginsYamlE2eIT
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Install upstream modules to ~/.m2 (skip tests)
        shell: bash
        # `test-compile` 不够:e2e-tests 跑 surefire 时 Maven 从 ~/.m2 解析 sibling
        # module(batch-worker-dispatch / batch-common:tests 等)的 jar/test-jar,
        # 必须 install 到本地仓库。
        # `-pl !batch-e2e-tests`:排除 e2e-tests 自身(它没有 surefire 跳过后的 jar
        # artifact,直接 install 会因「packaging plugin did not assign a file」失败)。
        # `-DskipTests` 跳上游测试(unit-it job 已跑过),只取 jar/test-jar。
        run: |
          mvn install -DskipTests -pl '!batch-e2e-tests' -B

      - name: Run E2E shard ${{ matrix.shard.id }} (${{ matrix.shard.label }})
        shell: bash
        run: |
          # `-Dtest=` 给 surefire 指定要跑的 IT class 列表(逗号分隔)。
          # batch-e2e-tests 用 surefire 而非 failsafe 跑 *E2eIT(见该 module pom)。
          TESTS="${{ matrix.shard.tests }}"
          # 去掉 YAML 折行引入的空白
          TESTS=$(echo "$TESTS" | tr -d ' \n')
          mvn test -pl batch-e2e-tests \
            -Dtest="$TESTS" \
            -Dsurefire.failIfNoSpecifiedTests=false -B

      - name: Upload E2E shard ${{ matrix.shard.id }} reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-e2e-shard-${{ matrix.shard.id }}-reports
          path: |
            batch-e2e-tests/target/surefire-reports/**
          retention-days: 14
