name: full-ci-gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: full-ci-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  full-ci-gate:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify console OpenAPI matches controllers
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml
          python3 scripts/ci/check-console-openapi-paths.py

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Compile load-tests module
        shell: bash
        run: |
          mvn -q -f load-tests/pom.xml test-compile

      - name: Run full CI gate
        shell: bash
        run: |
          bash scripts/ci/run-full-regression.sh

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-surefire-reports
          path: |
            **/target/surefire-reports/**
