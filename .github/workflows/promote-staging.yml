name: promote-staging

# build-image 成功后,自动到 ops repo 提 PR 把 staging values 的 7 个 image.tag 更新到当前 sha。
# 不直接 push,统一走 PR 让 ops 团队 review + merge,merge 后由 Argo CD 自动 sync。
# 前置:仓库 Secrets 配 OPS_REPO_TOKEN(PAT,写权限到 file-batch-system-ops repo)。
on:
  workflow_run:
    workflows:
      - build-image
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  promote:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPS_REPO: pinpols/file-batch-system-ops
      OPS_BRANCH_BASE: main
      APP_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      # 缺 OPS_REPO_TOKEN 时干净跳过(不 fail,出 warning),
      # 配 PAT 后自动进正常流程。
      - name: Preflight — require OPS_REPO_TOKEN
        id: preflight
        env:
          TOKEN: ${{ secrets.OPS_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::OPS_REPO_TOKEN not configured — skipping promote-staging."
            echo "::warning::配置: Settings → Secrets and variables → Actions → OPS_REPO_TOKEN (PAT, write to ${{ env.OPS_REPO }})"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout ops repo
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ env.OPS_REPO }}
          token: ${{ secrets.OPS_REPO_TOKEN }}
          ref: ${{ env.OPS_BRANCH_BASE }}
          path: ops

      - name: Install yq
        if: steps.preflight.outputs.skip != 'true'
        uses: mikefarah/yq@v4.44.3

      - name: Bump 7 module image.tag → ${{ env.APP_SHA }}
        if: steps.preflight.outputs.skip != 'true'
        working-directory: ops
        run: |
          set -eux
          FILE="helm/values-staging.yaml"
          for key in trigger orchestrator consoleApi workerImport workerExport workerProcess workerDispatch; do
            yq -i ".${key}.image.tag = \"sha-${APP_SHA}\"" "${FILE}"
          done
          echo "--- diff ---"
          git diff "${FILE}" || true

      - name: Create PR in ops repo
        if: steps.preflight.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          path: ops
          token: ${{ secrets.OPS_REPO_TOKEN }}
          branch: auto-promote/${{ env.APP_SHA }}
          base: ${{ env.OPS_BRANCH_BASE }}
          commit-message: |
            auto: promote ${{ env.APP_SHA }} to staging

            Source: ${{ github.server_url }}/${{ github.repository }}/commit/${{ env.APP_SHA }}
          title: 'auto: promote ${{ env.APP_SHA }} to staging'
          body: |
            Auto-generated by `promote-staging.yml`.

            - source sha: `${{ env.APP_SHA }}`
            - source workflow: ${{ github.event.workflow_run.html_url }}
            - updates `helm/values-staging.yaml` image tags for 7 modules

            Merge to trigger Argo CD staging sync.
          labels: |
            auto-promote
          delete-branch: true
