name: sdk-python-publish

on:
  push:
    tags:
      - 'sdk-python-v*.*.*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: '上传到 TestPyPI 而非 PyPI(workflow_dispatch 专用)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install hatch
        run: pip install --upgrade pip hatch

      # 防「打 sdk-python-v1.2.3 却发 __version__=0.5.0a0」的漂移:tag 推送时断言
      # git tag 后缀 == _version.py 的 __version__,不一致直接失败(dry-run 跳过)。
      - name: Assert tag matches package __version__ (tag push)
        if: startsWith(github.ref, 'refs/tags/sdk-python-v')
        working-directory: sdk/python
        run: |
          tag_ver="${GITHUB_REF_NAME#sdk-python-v}"
          pkg_ver="$(sed -nE "s/^__version__: *str *= *['\"]([^'\"]+)['\"].*/\1/p" src/batch_worker_sdk/_version.py)"
          echo "tag=${tag_ver} package=${pkg_ver}"
          [ "$tag_ver" = "$pkg_ver" ] || {
            echo "FAIL: tag sdk-python-v${tag_ver} != package __version__ ${pkg_ver};" \
                 "bump src/batch_worker_sdk/_version.py before tagging."; exit 1; }

      - name: Build wheel + sdist
        working-directory: sdk/python
        run: hatch build --clean

      - name: Verify artifacts present
        working-directory: sdk/python
        run: |
          ls -la dist/
          test -n "$(ls dist/*.whl 2>/dev/null)" || { echo "missing wheel"; exit 1; }
          test -n "$(ls dist/*.tar.gz 2>/dev/null)" || { echo "missing sdist"; exit 1; }

      - name: Publish to TestPyPI (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI (tag push)
        if: startsWith(github.ref, 'refs/tags/sdk-python-v') && !(github.event_name == 'workflow_dispatch' && inputs.dry-run == true)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          skip-existing: true
