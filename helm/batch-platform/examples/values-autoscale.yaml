# 启用弹性伸缩的示例 values（叠加到 values-local-k8s.yaml）
# 前提：集群已装 KEDA operator（helm install keda kedacore/keda -n keda）
#
# 策略：
#   - Worker（import/export/process/dispatch）：KEDA 按 Kafka consumer lag 扩缩
#   - Console-api：CPU HPA
#   - Orchestrator：sharding.mode=dynamic + CPU HPA（默认）；
#                   或改 keda 按 Outbox backlog 扩（需先创建 Secret，见下方注释）
#   - Trigger：保持静态 replicaCount（Quartz 集群锁天然约束）

consoleApi:
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

orchestrator:
  # 关键前置：切到 dynamic 才能安全扩缩；static 模式下 autoscaler 不会渲染
  sharding:
    mode: "dynamic"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  # 想改用"基于 Outbox backlog"的扩缩（比 CPU 更贴近业务），先准备 Secret：
  #   kubectl -n batch-prod create secret generic batch-keda-postgres \
  #     --from-literal=connection='host=postgresql port=5432 user=batch_user password=<pwd> dbname=batch_business sslmode=disable'
  # 然后把上面 hpa.enabled 改 false、下面 keda.enabled 改 true：
  # keda:
  #   enabled: true
  #   minReplicas: 2
  #   maxReplicas: 8
  #   backlogThreshold: "200"

workerImport:
  keda:
    enabled: true
    minReplicas: 1
    maxReplicas: 6           # Docker Desktop 8GB 上限示例；生产可调大
    lagThreshold: "20"
    topic: "batch.task.dispatch.import"
    consumerGroup: "batch-worker-import"

workerExport:
  keda:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    lagThreshold: "20"
    topic: "batch.task.dispatch.export"
    consumerGroup: "batch-worker-export"

workerProcess:
  keda:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    lagThreshold: "20"
    topic: "batch.task.dispatch.process"
    consumerGroup: "batch-worker-process"

workerDispatch:
  keda:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    lagThreshold: "10"
    topic: "batch.task.dispatch.dispatch"
    consumerGroup: "batch-worker-dispatch"

# ADR-029 专用 SPI worker(原子任务)— KEDA 按 spi 派发 topic lag 扩缩
workerSpi:
  keda:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    lagThreshold: "10"
    topic: "batch.task.dispatch.spi"
    consumerGroup: "batch-worker-spi"
