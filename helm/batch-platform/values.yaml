# Default values for batch-platform.
# Override with -f values-prod.yaml or --set key=value.

# ── Image ─────────────────────────────────────────────────────────────────────
# tag 留空时 fallback 到 Chart.appVersion；Chart.appVersion 跟随 **最近一次 GA 版本**
# （非 main 分支的 SNAPSHOT；详见 docs/runbook/releasing.md §Release flow 的 helm 同步步骤）。
# 仅临时覆盖才填（如 "latest" / "sha-abc123" / "1.0.1-rc1"）
image:
  registry: ""          # e.g. registry.example.com/batch-platform
  tag: ""               # 为空则用 Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ── Infrastructure ─────────────────────────────────────────────────────────────

postgresql:
  platform:
    url: "jdbc:postgresql://postgresql:5432/batch_platform"
    username: "batch_user"
    # password: set via --set or external secret
    password: ""
  business:
    url: "jdbc:postgresql://postgresql:5432/batch_business"
    username: "batch_user"
    password: ""
    schema: "biz"

kafka:
  bootstrapServers: "kafka:9092"

redis:
  host: "redis"
  port: "6379"

minio:
  endpoint: "http://minio:9000"
  accessKey: ""
  secretKey: ""
  bucket: "batch-prod"

# ── Cross-service ──────────────────────────────────────────────────────────────

# orchestrator Service DNS（集群内）。端口必须和 orchestrator.port 一致，否则 worker 注册挂。
orchestratorBaseUrl: "http://batch-orchestrator:18082"

security:
  bypassMode: "false"
  # Internal service-to-service secret for /internal/** APIs.
  # Leave empty in default chart values so application defaults still apply in non-prod.
  # Production must set this via --set, values overlay, or external secret manager.
  internalSecret: ""
  # Console JWT HMAC secret. Production must provide a strong value.
  consoleJwtSecret: ""
  # Console 登录请求体 RSA+AES 混合加密(对应 BE ConsoleLoginKeyPairService)。
  # multi-replica prod 必须显式提供 keypair —— 否则每个 pod 启动期各自生成,
  # FE 取到的公钥可能不匹配本次解密的私钥,登录概率性失败。
  loginEncryption:
    enabled: "true"
    required: "false"     # prod-like profile 强制 true(BE @PostConstruct 守护);此处留 false 让 dev/staging 灵活
    # PEM 字符串。values-prod.yaml 应 set + helm Secret 走外部密钥管理。
    # 留空时 BE 启动期生成单实例密钥(单副本 dev OK)。
    privateKeyPem: ""
    publicKeyPem: ""

# 注入 ConfigMap 键 BATCH_TIMEZONE_DEFAULT_ZONE（与 batch-defaults / .env.example 一致）
batchTimezoneDefaultZone: "Asia/Shanghai"

# 注入 ConfigMap 键 BATCH_LOCALE / LANG / LC_ALL（与 compose / .env.example 一致）
batchLocale: "C.UTF-8"

# ── console-api ────────────────────────────────────────────────────────────────

consoleApi:
  # per-service JVM override(追加到全局 javaOpts 后),完整参数说明见
  # docs/runbook/jvm-tuning-and-profiling.md §1.2。空字符串 = 用全局默认。
  javaOptsExtra: ""
  replicaCount: 2
  # P1-8 (pre-launch audit 2026-05-18)：Hikari 池大小通过 ConfigMap env 暴露给 application.yml,
  # 默认 16+16 配 2 replicas 共 64 连接,加 orchestrator 30 * 2 = 60,留出 100+ 头部给 trigger/worker。
  primaryPool: 16
  replicaPool: 16
  # SSE 客户端断开 + Spring graceful shutdown drain；preStop sleep 让 k8s Service endpoints
  # 收敛后再发 SIGTERM，避免 SLB 把新流量打到正退出的 pod。
  gracefulShutdown:
    terminationGracePeriodSeconds: 90
    preStopSleepSeconds: 15
  # CPU-based HPA（BFF 流量敏感，CPU 足够）。生产建议 enabled: true。
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  port: 18080
  realtime:
    replayMaxEntries: 20000
    replayTtl: "24h"
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 18080
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: batch-console.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
      # - secretName: batch-console-tls
      #   hosts:
      #     - batch-console.example.com
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18080
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── trigger ────────────────────────────────────────────────────────────────────

trigger:
  # 轻量 I/O,G1 默认即可,无 extra
  javaOptsExtra: ""
  replicaCount: 1
  port: 18081
  # Quartz misfire 由幸存节点立即补跑，trigger 自身负担轻；但要给 Quartz cluster
  # 注销节点 + Spring graceful shutdown drain in-flight 的 trigger 转发请求时间。
  gracefulShutdown:
    terminationGracePeriodSeconds: 90
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"
  service:
    type: ClusterIP
    port: 18081
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18081
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18081
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── orchestrator ───────────────────────────────────────────────────────────────

orchestrator:
  # 状态机大量短命对象,用 Generational ZGC sub-ms pause(JDK 21+)
  # 代价:吞吐 -10% 换调度延迟稳定。详见 docs/runbook/jvm-tuning-and-profiling.md §1.2
  javaOptsExtra: "-XX:+UseZGC -XX:+ZGenerational"
  replicaCount: 2
  port: 18082
  # 关键路径：让 ShedLock 主动释放（OutboxPoll/各 Archive scheduler）+ Spring graceful
  # 完成 in-flight 请求 + outbox 分片 rebalance 完成。
  # 必须 ≥ Spring batch.shutdown-timeout (默认 120s) + 30s 缓冲。
  gracefulShutdown:
    terminationGracePeriodSeconds: 150
    preStopSleepSeconds: 15
  # Outbox 分片模式。static=BATCH_OUTBOX_SHARD_TOTAL 写死（扩缩容需 helm upgrade
  # 走滚动重启），dynamic=运行期通过 Redis 成员注册动态分配（允许 kubectl scale
  # 或 HPA/KEDA 自动扩缩容）。
  # 任何形式的 autoscaling（hpa / keda）必须先切到 dynamic，否则新 Pod 的 shardIndex
  # 会越界或重复处理，数据一致性受损。
  sharding:
    mode: "static"              # static | dynamic
  # CPU-based HPA。要求 sharding.mode=dynamic（否则不会渲染）。
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  # KEDA ScaledObject（Postgres Outbox backlog）。要求 sharding.mode=dynamic。
  # 与 hpa 互斥：keda.enabled=true 时 hpa 自动跳过。
  # 前提：KEDA operator + TriggerAuthentication（用 k8s Secret 承载 DB 连接串）。
  keda:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    pollingInterval: 30
    cooldownPeriod: 120
    # Postgres scaler：统计 outbox backlog（NEW + FAILED），超过阈值扩容
    backlogQuery: "SELECT COUNT(*) FROM batch.outbox_event WHERE publish_status IN ('NEW','FAILED')"
    backlogThreshold: "200"
    # TriggerAuth 的 Secret 名字（承载 POSTGRES_CONNECTION_STRING）
    connectionStringSecretName: "batch-keda-postgres"
    connectionStringSecretKey: "connection"
  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "1500m"
      memory: "1.5Gi"
  service:
    type: ClusterIP
    port: 18082
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18082
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18082
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  # R7-A4-P0：之前 .env.prod 写了但 ConfigMap 未渲染 → K8s 部署用默认 pool=30 / 限流 disabled
  # 撑不住 .env.prod 注释里承诺的 500-1000 req/s。
  platformDb:
    maxPoolSize: 50
  rateLimit:
    enabled: true
    maxNewPerTenantPerMinute: 300
    maxReleasePerTenantPerMinute: 600

# ── worker-import ──────────────────────────────────────────────────────────────

workerImport:
  # 大文件流 + Netty direct buffer 上量,扩到 1G(覆盖全局 512M 默认)
  javaOptsExtra: "-XX:MaxDirectMemorySize=1g"
  replicaCount: 2
  port: 18083
  # Worker 长任务可能 1-3 分钟才完成；@PreDestroy 上报下线 + Kafka consumer leave +
  # 完成在跑 task。如果你的 import 单 task 平均 >2 分钟，调高这里。
  gracefulShutdown:
    terminationGracePeriodSeconds: 180
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "500m"
      memory: "768Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  service:
    type: ClusterIP
    port: 18083
  # CPU-based HPA（KEDA 不可用时的 fallback）
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  # KEDA 按 Kafka consumer lag 扩缩（生产首选，需先装 keda operator）
  # 与 hpa 互斥：keda.enabled=true 时 hpa 自动跳过
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    pollingInterval: 30       # 轮询 lag 间隔（秒）
    cooldownPeriod: 120       # 缩容冷却（秒）
    topic: "batch.task.dispatch.import"
    consumerGroup: "batch-worker-import"
    lagThreshold: "20"        # 单 Pod 允许的最大 lag；超过就扩容
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18083
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18083
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── worker-export ──────────────────────────────────────────────────────────────

workerExport:
  # 大文件流 + Netty direct buffer 上量,扩到 1G(覆盖全局 512M 默认)
  javaOptsExtra: "-XX:MaxDirectMemorySize=1g"
  replicaCount: 2
  port: 18084
  # Export 任务通常更长（生成大文件），给更宽窗口；超时未完成的 task 由 orchestrator
  # PartitionLeaseReclaimScheduler 兜底重派。
  # R3-P0-8：之前 180s < preStop(15) + spring drain(120) + awaitDrain(120) = 255s
  # → SIGKILL 中断进行中的 GB 文件导出。新值 = 15+120+120+30(buffer) = 285s。
  gracefulShutdown:
    terminationGracePeriodSeconds: 285
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "500m"
      memory: "768Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  service:
    type: ClusterIP
    port: 18084
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    pollingInterval: 30
    cooldownPeriod: 120
    topic: "batch.task.dispatch.export"
    consumerGroup: "batch-worker-export"
    lagThreshold: "20"
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18084
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18084
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── worker-dispatch ────────────────────────────────────────────────────────────

workerProcess:
  # 大文件流 + Netty direct buffer 上量,扩到 1G(覆盖全局 512M 默认)
  javaOptsExtra: "-XX:MaxDirectMemorySize=1g"
  replicaCount: 2
  port: 18086
  # PROCESS 任务可能很长(SQL 加工 / staging publish);需要充分的优雅停机时间。
  # R3-P0-8：同 workerExport，285s 覆盖 preStop + spring drain + awaitDrain 全程。
  gracefulShutdown:
    terminationGracePeriodSeconds: 285
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 18086
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    pollingInterval: 30
    cooldownPeriod: 120
    topic: "batch.task.dispatch.process"
    consumerGroup: "batch-worker-process"
    lagThreshold: "20"
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18086
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18086
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ADR-029 专用 Task SPI worker:dual-use(RCE 级 shell/stored-proc)能力隔离进程。
# 最小权限部署:配独立 serviceAccountName + 独立受限 envFromSecretName(平台库 claim/lease 用
# 低权限账号,不含业务库/MinIO 凭据)+ NetworkPolicy 限制出向。executors 默认全关,按需开。
workerSpi:
  javaOptsExtra: ""
  replicaCount: 1
  port: 18087
  # 最小权限 hooks(ops 填;留空则回退共享 SA/secret 仅为不阻断起步,生产务必配独立的)
  serviceAccountName: ""
  envFromSecretName: ""
  # 原子任务可能含外部调用(http/shell),给中等优雅停机
  gracefulShutdown:
    terminationGracePeriodSeconds: 120
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"
  service:
    type: ClusterIP
    port: 18087
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    pollingInterval: 30
    cooldownPeriod: 120
    topic: "batch.task.dispatch.spi"
    consumerGroup: "batch-worker-spi"
    lagThreshold: "20"
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18087
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18087
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

workerDispatch:
  # 大文件流 + Netty direct buffer 上量,扩到 1G(覆盖全局 512M 默认)
  javaOptsExtra: "-XX:MaxDirectMemorySize=1g"
  replicaCount: 2
  port: 18085
  # Dispatch 任务通常较短，但仍需 Kafka consumer leave + 完成在跑 task。
  gracefulShutdown:
    terminationGracePeriodSeconds: 120
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 18085
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 6
    pollingInterval: 30
    cooldownPeriod: 120
    topic: "batch.task.dispatch.dispatch"
    consumerGroup: "batch-worker-dispatch"
    lagThreshold: "10"        # dispatch 单次较重，阈值更小
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18085
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18085
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── PodDisruptionBudget ────────────────────────────────────────────────────────
# 每个模块默认允许一次最多驱逐 1 个 Pod，保证节点维护时不会一次踢光整个模块。
# 单副本（replicaCount=1）时 PDB 会自动跳过（minAvailable=1 会永远阻塞驱逐）。
podDisruptionBudget:
  enabled: true
  # 选择"绝对最少可用数"或"最大可不用数"任一种；两者互斥
  # 默认所有模块 maxUnavailable=1（单台受影响时继续对外服务）
  maxUnavailable: 1
  # minAvailable: 1          # 等价配法；启用 minAvailable 时请注释 maxUnavailable

# ── Pod scheduling ─────────────────────────────────────────────────────────────

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# ── JVM tuning ─────────────────────────────────────────────────────────────────
#
# 完整参数说明见 docs/runbook/jvm-tuning-and-profiling.md。
#
# 两层 override:
#   javaOpts             — 全模块共享基础(容器 / OOM / GC log / JFR / UTF-8)
#   <service>.javaOptsExtra  — per-service 追加(heap 大小 / GC 类型 / direct mem)
#                              通过 deployment env 注入,优先级高于 envFrom-configmap
#
# 调整内存:不直接改 -Xmx,改 resources.limits.memory + MaxRAMPercentage 让容器边界驱动。

javaOpts: >-
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=70.0
  -XX:InitialRAMPercentage=70.0
  -XX:MaxDirectMemorySize=512m
  -XX:NativeMemoryTracking=summary
  -XX:MaxMetaspaceSize=256m
  -XX:+HeapDumpOnOutOfMemoryError
  -XX:HeapDumpPath=/var/log/app/heap-dump-%p-%t.hprof
  -XX:+ExitOnOutOfMemoryError
  -Xlog:gc*=info,gc+age=trace,safepoint=info:file=/var/log/app/gc-%t.log:time,uptime,level,tags:filecount=10,filesize=50M
  -XX:+UseStringDeduplication
  -Djava.security.egd=file:/dev/./urandom
  -Duser.timezone=UTC
  -Dfile.encoding=UTF-8
  -Dsun.jnu.encoding=UTF-8
  -XX:StartFlightRecording=name=continuous,settings=profile,maxsize=256m,maxage=10m,dumponexit=true,filename=/var/log/app/jfr-exit.jfr
  --enable-native-access=ALL-UNNAMED
  -Dspring.main.lazy-initialization=true

# ── OpenTelemetry Collector (sidecar-less gateway mode) ────────────
otelCollector:
  enabled: false        # set true to deploy Collector alongside apps
  imageTag: "0.116.0"
  replicaCount: 1
  deploymentEnvironment: "production"
  memoryLimitMib: 512
  jaegerEndpoint: "jaeger:4317"            # override with actual Jaeger address
  lokiEndpoint: "http://loki:3100"         # override with actual Loki address
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "640Mi"

# ── OTEL env vars injected into all app pods (via ConfigMap) ────────
otel:
  endpoint: "http://batch-platform-otel-collector:4318"  # within cluster
  samplingProbability: "0.1"
  logFormat: "ecs"                                        # structured JSON

# ── Prometheus ServiceMonitor (R7-A6-P1) ────────────
# 需要集群安装 prometheus-operator (CRD: monitoring.coreos.com/v1)。enabled=false 时
# templates/servicemonitor.yaml 直接跳过渲染，不影响 plain Prometheus 用 file_sd 抓取。
# 启用方式：helm install/upgrade 加 --set serviceMonitor.enabled=true。
serviceMonitor:
  enabled: false
  # 与 prometheus-operator 的 Prometheus CR `serviceMonitorSelector` 匹配；
  # 一般用 `release: prometheus` 标签，按本集群 operator 部署调整。
  labels: {}
  # Prometheus 抓取间隔 / 超时。
  interval: 30s
  scrapeTimeout: 10s
  # /actuator/prometheus path（Spring Boot Micrometer 默认）。
  path: /actuator/prometheus
