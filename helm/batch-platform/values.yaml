# Default values for batch-platform.
# Override with -f values-prod.yaml or --set key=value.

# ── Image ─────────────────────────────────────────────────────────────────────
# tag 留空时 fallback 到 Chart.appVersion；Chart.appVersion 跟随 **最近一次 GA 版本**
# （非 main 分支的 SNAPSHOT；详见 docs/runbook/releasing.md §Release flow 的 helm 同步步骤）。
# 仅临时覆盖才填（如 "latest" / "sha-abc123" / "1.0.1-rc1"）
image:
  registry: ""          # e.g. registry.example.com/batch-platform
  tag: ""               # 为空则用 Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ── Infrastructure ─────────────────────────────────────────────────────────────

postgresql:
  platform:
    url: "jdbc:postgresql://postgresql:5432/batch_platform"
    username: "batch_user"
    # password: set via --set or external secret
    password: ""
  business:
    url: "jdbc:postgresql://postgresql:5432/batch_business"
    username: "batch_user"
    password: ""
    schema: "biz"

kafka:
  bootstrapServers: "kafka:9092"

redis:
  host: "redis"
  port: "6379"

minio:
  endpoint: "http://minio:9000"
  accessKey: ""
  secretKey: ""
  bucket: "batch-prod"

# ── Cross-service ──────────────────────────────────────────────────────────────

# orchestrator Service DNS（集群内）。端口必须和 orchestrator.port 一致，否则 worker 注册挂。
orchestratorBaseUrl: "http://batch-orchestrator:18082"

security:
  bypassMode: "false"

# 注入 ConfigMap 键 BATCH_TIMEZONE_DEFAULT_ZONE（与 batch-defaults / .env.example 一致）
batchTimezoneDefaultZone: "Asia/Shanghai"

# 注入 ConfigMap 键 BATCH_LOCALE / LANG / LC_ALL（与 compose / .env.example 一致）
batchLocale: "C.UTF-8"

# ── console-api ────────────────────────────────────────────────────────────────

consoleApi:
  replicaCount: 2
  # SSE 客户端断开 + Spring graceful shutdown drain；preStop sleep 让 k8s Service endpoints
  # 收敛后再发 SIGTERM，避免 SLB 把新流量打到正退出的 pod。
  gracefulShutdown:
    terminationGracePeriodSeconds: 90
    preStopSleepSeconds: 15
  # CPU-based HPA（BFF 流量敏感，CPU 足够）。生产建议 enabled: true。
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  port: 18080
  realtime:
    replayMaxEntries: 20000
    replayTtl: "24h"
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 18080
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: batch-console.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
      # - secretName: batch-console-tls
      #   hosts:
      #     - batch-console.example.com
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18080
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── trigger ────────────────────────────────────────────────────────────────────

trigger:
  replicaCount: 1
  port: 18081
  # Quartz misfire 由幸存节点立即补跑，trigger 自身负担轻；但要给 Quartz cluster
  # 注销节点 + Spring graceful shutdown drain in-flight 的 trigger 转发请求时间。
  gracefulShutdown:
    terminationGracePeriodSeconds: 90
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"
  service:
    type: ClusterIP
    port: 18081
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18081
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18081
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── orchestrator ───────────────────────────────────────────────────────────────

orchestrator:
  replicaCount: 2
  port: 18082
  # 关键路径：让 ShedLock 主动释放（OutboxPoll/各 Archive scheduler）+ Spring graceful
  # 完成 in-flight 请求 + outbox 分片 rebalance 完成。
  # 必须 ≥ Spring batch.shutdown-timeout (默认 120s) + 30s 缓冲。
  gracefulShutdown:
    terminationGracePeriodSeconds: 150
    preStopSleepSeconds: 15
  # Outbox 分片模式。static=BATCH_OUTBOX_SHARD_TOTAL 写死（扩缩容需 helm upgrade
  # 走滚动重启），dynamic=运行期通过 Redis 成员注册动态分配（允许 kubectl scale
  # 或 HPA/KEDA 自动扩缩容）。
  # 任何形式的 autoscaling（hpa / keda）必须先切到 dynamic，否则新 Pod 的 shardIndex
  # 会越界或重复处理，数据一致性受损。
  sharding:
    mode: "static"              # static | dynamic
  # CPU-based HPA。要求 sharding.mode=dynamic（否则不会渲染）。
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  # KEDA ScaledObject（Postgres Outbox backlog）。要求 sharding.mode=dynamic。
  # 与 hpa 互斥：keda.enabled=true 时 hpa 自动跳过。
  # 前提：KEDA operator + TriggerAuthentication（用 k8s Secret 承载 DB 连接串）。
  keda:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    pollingInterval: 30
    cooldownPeriod: 120
    # Postgres scaler：统计 outbox backlog（NEW + FAILED），超过阈值扩容
    backlogQuery: "SELECT COUNT(*) FROM biz.outbox_event WHERE publish_status IN ('NEW','FAILED')"
    backlogThreshold: "200"
    # TriggerAuth 的 Secret 名字（承载 POSTGRES_CONNECTION_STRING）
    connectionStringSecretName: "batch-keda-postgres"
    connectionStringSecretKey: "connection"
  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "1500m"
      memory: "1.5Gi"
  service:
    type: ClusterIP
    port: 18082
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18082
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18082
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── worker-import ──────────────────────────────────────────────────────────────

workerImport:
  replicaCount: 2
  port: 18083
  # Worker 长任务可能 1-3 分钟才完成；@PreDestroy 上报下线 + Kafka consumer leave +
  # 完成在跑 task。如果你的 import 单 task 平均 >2 分钟，调高这里。
  gracefulShutdown:
    terminationGracePeriodSeconds: 180
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "500m"
      memory: "768Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  service:
    type: ClusterIP
    port: 18083
  # CPU-based HPA（KEDA 不可用时的 fallback）
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  # KEDA 按 Kafka consumer lag 扩缩（生产首选，需先装 keda operator）
  # 与 hpa 互斥：keda.enabled=true 时 hpa 自动跳过
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    pollingInterval: 30       # 轮询 lag 间隔（秒）
    cooldownPeriod: 120       # 缩容冷却（秒）
    topic: "batch.task.dispatch.import"
    consumerGroup: "batch-worker-import"
    lagThreshold: "20"        # 单 Pod 允许的最大 lag；超过就扩容
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18083
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18083
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── worker-export ──────────────────────────────────────────────────────────────

workerExport:
  replicaCount: 2
  port: 18084
  # Export 任务通常更长（生成大文件），给更宽窗口；超时未完成的 task 由 orchestrator
  # PartitionLeaseReclaimScheduler 兜底重派。
  gracefulShutdown:
    terminationGracePeriodSeconds: 180
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "500m"
      memory: "768Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  service:
    type: ClusterIP
    port: 18084
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    pollingInterval: 30
    cooldownPeriod: 120
    topic: "batch.task.dispatch.export"
    consumerGroup: "batch-worker-export"
    lagThreshold: "20"
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18084
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18084
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── worker-dispatch ────────────────────────────────────────────────────────────

workerProcess:
  replicaCount: 2
  port: 18086
  # PROCESS 任务可能很长(SQL 加工 / staging publish);需要充分的优雅停机时间。
  gracefulShutdown:
    terminationGracePeriodSeconds: 180
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 18086
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 8
    pollingInterval: 30
    cooldownPeriod: 120
    topic: "batch.task.dispatch.process"
    consumerGroup: "batch-worker-process"
    lagThreshold: "20"
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18086
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18086
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

workerDispatch:
  replicaCount: 2
  port: 18085
  # Dispatch 任务通常较短，但仍需 Kafka consumer leave + 完成在跑 task。
  gracefulShutdown:
    terminationGracePeriodSeconds: 120
    preStopSleepSeconds: 15
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 18085
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 6
    pollingInterval: 30
    cooldownPeriod: 120
    topic: "batch.task.dispatch.dispatch"
    consumerGroup: "batch-worker-dispatch"
    lagThreshold: "10"        # dispatch 单次较重，阈值更小
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 18085
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 18085
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# ── PodDisruptionBudget ────────────────────────────────────────────────────────
# 每个模块默认允许一次最多驱逐 1 个 Pod，保证节点维护时不会一次踢光整个模块。
# 单副本（replicaCount=1）时 PDB 会自动跳过（minAvailable=1 会永远阻塞驱逐）。
podDisruptionBudget:
  enabled: true
  # 选择"绝对最少可用数"或"最大可不用数"任一种；两者互斥
  # 默认所有模块 maxUnavailable=1（单台受影响时继续对外服务）
  maxUnavailable: 1
  # minAvailable: 1          # 等价配法；启用 minAvailable 时请注释 maxUnavailable

# ── Pod scheduling ─────────────────────────────────────────────────────────────

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# ── JVM tuning ─────────────────────────────────────────────────────────────────

# spring.main.lazy-initialization=true: 在 K8s 资源紧张下避免 eager 初始化所有 bean
# 导致 HTTP 端口 bind 晚于 startupProbe，Pod 被杀进入 CrashLoop。
# （local profile 本就有 lazy-init: true；default profile 默认没有，所以这里显式打开）
javaOpts: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom -Dspring.main.lazy-initialization=true"

# ── OpenTelemetry Collector (sidecar-less gateway mode) ────────────
otelCollector:
  enabled: false        # set true to deploy Collector alongside apps
  imageTag: "0.116.0"
  replicaCount: 1
  deploymentEnvironment: "production"
  memoryLimitMib: 512
  jaegerEndpoint: "jaeger:4317"            # override with actual Jaeger address
  lokiEndpoint: "http://loki:3100"         # override with actual Loki address
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "640Mi"

# ── OTEL env vars injected into all app pods (via ConfigMap) ────────
otel:
  endpoint: "http://batch-platform-otel-collector:4318"  # within cluster
  samplingProbability: "0.1"
  logFormat: "ecs"                                        # structured JSON
