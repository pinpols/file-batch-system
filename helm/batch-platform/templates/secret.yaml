apiVersion: v1
kind: Secret
metadata:
  name: {{ include "batch-platform.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  BATCH_PLATFORM_DB_PASSWORD: {{ .Values.postgresql.platform.password | quote }}
  BATCH_BUSINESS_DB_PASSWORD: {{ .Values.postgresql.business.password | quote }}
  BATCH_S3_ACCESS_KEY: {{ .Values.objectStorage.accessKey | quote }}
  BATCH_S3_SECRET_KEY: {{ .Values.objectStorage.secretKey | quote }}
  # R4-P0-5 + P1-2 (pre-launch audit 2026-05-18)：required 在 Helm 3 中对空串/缺失都报错,
  # 但弱密钥(过短)能绕过；额外 fail 守卫强制 ≥ 16 字符,与 BatchSecurityProperties 的
  # MIN_SECRET_LENGTH 对齐,避免运行时 fail-fast(pod 全崩才告警)晚于 deploy 时拦截。
  {{- if lt (len (default "" .Values.security.internalSecret)) 16 }}
  {{- fail "security.internalSecret 必须 ≥ 16 字符 (helm --set security.internalSecret=<strong-secret>)" }}
  {{- end }}
  {{- if lt (len (default "" .Values.security.consoleJwtSecret)) 16 }}
  {{- fail "security.consoleJwtSecret 必须 ≥ 16 字符 (helm --set security.consoleJwtSecret=<strong-secret>)" }}
  {{- end }}
  BATCH_INTERNAL_SECRET: {{ .Values.security.internalSecret | quote }}
  BATCH_CONSOLE_JWT_SECRET: {{ .Values.security.consoleJwtSecret | quote }}
  # 2026-05-18 console 登录请求体 RSA+AES 混合加密密钥对(对应 BE ConsoleLoginKeyPairService)。
  # required=true → privateKeyPem/publicKeyPem 必填(prod 强制);任一非空 → 必须同时提供。
  # Multi-replica prod 必走外部 PEM 注入 —— 每个 pod 启动各自生成会导致 FE 取到的公钥
  # 不匹配本次解密 pod 的私钥,登录概率性失败。
  {{- $loginEnc := .Values.security.loginEncryption | default dict }}
  {{- $privPem := default "" $loginEnc.privateKeyPem }}
  {{- $pubPem := default "" $loginEnc.publicKeyPem }}
  {{- if eq (toString (default "false" $loginEnc.required)) "true" }}
    {{- if eq $privPem "" }}{{ fail "security.loginEncryption.privateKeyPem 必须提供 (required=true 时)" }}{{ end }}
    {{- if eq $pubPem "" }}{{ fail "security.loginEncryption.publicKeyPem 必须提供 (required=true 时)" }}{{ end }}
  {{- end }}
  {{- if and (ne $privPem "") (eq $pubPem "") }}{{ fail "security.loginEncryption.privateKeyPem / publicKeyPem 必须同时提供" }}{{ end }}
  {{- if and (ne $pubPem "") (eq $privPem "") }}{{ fail "security.loginEncryption.publicKeyPem / privateKeyPem 必须同时提供" }}{{ end }}
  BATCH_CONSOLE_SECURITY_LOGIN_ENCRYPTION_PRIVATE_KEY_PEM: {{ $privPem | quote }}
  BATCH_CONSOLE_SECURITY_LOGIN_ENCRYPTION_PUBLIC_KEY_PEM: {{ $pubPem | quote }}
