apiVersion: v1
kind: Secret
metadata:
  name: {{ include "batch-platform.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  BATCH_PLATFORM_DB_PASSWORD: {{ .Values.postgresql.platform.password | quote }}
  BATCH_BUSINESS_DB_PASSWORD: {{ .Values.postgresql.business.password | quote }}
  BATCH_MINIO_ACCESS_KEY: {{ .Values.minio.accessKey | quote }}
  BATCH_MINIO_SECRET_KEY: {{ .Values.minio.secretKey | quote }}
  # R4-P0-5：之前用 `{{ "{{" }} if .Values.security.internalSecret }}` 守卫；
  # 空字符串在 Helm 中是 falsy → Secret 不写入 BATCH_INTERNAL_SECRET 这把 key →
  # 容器 fallback 到默认值 "internal-secret" → @PostConstruct 在 prod profile fail-fast。
  # 改为用 required 强制非空；helm install/upgrade 时未 --set 会立刻报错，避免上线后 pod 全崩。
  BATCH_INTERNAL_SECRET: {{ required "security.internalSecret must be provided (helm --set security.internalSecret=...)" .Values.security.internalSecret | quote }}
  BATCH_CONSOLE_JWT_SECRET: {{ required "security.consoleJwtSecret must be provided (helm --set security.consoleJwtSecret=...)" .Values.security.consoleJwtSecret | quote }}
