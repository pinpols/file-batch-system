{{- $component := "orchestrator" }}
{{- $svc := .Values.orchestrator }}
---
# Headless Service：StatefulSet 必需，用于给每个 Pod 赋稳定 DNS 名（orchestrator-0.svc, orchestrator-1.svc ...）
# Pod 间直连或调试时用；日常客户端访问走下面的 ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  # StatefulSet 带 ordinal 的 Pod 名（batch-orchestrator-0..N-1）由 entrypoint.sh
  # 自动提取为 BATCH_OUTBOX_SHARD_INDEX；多 Pod 各持一片 Outbox 分片
  serviceName: {{ include "batch-platform.fullname" . }}-{{ $component }}-headless
  # 启用 HPA/KEDA 时由 autoscaler 管控副本数；否则用固定 replicaCount
  {{- $dynamic := eq (default "static" $svc.sharding.mode) "dynamic" }}
  {{- $autoscale := and $dynamic (or $svc.hpa.enabled (and $svc.keda $svc.keda.enabled)) }}
  {{- if not $autoscale }}
  replicas: {{ $svc.replicaCount }}
  {{- end }}
  # 并行部署/销毁：Outbox 实例互不依赖，不需要 StatefulSet 默认的 OrderedReady 串行升级
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "batch-platform.imagePullSecrets" . | nindent 6 }}
      {{- include "batch-platform.gracefulShutdownPod" $svc.gracefulShutdown | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $component }}
          image: {{ include "batch-platform.image" (dict "root" . "name" "batch-orchestrator") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "batch-platform.gracefulShutdownLifecycle" $svc.gracefulShutdown | nindent 10 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            # per-service JVM 参数追加,见 docs/runbook/jvm-tuning-and-profiling.md §1.2
            # orchestrator 默认 -XX:+UseZGC -XX:+ZGenerational(状态机低延迟)
            - name: JAVA_OPTS_EXTRA
              value: {{ $svc.javaOptsExtra | default "" | quote }}
            # Downward API：POD_NAME 用于 entrypoint.sh 提取 StatefulSet ordinal
            # dynamic 模式下 POD_NAME 还会被用作 Redis ZSET 里的 memberId
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # 分片模式：static=env 给 SHARD_TOTAL；dynamic=应用启动时走 Redis 注册
            - name: BATCH_OUTBOX_SHARDING_MODE
              value: {{ default "static" $svc.sharding.mode | quote }}
            {{- if not $dynamic }}
            # static 模式专用：Outbox 分片总数 = replicaCount；扩缩容走 helm upgrade
            - name: BATCH_OUTBOX_SHARD_TOTAL
              value: {{ $svc.replicaCount | quote }}
            {{- end }}
            # R7-A4-P1: pin management server port 到业务端口；application-prod.yml 默认 0 (ephemeral)
            # 会让 livenessProbe / Prometheus scrape 找不到管理 endpoint。
            - name: BATCH_MANAGEMENT_PORT
              value: {{ $svc.port | quote }}
          {{- include "batch-platform.envFrom" . | nindent 10 }}
          {{- with $svc.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml $svc.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml $svc.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- include "batch-platform.scheduling" . | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  type: {{ $svc.service.type }}
  selector:
    {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: http
      protocol: TCP
{{- if and $dynamic $svc.hpa.enabled (not (and $svc.keda $svc.keda.enabled)) }}
---
# CPU-based HPA：仅在 sharding.mode=dynamic 时渲染（static 模式自动扩会破坏分片）
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  minReplicas: {{ $svc.hpa.minReplicas }}
  maxReplicas: {{ $svc.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- if and $dynamic $svc.keda $svc.keda.enabled }}
---
# KEDA ScaledObject：按 Outbox backlog（NEW+FAILED 记录数）扩缩
# 仅在 sharding.mode=dynamic 时渲染。前提：KEDA operator + 下面的 TriggerAuthentication
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}-pg
  namespace: {{ .Release.Namespace }}
spec:
  secretTargetRef:
    - parameter: connection
      name: {{ $svc.keda.connectionStringSecretName | quote }}
      key: {{ $svc.keda.connectionStringSecretKey | quote }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  minReplicaCount: {{ $svc.keda.minReplicas }}
  maxReplicaCount: {{ $svc.keda.maxReplicas }}
  pollingInterval: {{ $svc.keda.pollingInterval | default 30 }}
  cooldownPeriod: {{ $svc.keda.cooldownPeriod | default 120 }}
  triggers:
    - type: postgresql
      metadata:
        query: {{ $svc.keda.backlogQuery | quote }}
        targetQueryValue: {{ $svc.keda.backlogThreshold | quote }}
      authenticationRef:
        name: {{ include "batch-platform.fullname" . }}-{{ $component }}-pg
{{- end }}
