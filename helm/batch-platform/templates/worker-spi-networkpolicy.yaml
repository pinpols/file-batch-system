{{- /*
  ADR-029 worker-spi 出口最小权限:default-deny egress NetworkPolicy。
  dual-use(shell/sql/stored-proc)能力一旦启用,worker 进程具备 RCE 级能力;
  本 policy 把出向收紧到「只放行运行所需」:DNS、平台 PostgreSQL、Kafka,以及 ops 在
  values.workerSpi.networkPolicy.egress.extra 显式列举的 CIDR/端口。其余出向一律拒绝。

  默认 OFF(.Values.workerSpi.networkPolicy.enabled=false)—— 向后兼容,不改变现有集群行为;
  ops 在确认隔离部署(独立 SA / 独立低权限库 / 受限 secret)后显式开启。

  NOTE: 仅 selector 命中 worker-spi pod;不影响其它 worker 模板。
*/ -}}
{{- if .Values.workerSpi.networkPolicy.enabled }}
{{- $component := "worker-spi" }}
{{- $np := .Values.workerSpi.networkPolicy }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # (1) DNS —— UDP/TCP 53,否则任何域名解析失败,worker 起不来
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # (2) 平台 PostgreSQL —— claim/lease 用低权限账号(绝不连业务库)
    {{- with $np.egress.postgresql }}
    {{- if .enabled }}
    - to:
        {{- toYaml .to | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .port | default 5432 }}
    {{- end }}
    {{- end }}
    # (3) Kafka —— 消费 batch.task.dispatch.spi + 回写结果
    {{- with $np.egress.kafka }}
    {{- if .enabled }}
    - to:
        {{- toYaml .to | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .port | default 9092 }}
    {{- end }}
    {{- end }}
    # (4) 显式放行的 SPI 出口目标(ops 列举:CIDR + 端口),如内部 API / 受信 DB
    {{- range $rule := $np.egress.extra }}
    - to:
        {{- toYaml $rule.to | nindent 8 }}
      {{- with $rule.ports }}
      ports:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
