{{- $component := "trigger" }}
{{- $svc := .Values.trigger }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "batch-platform.imagePullSecrets" . | nindent 6 }}
      {{- include "batch-platform.gracefulShutdownPod" $svc.gracefulShutdown | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $component }}
          image: {{ include "batch-platform.image" (dict "root" . "name" "batch-trigger") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "batch-platform.gracefulShutdownLifecycle" $svc.gracefulShutdown | nindent 10 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            # R7-A4-P1: 显式把 prod profile 的 management server port pin 到业务端口，
            # 否则 application-prod.yml 默认 ${BATCH_MANAGEMENT_PORT:0} 走 ephemeral 随机端口，
            # livenessProbe / Prometheus scrape 全部失效。管理端口真正隔离需 ADR + 单独 Service。
            - name: BATCH_MANAGEMENT_PORT
              value: {{ $svc.port | quote }}
          {{- include "batch-platform.envFrom" . | nindent 10 }}
          {{- with $svc.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml $svc.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml $svc.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- include "batch-platform.scheduling" . | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  type: {{ $svc.service.type }}
  selector:
    {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: http
      protocol: TCP
