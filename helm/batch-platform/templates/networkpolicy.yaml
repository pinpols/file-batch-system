{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "batch-platform.fullname" . }}-application-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" . | nindent 4 }}
spec:
  # 只覆盖本 chart 的标准应用 Pod；tenant worker pool 由租户 overlay 自己声明边界。
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - console-api
          - trigger
          - orchestrator
          - worker-import
          - worker-export
          - worker-process
          - worker-dispatch
          - worker-atomic
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.ingress.from | nindent 8 }}
{{- end }}
