{{- $component := "console-api" }}
{{- $svc := .Values.consoleApi }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  {{- if not (and $svc.hpa $svc.hpa.enabled) }}
  replicas: {{ $svc.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "batch-platform.imagePullSecrets" . | nindent 6 }}
      {{- include "batch-platform.gracefulShutdownPod" $svc.gracefulShutdown | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $component }}
          image: {{ include "batch-platform.image" (dict "root" . "name" "batch-console-api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "batch-platform.gracefulShutdownLifecycle" $svc.gracefulShutdown | nindent 10 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          {{- include "batch-platform.envFrom" . | nindent 10 }}
          env:
            # R7-A4-P0：console-api 多副本必须靠 BATCH_CONSOLE_INSTANCE_ID 区分实例（SSE replay /
            # instance-scoped 缓存）。ConfigMap 不能给静态值，否则两个 pod 拿到一样会冲突；
            # 用 downward API 注入 pod 名作 per-pod 唯一标识。
            - name: BATCH_CONSOLE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # R7-A4-P1: pin management server port 到业务端口；application-prod.yml 默认 0 (ephemeral)
            # 会让 livenessProbe / Prometheus scrape 找不到管理 endpoint。
            - name: BATCH_MANAGEMENT_PORT
              value: {{ $svc.port | quote }}
          {{- with $svc.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml $svc.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml $svc.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # logback-spring.xml 的 prod profile 里 FRONTEND_FILE RollingFileAppender
            # 硬编码写 /logs/frontend.log（绝对路径，根目录）；podSecurityContext 的
            # readOnlyRootFilesystem=true 不允许根目录创建，必须挂 emptyDir
            - name: logs
              mountPath: /logs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
      {{- include "batch-platform.scheduling" . | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  type: {{ $svc.service.type }}
  selector:
    {{- include "batch-platform.selectorLabels" (merge (dict "component" $component) .) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: http
      protocol: TCP
{{- if and $svc.hpa $svc.hpa.enabled }}
---
# Console-api CPU-based HPA（BFF 流量敏感，CPU 触发足够）
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "batch-platform.fullname" . }}-{{ $component }}
  minReplicas: {{ $svc.hpa.minReplicas }}
  maxReplicas: {{ $svc.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.hpa.targetCPUUtilizationPercentage }}
{{- end }}
