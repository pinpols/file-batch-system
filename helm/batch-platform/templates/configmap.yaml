apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "batch-platform.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "batch-platform.labels" . | nindent 4 }}
data:
  # ── Platform database ───────────────────────────────────────────────────────
  BATCH_PLATFORM_DB_URL: {{ .Values.postgresql.platform.url | quote }}
  BATCH_PLATFORM_DB_USERNAME: {{ .Values.postgresql.platform.username | quote }}

  # ── Business database (workers) ────────────────────────────────────────────
  BATCH_BUSINESS_DB_URL: {{ .Values.postgresql.business.url | quote }}
  BATCH_BUSINESS_DB_USERNAME: {{ .Values.postgresql.business.username | quote }}
  BATCH_BUSINESS_DB_SCHEMA: {{ .Values.postgresql.business.schema | quote }}

  # ── Kafka ──────────────────────────────────────────────────────────────────
  BATCH_KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}

  # ── Redis（用于 ShedLock / 配置缓存 / 实时 SSE Pub-Sub）─────────────────
  BATCH_REDIS_HOST: {{ .Values.redis.host | quote }}
  BATCH_REDIS_PORT: {{ .Values.redis.port | quote }}

  # ── 各模块 server.port 显式注入（Spring Boot 4 对 ${VAR:default} fallback
  #    处理变严，直接显式注入避免占位符解析失败）
  BATCH_CONSOLE_API_PORT: {{ .Values.consoleApi.port | quote }}
  BATCH_TRIGGER_PORT: {{ .Values.trigger.port | quote }}
  BATCH_ORCHESTRATOR_PORT: {{ .Values.orchestrator.port | quote }}
  BATCH_WORKER_IMPORT_PORT: {{ .Values.workerImport.port | quote }}
  BATCH_WORKER_EXPORT_PORT: {{ .Values.workerExport.port | quote }}
  BATCH_WORKER_DISPATCH_PORT: {{ .Values.workerDispatch.port | quote }}

  # ── MinIO ──────────────────────────────────────────────────────────────────
  BATCH_MINIO_ENDPOINT: {{ .Values.minio.endpoint | quote }}
  BATCH_MINIO_BUCKET: {{ .Values.minio.bucket | quote }}

  # ── Cross-service ──────────────────────────────────────────────────────────
  BATCH_ORCHESTRATOR_BASE_URL: {{ .Values.orchestratorBaseUrl | quote }}
  BATCH_SECURITY_BYPASS_MODE: {{ .Values.security.bypassMode | quote }}
  BATCH_CONSOLE_REALTIME_REPLAY_MAX_ENTRIES: {{ .Values.consoleApi.realtime.replayMaxEntries | quote }}
  BATCH_CONSOLE_REALTIME_REPLAY_TTL: {{ .Values.consoleApi.realtime.replayTtl | quote }}
  BATCH_TIMEZONE_DEFAULT_ZONE: {{ .Values.batchTimezoneDefaultZone | quote }}
  TZ: {{ .Values.batchTimezoneDefaultZone | quote }}
  BATCH_LOCALE: {{ .Values.batchLocale | quote }}
  LANG: {{ .Values.batchLocale | quote }}
  LC_ALL: {{ .Values.batchLocale | quote }}

  # ── OpenTelemetry ──────────────────────────────────────────────────────────
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  OTEL_SAMPLING_PROBABILITY: {{ .Values.otel.samplingProbability | quote }}
  BATCH_LOG_FORMAT: {{ .Values.otel.logFormat | quote }}

  # ── JVM ───────────────────────────────────────────────────────────────────
  JAVA_OPTS: {{ .Values.javaOpts | quote }}
