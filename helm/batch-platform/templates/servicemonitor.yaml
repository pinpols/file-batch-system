{{/*
  R7-A6-P1: Prometheus ServiceMonitor — 让 prometheus-operator 自动 scrape 7 个 Spring Boot
  app 的 /actuator/prometheus endpoint，替代 docker/observability/prometheus.yml 里的
  file_sd（K8s 场景下 file_sd 需要外部生成器维护 targets.json）。

  需要前置：集群已安装 prometheus-operator (kube-prometheus-stack)。values.yaml
  serviceMonitor.enabled=true 才渲染。
*/}}
{{- if .Values.serviceMonitor.enabled }}
{{- $components := list "console-api" "trigger" "orchestrator" "worker-import" "worker-export" "worker-dispatch" "worker-process" }}
{{- range $component := $components }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "batch-platform.fullname" $ }}-{{ $component }}
  labels:
    app.kubernetes.io/name: {{ include "batch-platform.name" $ }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: {{ $component }}
    {{- with $.Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "batch-platform.name" $ }}
      app.kubernetes.io/component: {{ $component }}
  endpoints:
    - port: http
      path: {{ $.Values.serviceMonitor.path | default "/actuator/prometheus" }}
      interval: {{ $.Values.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ $.Values.serviceMonitor.scrapeTimeout | default "10s" }}
      honorLabels: true
{{- end }}
{{- end }}
