# Production overlay — apply on top of values.yaml:
#   helm upgrade --install batch-platform ./helm/batch-platform \
#     -f helm/values-prod.yaml \
#     --set postgresql.platform.password=$DB_PASS \
#     --set postgresql.business.password=$DB_PASS \
#     --set objectStorage.accessKey=$MINIO_AK \
#     --set objectStorage.secretKey=$MINIO_SK \
#     --set security.internalSecret=$BATCH_INTERNAL_SECRET \
#     --set security.consoleJwtSecret=$BATCH_CONSOLE_JWT_SECRET

image:
  registry: "registry.example.com/batch-platform"
  tag: "1.0.0"
  pullPolicy: Always

imagePullSecrets:
  - name: registry-credentials

postgresql:
  platform:
    url: "jdbc:postgresql://pg-primary.db.svc.cluster.local:5432/batch_platform"
    username: "batch_user"
  business:
    url: "jdbc:postgresql://pg-primary.db.svc.cluster.local:5432/batch_business"
    username: "batch_user"
    schema: "biz"

kafka:
  bootstrapServers: "kafka-0.kafka-headless.kafka.svc.cluster.local:9092,kafka-1.kafka-headless.kafka.svc.cluster.local:9092,kafka-2.kafka-headless.kafka.svc.cluster.local:9092"
  # broker HA 拓扑由 Strimzi operator 落地（deploy/ha/20-kafka-strimzi.yaml），chart 不自建 broker。
  # 这里的 broker.* 是“期望值”声明，必须与 Strimzi Kafka CR 一致；改这里不会改集群，需同步改 CR。
  #   - replicas=3：KafkaNodePool.spec.replicas=3，散在不同 node（podAntiAffinity）。
  #   - replicationFactor=3 / minInsyncReplicas=2：CR config 的 default.replication.factor=3 +
  #     min.insync.replicas=2 + offsets/txn 内部 topic RF=3；建业务 topic 时由 init 脚本注入
  #     KAFKA_TOPIC_REPLICATION_FACTOR=3 / KAFKA_TOPIC_MIN_INSYNC_REPLICAS=2。
  #     配 producer acks=all（已在 batch-defaults.yml）→ 同步副本下在途事件 RPO=0（0 丢）。
  #   - unclean.leader.election=false（CR 推荐）：不让落后副本当 leader，宁可短暂不可用也不丢已确认事件。
  broker:
    replicas: 3
    replicationFactor: 3
    minInsyncReplicas: 2

objectStorage:
  endpoint: "http://minio.minio.svc.cluster.local:9000"
  bucket: "batch-prod"

security:
  bypassMode: "false"
  internalSecret: ""
  consoleJwtSecret: ""
  # 2026-05-18 console 登录请求体 RSA+AES 混合加密(BE ConsoleLoginKeyPairService)。
  # prod 强制 required=true(BE @PostConstruct 守护);multi-replica 必须显式注入
  # keypair —— 单副本启动期生成在多副本会导致 FE 公钥不匹配解密私钥。
  # 推荐外部密钥管理(Vault / KMS / sealed-secrets)注入,本文件留空,deploy 时
  # --set security.loginEncryption.privateKeyPem=$(cat priv.pem) 或 values overlay。
  loginEncryption:
    enabled: "true"
    required: "true"
    privateKeyPem: ""   # 必填 (helm/Secret fail-fast 守卫)
    publicKeyPem: ""    # 必填 (helm/Secret fail-fast 守卫)

# R4-P0-4：K8s Service 实际端口 18082（见 chart values orchestrator.port），之前误用 docker-compose 内部端口 8082。
# 修复后 worker / console-api 才能正确连到 orchestrator。
orchestratorBaseUrl: "http://batch-platform-orchestrator.batch.svc.cluster.local:18082"

consoleApi:
  replicaCount: 2
  # R4-P2-5：与 .env.prod 一致的 SSE 重放容量（默认 chart 是 dev 量 20000/24h）
  realtime:
    replayMaxEntries: 50000
    replayTtl: "48h"
  # P0-5 (pre-launch audit 2026-05-18)：Spring lazy-init 端口 bind 晚于 livenessProbe initialDelay
  # 20s + 18 * 10s = 200s 窗口给冷启动；HPA 扩容场景频繁触发,无 startupProbe 必 CrashLoop。
  startupProbe:
    httpGet: {path: /actuator/health/liveness, port: 18080}
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 18
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-body-size: "200m"
    hosts:
      - host: batch-console.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: batch-console-tls
        hosts:
          - batch-console.example.com

# P0-5: trigger 在 base values 有 livenessProbe 但缺 startupProbe,prod 补齐
trigger:
  startupProbe:
    httpGet: {path: /actuator/health/liveness, port: 18081}
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 18

orchestrator:
  replicaCount: 2
  startupProbe:
    httpGet: {path: /actuator/health/liveness, port: 18082}
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 18

workerImport:
  replicaCount: 3
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  startupProbe:
    httpGet: {path: /actuator/health/liveness, port: 18083}
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 18

workerExport:
  replicaCount: 3
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  startupProbe:
    httpGet: {path: /actuator/health/liveness, port: 18084}
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 18

workerProcess:
  replicaCount: 3
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  startupProbe:
    httpGet: {path: /actuator/health/liveness, port: 18086}
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 18

workerDispatch:
  replicaCount: 2
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  startupProbe:
    httpGet: {path: /actuator/health/liveness, port: 18085}
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 18

# ADR-029 专用 SPI worker(原子任务 shell/sql/stored-proc/http)。最小权限隔离:
# 生产务必另配 workerAtomic.serviceAccountName / envFromSecretName(独立低权限凭据)。
workerAtomic:
  replicaCount: 1
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  startupProbe:
    httpGet: {path: /actuator/health/liveness, port: 18087}
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 18

# JVM 参数:沿用 values.yaml 全模块基础(含 OOM 留证据 / GC log / JFR 持续录制 /
# UTF-8 时区硬约束),overlay 仅加 prod profile;per-service 调优在 values.yaml 各
# service.javaOptsExtra(orchestrator ZGC / worker direct 1G 等)。
# 完整说明见 docs/runbook/jvm-tuning-and-profiling.md。
javaOpts: >-
  -XX:+UseContainerSupport
  -XX:MaxRAMPercentage=75.0
  -XX:InitialRAMPercentage=50.0
  -XX:+UseG1GC
  -XX:MaxDirectMemorySize=512m
  -XX:NativeMemoryTracking=summary
  -XX:MaxMetaspaceSize=256m
  -XX:+HeapDumpOnOutOfMemoryError
  -XX:HeapDumpPath=/var/log/app/heap-dump-%p-%t.hprof
  -XX:+ExitOnOutOfMemoryError
  -Xlog:gc*=info,gc+age=trace,safepoint=info:file=/var/log/app/gc-%t.log:time,uptime,level,tags:filecount=10,filesize=50M
  -XX:+UseStringDeduplication
  -Djava.security.egd=file:/dev/./urandom
  -Duser.timezone=UTC
  -Dfile.encoding=UTF-8
  -Dsun.jnu.encoding=UTF-8
  -XX:StartFlightRecording=name=continuous,settings=profile,maxsize=256m,maxage=10m,dumponexit=true,filename=/var/log/app/jfr-exit.jfr
  --enable-native-access=ALL-UNNAMED
  -Dspring.main.lazy-initialization=true
  -Dspring.profiles.active=prod

# P2-4 (pre-launch audit 2026-05-18)：prod 默认不部署 chart 内 OTel Collector(由集群 ops 提供独立 Collector)。
# batch-defaults.yml 中 OTLP endpoint 默认 http://otel-collector:4318 仅在 Collector 存在时有效;
# prod 必须通过外部 ExternalSecret / ConfigMap 注入 OTEL_EXPORTER_OTLP_ENDPOINT 指向真实 Collector,
# 否则 OTLP exporter 持续投递失败产生噪音日志。
otelCollector:
  enabled: false
