spring:
  flyway:
    locations: classpath:db/migration
    # platform-init.sql 仅建 schema；迁移完整执行，无需 baseline。
  quartz:
    jdbc:
      schema: classpath:db/quartz/tables_postgres_quartz_schema.sql

# IT 让 ShedLockProviderFactory 自动建 batch.shedlock 表(生产由 docker init 002-batch-shedlock.sql 建)
batch:
  shedlock:
    auto-create: true
