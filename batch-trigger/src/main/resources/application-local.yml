server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:15432/batch_platform
    username: batch_user
    password: batch_pass_123
    driver-class-name: org.postgresql.Driver
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: BatchTriggerScheduler
          jobStore:
            tablePrefix: quartz.QRTZ_
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            isClustered: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: batch
    schemas:
      - batch
      - quartz
    # 本地联调：Docker init 会预建 batch schema + shedlock 表，导致 Flyway 看到 non-empty schema。
    # baseline-version: 1 → 跳过 V1（schema 已由 Docker init 建好），从 V2 开始执行全部迁移。
    baseline-on-migrate: true
    baseline-version: 1

mybatis:
  mapper-locations: classpath*:mapper/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

batch:
  orchestrator:
    base-url: http://localhost:8082
  trigger:
    runtime:
      misfire-catch-up-threshold-seconds: 60
