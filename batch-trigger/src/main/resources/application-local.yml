server:
  port: 18081

spring:
  main:
    # 关掉懒加载：TriggerOutboxRelay 等 bean 仅 @PostConstruct 自启、不被其它 bean 强引用，
    # lazy 模式下可能永不实例化 → ADR-010 trigger_outbox 永远 NEW（与 orchestrator/worker-local 对齐）。
    lazy-initialization: false
  datasource:
    url: jdbc:postgresql://localhost:15432/batch_platform
    username: batch_user
    password: batch_pass_123
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 16379
      repositories:
        enabled: false
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: BatchTriggerScheduler
          jobStore:
            tablePrefix: quartz.QRTZ_
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            isClustered: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: batch
    schemas:
      - batch
      - quartz
    baseline-on-migrate: true
    # 与 orchestrator 一致：baseline-version 恒为 1，勿随最新迁移版本递增。
    baseline-version: 1
    # 与 orchestrator application-local 对齐：脚本/jar 暂不一致时不阻塞 migrate；生产 profile 仍为默认 true。
    validate-on-migrate: false

mybatis:
  mapper-locations: classpath*:mapper/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

batch:
  security:
    # 本地联调关闭 InternalSecretFilter 强制校验，与其他 5 个模块 application-local.yml 对齐
    # 否则 start-all.sh 的 /actuator/health 不带 X-Internal-Secret 会被 401，健康检查永远不通过
    bypass-mode: true
  orchestrator:
    base-url: http://localhost:18082
  trigger:
    runtime:
      misfire-catch-up-threshold-seconds: 60
