server:
  port: 18081

spring:
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:postgresql://localhost:15432/batch_platform
    username: batch_user
    password: batch_pass_123
    driver-class-name: org.postgresql.Driver
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: BatchTriggerScheduler
          jobStore:
            tablePrefix: quartz.QRTZ_
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            isClustered: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: batch
    schemas:
      - batch
      - quartz
    baseline-on-migrate: true
    # 与 orchestrator 一致：baseline-version 恒为 1，勿随最新迁移版本递增。
    baseline-version: 1

mybatis:
  mapper-locations: classpath*:mapper/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

batch:
  security:
    # 本地联调关闭 InternalSecretFilter 强制校验，与其他 5 个模块 application-local.yml 对齐
    # 否则 start-all.sh 的 /actuator/health 不带 X-Internal-Secret 会被 401，健康检查永远不通过
    testing-open: true
  orchestrator:
    base-url: http://localhost:18082
  trigger:
    runtime:
      misfire-catch-up-threshold-seconds: 60
