server:
  # Trigger 服务端口：优先读取环境变量 BATCH_TRIGGER_PORT
  port: ${BATCH_TRIGGER_PORT:18081}

spring:
  application:
    # Spring 应用名（用于日志/链路追踪/注册等）
    name: batch-trigger
  config:
    # 引入共享默认配置基线（来自 batch-common 的 resources）
    import: "classpath:batch-defaults.yml"
  autoconfigure:
    # trigger 仅做调度触发（fire → orchestrator launch），不使用对象存储。
    # 排除 batch-common 的 S3/storage 自动配置，避免构建无用的 S3Client——
    # AWS SDK v2 的 AwsBasicCredentials 构造即校验 secret 非空，缺凭据会导致启动失败。
    exclude:
      - com.example.batch.common.config.S3AutoConfiguration
      - com.example.batch.common.config.BatchObjectStoreAutoConfiguration
  quartz:
    # Quartz 调度器配置（使用 JDBC JobStore，支持集群）
    job-store-type: jdbc
    jdbc:
      # 不自动建表：由 Flyway 迁移统一管理
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            # 调度器实例名（便于识别）
            instanceName: BatchTriggerScheduler
          jobStore:
            # Quartz 表前缀（这里在 quartz schema 下）
            tablePrefix: quartz.QRTZ_
            # PostgreSQL 方言
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            # 集群模式：多实例共同抢占/执行触发任务
            isClustered: true
  flyway:
    # 迁移脚本：与 orchestrator 同源（POM 复制其 db/migration 至 classpath:db/migration）
    enabled: true
    locations: classpath:db/migration
    # 默认 schema
    default-schema: batch
    # 需要管理的 schema 列表
    schemas:
      - batch
      - quartz
    # 与 orchestrator 同源：docker init 预置空 batch + quartz schema，必须 baseline-on-migrate=true
    # 才能在 trigger 与 orchestrator 并行启动时不抢着抛 "non-empty schema but no history table"。
    baseline-on-migrate: true
    baseline-version: 1

batch:
  # 注：batch.security.internal-secret 已抽到 batch-defaults.yml 统一管理
  startup-self-check:
    enabled: true
    context-name: trigger
    flyway-validate: false
    schemas:
      - quartz
    quartz-standard-tables: true
    quartz-schema: quartz
  trigger:
    # 调度引擎选择(quartz / wheel),默认 wheel(2026-04-26 phase 1 收尾切换;57 IT 全过)。
    # quartz 仍保留作 opt-in 回退路径(BATCH_TRIGGER_SCHEDULER_IMPL=quartz),
    # 后续 codepath 收敛见 docs/architecture/quartz-replacement-evaluation.md。
    scheduler-impl: ${BATCH_TRIGGER_SCHEDULER_IMPL:wheel}
    # 注：原 quartz-datasource opt-in 开关已于 2026-04-25 移除（Phase 2 半成品清理）。
    # Quartz JobStore 共享主 DataSource，业务表与 QRTZ_* 同 PG 实例不同 schema。
    # 业务量级到拐点时演进路径见 docs/architecture/quartz-replacement-evaluation.md（直接换时间轮，不做独立库）。
    runtime:
      # misfire 追赶阈值（秒）：当触发错过时间超过该阈值时进行 catch-up
      misfire-catch-up-threshold-seconds: ${BATCH_TRIGGER_MISFIRE_CATCH_UP_THRESHOLD_SECONDS:60}
    wheel:
      # 时间轮 scheduler 配置(scheduler-impl=wheel 时生效)。详见 quartz-replacement-design.md §5.4
      tick-millis: ${BATCH_TRIGGER_WHEEL_TICK_MILLIS:100}
      bucket-count: ${BATCH_TRIGGER_WHEEL_BUCKET_COUNT:512}
      # 业务字段(秒,Java 内部 Duration.ofSeconds)
      sliding-window-seconds: ${BATCH_TRIGGER_WHEEL_SLIDING_WINDOW_SECONDS:300}
      stale-marker-threshold-seconds: ${BATCH_TRIGGER_WHEEL_STALE_MARKER_THRESHOLD_SECONDS:300}
      misfire-threshold-seconds: ${BATCH_TRIGGER_WHEEL_MISFIRE_THRESHOLD_SECONDS:60}
      # @Scheduled 调度间隔(毫秒,直接 fixedDelayString)
      sliding-window-scan-interval-millis: ${BATCH_TRIGGER_WHEEL_SCAN_INTERVAL_MILLIS:60000}
      stale-marker-release-interval-millis: ${BATCH_TRIGGER_WHEEL_STALE_MARKER_RELEASE_INTERVAL_MILLIS:120000}
      misfire-pending-expire-interval: ${BATCH_TRIGGER_WHEEL_MISFIRE_PENDING_EXPIRE_INTERVAL:PT1H}
      scan-batch-size: ${BATCH_TRIGGER_WHEEL_SCAN_BATCH_SIZE:1000}
      catch-up-rate-per-second: ${BATCH_TRIGGER_WHEEL_CATCH_UP_RATE:10.0}
      leader-instance-id: ${BATCH_TRIGGER_WHEEL_LEADER_INSTANCE_ID:}
