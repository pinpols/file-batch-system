openapi: 3.1.0
info:
  title: Orchestrator Internal API (SDK ↔ Orch protocol)
  version: 1.1.0
  x-last-updated: "2026-06-09"
  x-changelog:
    - date: "2026-06-09"
      summary: "[File Governance] 补充 APP_MANAGED 上传会话与确认到达 internal-only 端点,供 console BFF 走对象存储托管上传。"
    - date: "2026-06-02"
      summary: "[Lane N] 补全 worker drain/force-offline/takeover/warmup/claimed-tasks 与 tasks/cancel 端点;每端点加 401/404/409/5xx error responses;顶层 paths 加 x-protocol-stability 标注(stable / beta / internal-only),作为 BYO SDK 实现门禁;version 跟根 pom revision。"
    - date: "2026-05-31"
      summary: "[Phase 0] 初版立 yaml(plan §2 决策 #2)。覆盖 /internal/workers/* 和 /internal/tasks/* 给 SDK / 准客户消费;不含管理面 console-api 路径(见 console-api.openapi.yaml)。"
  description: >
    Orchestrator 暴露给 self-hosted SDK / 内部 worker 的 `/internal/*` 协议。这套接口的 schema
    是 ADR-035 §9 「两套绑定」契约的 source of truth —— SDK 端的 wire DTOs
    (`io.github.pinpols.batch.sdk.wire.*`) 必须保持一致,字段重命名 / 删除 / 新增走
    `docs/runbook/sdk-dual-rollout.md` 双向滚动纪律。

    本文件**只描述 SDK 可见的内部协议**,不暴露给 FE / 外部消费者(不在 console-api Swagger UI)。
    pr-gate CI 会对照 `WorkerController` / `TaskController` 漂移检测(见 `CLAUDE.md` 「API 文档同步」段)。

servers:
  - url: http://orchestrator-internal:8081
    description: 内部网络 only(不走 ingress)

tags:
  - name: workers
    description: Worker 注册 / 心跳 / 下线 / 状态管理(`WorkerController`)
  - name: tasks
    description: 任务认领 / 上报 / 续租(`TaskController`)
  - name: file-governance
    description: Console BFF 调用的内部文件治理接口(`FileGovernanceController`)

paths:
  # ─── x-protocol-stability 含义 ────────────────────────────────────────────────
  # stable        : BYO SDK 必须实现;字段语义冻结,只能加 nullable optional 字段
  # beta          : BYO SDK 可选实现;字段集仍可能演进(走 sdk-dual-rollout 双轨)
  # internal-only : 平台运维 / Java SDK 内部用,不要求 BYO SDK 实现
  # ─────────────────────────────────────────────────────────────────────────────
  /internal/workers/register:
    x-protocol-stability: stable
    post:
      tags: [workers]
      summary: Worker 注册(idempotent on workerCode)
      operationId: registerWorker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerHeartbeatDto'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerRegistryEntity'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/workers/{workerCode}/heartbeat:
    x-protocol-stability: stable
    post:
      tags: [workers]
      summary: Worker 周期心跳(默认 30s 一次)
      operationId: workerHeartbeat
      parameters:
        - in: path
          name: workerCode
          required: true
          schema: {type: string}
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerHeartbeatDto'
      responses:
        '200':
          description: 心跳成功,回包为 platform directive(SDK Phase 2 §2.3)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerHeartbeatResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/workers/{workerCode}/deactivate:
    x-protocol-stability: stable
    post:
      tags: [workers]
      summary: Worker 主动下线(优雅停)
      operationId: deactivateWorker
      parameters:
        - in: path
          name: workerCode
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerHeartbeatDto'
      responses:
        '200': {description: 下线成功}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/workers/{workerCode}/status:
    x-protocol-stability: internal-only
    post:
      tags: [workers]
      summary: 更新 worker status(平台运维用)
      operationId: updateWorkerStatus
      parameters:
        - in: path
          name: workerCode
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerHeartbeatDto'
      responses:
        '200':
          description: 状态更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerRegistryEntity'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/workers/{workerCode}/drain:
    x-protocol-stability: internal-only
    post:
      tags: [workers]
      summary: 平台运维触发 worker 优雅排空(WorkerDrainGovernanceService)
      operationId: drainWorker
      parameters:
        - in: path
          name: workerCode
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerDrainRequest'
      responses:
        '200':
          description: 已置 DRAINING
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerRegistryEntity'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/workers/{workerCode}/force-offline:
    x-protocol-stability: internal-only
    post:
      tags: [workers]
      summary: 平台运维强制下线(不等 drain)
      operationId: forceOfflineWorker
      parameters:
        - in: path
          name: workerCode
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerTenantRequest'
      responses:
        '200':
          description: 已置 OFFLINE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerRegistryEntity'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/workers/{workerCode}/takeover:
    x-protocol-stability: internal-only
    post:
      tags: [workers]
      summary: 平台运维接管 worker(把 OFFLINE 拉回认领)
      operationId: takeoverWorker
      parameters:
        - in: path
          name: workerCode
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerTenantRequest'
      responses:
        '200':
          description: 接管成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerRegistryEntity'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/workers/{workerCode}/warmup:
    x-protocol-stability: internal-only
    post:
      tags: [workers]
      summary: 平台运维热身(DRAINING → RUNNING 撤销)
      operationId: warmupWorker
      parameters:
        - in: path
          name: workerCode
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerTenantRequest'
      responses:
        '200':
          description: 已回滚至 RUNNING
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerRegistryEntity'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/workers/{workerCode}/claimed-tasks:
    x-protocol-stability: internal-only
    get:
      tags: [workers]
      summary: 查询 worker 当前持有的 claim(运维查活,非 SDK 接入路径)
      operationId: listClaimedTasks
      parameters:
        - in: path
          name: workerCode
          required: true
          schema: {type: string}
        - in: query
          name: tenantId
          required: true
          schema: {type: string}
      responses:
        '200':
          description: claim 列表(JobTaskEntity 字段集)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/tasks/{taskId}/claim:
    x-protocol-stability: stable
    post:
      tags: [tasks]
      summary: 认领任务(返回 EffectiveTaskConfig)
      operationId: claimTask
      parameters:
        - in: path
          name: taskId
          required: true
          schema: {type: integer, format: int64}
        - in: header
          name: Idempotency-Key
          required: false
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskClaimRequest'
      responses:
        '200':
          description: 认领成功;body 为 EffectiveTaskConfig(P1-2.1 起平台返回业务参数实时快照)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectiveTaskConfig'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409':
          description: 任务已被其他 worker 认领(BYO SDK 必须当幂等成功处理,不报告失败)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/tasks/{taskId}/report:
    x-protocol-stability: stable
    post:
      tags: [tasks]
      summary: 上报任务执行结果
      operationId: reportTask
      parameters:
        - in: path
          name: taskId
          required: true
          schema: {type: integer, format: int64}
        - in: header
          name: Idempotency-Key
          required: false
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskExecutionReportDto'
      responses:
        '200': {description: 上报成功}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409':
          description: lease 已失效 / task 被回收;BYO SDK 应放弃报告,log warn 即可
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/tasks/{taskId}/renew:
    x-protocol-stability: stable
    post:
      tags: [tasks]
      summary: lease 续约 + 进度上报 + cancel 感知(ORCH-P4-1)
      operationId: renewTaskLease
      parameters:
        - in: path
          name: taskId
          required: true
          schema: {type: integer, format: int64}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskHeartbeatRequest'
      responses:
        '200':
          description: 续租成功;cancelRequested=true 时 BYO SDK 应通过 CancellationSignal 中止 handler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskHeartbeatResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409':
          description: lease 已被回收(orch 视为僵尸 claim);BYO SDK 应停 handler 并放弃 report
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/tasks/{taskId}/cancel:
    x-protocol-stability: internal-only
    post:
      tags: [tasks]
      summary: 运维 / 平台请求取消 RUNNING task(ORCH-P4-1)
      description: >
        被 console-api 或 timeout scheduler 调;BYO SDK 不主动调本端点,而是通过 renew 响应里的
        cancelRequested 标志感知。本端点幂等。
      operationId: cancelTask
      parameters:
        - in: path
          name: taskId
          required: true
          schema: {type: integer, format: int64}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCancelRequest'
      responses:
        '200': {description: 已置 cancel_requested=true(或重复调,语义幂等)}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/tasks/leases/renew-batch:
    x-protocol-stability: stable
    post:
      tags: [tasks]
      summary: 批量续租(ADR-016)
      operationId: renewTaskLeaseBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskLeaseRenewBatchRequest'
      responses:
        '200':
          description: 批量续租结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskLeaseRenewBatchResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/files/presign-upload:
    x-protocol-stability: internal-only
    post:
      tags: [file-governance]
      summary: 创建 APP_MANAGED 文件上传会话
      description: >
        Console BFF 用该端点创建对象存储托管的 file_record,返回 console 侧 PUT 上传 URL。
        不是 BYO SDK 协议面。
      operationId: createFileUploadSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUploadRequest'
      responses:
        '200':
          description: 上传会话创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadSessionResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
        '5XX': {$ref: '#/components/responses/ServerError'}

  /internal/files/{fileId}/confirm-arrival:
    x-protocol-stability: internal-only
    post:
      tags: [file-governance]
      summary: 确认文件内容已到达对象存储
      description: >
        Console BFF 上传内容后调用;orchestrator 校验对象存在、回填 size 与 arrival metadata,
        并追加文件审计。
      operationId: confirmFileArrival
      parameters:
        - in: path
          name: fileId
          required: true
          schema: {type: integer, format: int64}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileOperationRequest'
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileOperationResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
        '5XX': {$ref: '#/components/responses/ServerError'}

components:
  responses:
    Unauthorized:
      description: 凭据无效 / 缺失;BYO SDK 必须 fail-fast,不重试(对照 wire-protocol §B/§C)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Forbidden:
      description: tenantId 越权 / workerCode 不属本租户;BYO SDK 必须 fail-fast
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    NotFound:
      description: workerCode / taskId 不存在(可能被运维清掉或 lease 失效)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Conflict:
      description: 状态冲突 / 幂等冲突 / 存储对象状态不满足操作前置条件
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ServerError:
      description: 平台侧 5xx;BYO SDK 应指数退避(200ms 基,默认 3 次)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

  schemas:
    WorkerHeartbeatDto:
      type: object
      description: 同一 schema 用于 register / heartbeat / deactivate / updateStatus
      properties:
        tenantId: {type: string}
        workerCode: {type: string}
        workerGroup: {type: string, nullable: true}
        status: {type: string, description: "RUNNING / DRAINING / OFFLINE"}
        hostName: {type: string, nullable: true}
        hostIp: {type: string, nullable: true}
        processId: {type: string, nullable: true}
        buildId: {type: string, nullable: true, description: "SDK-P5-3 运行指纹:租户应用构建标识;仅 register 上报"}
        sdkVersion: {type: string, nullable: true, description: "SDK-P5-3 运行指纹:worker 链接的 batch-worker-sdk 库版本;仅 register 上报"}
        heartbeatAt: {type: string, format: date-time}
        capabilityTags:
          type: array
          items: {type: string}
          description: "Worker 注册时上报支持的 taskType 列表"
          nullable: true
        currentLoad:
          type: integer
          description: "in-flight 任务数;null/负值平台 normalize 为 0"
          nullable: true
        taskTypes:
          type: array
          items: {$ref: '#/components/schemas/WorkerTaskTypeDescriptorDto'}
          description: "SDK Phase 3 M3.1 自定义 taskType 描述符;仅 register 上报,heartbeat 不带(null)"
          nullable: true
        protocolVersion: {type: string, nullable: true, description: "SDK wire 协议 schema 主版本(v1/v2);仅 register 上报。缺=legacy 放行,不支持的版本(如 v3)register 拒绝(400 error.worker.unsupported_protocol_version)"}
      required: [tenantId, workerCode, status, heartbeatAt]

    WorkerTaskTypeDescriptorDto:
      type: object
      description: SDK 声明的自定义 taskType 描述符(SDK Phase 3 M3.1),平台 upsert 到 custom_task_type_registry
      properties:
        code:
          type: string
          description: "taskType 唯一标识;以 SdkTaskHandler.taskType() 为权威"
        displayName: {type: string, nullable: true}
        version: {type: string, nullable: true}
        defaults:
          type: object
          additionalProperties: true
          nullable: true
          description: "派单参数默认值;敏感凭据禁止放此(走环境变量)"
        inputSchema:
          type: object
          additionalProperties: true
          nullable: true
          description: "JSON Schema 片段,console 据此渲染表单"
        templateVariables:
          type: array
          items: {type: string}
          nullable: true
          description: "可用模板变量名(如 bizDate)"

    WorkerRegistryEntity:
      type: object
      description: orchestrator 持久化的 worker 记录(部分字段)
      properties:
        id: {type: integer, format: int64}
        tenantId: {type: string}
        workerCode: {type: string}
        status: {type: string}
        lastHeartbeatAt: {type: string, format: date-time}

    WorkerHeartbeatResponse:
      type: object
      description: 心跳回包 platform directive(SDK Phase 2 §2.3),SDK 据此驱动 4 态状态机
      properties:
        platformStatus:
          type: string
          description: "平台期望态;当前 NORMAL / DRAINING,PAUSED/DEGRADED 预留"
        desiredMaxConcurrent:
          type: integer
          nullable: true
          description: "平台希望的最大并发(worker_registry.max_concurrent);null=不下发"
        shouldDrain:
          type: boolean
          description: "true=停止认领新任务、跑完在手任务后下线"
        pausedTaskTypes:
          type: array
          items: {type: string}
          description: "被暂停的 taskType;当前恒空,预留"
        nextHeartbeatHint:
          type: integer
          nullable: true
          description: "建议下次心跳间隔(秒);null=不下发,SDK 用本地配置"
      required: [platformStatus, shouldDrain, pausedTaskTypes]

    TaskClaimRequest:
      type: object
      description: claim / renew 共用 schema
      properties:
        tenantId: {type: string}
        workerId: {type: string, description: "SDK 端 == workerCode(ADR-035 §9)"}
        partitionInvocationId:
          type: string
          nullable: true
          description: "ADR-014;mismatched invocation 平台 reject"
      required: [tenantId, workerId]

    TaskExecutionReportDto:
      type: object
      properties:
        taskId: {type: integer, format: int64}
        tenantId: {type: string}
        workerId: {type: string}
        traceId: {type: string, nullable: true}
        success: {type: boolean}
        code: {type: string, nullable: true}
        message: {type: string, nullable: true}
        resultSummary: {type: string, nullable: true}
        errorCode:
          type: string
          nullable: true
          description: "严禁错名 errorClass — 平台读 errorCode"
        highWaterMarkOut:
          type: string
          nullable: true
          description: "增量执行水位高点;null 表示无变化"
        outputs:
          type: object
          additionalProperties: true
          nullable: true
          description: "ADR-009 Stage 1.2 节点产出;严禁错名 output(单数)"
        partitionInvocationId: {type: string, nullable: true}
        failureClass:
          type: string
          nullable: true
          description: "ADR-012;允许取值见 FailureClass enum"
        verifierFailures:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
            description: "ADR-030 §C/F {code, message, evidence}"
      required: [taskId, tenantId, workerId, success]

    EffectiveTaskConfig:
      type: object
      description: claim 成功时平台返回的业务参数实时快照(字段集见 batch-common/.../EffectiveTaskConfig.java)

    TaskLeaseRenewBatchRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskLeaseRenewItemPayload'

    TaskLeaseRenewItemPayload:
      type: object
      properties:
        tenantId: {type: string}
        taskId: {type: integer, format: int64}
        workerId: {type: string}
        partitionInvocationId: {type: string, nullable: true}

    TaskLeaseRenewBatchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskLeaseRenewResultPayload'

    TaskLeaseRenewResultPayload:
      type: object
      properties:
        taskId: {type: integer, format: int64}
        success: {type: boolean}
        message: {type: string, nullable: true}

    ErrorBody:
      type: object
      description: 平台统一错误回包(对应 CommonResponse 失败态;BYO SDK 用 code + message 分类)
      properties:
        code: {type: string, nullable: true, description: "业务错误码(可选)"}
        message: {type: string, nullable: true}
        traceId: {type: string, nullable: true}

    TaskHeartbeatRequest:
      type: object
      description: renew 请求体(ORCH-P4-1);旧版仅 tenantId/workerId/partitionInvocationId,新增可选 details(进度 / checkpoint 快照,严禁放敏感凭据)
      properties:
        tenantId: {type: string}
        workerId: {type: string}
        partitionInvocationId: {type: string, nullable: true}
        details:
          type: object
          additionalProperties: true
          nullable: true
          description: "任意 JSON 对象(平台落 job_task 字段,console 任务详情读取)。严禁含 DB 密码 / OAuth secret"
      required: [tenantId, workerId]

    TaskHeartbeatResponse:
      type: object
      description: renew 响应体;BYO SDK 必须解析 cancelRequested(true 时通过 CancellationSignal 等价机制中止 handler)
      properties:
        cancelRequested:
          type: boolean
          description: "平台已请求取消本 task;BYO SDK 必须在 handler 长循环中检测并主动停"
      required: [cancelRequested]

    TaskCancelRequest:
      type: object
      properties:
        tenantId: {type: string}
        reason: {type: string, nullable: true, description: "审计 / 日志用"}
      required: [tenantId]

    WorkerDrainRequest:
      type: object
      properties:
        tenantId: {type: string}
        timeoutSeconds: {type: integer, nullable: true, description: "drain 超时上限(秒);null=平台默认"}
      required: [tenantId]

    WorkerTenantRequest:
      type: object
      properties:
        tenantId: {type: string}
      required: [tenantId]

    FileUploadRequest:
      type: object
      properties:
        tenantId: {type: string}
        channelCode: {type: string}
        fileName: {type: string}
        operatorId: {type: string, nullable: true}
        traceId: {type: string, nullable: true}
      required: [tenantId, channelCode, fileName]

    FileUploadSessionResponse:
      type: object
      properties:
        fileId: {type: integer, format: int64}
        status: {type: string, description: "当前返回 RECEIVED"}
        uploadMode: {type: string, description: "当前返回 APP_MANAGED"}
        uploadMethod: {type: string, description: "当前返回 PUT"}
        contentField: {type: string, description: "multipart 字段名,当前为 file"}
        uploadUrl: {type: string, description: "console-api 相对路径"}
        storageBucket: {type: string, nullable: true}
        storagePath: {type: string}
        fileName: {type: string}
      required: [fileId, status, uploadMode, uploadMethod, contentField, uploadUrl, storagePath, fileName]

    FileOperationRequest:
      type: object
      properties:
        tenantId: {type: string}
        operatorId: {type: string, nullable: true}
        reason: {type: string, nullable: true}
        traceId: {type: string, nullable: true}
      required: [tenantId]

    FileOperationResponse:
      type: object
      properties:
        status: {type: string}
      required: [status]

    TaskDispatchMessage:
      type: object
      description: >
        Kafka 派单消息(平台 producer → SDK consumer)。Phase 0 起携带 schemaVersion(默认 "v1",当前
        平台发 "v2");SDK 收到未知 major(非 v1/v2) 直接 reject 防错乱。
      properties:
        schemaVersion:
          type: string
          description: "v1 / v2 / v2-rc;缺字段当 v1 解析"
          default: "v1"
        tenantId: {type: string}
        jobInstanceId: {type: integer, format: int64, nullable: true}
        jobPartitionId: {type: integer, format: int64, nullable: true}
        taskId: {type: integer, format: int64}
        instanceNo: {type: string, nullable: true}
        jobCode: {type: string}
        workerType: {type: string, description: "等同 task_type;消费端按此过滤"}
        selectedWorkerId: {type: string, nullable: true, description: "非空走 direct dispatch topic"}
        priorityBand: {type: string, description: "HIGH / MEDIUM / LOW"}
        traceId: {type: string, nullable: true}
        idempotencyKey: {type: string}
        dispatchAt: {type: string, format: date-time}
      required: [tenantId, taskId, jobCode, workerType, idempotencyKey, dispatchAt]
