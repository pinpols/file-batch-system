    BatchDayReplaySubmitRequest:
      type: object
      description: ADR-020 批次日重放提交命令
      properties:
        tenantId:        { type: string }
        calendarCode:    { type: string }
        bizDate:         { type: string, format: date }
        scope:
          type: string
          enum: [ALL, ALL_FAILED, SUBSET_JOB_CODES, OUTPUTS_ONLY]
        jobCodes:
          type: array
          items: { type: string }
          description: 仅 SUBSET_JOB_CODES scope 必填
        versionIds:
          type: array
          items: { type: integer, format: int64 }
          description: 仅 OUTPUTS_ONLY scope 必填，要 promote 的 result_version id 列表
        resultPolicy:
          type: string
          enum: [CREATE_NEW_VERSION, KEEP_BOTH, MANUAL_CONFIRM_EFFECTIVE]
          description: 缺省 CREATE_NEW_VERSION
        configVersionPolicy:
          type: string
          enum: [USE_ORIGINAL_CONFIG, USE_CURRENT_CONFIG, USE_SPECIFIC_VERSION]
          description: 缺省 USE_ORIGINAL_CONFIG
        configVersion:   { type: integer, format: int32 }
        reason:          { type: string }
        requestedBy:     { type: string }
        autoApprove:     { type: boolean, description: 'true 直接 RUNNING；false PENDING_APPROVAL（默认）' }
        traceId:         { type: string }
      required: [tenantId, calendarCode, bizDate, scope, reason, requestedBy]
    DryRunPlanRequest:
      type: object
      description: ADR-026 演练计划请求
      properties:
        tenantId: { type: string }
        jobCode:  { type: string }
        bizDate:
          type: string
          format: date
          description: L2/L3 必填；L1 可空
        level:
          type: string
          enum: [CONFIG_VALIDATE, SCHEDULE_PLAN, EXECUTION_PLAN]
          description: 'L1=CONFIG_VALIDATE / L2=SCHEDULE_PLAN / L3=EXECUTION_PLAN'
        params:
          type: object
          additionalProperties: true
          description: |
            可选 effectiveParams；L3 EXECUTION_PLAN 中识别以下 key 触发探测：
            - sql / querySql / sourceQuery / validationSql / selectSql → JdbcTemplate EXPLAIN
            - s3Bucket → S3Client.headBucket（命名 DNS-style 校验）
            - endpointUrl / callbackUrl / channelEndpoint / dispatchTarget → HTTP HEAD（5s timeout）
      required: [tenantId, jobCode]
