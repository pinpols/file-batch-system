components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    consoleToken:
      type: apiKey
      in: header
      name: X-Console-Token
  parameters:
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    TraceIdHeader:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
    TenantIdQuery:
      name: tenantId
      in: query
      required: false
      schema:
        type: string
    OperatorIdHeader:
      name: X-Operator-Id
      in: header
      required: false
      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  schemas:
    CommonMeta:
      type: object
      properties:
        requestId:
          type: string
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [requestId, traceId, timestamp]
    CommonResponseBase:
      type: object
      properties:
        code:
          type: string
          description: Application-level status code.
        message:
          type: string
          description: Human-readable status message.
        meta:
          $ref: '#/components/schemas/CommonMeta'
      required: [code, message, meta]
    PageRequest:
      type: object
      properties:
        pageNo:
          type: integer
          format: int32
          minimum: 1
          default: 1
        pageSize:
          type: integer
          format: int32
          minimum: 1
          default: 20
      required: [pageNo, pageSize]
    PageResponse:
      type: object
      properties:
        total:
          type: integer
          format: int64
        pageNo:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        items:
          type: array
          items: {}
      required: [total, pageNo, pageSize, items]
