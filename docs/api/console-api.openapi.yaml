openapi: 3.1.0
info:
  title: Batch Platform Console API
  version: 0.1.0
  x-last-updated: "2026-05-13"
  x-changelog:
    - date: "2026-05-13"
      summary: "配置类 Excel 单域 template/export 已收敛删除，仅保留 /api/console/config/tenant-package/excel/** 作为 11-Sheet 租户配置包 Excel 唯一路径；报表中心 /api/console/reports/excel/** 保留"
    - date: "2026-05-03"
      summary: "POST /api/console/config/tenant-init 与 POST /api/console/config/tenant-copy 的 requestBody 改为 $ref 引用：新增 TenantConfigBatchInitRequest（含 11 个嵌套 Spec：JobDefinitionSpec/WorkflowDefinitionSpec(NodeSpec/EdgeSpec)/PipelineDefinitionSpec(StepSpec)/FileChannelSpec/FileTemplateSpec/ResourceQueueSpec/BatchWindowSpec/BusinessCalendarSpec/TenantQuotaPolicySpec/AlertRoutingSpec）+ TenantConfigCopyRequest + TenantConfigCopyType enum，前端 codegen 现可拿到完整嵌套结构"
    - date: "2026-04-16"
      summary: "6 个 Excel 控制器（file-templates/file-channels/alert-routings/batch-windows/quota-policies/resource-queues）的 upload/apply 请求响应统一为共享类型 ExcelUploadResponse/ExcelApplyResponse/ExcelApplyRequest/ExcelRowIssue，旧 per-entity schema 改为 $ref 别名"
    - date: "2026-04-11"
      summary: "POST /api/console/files/delete 改为 DELETE /api/console/files/{fileId}，请求体拆为 path/query 参数，统一物理删除走 DELETE 方法"
    - date: "2026-04-11"
      summary: "软删除改 PATCH：POST /{id}/toggle + POST /batch-toggle 统一改为 PATCH /{id}（body: EnabledPatchRequest）和 PATCH /batch（body: BatchEnabledPatchRequest），移除旧 toggle/batch-toggle 路径"
    - date: "2026-04-11"
      summary: "移除 DELETE job-definitions/{id}、workflow-definitions/{id}、file-channels/{id}、file-templates/{id}；软删除统一走 PATCH /{id}，DELETE 仅保留于物理删除场景"
    - date: "2026-04-12"
      summary: "新增 /api/console/config/tenant-package/excel 配置包端点，后续收敛为 11-Sheet 租户配置包 Excel 唯一路径（template/export/upload/preview/preview-workbook/apply），含跨 Sheet 依赖校验和单事务写库"
    - date: "2026-04-12"
      summary: "POST /api/console/tenants/batch 新增可选字段 initConfigFrom/initMode：非空时建完租户后自动复制源租户配置，响应从 List<ConsoleTenantResponse> 改为 {tenants, configInit}"
    - date: "2026-04-11"
      summary: "新增 POST /api/console/tenants/batch 批量建租户端点（共享密码+用户名前缀，单事务）"
    - date: "2026-04-11"
      summary: "POST /api/console/tenants 新增必填字段 username/password，建租户时同步创建 ROLE_TENANT_USER 操作账号"
    - date: "2026-04-11"
      summary: "补齐 5 个新域（BatchWindow/BusinessCalendar/PipelineDefinition/TenantQuotaPolicy/ResourceQueue）的 Excel Upload/Preview/Apply CommonResponse 包装、ApplyRequest 及全部 inner Response/RowIssue/domain schema（共 47 个），消除所有悬空 $ref；添加 x-last-updated 和 x-changelog 标识"
  description: >
    Frontend-facing contract for the batch console.
    This file is the machine-readable source of truth for UI integration,
    code generation, and mock server stubs.
    Whenever the API surface changes, update this file and console-api-protocol.md together.
servers:
  - url: http://localhost:18080
    description: Local console-api
tags:
  - name: Jobs
    description: Trigger, compensate, rerun, and dead-letter replay actions.
  - name: Approvals
    description: Approval workflow actions.
  - name: Config
    description: Config release, gray, rollback, and secret rotation.
  - name: Reports
    description: Export-only Excel reports for config and runtime records.
  - name: Workers
    description: Worker drain, takeover, force-offline, and claimed tasks.
  - name: Files
    description: File governance and presigned download.
  - name: Alerts
    description: Alert acknowledgement, silencing, and closure actions.
  - name: Scheduler
    description: Scheduler snapshot and history.
  - name: Ops
    description: Console summary and operation dashboard.
  - name: Auth
    description: JWT login exchange and current principal.
  - name: Queries
    description: Read-only list and detail views.
  - name: AI
    description: Console AI assistant.
  - name: JobDefinitions
    description: Job definition CRUD and lifecycle management.
  - name: WorkflowDefinitions
    description: Workflow definition CRUD, DAG validation, and lifecycle management.
  - name: Triggers
    description: Quartz trigger registration, pause, resume, and unregister.
  - name: Meta
    description: Enum metadata, queue list, calendar list, window list, and worker group list.
  - name: Queues
    description: Resource queue CRUD and toggle.
  - name: BatchWindows
    description: Batch window CRUD and toggle.
  - name: Calendars
    description: Calendar CRUD, toggle, and holiday management.
  - name: QuotaPolicies
    description: Quota policy CRUD and toggle.
  - name: PipelineDefinitions
    description: Pipeline definition CRUD, detail with steps, and toggle.
  - name: Dashboard
    description: Dashboard statistics and trend views.
  - name: FileChannels
    description: File channel CRUD and toggle.
  - name: FileTemplates
    description: File template CRUD and toggle.
  - name: AlertRoutings
    description: Alert routing configuration Excel import/export.
  - name: Instances
    description: Job instance and partition cancel/terminate/retry operations.
  - name: WorkflowRuns
    description: Workflow run cancel, terminate, and node-skip operations.
  - name: Streams
    description: SSE streams for execution logs, trace snapshots, and event-driven realtime updates.
  - name: SystemParameters
    description: Runtime system parameter CRUD with Redis cache.
  - name: Webhooks
    description: Webhook subscription CRUD, delivery logs, and async event dispatch.
  - name: ResourceTags
    description: Resource tagging for job, workflow, file channel, and file template.
  - name: ApiKeys
    description: API key self-service creation, listing, and revocation.
  - name: Telemetry
    description: Frontend telemetry log collection endpoint.
  - name: Notifications
    description: >-
      Notification channel and subscription rule management, delivery logs.
      Channel/rule create/update/delete/test require ROLE_ADMIN or ROLE_TENANT_ADMIN;
      read (list/get) also allows ROLE_AUDITOR / ROLE_TENANT_USER. Subscription rules
      of channel_type=WEBHOOK are dispatched at runtime via SubscriptionRuleWebhookDispatcher
      (other channel types are logged as not-yet-wired).
  - name: Governance
    description: Circuit breaker and rate limit parameter management.
  - name: ArchivePolicies
    description: Data archive and cleanup policy management.
  - name: TenantPlacements
    description: biz tenant→shard placement management (P2 tenant-routing).
  - name: ClusterDiagnostic
    description: Cross-node consistency diagnostic endpoints.
  - name: Tenants
    description: Tenant registry CRUD and lifecycle management (ROLE_ADMIN).
  - name: Users
    description: Console user account CRUD, password reset, enable/disable (ROLE_ADMIN).
  - name: TenantSelfService
    description: Tenant quota and usage self-service.
  - name: SelfServiceJobs
    description: Tenant self-service rerun and compensation requests.
  - name: EventCatalog
    description: Event type catalog and Kafka topic directory.
security:
  - bearerAuth: []
paths:
  /api/console/auth/login:
    post:
      tags: [Auth]
      summary: Login with a seeded console account and issue a JWT
      operationId: loginConsoleAccount
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsoleLoginRequest'
      responses:
        '200':
          description: JWT token payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleAuthTokenResponse'
  /api/console/auth/public-key:
    get:
      tags: [Auth]
      summary: Get login encryption public key
      operationId: getConsoleLoginPublicKey
      security: []
      description: |
        Returns RSA-OAEP-256 public key metadata for encrypted login payloads.
        When login encryption is disabled, the backend returns 404 and the frontend may use plain login.
      responses:
        '200':
          description: Login encryption public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseMapStringObject'
        '404':
          description: Login encryption is unavailable
  /api/console/captcha/config:
    get:
      tags: [Auth]
      summary: Get captcha provider config (public, pre-login)
      operationId: getConsoleCaptchaConfig
      security: []
      description: |
        Returns the active captcha provider, public siteKey and whether login-protection is enabled,
        so the frontend can decide whether/which captcha widget to preload. Never returns any secret.
      responses:
        '200':
          description: Captcha provider config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseMapStringObject'
  /api/console/captcha/challenge:
    get:
      tags: [Auth]
      summary: Issue a self-hosted slider captcha challenge (pre-login)
      operationId: issueConsoleCaptchaChallenge
      security: []
      description: |
        Self-hosted provider only: issues a single-use slider challenge {challengeId, gap}.
        Returns 404 for any other provider (third-party providers handle challenges via their own SDK).
      responses:
        '200':
          description: Slider challenge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseMapStringObject'
        '404':
          description: Captcha challenge is not available for the current provider
  /api/console/auth/token:
    post:
      tags: [Auth]
      summary: Exchange current console session for a JWT token
      operationId: issueConsoleToken
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: JWT token payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleAuthTokenResponse'
  /api/console/auth/change-password:
    post:
      tags: [Auth]
      summary: Change own password (first-login forced change landing path)
      description: |
        本人改密:username 取自已认证 principal(不接受 body 指定)。校验旧密码 → 写新密码 →
        清除 must_change_password 标志 → 踢旧会话(强制用新密码重登)。
        must_change_password=true 期间此端点必须可达(改密守护白名单)。
        旧密码错误 401;新旧密码相同 400。
      operationId: changeOwnPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  minLength: 8
                  maxLength: 256
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 256
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated principal
      operationId: getConsolePrincipal
      responses:
        '200':
          description: Principal payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleAuthProfileResponse'
  /api/console/system/cron-preview:
    get:
      tags: [System]
      summary: Validate Quartz cron expression and preview next executions
      operationId: previewCron
      description: |
        Parses the expression with the same Quartz `CronExpression` class used by the trigger
        scheduler, so the previewed times match the real fire times exactly.

        Returns `valid=false` + `error` message when the expression cannot be parsed (200, not 400),
        or `valid=true` + `nextRuns` (ISO-8601 UTC, ascending) on success.

        Timezone is taken from `batch.timezone.default-zone` (default `Asia/Shanghai`).
      parameters:
        - name: expr
          in: query
          required: true
          schema:
            type: string
          description: Quartz 6 or 7 field expression (sec min hour dom mon dow [year])
        - name: count
          in: query
          required: false
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 20
          description: How many next executions to compute, clamped to [1, 20]
      responses:
        '200':
          description: Cron preview result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseCronPreview'
  /api/console/system/maintenance:
    get:
      tags: [System]
      summary: Maintenance mode status (always 200, no auth)
      operationId: getMaintenanceStatus
      description: |
        Returns the current maintenance/degradation state so the frontend can:
        1. Render a global banner with `message` + `etaAt` when `enabled=true`.
        2. Switch to read-only UI (disable write buttons) when `readOnly=true`.
        3. Auto-recover by polling (30s) and clearing banner when `enabled=false`.
        4. List `affectedServices` so users see which features are down vs available.

        This endpoint is whitelisted by `MaintenanceModeFilter`, so it returns 200 even
        during maintenance — otherwise the frontend would have no way to detect recovery.
      responses:
        '200':
          description: Maintenance status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseMaintenanceStatus'
  /api/console/admin/system/maintenance:
    get:
      tags: [System]
      summary: Get current maintenance state (admin)
      operationId: getAdminMaintenanceState
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current maintenance state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseMaintenanceStatus'
    put:
      tags: [System]
      summary: Hot-update maintenance state without restart (admin)
      operationId: updateAdminMaintenanceState
      description: |
        ROLE_ADMIN only. Replaces the runtime maintenance state in
        `MaintenanceStateHolder` (AtomicReference). Takes effect immediately on next
        request — no restart needed. Whitelisted by `MaintenanceModeFilter` so admins
        can disable maintenance even during a maintenance window.

        Typical SOP:
        - Pre-rollout: PUT `{enabled:true, readOnly:false, message:..., etaAt:...,
          affectedServices:["job-schedule"]}`
        - Post-rollout: PUT `{enabled:false}`
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMaintenanceRequest'
      responses:
        '200':
          description: Updated maintenance state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseMaintenanceStatus'
  /api/console/auth/check:
    get:
      tags: [Auth]
      summary: Lightweight auth probe (for nginx auth_request / reverse-proxy gating)
      operationId: checkConsoleAuth
      description: |
        Returns 204 if the current request carries a valid console session/JWT, 401 otherwise.
        Designed for high-frequency reverse-proxy auth checks (e.g. gating `/docs/*` static
        files); avoids the menu-assembly cost of `GET /api/console/auth/me`.
      responses:
        '204':
          description: Authenticated
        '401':
          description: Not authenticated
  /api/console/auth/logout:
    post:
      tags: [Auth]
      summary: Log out — clear HttpOnly token cookie
      operationId: logoutConsole
      description: |
        Sets `Set-Cookie: batch_console_token=; Max-Age=0` so the browser drops the auth cookie.
        Idempotent and does not require authentication (permitAll). Front-end should also clear
        the `batch-console-session` localStorage flag.
      responses:
        '204':
          description: Cookie cleared
  /api/console/auth/stream/ticket:
    post:
      tags: [Auth]
      summary: Issue one-time SSE ticket (5min TTL) for EventSource auth
      operationId: issueConsoleSseTicket
      responses:
        '200':
          description: One-time ticket used as `?ticket=` query param on SSE endpoints
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleSseTicketResponse'
  /api/console/pipeline-definitions/events:
    get:
      tags: [PipelineDefinitions]
      summary: Subscribe to pipeline definition realtime events
      operationId: streamPipelineDefinitionEvents
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of pipeline definition realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/workflow-definitions/events:
    get:
      tags: [WorkflowDefinitions]
      summary: Subscribe to workflow definition realtime events
      operationId: streamWorkflowDefinitionEvents
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of workflow definition realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/workers/events:
    get:
      tags: [Workers]
      summary: Subscribe to worker realtime events
      operationId: streamWorkerEvents
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of worker realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/alerts/events:
    get:
      tags: [Alerts]
      summary: Subscribe to alert realtime events
      operationId: streamAlertEvents
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of alert realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/ops/cache/evict-job-definition:
    post:
      tags: [Ops]
      summary: Evict orchestrator Redis cache for a single job definition
      description: |-
        Manual cache eviction for the OrchestratorConfigCacheService. Use only when DB
        was modified outside the console write path (direct psql / SQL migration);
        otherwise normal write endpoints already trigger afterCommit eviction.
      operationId: evictJobDefinitionCache
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: jobCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eviction result with the affected cache key descriptor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/cache/evict-all-job-definitions:
    post:
      tags: [Ops]
      summary: Evict orchestrator Redis cache for all job definitions of a tenant
      operationId: evictAllJobDefinitionsCache
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eviction result with the wildcard cache key descriptor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/cache/evict-workflow-definition:
    post:
      tags: [Ops]
      summary: Evict orchestrator Redis cache for a single workflow definition
      operationId: evictWorkflowDefinitionCache
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: workflowCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eviction result with the affected cache key descriptor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/cache/evict-business-calendar:
    post:
      tags: [Ops]
      summary: Evict orchestrator Redis cache for a single business calendar
      operationId: evictBusinessCalendarCache
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: calendarCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eviction result with the affected cache key descriptor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/cache/evict-batch-window:
    post:
      tags: [Ops]
      summary: Evict orchestrator Redis cache for a single batch window
      operationId: evictBatchWindowCache
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: windowCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eviction result with the affected cache key descriptor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/cache/evict-quota-policies:
    post:
      tags: [Ops]
      summary: Evict orchestrator Redis cache for tenant quota policy resolution
      operationId: evictQuotaPoliciesCache
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eviction result with the affected cache key descriptor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/summary:
    get:
      tags: [Ops]
      summary: Get console summary
      operationId: getConsoleSummary
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: Tenant scope for aggregated metrics (matches server @RequestParam).
      responses:
        '200':
          description: Summary payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleOpsSummaryResponse'
  /api/console/ops/atomic-runtime-status:
    get:
      tags: [Ops]
      summary: Atomic worker runtime defense status (Round-3 #8)
      description: |
        Operator-facing dashboard for ADR-029 atomic worker's 4 executors
        (shell/sql/http/storedProc): exposes enabled flag + safety-gate
        snapshot (allowlist sizes, SQL dialect, effective enforce-allowlist
        + its source: explicit/prod-default/dev-default). Console reverse-
        proxies the atomic worker's `/actuator/atomicruntime` Actuator
        endpoint. Returns `available=false` when reverse channel is disabled
        or atomic worker is unreachable (UI shows degraded banner).
      operationId: getAtomicRuntimeStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Atomic runtime status snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/kafka-lag:
    get:
      tags: [Ops]
      summary: Query Kafka consumer group lag
      operationId: getKafkaConsumerLag
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Consumer group lag list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/outbox/stats:
    get:
      tags: [Ops]
      summary: Get outbox backlog statistics
      operationId: getOutboxStats
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Outbox stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/outbox/cleanup:
    post:
      tags: [Ops]
      summary: Clean up published or abandoned outbox events
      operationId: cleanupOutbox
      security:
