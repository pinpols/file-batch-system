openapi: 3.1.0
info:
  title: Batch Platform Console API
  version: 0.1.0
  description: >
    Frontend-facing contract for the batch console.
    This file is the machine-readable source of truth for UI integration,
    code generation, and mock server stubs.
    Whenever the API surface changes, update this file and console-api-protocol.md together.
servers:
  - url: http://localhost:8080
    description: Local console-api
tags:
  - name: Jobs
    description: Trigger, compensate, rerun, and dead-letter replay actions.
  - name: Approvals
    description: Approval workflow actions.
  - name: Config
    description: Config release, gray, rollback, and secret rotation.
  - name: Workers
    description: Worker drain, force-offline, and claimed tasks.
  - name: Files
    description: File governance and presigned download.
  - name: Scheduler
    description: Scheduler snapshot and history.
  - name: Ops
    description: Console summary and operation dashboard.
  - name: Queries
    description: Read-only list and detail views.
  - name: AI
    description: Console AI assistant.
security:
  - consoleToken: []
paths:
  /api/console/ops/summary:
    get:
      tags: [Ops]
      summary: Get console summary
      operationId: getConsoleSummary
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Summary payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleOpsSummary'
  /api/console/jobs/trigger:
    post:
      tags: [Jobs]
      summary: Trigger a job
      operationId: triggerJob
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/OperatorIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerRequest'
      responses:
        '200':
          description: Trigger result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseString'
  /api/console/jobs/compensations:
    post:
      tags: [Jobs]
      summary: Create compensation command
