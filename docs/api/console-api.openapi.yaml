          format: int32
        fileTemplateRows:
          type: integer
          format: int32
        pipelineRows:
          type: integer
          format: int32
        pipelineStepRows:
          type: integer
          format: int32
        workflowDefinitionRows:
          type: integer
          format: int32
        workflowNodeRows:
          type: integer
          format: int32
        workflowEdgeRows:
          type: integer
          format: int32
      required: [uploadToken, fileName, resourceQueueRows, businessCalendarRows, batchWindowRows, jobRows, fileChannelRows, fileTemplateRows, pipelineRows, pipelineStepRows, workflowDefinitionRows, workflowNodeRows, workflowEdgeRows]
    TenantConfigPackageExcelPreviewResponse:
      type: object
      properties:
        uploadToken:
          type: string
        fileName:
          type: string
        totalRows:
          type: integer
          format: int32
