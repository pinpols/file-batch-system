      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  schemas:
    WorkerFingerprintResponse:
      type: object
      description: |
        Single worker run-fingerprint (SDK Phase 5 / SDK-P5-3, console Lane D).
        buildId / sdkVersion are nullable when worker did not report (e.g. legacy non-SDK file pipeline workers).
      properties:
        id:
          type: integer
          format: int64
        tenantId:
          type: string
        workerCode:
          type: string
        buildId:
          type: string
          nullable: true
          description: Application build identifier reported by SDK register.
        processId:
          type: string
          nullable: true
        sdkVersion:
          type: string
          nullable: true
          description: batch-worker-sdk library version detected from jar manifest.
        status:
          type: string
          enum: [ONLINE, OFFLINE, DRAINING, DECOMMISSIONED]
        heartbeatAt:
          type: string
          format: date-time
        compatibility:
          $ref: '#/components/schemas/WorkerCompatibility'
      required: [id, tenantId, workerCode, status]
    WorkerCompatibility:
      type: object
      description: |
        Protocol/SDK compatibility derived by backend from the worker's reported sdkVersion vs the
        platform's current supported SDK major (SDK runtime visibility ①). worker_registry stores only
        sdkVersion (no per-worker protocol schemaVersion), so the verdict is purely sdkVersion-major based;
        unparseable/missing -> UNKNOWN (never guessed).
      properties:
        status:
          type: string
          enum: [OK, SDK_OUTDATED, PROTOCOL_UNSUPPORTED, UNKNOWN]
        reasonCode:
          type: string
          description: Stable reason token for FE i18n (worker.compatibility.reason.*).
          enum: [COMPATIBLE, SDK_VERSION_BEHIND, SDK_VERSION_AHEAD, SDK_VERSION_UNKNOWN]
        reportedSdkVersion:
          type: string
          nullable: true
        platformSdkMajor:
          type: string
          description: Platform current SDK major (e.g. v1) for "upgrade to" hint.
    SdkCatalog:
      type: object
      description: SDK developer-portal catalog (SDK runtime visibility ②).
      properties:
        protocolVersion:
          type: object
          properties:
            supportedMajors:
              type: array
              items: { type: string }
              description: Platform-supported protocol majors (e.g. [v1, v2]).
            current:
              type: string
              description: Current canonical protocol major dispatched (e.g. v2).
            rejectedFrom:
              type: string
              description: Lowest rejected major (this and above are rejected, e.g. v3).
        languages:
          type: array
          items:
            type: object
            properties:
              lang: { type: string }
              artifact: { type: string }
              latestVersion:
                type: string
                description: Latest version; repo-version/unpublished when not published.
              installSnippet: { type: string }
              conformanceStatus: { type: string }
        sharedConstants:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
          description: Cross-language key constants mirrored from sdk-shared-constants.yaml.
        docs:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              path: { type: string }
      required: [id, tenantId, workerCode, status]
    WorkerFingerprintSummaryResponse:
      type: object
      description: |
        (buildId, sdkVersion) aggregated count of ONLINE workers for grayscale rollout visualization.
        NULL build_id / sdk_version are coalesced to literal "(unknown)" in SQL.
      properties:
        buildId:
          type: string
        sdkVersion:
          type: string
        count:
          type: integer
          format: int64
      required: [buildId, sdkVersion, count]
    CommonMeta:
      type: object
      properties:
        requestId:
          type: string
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [requestId, traceId, timestamp]
    CommonResponseBase:
      type: object
      properties:
        code:
          type: string
          description: Application-level status code.
        message:
          type: string
          description: Human-readable status message.
        meta:
          $ref: '#/components/schemas/CommonMeta'
      required: [code, message, meta]
    CommonResponseVoid:
      allOf:
        - $ref: '#/components/schemas/CommonResponseBase'
        - type: object
          properties:
            data:
              type: object
              nullable: true
              description: Always null for void responses.
    ReadinessItem:
      type: object
      description: |
        单条就绪项。hint / docRef 为「报怎么补」的可操作引导(向后兼容新增字段):
        告诉填写人具体在哪个 sheet 填哪个字段、参考哪份文档,而不是只报「缺什么」。
        两字段对 blocking 项填具体值,对 warning 项可为空。
      properties:
        item:
          type: string
          description: 检查项类别(template / channel / queue / job)。
        reason:
          type: string
          description: 原因可读英文摘要。
        ref:
          type: string
          description: 关联配置引用(templateCode / channelCode / queueCode / jobCode)。
        hint:
          type: string
          nullable: true
          description: 怎么填的可操作提示(如「在配置模板 file_template_config sheet 填 default_query_sql,参考『四类Worker示例』」)。
        docRef:
          type: string
          nullable: true
          description: 指向 quickstart 文档 / 字段说明的引用路径(如 docs/runbook/first-tenant-config-quickstart.md)。
      required: [item, reason, ref]
    TenantReadinessResult:
      type: object
      description: 租户就绪自检结果(ADR-026 dry-run 边界内:只看配置完整性 / 会不会跑,不看业务结果)。
      properties:
        tenantId:
          type: string
        ready:
          type: boolean
          description: blocking 为空即就绪。
        blocking:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessItem'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessItem'
      required: [tenantId, ready, blocking, warnings]
    EnabledPatchRequest:
      type: object
      properties:
        tenantId:
          type: string
          description: Tenant identifier.
        enabled:
          type: boolean
          description: Target enabled state.
      required: [tenantId, enabled]
    BatchEnabledPatchRequest:
      type: object
      properties:
        tenantId:
          type: string
          description: Tenant identifier.
        enabled:
          type: boolean
          description: Target enabled state.
        ids:
          type: array
          items:
            type: integer
            format: int64
          minItems: 1
          maxItems: 200
          description: IDs of records to patch.
      required: [tenantId, enabled, ids]
    PageRequest:
      type: object
      properties:
        pageNo:
          type: integer
          format: int32
          minimum: 1
          default: 1
        pageSize:
          type: integer
          format: int32
          minimum: 1
          default: 20
      required: [pageNo, pageSize]
    PageResponse:
      type: object
      properties:
        total:
          type: integer
          format: int64
        pageNo:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        items:
          type: array
          items: {}
      required: [total, pageNo, pageSize, items]
    CommonResponseString:
      allOf:
        - $ref: '#/components/schemas/CommonResponseBase'
        - type: object
          properties:
            data:
              type: string
    CommonResponseLong:
      allOf:
        - $ref: '#/components/schemas/CommonResponseBase'
        - type: object
          properties:
            data:
              type: integer
              format: int64
    CronPreview:
      type: object
      required: [expr, valid, nextRuns]
      properties:
        expr:
          type: string
          description: Echo of the input expression (trimmed)
        valid:
          type: boolean
          description: Whether the expression parsed successfully
        error:
          type: string
          nullable: true
          description: Parse error message when valid=false
        nextRuns:
          type: array
          items:
            type: string
            format: date-time
          description: Up to N next fire times in ISO-8601 UTC, ascending
        timezone:
          type: string
          nullable: true
          description: IANA timezone id used to compute the times (e.g. "Asia/Shanghai")
    CommonResponseCronPreview:
      allOf:
        - $ref: '#/components/schemas/CommonResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CronPreview'
    MaintenanceStatus:
      type: object
      required: [enabled, readOnly]
      properties:
        enabled:
          type: boolean
          description: Maintenance mode master switch
        readOnly:
          type: boolean
          description: When true, GET requests pass through but POST/PUT/PATCH/DELETE return 503
        message:
          type: string
          nullable: true
          description: User-facing reason; rendered verbatim in the FE banner
        etaAt:
          type: string
          nullable: true
          description: ISO-8601 estimated recovery timestamp; null when unknown
        affectedServices:
          type: array
          items:
            type: string
          description: |
            Service codes that are down during this maintenance (empty list = whole site).
            FE renders a per-service availability badge so users see what's still usable.
    UpdateMaintenanceRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        readOnly:
          type: boolean
          default: false
        message:
          type: string
          maxLength: 2048
        etaAt:
          type: string
          description: ISO-8601 estimated recovery timestamp
        affectedServices:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 64
    CommonResponseMaintenanceStatus:
      allOf:
        - $ref: '#/components/schemas/CommonResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MaintenanceStatus'
    CommonResponseWorkflowDefinitionDetailResponse:
