  /api/console/jobs/catch-up/approve:
    post:
      tags: [Jobs]
      summary: Approve catch-up
      operationId: approveCatchUp
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
