        - $ref: '#/components/parameters/StartDateFilter'
        - $ref: '#/components/parameters/EndDateFilter'
        - $ref: '#/components/parameters/TraceIdFilter'
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [id, duration]
            default: id
          description: Sort order. Use 'duration' for slow task diagnosis (descending by runtime).
        - name: minDurationSeconds
          in: query
          required: false
          schema:
            type: integer
          description: Minimum runtime threshold in seconds. Only returns instances running >= this value.
        - name: slaBreached
          in: query
          required: false
          schema:
            type: boolean
          description: When true, only returns instances with deadline_at < now and still in active status (CREATED/WAITING/READY/RUNNING/PARTIAL_FAILED). Matches the slaBreaches metric on OpsSummary.
        - name: instanceStatuses
          in: query
          required: false
          schema:
            type: string
          description: |
            Comma-separated status list (e.g. `FAILED,PARTIAL_FAILED`). Takes precedence over
            `instanceStatus`. Used by OpsSummary "failed jobs" card to match the same
            FAILED + PARTIAL_FAILED predicate as the counter.
      responses:
        '200':
          description: Job instance list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseJobInstanceList'
