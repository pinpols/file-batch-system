    TriggerRequest:
      type: object
      properties:
        tenantId:
          type: string
        jobCode:
          type: string
        bizDate:
          type: string
          format: date
        triggerType:
          type: string
          enum: [MANUAL, API, SCHEDULE, CATCH_UP]
        payload:
          type: string
        dryRun:
          type: boolean
          default: false
          description: When true, validates the trigger request without executing. Idempotency-Key not required.
      required: [tenantId, jobCode, bizDate]
    BatchDayQueryRequest:
      type: object
      properties:
        tenantId:
          type: string
        calendarCode:
          type: string
          maxLength: 128
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        pageNo:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
      required: [calendarCode]
    BatchDayWindowQueryRequest:
      type: object
      properties:
        tenantId:
          type: string
        calendarCode:
          type: string
          maxLength: 128
      required: [calendarCode]
    BatchDayCatchUpRequest:
      type: object
      properties:
        tenantId:
          type: string
        calendarCode:
          type: string
          maxLength: 128
        jobCodes:
          type: array
          items:
            type: string
            maxLength: 128
        reason:
          type: string
          maxLength: 512
      required: [calendarCode]
    ForensicExportRequest:
      type: object
      properties:
        tenantId:
          type: string
        bizDateFrom:
          type: string
          format: date
        bizDateTo:
          type: string
          format: date
