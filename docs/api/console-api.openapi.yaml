        把预览出错行被改动的单元格回写到上传会话并重校验,返回新预览,免去"下 Excel→改→重传"。不落库,仍需 apply。
      operationId: patchTenantConfigPackageExcelPreviewRow
      parameters:
        - name: uploadToken
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantConfigPackageExcelPatchRequest'
      responses:
        '200':
          description: Re-validated preview after patching the row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseTenantConfigPackageExcelPreview'
  /api/console/config/tenant-package/excel/preview/{uploadToken}/workbook:
    get:
      tags: [Config]
      summary: Download annotated preview workbook for tenant config package Excel
      operationId: downloadTenantConfigPackageExcelPreviewWorkbook
      parameters:
        - name: uploadToken
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Annotated workbook download (re-uploadable after fixing errors)
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
  /api/console/config/tenant-package/excel/apply/{uploadToken}:
    post:
      tags: [Config]
      summary: Apply tenant config package Excel in a single transaction
      operationId: applyTenantConfigPackageExcel
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - name: uploadToken
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantConfigPackageExcelApplyRequest'
      responses:
        '200':
          description: Apply result with inserted/updated counts per config type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseTenantConfigPackageExcelApply'

  # 2026-05-16 Web Push 后端实装合并(原 batch-console/backend-patch/),3 端点恢复声明。
  /api/console/push/vapid-public-key:
    get:
      tags: [push]
      summary: Return VAPID public key for browser PushManager.subscribe()
      operationId: getConsolePushVapidPublicKey
      responses:
        '200':
          description: VAPID public key (base64-url)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsolePushVapidPublicKey'
        '404':
          description: Push module disabled (BATCH_CONSOLE_PUSH_ENABLED=false)
  /api/console/push/subscribe:
    post:
      tags: [push]
      summary: Register a browser PushSubscription for the current user
      operationId: subscribeConsolePush
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsolePushSubscribeRequest'
      responses:
        '201':
          description: Subscription stored (or refreshed via upsert)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseBase'
  /api/console/push/unsubscribe:
    post:
      tags: [push]
      summary: Remove a single browser PushSubscription by endpoint
      operationId: unsubscribeConsolePush
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsolePushUnsubscribeRequest'
      responses:
        '204':
          description: Subscription removed (or already absent)

