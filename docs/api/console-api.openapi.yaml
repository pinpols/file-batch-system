      responses:
        '200':
          description: Rerun result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseString'
  /api/console/jobs/dead-letters/replay:
    post:
      tags: [Jobs]
      summary: Replay dead letters
      operationId: replayDeadLetters
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
