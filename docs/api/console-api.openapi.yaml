components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    consoleToken:
      type: apiKey
      in: header
      name: X-Console-Token
  parameters:
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    TraceIdHeader:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
    TenantIdQuery:
      name: tenantId
      in: query
      required: false
      schema:
        type: string
    CalendarCodeQuery:
      name: calendarCode
      in: query
      required: true
      schema:
        type: string
    PageNoQuery:
      name: pageNo
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 1
    PageSizeQuery:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 20
    # ── Domain-specific optional filter parameters ──
    JobCodeFilter:
      name: jobCode
      in: query
      required: false
      description: Filter by job code (partial match)
      schema:
        type: string
    InstanceStatusFilter:
      name: instanceStatus
      in: query
      required: false
      description: Filter by instance status (exact match)
      schema:
        type: string
    StartDateFilter:
      name: startDate
      in: query
      required: false
      description: Filter start date (ISO date, inclusive)
      schema:
        type: string
        format: date
    EndDateFilter:
      name: endDate
      in: query
      required: false
      description: Filter end date (ISO date, inclusive)
      schema:
        type: string
        format: date
    FileStatusFilter:
      name: fileStatus
      in: query
      required: false
      description: Filter by file status (exact match)
      schema:
        type: string
    BizTypeFilter:
      name: bizType
      in: query
      required: false
      description: Filter by biz type (partial match)
      schema:
        type: string
    FileNameFilter:
      name: fileName
      in: query
      required: false
      description: Filter by file name (partial match)
      schema:
        type: string
    TraceIdFilter:
      name: traceId
      in: query
      required: false
      description: Filter by trace ID (partial match)
      schema:
        type: string
    FileIdFilter:
      name: fileId
      in: query
      required: false
      description: Filter by file ID
      schema:
        type: integer
        format: int64
    AcknowledgedFilter:
      name: acknowledged
      in: query
      required: false
      description: Filter by acknowledged state (true = non-OPEN, false = OPEN)
      schema:
        type: boolean
    OperationTypeFilter:
      name: operationType
      in: query
      required: false
      description: Filter by audit operation type (exact match)
      schema:
        type: string
    OperatorIdFilter:
      name: operatorId
      in: query
      required: false
      description: Filter by operator ID (partial match)
      schema:
        type: string
    OperationResultFilter:
      name: operationResult
      in: query
      required: false
      description: Filter by operation result (exact match)
      schema:
        type: string
    StartTimeFilter:
      name: startTime
      in: query
      required: false
      description: Filter start datetime (ISO date-time, inclusive)
      schema:
        type: string
