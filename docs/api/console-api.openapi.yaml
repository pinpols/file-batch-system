          type: array
          items:
            $ref: '#/components/schemas/TenantConfigPackageSheetStats'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/TenantConfigPackageIssueDto'
        errorRows:
          type: array
          description: 按 (sheet, rowNo) 聚合的出错行明细(整行单元格值 + 该行所有问题),供前端内联编辑。
          items:
            $ref: '#/components/schemas/TenantConfigPackageErrorRowDto'
