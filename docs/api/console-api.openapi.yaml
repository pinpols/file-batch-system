  /api/console/config/tenant-init:
    post:
      tags: [Config]
      summary: Batch-initialize tenant configurations
      description: >
        Pushes all 10 config types to one or more tenants: job definitions, workflow definitions,
        pipeline definitions, file channels, file templates, resource queues, batch windows,
        business calendars, quota policies, and alert routings.
        mode=SKIP_EXISTING (default) creates missing items only; mode=UPSERT creates or updates.
        dryRun=true validates without writing.
      operationId: batchInitTenantConfig
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: TenantConfigBatchInitRequest
      responses:
        '200':
          description: Batch init result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'

  /api/console/config/tenant-copy:
    post:
      tags: [Config]
      summary: Cross-tenant configuration copy
      description: >
        Reads configuration from a source tenant and pushes it to one or more target tenants.
        Supports selective config types and dry-run mode. Response format is identical to tenant-init.
      operationId: copyTenantConfig
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceTenantId, targetTenantIds]
              properties:
                sourceTenantId:
                  type: string
                  maxLength: 64
                targetTenantIds:
                  type: array
                  items:
                    type: string
                    maxLength: 64
                  maxItems: 50
                configTypes:
                  type: array
                  items:
                    type: string
                    enum: [JOB_DEFINITION, WORKFLOW_DEFINITION, PIPELINE_DEFINITION, FILE_CHANNEL, FILE_TEMPLATE,
                           RESOURCE_QUEUE, BATCH_WINDOW, BUSINESS_CALENDAR, QUOTA_POLICY, ALERT_ROUTING]
                  description: Empty means all 10 types
                mode:
                  type: string
                  enum: [SKIP_EXISTING, UPSERT]
                  default: SKIP_EXISTING
                dryRun:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Copy result (same schema as tenant-init)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'

