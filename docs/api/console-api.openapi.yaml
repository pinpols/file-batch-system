  /api/console/tenants:
    get:
      tags: [Tenants]
      summary: List tenants
      operationId: listTenants
      security:
        - bearerAuth: []
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
          description: Fuzzy match on tenantId or tenantName
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, SUSPENDED]
        - name: pageNo
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated tenant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
    post:
      tags: [Tenants]
      summary: Create tenant (one-click provision)
      description: |
        创建租户并绑定一个 ROLE_TENANT_ADMIN 首账号。
        可选 `initConfigFrom` 非空时,建完租户后自动复制源租户配置(复用批量路径 configCopyService);
        无论是否复制配置,创建后都会运行租户就绪自检并把结果一并返回(建租户→复制配置→就绪校验一次闭环)。
        默认不传 `initConfigFrom` 即不复制配置,保持现行为(向后兼容)。
        响应从单纯 tenant 改为 `{tenant, configInit?, readiness}`(superset,向后兼容)。
      operationId: createTenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, tenantName, username, password]
              properties:
                tenantId:
                  type: string
                  minLength: 2
                  maxLength: 64
                  pattern: '^[a-z0-9][a-z0-9\-]*[a-z0-9]$'
                  description: Lowercase alphanumeric with hyphens
                tenantName:
                  type: string
                  maxLength: 256
                description:
                  type: string
                  maxLength: 512
                username:
                  type: string
                  minLength: 2
                  maxLength: 128
                  pattern: '^[a-zA-Z0-9][a-zA-Z0-9._\-]*$'
                  description: Initial operator account username (ROLE_TENANT_ADMIN)
                password:
                  type: string
                  minLength: 8
                  maxLength: 256
                  description: Initial operator account password (Argon2id hashed on server)
                initConfigFrom:
                  type: string
                  maxLength: 64
                  nullable: true
                  description: 可选;非空时建完租户后复制该源租户配置(如 default)。默认 null=不复制。
                initMode:
                  type: string
                  enum: [SKIP_EXISTING, UPSERT]
                  nullable: true
                  description: 配置复制模式,默认 SKIP_EXISTING;仅 initConfigFrom 非空时生效。
      responses:
        '200':
          description: Provision result (tenant + optional configInit + readiness)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'

  /api/console/tenants/batch:
    post:
      tags: [Tenants]
      summary: Batch create tenants with optional config init
      description: |
        批量创建租户，每个租户自动绑定一个 ROLE_TENANT_USER 操作账号。
        账号用户名 = `usernamePrefix` + `tenantId`，所有租户共享同一初始密码。
        全部租户创建操作在单事务内完成，任意冲突均回滚。

        租户创建成功后自动将源租户的配置（含作业定义、工作流定义、资源队列等全部 10 类）
        复制到新建租户，等价于调用 `POST /api/console/config/tenant-copy`。
        `initConfigFrom` 不传时默认使用 `default` 模板租户。
        配置复制失败不影响租户记录，失败详情见响应 `configInit` 字段。
      operationId: batchCreateTenants
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenants, password]
              properties:
                tenants:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: object
                    required: [tenantId, tenantName]
                    properties:
                      tenantId:
                        type: string
                        minLength: 2
                        maxLength: 64
                        pattern: '^[a-z0-9][a-z0-9\-]*[a-z0-9]$'
                      tenantName:
                        type: string
                        maxLength: 256
                      description:
                        type: string
                        maxLength: 512
                usernamePrefix:
                  type: string
                  maxLength: 32
                  pattern: '^[a-zA-Z0-9][a-zA-Z0-9._\-]*$'
                  default: "op-"
                  description: 账号用户名前缀，最终用户名为 {prefix}{tenantId}
                password:
                  type: string
                  minLength: 12
                  maxLength: 256
                  description: 批量初始密码（≥12位高强度），首次登录后应立即修改
                initConfigFrom:
                  type: string
                  maxLength: 64
                  nullable: true
                  description: |
                    可选。配置初始化源租户 ID。不传时默认使用 default 模板租户。
                    租户创建成功后自动将源租户的全部配置复制到新建租户。
                initMode:
                  type: string
                  enum: [SKIP_EXISTING, UPSERT]
                  default: SKIP_EXISTING
                  description: 配置初始化模式，默认 SKIP_EXISTING
      responses:
        '200':
          description: 租户创建结果及（可选）配置初始化结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponseObject'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          tenants:
                            type: array
                            items:
                              $ref: '#/components/schemas/ConsoleTenantResponse'
                          configInit:
                            nullable: true
                            $ref: '#/components/schemas/TenantConfigBatchInitResponse'
        '409':
          description: Conflict — tenantId or username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'

  /api/console/tenants/{tenantId}:
    get:
      tags: [Tenants]
      summary: Get tenant detail
      operationId: getTenant
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
    put:
      tags: [Tenants]
      summary: Update tenant name / description
      operationId: updateTenant
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantName]
              properties:
