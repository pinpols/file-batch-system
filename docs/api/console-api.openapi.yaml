      summary: Create job bundle
      description: |
        Creates one job definition and optional related workflow/file/alert/resource config in
        a single backend transaction. **Strict all-or-nothing**: if any spec fails to apply
        the whole transaction is rolled back (no partial commits). The shared
        `TenantConfigBatchInitRequest.strict` flag is forced to true on this path; the
        unrelated ConfigSync path keeps `strict=false` and tolerates partial success.
      operationId: createJobBundle
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobBundleCreateRequest'
      responses:
        '200':
          description: Bundle creation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
