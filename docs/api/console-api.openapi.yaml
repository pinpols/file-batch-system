    TenantConfigBatchInitRequest:
      type: object
      required: [targetTenantIds]
      description: |
        批量租户配置初始化请求。
        mode=SKIP_EXISTING 已存在跳过；mode=UPSERT 已存在更新。
        dryRun=true 时只校验不写入数据库。
        各 List<XxxSpec> 字段为可选；未传则该类配置不初始化。
      properties:
        targetTenantIds:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            minLength: 1
            maxLength: 64
        mode:
          type: string
          enum: [SKIP_EXISTING, UPSERT]
          default: SKIP_EXISTING
        dryRun:
          type: boolean
          default: false
        jobDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/JobDefinitionSpec'
        workflowDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowDefinitionSpec'
        pipelineDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/PipelineDefinitionSpec'
        fileChannels:
          type: array
          items:
            $ref: '#/components/schemas/FileChannelSpec'
        fileTemplates:
          type: array
          items:
            $ref: '#/components/schemas/FileTemplateSpec'
        resourceQueues:
          type: array
          items:
            $ref: '#/components/schemas/ResourceQueueSpec'
        batchWindows:
          type: array
          items:
            $ref: '#/components/schemas/BatchWindowSpec'
        businessCalendars:
          type: array
          items:
            $ref: '#/components/schemas/BusinessCalendarSpec'
        quotaPolicies:
          type: array
          items:
            $ref: '#/components/schemas/TenantQuotaPolicySpec'
        alertRoutings:
          type: array
          items:
            $ref: '#/components/schemas/AlertRoutingSpec'

    TenantConfigCopyRequest:
      type: object
      required: [sourceTenantId, targetTenantIds]
      description: |
        跨租户配置复制请求。从源租户读取配置，推送到目标租户列表。
        configTypes 为空表示复制全部 10 类。
      properties:
        sourceTenantId:
          type: string
          minLength: 1
          maxLength: 64
        targetTenantIds:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            minLength: 1
            maxLength: 64
        configTypes:
          type: array
          items:
            $ref: '#/components/schemas/TenantConfigCopyType'
          description: 空表示复制全部 10 类
        mode:
          type: string
          enum: [SKIP_EXISTING, UPSERT]
          default: SKIP_EXISTING
        dryRun:
          type: boolean
          default: false

    TenantConfigCopyType:
      type: string
      enum:
        - JOB_DEFINITION
        - WORKFLOW_DEFINITION
        - PIPELINE_DEFINITION
        - FILE_CHANNEL
        - FILE_TEMPLATE
        - RESOURCE_QUEUE
        - BATCH_WINDOW
        - BUSINESS_CALENDAR
        - QUOTA_POLICY
        - ALERT_ROUTING
      description: |
        配置类型枚举。后端 @JsonCreator 兼容简写：
        "JOB" → JOB_DEFINITION / "WORKFLOW" → WORKFLOW_DEFINITION /
        "PIPELINE" → PIPELINE_DEFINITION（仅 *_DEFINITION 三类支持简写）。
        其余类型必须传完整名称。

