  # See docs/design/workflow-dag-designer.md
  /api/console/workflow-definitions/{id}/full:
    put:
      tags: [WorkflowDefinitions]
      summary: Full replace workflow definition (definition + nodes + edges)
      description: |
        Canvas Save: same-tx delete nodes/edges + rewrite + bump version.
        Caller must hold the design lock; CONFLICT on lock not held / version mismatch.
      operationId: fullUpdateWorkflowDefinition
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowDefinitionFullUpdateRequest'
      responses:
        '200':
          description: Updated workflow definition detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseWorkflowDefinitionDetailResponse'

  /api/console/workflow-definitions/{id}/versions:
    get:
      tags: [WorkflowDefinitions]
      summary: List all version snapshots for a workflow definition
      description: |
        workflow-dag-designer Polish — reads `workflow_definition_version` (V167).
        Returned list is sorted by `version desc`; the entry matching the master
        `workflow_definition.version` carries `current=true`. When the history table
        has no rows yet (e.g. just after V167 migration) the endpoint degrades to a
        single `current` row built from the master table (compatible with the
        pre-history single-version PR #370 behavior).
      operationId: listWorkflowDefinitionVersions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseWorkflowDefinitionVersionSummaryList'

  /api/console/workflow-definitions/{id}/versions/{version}:
    get:
      tags: [WorkflowDefinitions]
      summary: Read a specific workflow definition version (current or historical)
      description: |
        Current `version` (== master `workflow_definition.version`) is served from
        the master tables (`workflow_definition` + `workflow_node` + `workflow_edge`);
        historical versions are deserialized from `workflow_definition_version.nodes_json`
        / `edges_json`. Unknown versions return NOT_FOUND.
      operationId: getWorkflowDefinitionVersion
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: version
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow definition detail at the requested version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseWorkflowDefinitionDetailResponse'
        '404':
          description: Version not found

  /api/console/workflow-definitions/{id}/lock:
    put:
      tags: [WorkflowDefinitions]
      summary: Acquire workflow design lock (5min TTL)
      operationId: acquireWorkflowDesignLock
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lock acquired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseWorkflowDesignLockResponse'
        '409':
          description: Lock held by other user (response body includes lockedBy)
    delete:
      tags: [WorkflowDefinitions]
      summary: Release workflow design lock (owner only)
      operationId: releaseWorkflowDesignLock
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Released (or already expired — idempotent no-op)

