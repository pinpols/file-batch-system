components:
  securitySchemes:
    consoleToken:
      type: apiKey
      in: header
      name: X-Console-Token
  parameters:
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    TraceIdHeader:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
    TenantIdQuery:
      name: tenantId
      in: query
      required: false
      schema:
        type: string
    OperatorIdHeader:
      name: X-Operator-Id
      in: header
      required: false
      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  schemas:
    CommonMeta:
      type: object
      properties:
        requestId:
          type: string
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [requestId, traceId, timestamp]
    CommonResponseString:
      type: object
      properties:
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: success
        data:
          type: string
        meta:
          $ref: '#/components/schemas/CommonMeta'
      required: [code, message, data, meta]
    CommonResponseLong:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: integer
          format: int64
        meta:
          $ref: '#/components/schemas/CommonMeta'
      required: [code, message, data, meta]
    CommonResponseObject:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          nullable: true
        meta:
          $ref: '#/components/schemas/CommonMeta'
      required: [code, message, data, meta]
    CommonResponseMapList:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        meta:
          $ref: '#/components/schemas/CommonMeta'
      required: [code, message, data, meta]
    CommonResponseMapStringObject:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseBatchApprovalResultList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseConfigReleaseList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseSecretVersionList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseConfigChangeLogList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseAlertEventList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseFileRecordList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseJobDefinitionList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseJobInstanceList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseJobStepInstanceList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseWorkflowDefinitionList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseWorkflowNodeList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseWorkflowEdgeList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseWorkflowRunList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseWorkflowNodeRunList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseWorkflowTopologyView:
      allOf:
        - $ref: '#/components/schemas/CommonResponseObject'
    CommonResponseDeadLetterTaskList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseRetryScheduleList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponsePendingCatchUpList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseWorkerRegistryList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseConsoleOpsSummary:
      allOf:
        - $ref: '#/components/schemas/CommonResponseObject'
    CommonResponseAiChatResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/AiChatResponse'
        meta:
          $ref: '#/components/schemas/CommonMeta'
      required: [code, message, data, meta]
    CommonResponseFileArrivalGroupList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'
    CommonResponseFileErrorRecordList:
      allOf:
        - $ref: '#/components/schemas/CommonResponseMapList'

    TriggerRequest:
      type: object
      properties:
        tenantId:
          type: string
        jobCode:
