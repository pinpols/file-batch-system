    get:
      tags: [Jobs]
      summary: Export job bundle
      description: Exports one job definition and directly related config as a reusable bundle payload.
      operationId: exportJobBundle
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: jobCode
          in: query
          required: true
