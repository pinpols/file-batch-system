    TenantConfigPackageErrorRowDto:
      type: object
      properties:
        sheetName:
          type: string
        rowNo:
          type: integer
          format: int32
        values:
          type: object
          additionalProperties:
            type: string
          description: 该行整行单元格值(列键→值),迭代顺序 = 该 sheet 列顺序。
        messages:
          type: array
          items:
            type: string
      required: [sheetName, rowNo, values, messages]
    TenantConfigPackageExcelPatchRequest:
      type: object
      properties:
        sheetName:
          type: string
          description: sheet 名(后端 validator SHEET 常量,如 job_definition / file_channel_config)。
        rowNo:
          type: integer
          format: int32
          minimum: 2
          description: 行号(与预览返回一致;数据行从 2 起,1 为表头)。
        values:
          type: object
          additionalProperties:
            type: string
          description: 改动的单元格:列键→新值。仅合并该行已有的列键,未知键忽略。
      required: [sheetName, rowNo]
    TenantConfigPackageSheetStats:
