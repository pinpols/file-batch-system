  /api/console/admin/test-data:
    delete:
      tags: [Admin]
      summary: Cleanup e2e/test data by prefix (admin-only, cascading delete across 11 tables)
      description: |
        按 prefix 级联清理测试数据,解决 e2e 测试只 INSERT 不 DELETE 导致业务表 60-85% 是
        e2e-* 残留的问题。通常由 playwright globalTeardown 自动调用,也可运维手动触发。

        **安全约束**:
        - ROLE_ADMIN only
        - prefix 强制 `^[a-zA-Z][a-zA-Z0-9_-]{2,32}$` 正则(空 prefix / SQL 通配符 / 含
          `'`/`;`/`%`/`_`/`\` 都 400)
        - SQL LIKE 强制 `prefix-%`,只匹配 `prefix-xxx` 不会误删 `prefixer` 这种合法资源
        - @Transactional 全表事务,任何一段失败整体回滚
        - @AuditAction 留痕到 console_operation_audit

        清理覆盖 11 张表(按 FK 反向):job_partition → job_instance → workflow_node →
        workflow_edge → workflow_definition → job_definition → file_channel_config →
        file_template_config → console_user_account → archive_policy → tenant。
      operationId: cleanupTestData
      parameters:
        - name: prefix
          in: query
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z][a-zA-Z0-9_-]{2,32}$'
            example: e2e
          description: 资源前缀(必须字母开头,3-33 字符,只含字母/数字/_/-)
      responses:
        '200':
          description: Cleanup result, map of table → row count deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseTestDataCleanupResult'
        '400':
          description: prefix validation failed
        '403':
          description: not ROLE_ADMIN
  /api/console/admin/test-data/by-ids:
    delete:
      tags: [Admin]
      summary: Cleanup tenants by exact ID list (补充处理 prefix 模式无法清纯短名残留)
      description: |
        按精确 tenantId 列表级联清理,补充处理 `/api/console/admin/test-data?prefix=` 无法清纯短名
        ID(如历史残留 `tx` / `td`,因 prefix 模式强制 `prefix-%` 后缀匹配)。

        **白名单保护**(任何场景拒删):`system` / `default` / `default-tenant` / `ta` / `tb` / `tc`。

        **安全约束**:
        - ROLE_ADMIN only
        - ids 必须字母开头,逗号分隔,总长 3-256(同一批最多 ~50 个 ID)
        - @Transactional 全表事务,任何一段失败整体回滚
        - @AuditAction 留痕到 console_operation_audit(aggregateId = #ids 整串)

        清理顺序参考 scripts/db/wipe-non-system-tenants.sql:pipeline 运行 → workflow 运行 →
        job 实例链 → file 相关 → workflow/pipeline/job 定义 → 配置 → 用户 → 租户本体。
      operationId: cleanupTestDataByIds
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z][a-zA-Z0-9_,-]{2,255}$'
            example: td,te,tf,tg,th,tx
          description: 精确 tenantId 列表(逗号分隔)
      responses:
        '200':
          description: Cleanup result, map of table → row count deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseTestDataCleanupResult'
        '400':
          description: ids validation failed / 列表含白名单保护租户
        '403':
          description: not ROLE_ADMIN
