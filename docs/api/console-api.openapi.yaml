openapi: 3.1.0
info:
  title: Batch Platform Console API
  version: 0.1.0
  x-last-updated: "2026-04-11"
  x-changelog:
    - date: "2026-04-11"
      summary: "添加 x-last-updated 和 x-changelog 标识，便于快速定位文档更新时间"
  description: >
    Frontend-facing contract for the batch console.
    This file is the machine-readable source of truth for UI integration,
    code generation, and mock server stubs.
    Whenever the API surface changes, update this file and console-api-protocol.md together.
servers:
  - url: http://localhost:18080
    description: Local console-api
tags:
  - name: Jobs
    description: Trigger, compensate, rerun, and dead-letter replay actions.
  - name: Approvals
    description: Approval workflow actions.
  - name: Config
    description: Config release, gray, rollback, and secret rotation.
  - name: Reports
    description: Export-only Excel reports for config and runtime records.
  - name: Workers
    description: Worker drain, takeover, force-offline, and claimed tasks.
  - name: Files
    description: File governance and presigned download.
  - name: Alerts
    description: Alert acknowledgement, silencing, and closure actions.
  - name: Scheduler
    description: Scheduler snapshot and history.
  - name: Ops
    description: Console summary and operation dashboard.
  - name: Auth
    description: JWT login exchange and current principal.
  - name: Queries
    description: Read-only list and detail views.
  - name: AI
    description: Console AI assistant.
  - name: JobDefinitions
    description: Job definition CRUD and lifecycle management.
  - name: WorkflowDefinitions
    description: Workflow definition CRUD, DAG validation, and lifecycle management.
  - name: Triggers
    description: Quartz trigger registration, pause, resume, and unregister.
  - name: Meta
    description: Enum metadata, queue list, calendar list, window list, and worker group list.
  - name: Queues
    description: Resource queue CRUD and toggle.
  - name: BatchWindows
    description: Batch window CRUD and toggle.
  - name: Calendars
    description: Calendar CRUD, toggle, and holiday management.
  - name: QuotaPolicies
    description: Quota policy CRUD and toggle.
  - name: PipelineDefinitions
    description: Pipeline definition CRUD, detail with steps, and toggle.
  - name: Dashboard
    description: Dashboard statistics and trend views.
  - name: FileChannels
    description: File channel CRUD and toggle.
  - name: FileTemplates
    description: File template CRUD and toggle.
  - name: AlertRoutings
    description: Alert routing configuration Excel import/export.
  - name: Instances
    description: Job instance and partition cancel/terminate/retry operations.
  - name: WorkflowRuns
    description: Workflow run cancel, terminate, and node-skip operations.
  - name: Streams
    description: SSE streams for execution logs, trace snapshots, and event-driven realtime updates.
  - name: SystemParameters
    description: Runtime system parameter CRUD with Redis cache.
  - name: Webhooks
    description: Webhook subscription CRUD, delivery logs, and async event dispatch.
  - name: ResourceTags
    description: Resource tagging for job, workflow, file channel, and file template.
  - name: ApiKeys
    description: API key self-service creation, listing, and revocation.
  - name: Telemetry
    description: Frontend telemetry log collection endpoint.
  - name: Notifications
    description: Notification channel and subscription rule management, delivery logs.
  - name: Governance
    description: Circuit breaker and rate limit parameter management.
  - name: ArchivePolicies
    description: Data archive and cleanup policy management.
  - name: ClusterDiagnostic
    description: Cross-node consistency diagnostic endpoints.
  - name: Tenants
    description: Tenant registry CRUD and lifecycle management (ROLE_ADMIN).
  - name: Users
    description: Console user account CRUD, password reset, enable/disable (ROLE_ADMIN).
  - name: TenantSelfService
    description: Tenant quota and usage self-service.
  - name: SelfServiceJobs
    description: Tenant self-service rerun and compensation requests.
  - name: EventCatalog
    description: Event type catalog and Kafka topic directory.
security:
  - bearerAuth: []
  - consoleToken: []
paths:
  /api/console/auth/login:
    post:
      tags: [Auth]
      summary: Login with a seeded console account and issue a JWT
      operationId: loginConsoleAccount
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsoleLoginRequest'
      responses:
        '200':
          description: JWT token payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleAuthTokenResponse'
  /api/console/auth/token:
    post:
      tags: [Auth]
      summary: Exchange current console session for a JWT token
      operationId: issueConsoleToken
      security:
        - basicAuth: []
        - bearerAuth: []
        - consoleToken: []
      responses:
        '200':
          description: JWT token payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleAuthTokenResponse'
  /api/console/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated principal
      operationId: getConsolePrincipal
      responses:
        '200':
          description: Principal payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleAuthProfileResponse'
  /api/console/pipeline-definitions/events:
    get:
      tags: [PipelineDefinitions]
      summary: Subscribe to pipeline definition realtime events
      operationId: streamPipelineDefinitionEvents
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of pipeline definition realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/workflow-definitions/events:
    get:
      tags: [WorkflowDefinitions]
      summary: Subscribe to workflow definition realtime events
      operationId: streamWorkflowDefinitionEvents
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of workflow definition realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/workers/events:
    get:
      tags: [Workers]
      summary: Subscribe to worker realtime events
      operationId: streamWorkerEvents
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of worker realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/alerts/events:
    get:
      tags: [Alerts]
      summary: Subscribe to alert realtime events
      operationId: streamAlertEvents
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of alert realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/ops/summary:
    get:
      tags: [Ops]
      summary: Get console summary
      operationId: getConsoleSummary
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: Tenant scope for aggregated metrics (matches server @RequestParam).
      responses:
        '200':
          description: Summary payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleOpsSummaryResponse'
  /api/console/ops/kafka-lag:
    get:
      tags: [Ops]
      summary: Query Kafka consumer group lag
      operationId: getKafkaConsumerLag
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Consumer group lag list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/outbox/stats:
    get:
      tags: [Ops]
      summary: Get outbox backlog statistics
      operationId: getOutboxStats
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Outbox stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/outbox/cleanup:
    post:
      tags: [Ops]
      summary: Clean up published or abandoned outbox events
      operationId: cleanupOutbox
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: retainDays
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 7
      responses:
        '200':
          description: Cleanup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/outbox/republish:
    post:
      tags: [Ops]
      summary: Manually republish failed outbox events
      operationId: republishOutbox
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int64
      responses:
        '200':
          description: Republish result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/ops/summary/events:
    get:
      tags: [Ops]
      summary: Subscribe to console summary realtime updates
      description: |
        Subscribe to the first-screen operational summary stream. A shared realtime envelope with `summaryRefresh=true`
        causes the console consumer to reload the latest summary snapshot from the database and emit `ops-summary-updated`
        to SSE clients.
      operationId: streamConsoleOpsSummary
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: initialSnapshot
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: SSE event stream of ops summary refreshes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/stream/job-instances/events:
    get:
      tags: [Streams]
      summary: Subscribe to job instance realtime events
      operationId: streamJobInstanceEvents
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of job instance realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/workflow-runs/events:
    get:
      tags: [WorkflowRuns]
      summary: Subscribe to workflow run realtime events
      operationId: streamWorkflowRunEvents
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of workflow run realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/stream/outbox-retries/events:
    get:
      tags: [Streams]
      summary: Subscribe to outbox retry realtime events
      operationId: streamOutboxRetryEvents
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of outbox retry realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/stream/outbox-deliveries/events:
    get:
      tags: [Streams]
      summary: Subscribe to outbox delivery realtime events
      operationId: streamOutboxDeliveryEvents
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: heartbeatMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE event stream of outbox delivery realtime changes
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConsoleSseEventResponse'
  /api/console/jobs/trigger:
    post:
      tags: [Jobs]
      summary: Trigger a job
      operationId: triggerJob
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/OperatorIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerRequest'
      responses:
        '200':
          description: Trigger result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseString'
  /api/console/jobs/compensations:
    post:
      tags: [Jobs]
      summary: Create compensation command
      operationId: createCompensationCommand
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompensationCommandRequest'
      responses:
        '200':
          description: Compensation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseString'
  /api/console/jobs/compensate:
    post:
      tags: [Jobs]
      summary: Compensate a job instance
      operationId: compensateJob
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompensateRequest'
      responses:
        '200':
          description: Compensation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseString'
  /api/console/jobs/rerun:
    post:
      tags: [Jobs]
      summary: Rerun a failed job instance
      operationId: rerunJob
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerunRequest'
      responses:
        '200':
          description: Rerun result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseString'
  /api/console/jobs/dead-letters/replay:
    post:
      tags: [Jobs]
      summary: Replay dead letters
      operationId: replayDeadLetters
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeadLetterReplayRequest'
      responses:
        '200':
          description: Replay result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseString'
  /api/console/jobs/catch-up/approve:
    post:
      tags: [Jobs]
      summary: Approve catch-up
      operationId: approveCatchUp
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsoleCatchUpApprovalRequest'
      responses:
        '200':
          description: Approval result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseString'
  /api/console/jobs/batch-days/{bizDate}/catchup:
    post:
      tags: [Jobs]
      summary: Launch batch-day catch-up
      operationId: batchDayCatchUp
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - name: bizDate
          in: path
          required: true
          schema:
            type: string
            format: date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDayCatchUpRequest'
      responses:
        '200':
          description: Catch-up result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseConsoleBatchDayCatchUpResponse'
  /api/console/jobs/batch-trigger:
    post:
      tags: [Jobs]
      summary: Batch trigger up to 50 jobs
      operationId: batchTriggerJobs
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/TriggerRequest'
              maxItems: 50
      responses:
        '200':
          description: Batch trigger results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/system-parameters:
    get:
      tags: [SystemParameters]
      summary: List all system parameters for tenant
      operationId: listSystemParameters
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
      responses:
        '200':
          description: Parameter list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
    put:
      tags: [SystemParameters]
      summary: Upsert a system parameter
      operationId: upsertSystemParameter
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                  maxLength: 128
                value:
                  type: string
                  maxLength: 2048
                description:
                  type: string
                  maxLength: 512
      responses:
        '200':
          description: Upsert success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseVoid'
    delete:
      tags: [SystemParameters]
      summary: Delete a system parameter
      operationId: deleteSystemParameter
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Delete success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseVoid'
  /api/console/system-parameters/value:
    get:
      tags: [SystemParameters]
      summary: Get single parameter value
      operationId: getSystemParameterValue
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Parameter value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhook subscriptions
      operationId: listWebhooks
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
      responses:
        '200':
          description: Subscription list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
    post:
      tags: [Webhooks]
      summary: Create webhook subscription
      operationId: createWebhook
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, callbackUrl, eventTypes]
              properties:
                name:
                  type: string
                  maxLength: 128
                callbackUrl:
                  type: string
                  maxLength: 1024
                eventTypes:
                  type: array
                  items:
                    type: string
                    maxLength: 64
                secret:
                  type: string
                  maxLength: 256
                enabled:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Created subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/webhooks/{id}:
    get:
      tags: [Webhooks]
      summary: Get webhook subscription detail
      operationId: getWebhook
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Subscription detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
    put:
      tags: [Webhooks]
      summary: Update webhook subscription
      operationId: updateWebhook
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [callbackUrl, eventTypes]
              properties:
                callbackUrl:
                  type: string
                eventTypes:
                  type: array
                  items:
                    type: string
                secret:
                  type: string
                enabled:
                  type: boolean
      responses:
        '200':
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
    delete:
      tags: [Webhooks]
      summary: Delete webhook subscription
      operationId: deleteWebhook
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseVoid'
  /api/console/webhooks/delivery-logs:
    get:
      tags: [Webhooks]
      summary: Query webhook delivery logs
      operationId: listWebhookDeliveryLogs
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: subscriptionId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 200
      responses:
        '200':
          description: Delivery log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponseObject'
  /api/console/tags:
    get:
      tags: [ResourceTags]
      summary: List tags for a resource
      operationId: listResourceTags
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: resourceType
          in: query
          required: true
          schema:
            type: string
            enum: [JOB, WORKFLOW, FILE_CHANNEL, FILE_TEMPLATE]
        - name: resourceCode
          in: query
          required: true
          schema:
