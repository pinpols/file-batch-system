global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/batch.yml

scrape_configs:
  - job_name: batch-console-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['console-api:18080']

  - job_name: batch-trigger
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['trigger:18081']

  - job_name: batch-orchestrator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['orchestrator:18082']

  - job_name: batch-worker-import
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['worker-import:18083']

  - job_name: batch-worker-export
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['worker-export:18084']

  - job_name: batch-worker-dispatch
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['worker-dispatch:18085']

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:19000']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:19100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ['otel-collector:8888']
