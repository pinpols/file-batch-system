server:
  port: ${BATCH_CONSOLE_API_PORT:8080}

spring:
  application:
    name: batch-console-api
  datasource:
    url: ${BATCH_PLATFORM_DB_URL:jdbc:postgresql://localhost:15432/batch_platform}
    username: ${BATCH_PLATFORM_DB_USERNAME:batch_user}
    password: ${BATCH_PLATFORM_DB_PASSWORD:batch_pass_123}
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  security:
    user:
      name: ${BATCH_CONSOLE_USERNAME:admin}
      password: ${BATCH_CONSOLE_PASSWORD:admin123}

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.batch.console.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{service:-} %X{tenantId:-} %X{traceId:-} %X{requestId:-} %X{jobInstanceId:-} %X{fileId:-}] %logger{40} - %msg%n"

batch:
  security:
    testing-open: ${BATCH_SECURITY_TESTING_OPEN:false}
    kms:
      default-key-ref: ${BATCH_SECURITY_KMS_DEFAULT_KEY_REF:DEFAULT_TEST}
      keys:
        DEFAULT_TEST: ${BATCH_SECURITY_KMS_KEYS_DEFAULT_TEST:AAAAAAAAAAAAAAAAAAAAAA==}
  console:
    security:
      enabled: ${BATCH_CONSOLE_SECURITY_ENABLED:true}
      shared-secret: ${BATCH_CONSOLE_SHARED_SECRET:console-secret}
      tenant-header: ${BATCH_CONSOLE_TENANT_HEADER:X-Tenant-Id}
      user-header: ${BATCH_CONSOLE_USER_HEADER:X-Console-User}
      role-header: ${BATCH_CONSOLE_ROLE_HEADER:X-Console-Roles}
      token-header: ${BATCH_CONSOLE_TOKEN_HEADER:X-Console-Token}
      default-tenant-id: ${BATCH_CONSOLE_DEFAULT_TENANT_ID:default-tenant}
      allowed-tenants:
        - ${BATCH_CONSOLE_ALLOWED_TENANT:default-tenant}
      default-authorities:
        - ROLE_ADMIN
        - ROLE_AUDITOR
        - ROLE_CONFIG_ADMIN
    ai:
      enabled: ${BATCH_CONSOLE_AI_ENABLED:false}
      model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      max-prompt-length: ${BATCH_CONSOLE_AI_MAX_PROMPT_LENGTH:4000}
      max-response-length: ${BATCH_CONSOLE_AI_MAX_RESPONSE_LENGTH:3000}
      allowed-users:
        - ${BATCH_CONSOLE_AI_ALLOWED_USER:admin}
      allowed-authorities:
        - ROLE_ADMIN
        - ROLE_AUDITOR
    trigger:
      base-url: ${BATCH_TRIGGER_BASE_URL:http://localhost:8081}
    orchestrator:
      base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:8082}
  storage:
    minio:
      endpoint: ${BATCH_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${BATCH_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${BATCH_MINIO_SECRET_KEY:minioadmin123}
      bucket: ${BATCH_MINIO_BUCKET:batch-dev}
