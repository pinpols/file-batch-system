server:
  # Console API 端口：优先读取环境变量 BATCH_CONSOLE_API_PORT
  port: ${BATCH_CONSOLE_API_PORT:18080}

spring:
  application:
    # Spring 应用名（用于日志/链路追踪/注册等）
    name: batch-console-api
  flyway:
    # console 不拥有平台 schema，DB 版本由 batch-orchestrator / batch-trigger 管理；此处关闭避免双写 flyway_schema_history 及重复执行迁移脚本。
    enabled: false
  config:
    # 引入共享默认配置基线（来自 batch-common 的 resources）
    import: "classpath:batch-defaults.yml"
  # 注：DataRedisRepositoriesAutoConfiguration 已在 BatchConsoleApiApplication 主类 @SpringBootApplication(exclude=...) 排除
  #     data.redis.repositories.enabled=false 已在 batch-defaults.yml 设置；此处不再重复
  ai:
    openai:
      # OpenAI 接入地址（可按代理/私有化环境覆盖）
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      # API Key：强烈建议通过环境变量注入，避免在仓库中明文保存真实密钥
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          # 默认模型（Console 内置 AI 功能使用；也会被 batch.console.ai.model 覆盖）
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}

batch:
  console:
    # 维护 / 降级模式开关。默认全部 false,生产灰度切换 / 紧急回滚时由 env 临时开启。
    # SOP: docs/runbook/maintenance-mode.md
    maintenance:
      enabled: ${BATCH_CONSOLE_MAINTENANCE_ENABLED:false}
      read-only: ${BATCH_CONSOLE_MAINTENANCE_READ_ONLY:false}
      message: ${BATCH_CONSOLE_MAINTENANCE_MESSAGE:}
      eta-at: ${BATCH_CONSOLE_MAINTENANCE_ETA_AT:}
    # P2-4: 读写分离 — 默认 true（本地 docker-compose / 生产部署一致；
    # fail-open 已就位，从库挂了自动降级主库；测试用 application-test.yml 覆盖为 false）
    read-replica:
      enabled: ${BATCH_CONSOLE_READ_REPLICA_ENABLED:true}
      # fail-open：从库连续连接失败 N 次后进入 quarantine，期间所有读路由降级到主库
      failure-threshold: ${BATCH_CONSOLE_REPLICA_FAILURE_THRESHOLD:3}
      quarantine-seconds: ${BATCH_CONSOLE_REPLICA_QUARANTINE_SECONDS:30}
      primary:
        # P1-17 reWriteBatchedInserts=true: batchUpdate 多值 INSERT 重写
        url: ${BATCH_CONSOLE_PRIMARY_URL:jdbc:postgresql://localhost:15432/batch_platform?reWriteBatchedInserts=true}
        username: ${BATCH_CONSOLE_PRIMARY_USER:batch_user}
        password: ${BATCH_CONSOLE_PRIMARY_PASSWORD:batch_pass_123}
        maximum-pool-size: ${BATCH_CONSOLE_PRIMARY_POOL:16}
        leak-detection-threshold-millis: ${BATCH_CONSOLE_PRIMARY_LEAK_DETECTION_MS:0}
      replica:
        # P1-17 reWriteBatchedInserts=true: 即便 replica 主要读,健康检查/explain 链路一致
        url: ${BATCH_CONSOLE_REPLICA_URL:jdbc:postgresql://localhost:15433/batch_platform?reWriteBatchedInserts=true}
        username: ${BATCH_CONSOLE_REPLICA_USER:batch_user}
        password: ${BATCH_CONSOLE_REPLICA_PASSWORD:batch_pass_123}
        maximum-pool-size: ${BATCH_CONSOLE_REPLICA_POOL:16}
        leak-detection-threshold-millis: ${BATCH_CONSOLE_REPLICA_LEAK_DETECTION_MS:0}
    # Redis Pub/Sub、SSE：实例标识。未设置环境变量时使用固定默认值，避免随机 UUID 与启动 WARN。
    instance-id: ${BATCH_CONSOLE_INSTANCE_ID:batch-console-api}
    security:
      # Console 鉴权开关（开启后走 JWT + 多租户路由）
      enabled: ${BATCH_CONSOLE_SECURITY_ENABLED:true}
      # 多租户 header 名称（租户隔离）
      tenant-header: ${BATCH_CONSOLE_TENANT_HEADER:X-Tenant-Id}
      # 用户 header 名称（bypass-mode 测试钩子）
      user-header: ${BATCH_CONSOLE_USER_HEADER:X-Console-User}
      # 角色/权限 header 名称（bypass-mode 测试钩子，RBAC）
      role-header: ${BATCH_CONSOLE_ROLE_HEADER:X-Console-Roles}
      # 默认租户（未显式传入时使用；留空表示不设默认值，请求必须携带 X-Tenant-Id header）
      default-tenant-id: ${BATCH_CONSOLE_DEFAULT_TENANT_ID:}
      # 允许访问的租户白名单（空列表表示不限制；生产建议通过 BATCH_CONSOLE_ALLOWED_TENANTS 显式指定）
      allowed-tenants: ${BATCH_CONSOLE_ALLOWED_TENANTS:}
      # 默认授权列表（SSE ticket / bypass-mode 未带 role header 时的兜底）
      default-authorities:
        - ROLE_ADMIN
        - ROLE_AUDITOR
        - ROLE_CONFIG_ADMIN
      # 单账号单会话：新登录会顶掉旧 JWT
      single-session-enabled: ${BATCH_CONSOLE_SINGLE_SESSION_ENABLED:true}
      # JWT 签发者
      jwt-issuer: ${BATCH_CONSOLE_JWT_ISSUER:batch-console-api}
      # JWT 对称签名密钥（生产环境务必使用环境变量或密钥管理注入）
      jwt-secret: ${BATCH_CONSOLE_JWT_SECRET:console-jwt-secret-change-me}
      # JWT 有效期
      # S-3.1: 默认 2 小时（原 8h），减少 token 泄露后的风险窗口
      jwt-ttl: ${BATCH_CONSOLE_JWT_TTL:PT2H}
      # Redis 中会话状态保留时长
      session-state-ttl: ${BATCH_CONSOLE_SESSION_STATE_TTL:P30D}
    # PWA Web Push (VAPID) — 移动端告警/审批推送。VAPID 公私钥需先 generate 再注入。
    push:
      enabled: ${BATCH_CONSOLE_PUSH_ENABLED:false}
      # 生成命令(任选其一):
      #   npx web-push generate-vapid-keys
      #   (或) java -jar web-push-cli.jar generate-key-pair
      # 公钥可入仓(本就要 GET 端点暴露);私钥用 Vault / env 注入,不要 commit
      public-key: ${BATCH_CONSOLE_PUSH_PUBLIC_KEY:}
      private-key: ${BATCH_CONSOLE_PUSH_PRIVATE_KEY:}
      # VAPID JWT 的 sub claim,推送服务出问题时知道找谁
      subject: ${BATCH_CONSOLE_PUSH_SUBJECT:mailto:ops@example.com}
      # 浏览器推送服务超时未送达则丢弃(秒);默认 12h
      ttl-seconds: ${BATCH_CONSOLE_PUSH_TTL_SECONDS:43200}
    ai:
      # Console AI 功能开关（仅在开启并满足白名单时生效）
      enabled: ${BATCH_CONSOLE_AI_ENABLED:false}
      # AI 模型（通常与 OPENAI_CHAT_MODEL 保持一致）
      model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      # prompt 最大长度（防止输入过长导致请求失败/费用不可控）
      max-prompt-length: ${BATCH_CONSOLE_AI_MAX_PROMPT_LENGTH:4000}
      # response 最大长度（防止输出过长）
      max-response-length: ${BATCH_CONSOLE_AI_MAX_RESPONSE_LENGTH:3000}
      # 允许使用 AI 的用户白名单
      allowed-users:
        - ${BATCH_CONSOLE_AI_ALLOWED_USER:admin}
      # 允许使用 AI 的角色白名单
      allowed-authorities:
        - ROLE_ADMIN
        - ROLE_AUDITOR
    trigger:
      # Trigger 服务地址（Console 调用 Trigger API）
      base-url: ${BATCH_TRIGGER_BASE_URL:http://localhost:18081}
    orchestrator:
      # Orchestrator 服务地址（Console 调用 Orchestrator API）
      base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:18082}
    # Round-3 #8(Round-2 §4 P0 #8):Console 反向拉 atomic worker /actuator/atomicruntime 做仪表盘。
    atomic-worker:
      enabled: ${BATCH_CONSOLE_ATOMIC_WORKER_ENABLED:true}
      base-url: ${BATCH_WORKER_ATOMIC_BASE_URL:http://localhost:18087}
