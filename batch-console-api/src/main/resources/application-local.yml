      enabled: false
      model: gpt-4o-mini
      max-prompt-length: 4000
      max-response-length: 3000
      allowed-users:
        - admin
      allowed-authorities:
        - ROLE_ADMIN
        - ROLE_AUDITOR
    trigger:
      base-url: http://localhost:18081
    orchestrator:
      base-url: http://localhost:18082
  storage:
    s3:
      endpoint: http://localhost:19000
      access-key: minioadmin
      secret-key: minioadmin123
      bucket: batch-dev
