server:
  port: 18080

spring:
  main:
    lazy-initialization: true
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  kafka:
    bootstrap-servers: localhost:19092
  datasource:
    url: jdbc:postgresql://localhost:15432/batch_platform
    username: batch_user
    password: batch_pass_123
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 16379
      # 勿删：本段会覆盖基线里整个 spring.data.redis；缺少时 repositories.enabled 会回到默认 true，触发 Redis Repository 扫描 INFO
      repositories:
        enabled: false
  ai:
    openai:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY:local-dummy-openai-key}
      chat:
        options:
          model: gpt-4o-mini

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.batch.console.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

batch:
  security:
    bypass-mode: true
    kms:
      default-key-ref: DEFAULT_TEST
      keys:
        DEFAULT_TEST: AAAAAAAAAAAAAAAAAAAAAA==
  console:
    instance-id: ${BATCH_CONSOLE_INSTANCE_ID:batch-console-api-local}
    security:
      enabled: true
      tenant-header: X-Tenant-Id
      user-header: X-Console-User
      role-header: X-Console-Roles
      default-tenant-id: ""
      allowed-tenants: []
      default-authorities:
        - ROLE_ADMIN
        - ROLE_AUDITOR
        - ROLE_CONFIG_ADMIN
      # 本地/测试环境关掉单点登录,允许 e2e harness 共享 storageState (BE-ISSUE-3)。
      # 生产由 application.yml 的环境变量 BATCH_CONSOLE_SINGLE_SESSION_ENABLED 控制,默认仍 true。
      single-session-enabled: false
      jwt-issuer: batch-console-api
      jwt-secret: console-jwt-secret-change-me
      jwt-ttl: PT8H
      session-state-ttl: P30D
      # R7-A1-P2：本地 HTTP 调试关掉 cookie Secure（默认 true，生产 HTTPS 强制）。
      cookie-secure: false
      # 本地固定 RSA 密钥对：默认 ConsoleLoginKeyPairService 启动期生成内存密钥,重启即变,
      # FE localStorage 缓存的公钥会失效 → 触发 error.auth.encryption_failed。
      # 这里给本地写死一对仅 dev 用的 keypair,重启后 FE 缓存仍然有效（fp 不变）。
      # 生产由 Helm Secret 注入 BATCH_CONSOLE_LOGIN_ENCRYPTION_{PRIVATE,PUBLIC}_KEY_PEM 覆盖。
