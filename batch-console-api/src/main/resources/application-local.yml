server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:15432/batch_platform
    username: batch_user
    password: batch_pass_123
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY:local-dummy-openai-key}
      chat:
        options:
          model: gpt-4o-mini
  security:
    user:
      name: admin
      password: admin123

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.batch.console.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

batch:
  security:
    testing-open: true
    kms:
      default-key-ref: DEFAULT_TEST
      keys:
        DEFAULT_TEST: AAAAAAAAAAAAAAAAAAAAAA==
  console:
    security:
      enabled: true
      shared-secret: console-secret
      tenant-header: X-Tenant-Id
      user-header: X-Console-User
      role-header: X-Console-Roles
      token-header: X-Console-Token
      default-tenant-id: default-tenant
      allowed-tenants:
        - default-tenant
      default-authorities:
        - ROLE_ADMIN
        - ROLE_AUDITOR
        - ROLE_CONFIG_ADMIN
      legacy-header-auth-enabled: true
      jwt-issuer: batch-console-api
      jwt-secret: console-jwt-secret-change-me
      jwt-ttl: PT8H
    ai:
      enabled: false
      model: gpt-4o-mini
      max-prompt-length: 4000
      max-response-length: 3000
      allowed-users:
        - admin
      allowed-authorities:
        - ROLE_ADMIN
        - ROLE_AUDITOR
    trigger:
      base-url: http://localhost:8081
    orchestrator:
      base-url: http://localhost:8082
  storage:
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin123
      bucket: batch-dev
