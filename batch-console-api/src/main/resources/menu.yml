            - { title: 批次日与窗口, path: /scheduler/batch-days, icon: Calendar, minRole: VIEWER }
            - { title: 批次日重放, path: /ops/batch-day-replay, icon: RefreshRight, minRole: TENANT_ADMIN }
            - { title: 业务日历, path: /governance/calendars, icon: Calendar, minRole: TENANT_ADMIN }
            - { title: 批次窗口, path: /governance/windows, icon: Clock, minRole: TENANT_ADMIN }
