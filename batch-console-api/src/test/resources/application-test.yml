spring:
  flyway:
    locations: classpath:db/migration
    # platform-init.sql 仅建 schema；迁移完整执行，无需 baseline。
  # Spring AI（OpenAI）自动装配在测试环境需要一个非空 api-key，
  # 即使测试本身不调用 AI 功能，也要避免 Bean 初始化直接失败。
  ai:
    openai:
      api-key: "test-api-key"

batch:
  tenant:
    active-cache-ttl-millis: 0  # 测试关缓存,保证新插租户即时可见(Citus 租户路由确定性)
  scheduling:
    # IT 不验证 Spring @Scheduled 线程池的优雅收尾；关闭时立即取消，避免 surefire fork 退出超时。
    wait-for-tasks-to-complete-on-shutdown: false
    await-termination-seconds: 1
  console:
    ai:
      enabled: false
    # 测试关读写分离，避免 ReadReplicaRoutingDataSource 把写路径打到 application.yml
    # 默认硬编码的 localhost:15432（本地 dev PG），导致写不进 Testcontainer，
    # 反而污染本地 PG 数据并触发 UK 冲突（uk_console_ai_audit_request 等）。
    read-replica:
      enabled: false
