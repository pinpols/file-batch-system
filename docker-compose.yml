# 宿主机映射由 .env.local / .env.example 控制（如 POSTGRES_PORT=15432、KAFKA_HOST_PORT=19092、
# MINIO_API_PORT=19000、REDIS_PORT=16379）。容器内端口（5432、9092、9000、6379 等）为服务原生监听，勿与映射混淆。
services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: batch-postgres
    restart: unless-stopped
    # 默认 max_connections=100 不够：6 模块 × (platform + business) × Hikari 池
    # 本地联调叠加就会炸 "too many clients already"。调到 300 留足余量。
    command:
      - postgres
      - -c
      - max_connections=300
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # 全栈 UTF-8（见 CLAUDE.md §字符编码）：数据库 initdb 强制 UTF8 编码，
      # 容器 locale 锁 C.UTF-8 防止 psql/日志输出乱码。
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      LANG: ${BATCH_LOCALE:-C.UTF-8}
      LC_ALL: ${BATCH_LOCALE:-C.UTF-8}
      TZ: ${TZ}
      PGTZ: ${TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:${KAFKA_IMAGE_TAG}
    container_name: batch-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_HOST_PORT}:9092"
    environment:
      # 全栈 UTF-8：Kafka broker 自身不解析消息字节，locale 只影响日志/JVM file.encoding。
      LANG: ${BATCH_LOCALE:-C.UTF-8}
      LC_ALL: ${BATCH_LOCALE:-C.UTF-8}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS}
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-init:
    image: apache/kafka:${KAFKA_IMAGE_TAG}
    container_name: batch-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_TOPICS: ${KAFKA_TOPICS}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS}
      KAFKA_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PARTITIONS_DISPATCH: ${KAFKA_PARTITIONS_DISPATCH:-${KAFKA_DEFAULT_PARTITIONS}}
      KAFKA_PARTITIONS_RESULT: ${KAFKA_PARTITIONS_RESULT:-${KAFKA_DEFAULT_PARTITIONS}}
      KAFKA_PARTITIONS_RETRY: ${KAFKA_PARTITIONS_RETRY:-${KAFKA_DEFAULT_PARTITIONS}}
      KAFKA_PARTITIONS_DEAD_LETTER: ${KAFKA_PARTITIONS_DEAD_LETTER:-${KAFKA_DEFAULT_PARTITIONS}}
    volumes:
      - ./scripts/data/init-kafka-topics.sh:/scripts/data/init-kafka-topics.sh:ro
    entrypoint: ["/bin/sh", "/scripts/data/init-kafka-topics.sh"]
    restart: "no"
    networks:
      - batch-network

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-RELEASE.2025-04-03T14-56-28Z}
    container_name: batch-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: ${MINIO_PROMETHEUS_AUTH_TYPE:-public}
      # 全栈 UTF-8：对象存储是字节流，locale 只影响 mc/控制台输出。
      LANG: ${BATCH_LOCALE:-C.UTF-8}
      LC_ALL: ${BATCH_LOCALE:-C.UTF-8}
      TZ: ${TZ}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:${MINIO_MC_IMAGE_TAG:-RELEASE.2025-07-16T15-35-03Z}
    container_name: batch-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    volumes:
      - ./scripts/data/init-minio.sh:/scripts/data/init-minio.sh:ro
    entrypoint: ["/bin/sh", "/scripts/data/init-minio.sh"]
    restart: "no"
    networks:
      - batch-network

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7.4}
    container_name: batch-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    environment:
      # 全栈 UTF-8：Redis 是 binary-safe，locale 只影响 redis-cli 输出/日志。
      LANG: ${BATCH_LOCALE:-C.UTF-8}
      LC_ALL: ${BATCH_LOCALE:-C.UTF-8}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 15

volumes:
  postgres-data:
  kafka-data:
  minio-data:
  redis-data:

networks:
  batch-network:
    name: ${COMPOSE_PROJECT_NAME:-batch-local}_batch-network
    external: true
