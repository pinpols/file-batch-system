# 宿主机映射由 .env.local / .env.example 控制（如 POSTGRES_PORT=15432、KAFKA_HOST_PORT=19092、
# MINIO_API_PORT=19000、REDIS_PORT=16379(Valkey 服务)）。容器内端口（5432、9092、9000、6379 等）为服务原生监听，勿与映射混淆。
x-common-runtime-env: &common-runtime-env
  LANG: ${BATCH_LOCALE:-C.UTF-8}
  LC_ALL: ${BATCH_LOCALE:-C.UTF-8}
  BATCH_TIMEZONE_DEFAULT_ZONE: ${BATCH_TIMEZONE_DEFAULT_ZONE:-Asia/Shanghai}
  TZ: ${BATCH_TIMEZONE_DEFAULT_ZONE:-Asia/Shanghai}

services:
  postgres-primary:
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: batch-postgres-primary
    restart: unless-stopped
    # 默认 max_connections=100 不够：6 模块 × (platform + business) × Hikari 池
    # 本地联调叠加就会炸 "too many clients already"。调到 300 留足余量。
    # P2-4: 流复制参数 —— wal_level=replica（默认值，显式声明便于审阅）+ max_wal_senders 给 replica 容器留位
    command:
      - postgres
      - -c
      - max_connections=300
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - wal_keep_size=64
      - -c
      - hot_standby=on
      # ── WAL 连续归档(PITR 第 B 层)——**默认关闭,生产再开** ──────────────
      # dev 默认不开:开了会持续往 /wal-archive 写 WAL 段,本地联调无意义且占盘。
      # 生产启用步骤(见 docs/runbook/backup-and-pitr.md §1.1):
      #   1) 解开下面 3 行注释(archive_mode/archive_command/archive_timeout);
      #   2) 把 archive_command 的目标指向**独立故障域**(S3 `aws s3 cp` / 专用 NFS),
      #      **绝不能**和 PGDATA 同一块盘(盘坏时 base 和 WAL 一起没);
      #   3) 挂一个归档卷(下方 volumes 里示例的 wal-archive),并监控其可写性。
      # - -c
      # - archive_mode=on
      # - -c
      # - archive_command=test ! -f /wal-archive/%f && cp %p /wal-archive/%f
      # - -c
      # - archive_timeout=300
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # P2-4: 透传给 003-create-replication-user.sh 创建流复制用户
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_pass_dev_only}
      # 全栈 UTF-8（见 CLAUDE.md §字符编码）：数据库 initdb 强制 UTF8 编码，
      # 容器 locale 锁 C.UTF-8 防止 psql/日志输出乱码。
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --auth-host=scram-sha-256"
      <<: *common-runtime-env
      PGTZ: ${BATCH_TIMEZONE_DEFAULT_ZONE:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      # WAL 归档卷(配合上面 archive_mode,默认关闭)。生产开 PITR 时解开,
      # 并把目标换成独立故障域(本地卷仅示例,不满足"独立盘"要求)。
      # - wal-archive:/wal-archive
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # P2-4: 只读从库（流复制 hot standby）。console-api 启用 read-replica 时连接此实例。
  # 首次启动时 entrypoint.sh 会从主库 pg_basebackup 引导；后续重启直接进 standby 模式。
  # `--profile replica` 启用：docker compose --profile replica up -d
  postgres-replica:
    profiles: ["replica"]
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: batch-postgres-replica
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/replica-entrypoint.sh"]
    # Hot standby 要求 max_connections >= 主库（PG 限制）；其他参数也需匹配主库才能 redo
    command:
      - -c
      - max_connections=300
      - -c
      - hot_standby=on
    environment:
      POSTGRES_PRIMARY_HOST: postgres-primary
      POSTGRES_PRIMARY_PORT: 5432
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_pass_dev_only}
      # healthcheck 用的本地连接信息（同主库一致；replica 镜像主库账号体系）
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      <<: *common-runtime-env
      PGTZ: ${BATCH_TIMEZONE_DEFAULT_ZONE:-Asia/Shanghai}
    ports:
      - "${POSTGRES_REPLICA_PORT:-15433}:5432"
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
      - ./docker/postgres-replica/entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    networks:
      - batch-network
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      # 走 unix socket 用主库同名用户/库；standby 接受只读连接，pg_isready 只看 listening 不看 recovery 状态
      test: ["CMD-SHELL", "pg_isready -h /var/run/postgresql -U $${POSTGRES_USER:-batch_user} -d $${POSTGRES_DB:-batch_platform}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # P2 tenant-routing: biz 第二片 PG 实例(shard-1)。shard-0 = postgres-primary 的 batch_business。
  # 独立 PG 进程 + 独立数据卷,验证应用层按租户路由到不同物理实例(非 Citus、非分布表)。
  # `--profile biz-shard` 启用:docker compose --profile biz-shard up -d postgres-biz-shard-1
  # 默认不启,基线启动不受影响(零行为变更,与单片路由 default 一致)。
  postgres-biz-shard-1:
    profiles: ["biz-shard"]
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: batch-postgres-biz-shard-1
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=200
    environment:
      # initdb 引导库用平台同名账号体系(凭据本身经 secrets 注入应用,见 secrets/biz-shards/)
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --auth-host=scram-sha-256"
      <<: *common-runtime-env
      PGTZ: ${BATCH_TIMEZONE_DEFAULT_ZONE:-Asia/Shanghai}
    ports:
      - "${BIZ_SHARD_1_PORT:-15442}:5432"
    volumes:
      - postgres-biz-shard-1-data:/var/lib/postgresql/data
      - ./docker/biz-shard-init:/docker-entrypoint-initdb.d:ro
      - ./scripts/db/business/create_biz_tables.sql:/biz-sql/create_biz_tables.sql:ro
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d batch_business"]
      interval: 5s
      timeout: 5s
      retries: 12

  kafka:
    image: apache/kafka:${KAFKA_IMAGE_TAG}
    container_name: batch-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_HOST_PORT}:9092"
    environment:
      # 全栈 UTF-8：Kafka broker 自身不解析消息字节，locale 只影响日志/JVM file.encoding。
      <<: *common-runtime-env
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS}
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-init:
    image: apache/kafka:${KAFKA_IMAGE_TAG}
    container_name: batch-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *common-runtime-env
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_TOPICS: ${KAFKA_TOPICS}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS}
      KAFKA_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PARTITIONS_DISPATCH: ${KAFKA_PARTITIONS_DISPATCH:-${KAFKA_DEFAULT_PARTITIONS}}
      KAFKA_PARTITIONS_RESULT: ${KAFKA_PARTITIONS_RESULT:-${KAFKA_DEFAULT_PARTITIONS}}
      KAFKA_PARTITIONS_RETRY: ${KAFKA_PARTITIONS_RETRY:-${KAFKA_DEFAULT_PARTITIONS}}
      KAFKA_PARTITIONS_DEAD_LETTER: ${KAFKA_PARTITIONS_DEAD_LETTER:-${KAFKA_DEFAULT_PARTITIONS}}
    volumes:
      - ./scripts/data/init-kafka-topics.sh:/scripts/data/init-kafka-topics.sh:ro
    entrypoint: ["/bin/sh", "/scripts/data/init-kafka-topics.sh"]
    restart: "no"
    networks:
      - batch-network

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-RELEASE.2025-09-07T16-13-09Z}
    container_name: batch-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: ${MINIO_PROMETHEUS_AUTH_TYPE:-public}
      # 全栈 UTF-8：对象存储是字节流，locale 只影响 mc/控制台输出。
      <<: *common-runtime-env
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:${MINIO_MC_IMAGE_TAG:-RELEASE.2025-07-16T15-35-03Z}
    container_name: batch-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      <<: *common-runtime-env
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    volumes:
      - ./scripts/data/init-minio.sh:/scripts/data/init-minio.sh:ro
    entrypoint: ["/bin/sh", "/scripts/data/init-minio.sh"]
    restart: "no"
    networks:
      - batch-network

  valkey:
    image: valkey/valkey:${VALKEY_IMAGE_TAG:-8.1}
    container_name: batch-valkey
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    environment:
      # 全栈 UTF-8：Valkey(Redis 协议兼容)是 binary-safe，locale 只影响 redis-cli 输出/日志。
      <<: *common-runtime-env
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey-data:/data
    networks:
      - batch-network
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 15

volumes:
  postgres-primary-data:
  postgres-replica-data:
  postgres-biz-shard-1-data:
  kafka-data:
  minio-data:
  valkey-data:
  # WAL 归档卷(PITR 第 B 层,默认不创建/不挂载)。生产启用见
  # docs/runbook/backup-and-pitr.md §1.1,且应改用独立故障域而非本地卷。
  # wal-archive:

networks:
  batch-network:
    name: ${COMPOSE_PROJECT_NAME:-batch-platform}_batch-network
    external: true
