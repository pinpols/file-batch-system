# Excel:Tenant Config Package 复合模板 (ConfigPackageExcelWorkbookWriter)
excel.package.readme.title=租户配置包导入模板（9+2 / 11 sheet）
excel.package.readme.line1=【Sheet 范围】共 11 个数据 sheet，分两组：
excel.package.readme.line2=  业务核心 8: job_definition / file_template_config / file_channel_config
excel.package.readme.line3=             / pipeline_definition / pipeline_step_definition
excel.package.readme.line4=             / workflow_definition / workflow_node / workflow_edge
excel.package.readme.line5=  可选基础依赖 3: resource_queue / business_calendar / batch_window
excel.package.readme.line6=    （引用时必填，允许 DB 回退；本包未填且 DB 也不存在才报错）
excel.package.readme.line7=  注意：alert_routing_config 已从配置包剔除，请走 /config/excel?domain=alert-routings 独立入口
excel.package.readme.line8=
excel.package.readme.line9=【跨 sheet 依赖（preview 时校验，含 DB 回退）】
excel.package.readme.line10=  job.queue_code        → resource_queue.queue_code
excel.package.readme.line11=  job.calendar_code     → business_calendar.calendar_code
excel.package.readme.line12=  job.window_code       → batch_window.window_code
excel.package.readme.line13=  job.default_params.templateCode  → file_template_config.template_code
excel.package.readme.line14=  pipeline.job_code     → job_definition.job_code (强引用，仅同包内)
excel.package.readme.line15=  pipeline_step.job_code+version → pipeline_definition.job_code+version (强引用)
excel.package.readme.line16=  pipeline_step.step_params.templateCode → file_template_config.template_code
excel.package.readme.line17=  pipeline_step.step_params.channelCode  → file_channel_config.channel_code
excel.package.readme.line18=  workflow_node.related_job_code         → job_definition.job_code
excel.package.readme.line19=  workflow_node.related_pipeline_code    → pipeline_definition.job_code
excel.package.readme.line20=  workflow_node.window_code              → batch_window.window_code
excel.package.readme.line21=  workflow_edge.from/to_node_code        → workflow_node.node_code (强引用)
excel.package.readme.line22=
excel.package.readme.line23=【五类 Worker / Job 配置指南】
excel.package.readme.line24=
excel.package.readme.line25=▶ IMPORT 文件导入 (文件 → 业务表)
excel.package.readme.line26=  必填 sheet: job_definition + file_template_config + pipeline_definition + pipeline_step_definition
excel.package.readme.line27=  可选 sheet: file_channel_config (RECEIVE 阶段 SFTP/NAS/OSS 源) / resource_queue / business_calendar / batch_window
excel.package.readme.line28=  关键字段:
excel.package.readme.line29=    job_definition.job_type = IMPORT；default_params 通过 templateCode 关联 file_template_config
excel.package.readme.line30=    file_template_config.query_param_schema.jdbcMappedImport = {schema,table,columnMappings,conflictColumns}
excel.package.readme.line31=    file_template_config.file_format_type = CSV / FIXED / JSON 等；charset/delimiter 按源文件
excel.package.readme.line32=    pipeline_definition.pipeline_type = IMPORT；job_code 与 job_definition 同
excel.package.readme.line33=    pipeline_step_definition stage 链: RECEIVE → PREPROCESS → PARSE → VALIDATE → LOAD → FEEDBACK
excel.package.readme.line34=    step_params.templateCode 引用 file_template_config.template_code
excel.package.readme.line35=
excel.package.readme.line36=▶ EXPORT 文件导出 (业务表 → 文件)
excel.package.readme.line37=  必填 sheet: job_definition + file_template_config + pipeline_definition + pipeline_step_definition
excel.package.readme.line38=  可选 sheet: 后续 DISPATCH 推送时另需 file_channel_config
excel.package.readme.line39=  关键字段:
excel.package.readme.line40=    job_definition.job_type = EXPORT
excel.package.readme.line41=    file_template_config 二选一: default_query_sql (单条 SELECT) 或 query_param_schema.jdbcMappedExport
excel.package.readme.line42=      jdbcMappedExport = {schema,batchTable,detailTable,batchTenantColumn,batchNoColumn,detailFkColumn,detailOrderByColumn}
excel.package.readme.line43=    file_template_config.streaming_enabled / page_size / fetch_size 控制游标分页
excel.package.readme.line44=    pipeline_definition.pipeline_type = EXPORT
excel.package.readme.line45=    pipeline_step_definition stage 链: PREPARE → GENERATE → STORE → REGISTER → COMPLETE
excel.package.readme.line46=
excel.package.readme.line47=▶ PROCESS SQL 加工 (业务表 → 业务表 / 跨表落表)
excel.package.readme.line48=  必填 sheet: job_definition + pipeline_definition + pipeline_step_definition
excel.package.readme.line49=  通常不需要: file_template_config / file_channel_config
excel.package.readme.line50=  关键字段:
excel.package.readme.line51=    job_definition.job_type = PROCESS
excel.package.readme.line52=    pipeline_definition.pipeline_type = PROCESS
excel.package.readme.line53=    pipeline_step_definition.step_params = {targetSchema,targetTable,sql,columnMappings}
excel.package.readme.line54=    pipeline_step_definition stage 链: PREPARE → COMPUTE → VALIDATE → COMMIT → FEEDBACK
excel.package.readme.line55=
excel.package.readme.line56=▶ DISPATCH 派发 (推送文件/消息到外部)
excel.package.readme.line57=  必填 sheet: job_definition + file_channel_config + pipeline_definition + pipeline_step_definition
excel.package.readme.line58=  可选 sheet: file_template_config (派发对象是 EXPORT 产物时引用 templateCode)
excel.package.readme.line59=  关键字段:
excel.package.readme.line60=    job_definition.job_type = DISPATCH
excel.package.readme.line61=    file_channel_config.channel_type = SFTP / EMAIL / NAS / OSS / API_PUSH / LOCAL
excel.package.readme.line62=    file_channel_config.config_json 含 endpoint / 凭据 / receipt_policy
excel.package.readme.line63=    pipeline_definition.pipeline_type = DISPATCH
excel.package.readme.line64=    pipeline_step_definition.step_params.channelCode → file_channel_config.channel_code
excel.package.readme.line65=    pipeline_step_definition stage 链: PREPARE → DISPATCH → ACK → RETRY → COMPENSATE → COMPLETE
excel.package.readme.line66=
excel.package.readme.line67=▶ GENERAL 普通通用任务 (无 pipeline / 自定义 bean 执行)
excel.package.readme.line68=  必填 sheet: 仅 job_definition
excel.package.readme.line69=  不需要: pipeline_definition / pipeline_step_definition / file_template_config / file_channel_config
excel.package.readme.line70=  关键字段:
excel.package.readme.line71=    job_definition.job_type = GENERAL
excel.package.readme.line72=    job_definition.execution_handler = "myJobBeanName" (worker 启动时 step_registry 上报的 Spring bean)
excel.package.readme.line73=    无固定 stage 链；不进入文件流水线，由 bean 内部逻辑控制
excel.package.readme.line74=
excel.package.readme.line75=▶ WORKFLOW 工作流编排 (多 Job 组合)
excel.package.readme.line76=  必填 sheet: job_definition(job_type=WORKFLOW) + workflow_definition + workflow_node + workflow_edge
excel.package.readme.line77=  通过 workflow_node.related_job_code 引用其他 IMPORT/EXPORT/PROCESS/DISPATCH/GENERAL 作业
excel.package.readme.line78=  关键字段:
excel.package.readme.line79=    workflow_definition.workflow_type = DAG / PIPELINE / MIXED
excel.package.readme.line80=    workflow_node.node_type = START / END / TASK / GATEWAY / FILE_STEP / JOB
excel.package.readme.line81=    workflow_edge.edge_type = SUCCESS / FAILURE / CONDITION / ALWAYS
excel.package.readme.line82=
excel.package.readme.line83=【导入流程】上传 → 预览 → 应用 (单事务原子提交)
excel.package.readme.line84=  preview 有任何 error 或跨 sheet 引用错误时禁止 apply
excel.package.readme.line85=  写入数据库顺序由后端按依赖拓扑控制，无须按 sheet 顺序填
excel.package.readme.line86=【UPSERT 行为】Job 定义未找到则 INSERT，已存在则更新可变字段；其他类型按唯一键 UPSERT

excel.package.impl_code.prompt_title=impl_code 填写提示
excel.package.impl_code.prompt_box=格式 MODULE:beanName(MODULE 来自 pipeline_type,beanName 来自 worker 启动时上报的 step_registry)

