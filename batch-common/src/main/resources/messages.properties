# Excel:Workflow 模板 (WorkflowExcelColumnMetadata + WorkflowExcelWorkbookWriter)
excel.workflow.readme.title=Workflow Definition / Node / Edge maintenance template
excel.workflow.readme.line1=1. Orange headers are required; hover the header to see column rules and examples.
excel.workflow.readme.line2=2. Keep the sheet order: definition / node / edge / instructions / dict / validation.
excel.workflow.readme.line3=3. workflow_code + version is the join key between the three workflow sheets.
excel.workflow.readme.line4=4. node_params must be valid JSON; CONDITION edges may set condition_expr.
excel.workflow.readme.line5=5. Import flow: upload -> preview -> apply.

