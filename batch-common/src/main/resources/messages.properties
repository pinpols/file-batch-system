# Excel:BusinessCalendar 模板 (BusinessCalendarExcelWorkbookWriter)
excel.calendar.readme.title=Business calendar maintenance template
excel.calendar.readme.line1=1. The workbook contains two data sheets: business_calendar and calendar_holiday.
excel.calendar.readme.line2=2. Orange headers are required; hover the header to see column rules and examples.
excel.calendar.readme.line3=3. calendar_code is the calendar unique key; calendar_code + biz_date is the holiday unique key.
excel.calendar.readme.line4=4. holiday_roll_rule / catch_up_policy / day_type / enabled have built-in dropdown validation.
excel.calendar.readme.line5=5. calendar_code in calendar_holiday sheet must reference an existing calendar_code in business_calendar.
excel.calendar.readme.line6=6. Import flow: upload -> preview -> apply.

