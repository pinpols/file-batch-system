# Excel:Tenant Config Package 复合模板 (ConfigPackageExcelWorkbookWriter)
excel.package.readme.title=Tenant config package import template (9+2 / 11 sheets)
excel.package.readme.line1=[Sheet scope] 11 data sheets in two groups:
excel.package.readme.line2=  Business core 8: job_definition / file_template_config / file_channel_config
excel.package.readme.line3=                  / pipeline_definition / pipeline_step_definition
excel.package.readme.line4=                  / workflow_definition / workflow_node / workflow_edge
excel.package.readme.line5=  Optional infra 3: resource_queue / business_calendar / batch_window
excel.package.readme.line6=    (required when referenced; DB fallback allowed - error only when missing from BOTH package and DB)
excel.package.readme.line7=  Note: alert_routing_config has been removed from this package; use /config/excel?domain=alert-routings instead.
excel.package.readme.line8=
excel.package.readme.line9=[Cross-sheet dependencies (validated at preview, DB fallback supported)]
excel.package.readme.line10=  job.queue_code        -> resource_queue.queue_code
excel.package.readme.line11=  job.calendar_code     -> business_calendar.calendar_code
excel.package.readme.line12=  job.window_code       -> batch_window.window_code
excel.package.readme.line13=  job.default_params.templateCode  -> file_template_config.template_code
excel.package.readme.line14=  pipeline.job_code     -> job_definition.job_code (strict, in-package only)
excel.package.readme.line15=  pipeline_step.job_code+version -> pipeline_definition.job_code+version (strict)
excel.package.readme.line16=  pipeline_step.step_params.templateCode -> file_template_config.template_code
excel.package.readme.line17=  pipeline_step.step_params.channelCode  -> file_channel_config.channel_code
excel.package.readme.line18=  workflow_node.related_job_code         -> job_definition.job_code
excel.package.readme.line19=  workflow_node.related_pipeline_code    -> pipeline_definition.job_code
excel.package.readme.line20=  workflow_node.window_code              -> batch_window.window_code
excel.package.readme.line21=  workflow_edge.from/to_node_code        -> workflow_node.node_code (strict)
excel.package.readme.line22=
excel.package.readme.line23=[Worker / Job configuration guide (5 worker categories + WORKFLOW)]
excel.package.readme.line24=
excel.package.readme.line25=> IMPORT - file to business table
excel.package.readme.line26=  Required: job_definition + file_template_config + pipeline_definition + pipeline_step_definition
excel.package.readme.line27=  Optional: file_channel_config (RECEIVE stage source SFTP/NAS/OSS) / resource_queue / business_calendar / batch_window
excel.package.readme.line28=  Key fields:
excel.package.readme.line29=    job_definition.job_type = IMPORT; default_params.templateCode references file_template_config
excel.package.readme.line30=    file_template_config.query_param_schema.jdbcMappedImport = {schema,table,columnMappings,conflictColumns}
excel.package.readme.line31=    file_template_config.file_format_type = CSV/FIXED/JSON; charset/delimiter per source file
excel.package.readme.line32=    pipeline_definition.pipeline_type = IMPORT; job_code matches job_definition
excel.package.readme.line33=    pipeline_step_definition stage chain: RECEIVE -> PREPROCESS -> PARSE -> VALIDATE -> LOAD -> FEEDBACK
excel.package.readme.line34=    step_params.templateCode references file_template_config.template_code
excel.package.readme.line35=
excel.package.readme.line36=> EXPORT - business table to file
excel.package.readme.line37=  Required: job_definition + file_template_config + pipeline_definition + pipeline_step_definition
excel.package.readme.line38=  Optional: file_channel_config (when downstream DISPATCH pushes the export)
excel.package.readme.line39=  Key fields:
excel.package.readme.line40=    job_definition.job_type = EXPORT
excel.package.readme.line41=    file_template_config: either default_query_sql (single SELECT) OR query_param_schema.jdbcMappedExport
excel.package.readme.line42=      jdbcMappedExport = {schema,batchTable,detailTable,batchTenantColumn,batchNoColumn,detailFkColumn,detailOrderByColumn}
excel.package.readme.line43=    file_template_config.streaming_enabled / page_size / fetch_size control cursor paging
excel.package.readme.line44=    pipeline_definition.pipeline_type = EXPORT
excel.package.readme.line45=    pipeline_step_definition stage chain: PREPARE -> GENERATE -> STORE -> REGISTER -> COMPLETE
excel.package.readme.line46=
excel.package.readme.line47=> PROCESS - SQL transform / cross-table landing
excel.package.readme.line48=  Required: job_definition + pipeline_definition + pipeline_step_definition
excel.package.readme.line49=  NOT needed: file_template_config / file_channel_config (in most cases)
excel.package.readme.line50=  Key fields:
excel.package.readme.line51=    job_definition.job_type = PROCESS
excel.package.readme.line52=    pipeline_definition.pipeline_type = PROCESS
excel.package.readme.line53=    pipeline_step_definition.step_params = {targetSchema,targetTable,sql,columnMappings}
excel.package.readme.line54=    pipeline_step_definition stage chain: PREPARE -> COMPUTE -> VALIDATE -> COMMIT -> FEEDBACK
excel.package.readme.line55=
excel.package.readme.line56=> DISPATCH - push file/message to external system
excel.package.readme.line57=  Required: job_definition + file_channel_config + pipeline_definition + pipeline_step_definition
excel.package.readme.line58=  Optional: file_template_config (when dispatching EXPORT output, reference its templateCode)
excel.package.readme.line59=  Key fields:
excel.package.readme.line60=    job_definition.job_type = DISPATCH
excel.package.readme.line61=    file_channel_config.channel_type = SFTP/EMAIL/NAS/OSS/API_PUSH/LOCAL
excel.package.readme.line62=    file_channel_config.config_json contains endpoint/credentials/receipt_policy
excel.package.readme.line63=    pipeline_definition.pipeline_type = DISPATCH
excel.package.readme.line64=    pipeline_step_definition.step_params.channelCode -> file_channel_config.channel_code
excel.package.readme.line65=    pipeline_step_definition stage chain: PREPARE -> DISPATCH -> ACK -> RETRY -> COMPENSATE -> COMPLETE
excel.package.readme.line66=
excel.package.readme.line67=> GENERAL - generic task (no pipeline / custom bean execution)
excel.package.readme.line68=  Required: only job_definition
excel.package.readme.line69=  Not needed: pipeline_definition / pipeline_step_definition / file_template_config / file_channel_config
excel.package.readme.line70=  Key fields:
excel.package.readme.line71=    job_definition.job_type = GENERAL
excel.package.readme.line72=    job_definition.execution_handler = "myJobBeanName" (Spring bean registered by worker at startup)
excel.package.readme.line73=    No fixed stage chain; logic lives inside the bean rather than a file pipeline.
excel.package.readme.line74=
excel.package.readme.line75=> WORKFLOW - orchestrate multiple jobs
excel.package.readme.line76=  Required: job_definition (job_type=WORKFLOW) + workflow_definition + workflow_node + workflow_edge
excel.package.readme.line77=  References other IMPORT/EXPORT/PROCESS/DISPATCH/GENERAL jobs via workflow_node.related_job_code
excel.package.readme.line78=  Key fields:
excel.package.readme.line79=    workflow_definition.workflow_type = DAG / PIPELINE / MIXED
excel.package.readme.line80=    workflow_node.node_type = START / END / TASK / GATEWAY / FILE_STEP / JOB
excel.package.readme.line81=    workflow_edge.edge_type = SUCCESS / FAILURE / CONDITION / ALWAYS
excel.package.readme.line82=
excel.package.readme.line83=[Import flow] upload -> preview -> apply (single transaction atomic commit)
excel.package.readme.line84=  Apply is blocked when preview shows any error or cross-sheet reference issue.
excel.package.readme.line85=  Backend orders the upsert by dependency topology; sheet order in Excel does not matter.
excel.package.readme.line86=[UPSERT behavior] Job definition: INSERT if missing, update mutable fields if present; other types: UPSERT by unique key.

excel.package.impl_code.prompt_title=impl_code input hint
excel.package.impl_code.prompt_box=Format MODULE:beanName (MODULE from pipeline_type; beanName from worker step_registry at startup)

