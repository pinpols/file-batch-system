# ============================================================
# batch-defaults.yml — 共享配置基线
#
# 所有 batch-platform 服务模块通过 spring.config.import 引入本文件。
# 模块自身的 application.yml 值优先级高于此处默认值（可覆盖）。
# 仅包含跨模块重复的配置；模块专属配置保留在各模块的 application.yml。
# ============================================================

# ------------------------------------------------------------------
# 优雅停机（所有服务模块共用）
# ------------------------------------------------------------------
server:
  shutdown: graceful
  # 全栈 UTF-8：HTTP 请求 / 响应 / servlet 默认字符集统一 UTF-8，
  # `force: true` 覆盖客户端传入的 `charset` 参数，防止浏览器/代理误判。
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
spring:
  lifecycle:
    # A-5.4: Worker 长任务需要更多时间完成；各模块可在自身 application.yml 中覆盖
    timeout-per-shutdown-phase: ${BATCH_SHUTDOWN_TIMEOUT:120s}
  # i18n / 错误消息资源统一 UTF-8 读取，避免 properties 文件在不同环境被按平台默认字符集解析。
  messages:
    encoding: UTF-8
  # Jackson 序列化统一使用平台默认时区（见下方 batch.timezone.default-zone）；避免 API 响应里
  # OffsetDateTime / Instant 根据 JVM default 被渲染出不一致的 offset。
  jackson:
    time-zone: ${BATCH_TIMEZONE_DEFAULT_ZONE:Asia/Shanghai}

# ------------------------------------------------------------------
# 平台数据库（Platform PostgreSQL，所有服务模块共用）
# ------------------------------------------------------------------
  datasource:
    # 平台库 JDBC URL（所有服务模块共用）
    url: ${BATCH_PLATFORM_DB_URL:jdbc:postgresql://localhost:15432/batch_platform}
    # 平台库用户名
    username: ${BATCH_PLATFORM_DB_USERNAME:batch_user}
    # 平台库密码（生产请通过环境变量/密钥管理注入）
    password: ${BATCH_PLATFORM_DB_PASSWORD:}
    # JDBC 驱动类
    driver-class-name: org.postgresql.Driver
  servlet:
    # 显式限制 multipart 尺寸，防止恶意大文件 DoS / 默认 10MB 对 Excel 上传太小
    multipart:
      max-file-size: ${BATCH_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${BATCH_MULTIPART_MAX_REQUEST_SIZE:60MB}
      file-size-threshold: ${BATCH_MULTIPART_FILE_SIZE_THRESHOLD:2MB}
  kafka:
    # Kafka 集群地址（逗号分隔）
    bootstrap-servers: ${BATCH_KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    producer:
      # 要求所有 ISR 副本确认写入后才返回成功，配合 replication-factor=3 + min.insync.replicas=2 防止数据丢失
      acks: all
      # broker 抖动 / leader 切换时生产者 in-process 重试；配合 idempotence 避免重复
      retries: ${BATCH_KAFKA_PRODUCER_RETRIES:5}
      properties:
        # 幂等生产者：enable.idempotence=true 要求 acks=all + max.in.flight<=5；避免重试导致的重复
        enable.idempotence: true
        # 允许并发在途请求，平衡吞吐与顺序保证
        max.in.flight.requests.per.connection: 5
        # send → 收到 ack 的端到端总时限；超过即回调失败（由 OutboxPoll 走下一轮）
        delivery.timeout.ms: ${BATCH_KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS:30000}
        # 单次请求超时（与 delivery.timeout.ms 配合；小于后者，留出重试空间）
        request.timeout.ms: ${BATCH_KAFKA_PRODUCER_REQUEST_TIMEOUT_MS:10000}
    listener:
      # 所有 worker 统一手动确认：业务处理成功后显式 ack，避免"处理失败但已提交 offset"
      # 非 worker 模块（不消费 Kafka）不受影响
      ack-mode: manual_immediate
    consumer:
      # 任务派发语义不能漏消息：worker 第一次订阅一个新 topic（例如 P2-5 worker-specific
      # topic `task.dispatch.import.node.<workerId>`）时，必须从 earliest 开始消费，
      # 否则 dispatcher 比 worker 先把消息写进去 → consumer rebalance 后 reset 到 latest
      # 直接跳过那条任务，partition 永远 READY 不动。worker 端的 CLAIM 已是幂等
      # （CLAIM 失败就 skip）兜底，重复消费旧消息无副作用。
      auto-offset-reset: ${BATCH_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
  data:
    redis:
      # Redis：本地 compose 宿主机映射 16379→6379；容器内由环境变量覆盖为 redis:6379
      host: ${BATCH_REDIS_HOST:localhost}
      port: ${BATCH_REDIS_PORT:16379}
      # 仅用 Redis 作缓存/消息，不使用 Spring Data Redis Repository；避免与 JDBC Repository 混扫产生 INFO
      repositories:
        enabled: false
      # 命令执行超时（含网络往返），防止慢操作无限阻塞调用方
      timeout: ${BATCH_REDIS_TIMEOUT:2000ms}
      lettuce:
        # 关闭连接后等待挂起命令完成的超时
        shutdown-timeout: ${BATCH_REDIS_SHUTDOWN_TIMEOUT:200ms}
        pool:
          # 最大活跃连接数；建议 = 并发调用方线程数上限（Outbox 轮询 + 限流 + 配置缓存）
          max-active: ${BATCH_REDIS_POOL_MAX_ACTIVE:32}
          # 最大空闲连接数
          max-idle: ${BATCH_REDIS_POOL_MAX_IDLE:16}
          # 最小空闲连接数（预热，避免冷启动延迟）
          min-idle: ${BATCH_REDIS_POOL_MIN_IDLE:4}
          # 获取连接的最长等待时间；超时后抛出异常而非无限挂起
          max-wait: ${BATCH_REDIS_POOL_MAX_WAIT:1000ms}

# ------------------------------------------------------------------
# MyBatis（mapper 扫描路径各模块相同；type-aliases-package 在模块内覆盖）
# ------------------------------------------------------------------
mybatis:
  # mapper XML 统一扫描路径（各服务模块一致）
  mapper-locations: classpath*:mapper/*.xml

# ------------------------------------------------------------------
# Actuator / 可观测性
# ------------------------------------------------------------------
management:
  # S-3.4: 管理端点隔离——生产环境通过 BATCH_MANAGEMENT_PORT 或 application-prod.yml 设独立端口
  # 默认不设（与业务端口共享），保证本地开发脚本健康检查可用
  server:
    port: ${BATCH_MANAGEMENT_PORT:}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,loggers
  endpoint:
    health:
      probes:
        enabled: true
      # A-4.1: 健康检查显示详情（仅管理端口可见）
      show-details: always
      # readiness 组：下游全就绪才对外服务；include="*" 会自动纳入所有已注册的
      # HealthIndicator（db/redis/kafka/minio 等，按模块 starter 实际 bean 决定）。
      # liveness 只看 livenessState（避免下游抖动反复重启 Pod），K8s readinessProbe 应配
      # /actuator/health/readiness
      group:
        readiness:
          include: "*"
          exclude: livenessState,ping
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    # A-4.1: 启用 DB / Redis / Kafka 运行时健康检查
    db:
      enabled: true
    redis:
      enabled: true
    # Spring Boot 内置 Kafka health indicator（仅 worker / orchestrator 有 KafkaTemplate）
    kafka:
      enabled: true
  # ── 分布式追踪 ──────────────────────────────────────────────────
  tracing:
    sampling:
      # 生产建议 0.1（10%）；staging/压测设为 1.0；本地默认 1.0 方便调试
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  # ── OTLP 导出（链路 Trace 与日志 → OTel Collector）────────────────────
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/traces
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/logs

# ------------------------------------------------------------------
# 结构化日志（MDC 字段统一：service / tenantId / traceId / requestId / jobInstanceId / fileId）
# 生产/K8s 环境：设 BATCH_LOG_FORMAT=ecs 输出 JSON（Loki / Elasticsearch 可直接解析）
# 本地开发：留空，使用下方 console pattern（可读格式）
# ------------------------------------------------------------------
logging:
  structured:
    format:
      console: ${BATCH_LOG_FORMAT:}    # 生产设为 ecs；本地留空
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{service:-} %X{tenantId:-} %X{traceId:-} %X{requestId:-} %X{jobInstanceId:-} %X{fileId:-}] %logger{40} - %msg%n"
  level:
    # Flyway 幂等 migration(IF NOT EXISTS / IF EXISTS)在 PG 走 NOTICE → JDBC SQLWarning →
    # Flyway 7+ 默认全转 WARN log,刷屏"schema/column already exists, skipping"假阳。
    # 这些 statement 设计就是为重跑设计的,安全的。压到 ERROR 级别只保留真问题。
    org.flywaydb.core.internal.sqlscript.DefaultSqlScriptExecutor: ERROR
    # Quartz autoStartup=false 是 wheel 模式正常配置,启动期信息性 WARN 一条,压到 INFO。
    com.example.batch.trigger.wheel.QuartzPauseWhenWheelEnabledCustomizer: INFO

# ------------------------------------------------------------------
# Batch 平台共享配置
# ------------------------------------------------------------------
batch:
  # 全局时区（所有业务路径上的 ZoneId.systemDefault() 改走 BatchTimezoneProvider）。
  # IANA 名，默认 Asia/Shanghai（= UTC+8），可用 BATCH_TIMEZONE_DEFAULT_ZONE 覆盖。
  # business_calendar.timezone 仍然优先；此值只在日历未配置 timezone 时作为兜底。
  timezone:
    default-zone: ${BATCH_TIMEZONE_DEFAULT_ZONE:Asia/Shanghai}

  # ShedLock LockProvider(2026-05-28 改默认为 redis,详见 BatchShedLockAutoConfiguration)
  # ── 默认 redis:SETNX 比 PG row UPDATE 快 1 个量级,HA 多节点首选;lettuce 客户端
  #    由 batch-common 共享,所有模块 transitive 引入。
  # ── 回滚 / Redis 不可用:BATCH_SHEDLOCK_PROVIDER=jdbc 切回 PG batch.shedlock 表。
  # 业务代码 48 处 @SchedulerLock 无需任何改动。
  # 切换灰度:**全停 → 切配置 → 全起**(不能两个 provider 同时跑,会重复触发任务)。
  shedlock:
    provider: ${BATCH_SHEDLOCK_PROVIDER:redis}        # redis(默认) | jdbc
    auto-create: ${BATCH_SHEDLOCK_AUTO_CREATE:false}  # jdbc 模式启动期自建 batch.shedlock 表(dev 用)
    redis:
      # key 命名空间,默认 = spring.application.name(每服务独立命名空间)。
      # 实际 key 格式:job-lock:<env>:shedlock:<env>:<lockName>
      #   - 如 orchestrator:job-lock:batch-orchestrator:shedlock:batch-orchestrator:outbox_poll
      # 多环境共享同 Redis 集群时:export BATCH_SHEDLOCK_REDIS_ENV=prod-orchestrator 防撞 key。
      key-prefix-env: ${BATCH_SHEDLOCK_REDIS_ENV:}

  # 安全 / KMS（orchestrator + worker + console 共用）
  security:
    # 全链路安全旁路开关（放宽认证 / 脱敏 / 加解密 / 审批 / 渠道校验）；仅限本地 / 联调 / E2E。
    # 默认值策略见 CLAUDE.md §配置开关规范：IDE 跑读此处默认 false；docker-compose 跑通过
    # BATCH_SECURITY_BYPASS_MODE=true 覆盖；生产 profile 通过 @PostConstruct 守护拒绝 true。
    bypass-mode: ${BATCH_SECURITY_BYPASS_MODE:false}
    # 内部接口（/internal/**）共享密钥；生产环境必须通过 BATCH_INTERNAL_SECRET 注入强密钥
    internal-secret: ${BATCH_INTERNAL_SECRET:internal-secret}
    kms:
      # 默认密钥引用（key ref）
      default-key-ref: ${BATCH_SECURITY_KMS_DEFAULT_KEY_REF:DEFAULT_TEST}
      keys:
        # 具体密钥内容（Base64 等形式；生产请避免明文出现在仓库）
        DEFAULT_TEST: ${BATCH_SECURITY_KMS_KEYS_DEFAULT_TEST:AAAAAAAAAAAAAAAAAAAAAA==}

  # MinIO 对象存储（orchestrator + 所有 worker + console）
  storage:
    minio:
      # MinIO 访问地址（http/https）
      endpoint: ${BATCH_MINIO_ENDPOINT:http://localhost:19000}
      # MinIO 访问密钥 ID
      access-key: ${BATCH_MINIO_ACCESS_KEY:minioadmin}
      # MinIO 秘密访问密钥
      secret-key: ${BATCH_MINIO_SECRET_KEY:}
      # 默认 bucket
      bucket: ${BATCH_MINIO_BUCKET:batch-dev}

  # Orchestrator API 地址（trigger + 所有 worker 模块使用）
  orchestrator:
    # Orchestrator 基础地址（trigger/worker 客户端调用）
    base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:18082}

  # 业务数据库（import / export / dispatch worker 使用）
  datasource:
    # PostgreSQL：JDBC ApplicationName + statement / idle-in-transaction 超时（经 Hikari connectionInitSql）
    # Flyway 与业务共用同一池时，超长迁移可能被 statement-timeout 打断——可临时调高 platform.* 或设 pg-session.enabled=false
    pg-session:
      enabled: ${BATCH_PG_SESSION_ENABLED:true}
      merge-connection-init-sql: ${BATCH_PG_SESSION_MERGE_INIT_SQL:true}
      platform:
        statement-timeout: ${BATCH_PG_PLATFORM_STATEMENT_TIMEOUT:15m}
        idle-in-transaction-timeout: ${BATCH_PG_PLATFORM_IDLE_IN_TX_TIMEOUT:60s}
      business:
        statement-timeout: ${BATCH_PG_BUSINESS_STATEMENT_TIMEOUT:30m}
        # 10m: PROCESS 5-stage WAP COMMIT 步骤可能跑长事务, 比 5m 更宽容 (export 单 task 几分钟仍足够)
        idle-in-transaction-timeout: ${BATCH_PG_BUSINESS_IDLE_IN_TX_TIMEOUT:10m}
    business:
      # 业务库 JDBC URL（worker 侧使用）
      url: ${BATCH_BUSINESS_DB_URL:jdbc:postgresql://localhost:15432/batch_business}
      # 业务库用户名
      username: ${BATCH_BUSINESS_DB_USERNAME:batch_user}
      # 业务库密码（生产请通过环境变量/密钥管理注入）
      password: ${BATCH_BUSINESS_DB_PASSWORD:}
      # 业务 schema（用于 SQL 拼接/校验等）
      schema: ${BATCH_BUSINESS_DB_SCHEMA:biz}

  # Kafka Topic 名称（orchestrator 发布，worker 消费）
  mq:
    topics:
      # Import 派发 Topic
      import-dispatch: ${BATCH_TOPIC_IMPORT_DISPATCH:batch.task.dispatch.import}
      # Export 派发 Topic
      export-dispatch: ${BATCH_TOPIC_EXPORT_DISPATCH:batch.task.dispatch.export}
      # Process 派发 Topic
      process-dispatch: ${BATCH_TOPIC_PROCESS_DISPATCH:batch.task.dispatch.process}
      # Dispatch 派发 Topic
      dispatch-dispatch: ${BATCH_TOPIC_DISPATCH_DISPATCH:batch.task.dispatch.dispatch}
      # 任务结果 Topic（worker → orchestrator）
      task-result: ${BATCH_TOPIC_TASK_RESULT:batch.task.result}
      # 任务重试 Topic
      task-retry: ${BATCH_TOPIC_TASK_RETRY:batch.task.retry}
      # 死信 Topic（无法处理/超过重试）
      dead-letter: ${BATCH_TOPIC_DEAD_LETTER:batch.task.dead-letter}

  # Worker 通用配置（import / export / dispatch 共用）
  worker:
    lease:
      # 租约续约间隔（毫秒）：worker 定期刷新租约防止被回收
      renew-interval-millis: ${BATCH_WORKER_LEASE_RENEW_INTERVAL_MILLIS:10000}
      # ADR-016：单次 renew-batch HTTP 请求最多携带的 task 条数（超出则拆成多请求）
      renew-batch-max-items: ${BATCH_WORKER_LEASE_RENEW_BATCH_MAX_ITEMS:256}
    task-client:
      # worker 调用 orchestrator 的 base-url（默认同 orchestrator.base-url）
      base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:18082}
    # ADR-015：REPORT 失败后写入 outbox、后台重投 orchestrator（默认关）。
    # storage=PLATFORM_PG（默认）→ 平台库 batch.worker_report_outbox（Flyway V96，由 orchestrator 迁移）； SQLITE → sqlite-path 本地文件。
    report-outbox:
      enabled: ${BATCH_WORKER_REPORT_OUTBOX_ENABLED:false}
      storage: ${BATCH_WORKER_REPORT_OUTBOX_STORAGE:PLATFORM_PG}
      sqlite-path: ${BATCH_WORKER_REPORT_OUTBOX_SQLITE_PATH:}
      poll-interval-millis: ${BATCH_WORKER_REPORT_OUTBOX_POLL_INTERVAL_MS:5000}
      max-publish-attempts: ${BATCH_WORKER_REPORT_OUTBOX_MAX_PUBLISH_ATTEMPTS:48}
      initial-backoff-millis: ${BATCH_WORKER_REPORT_OUTBOX_INITIAL_BACKOFF_MS:1000}
      max-backoff-millis: ${BATCH_WORKER_REPORT_OUTBOX_MAX_BACKOFF_MS:300000}
      jitter-millis: ${BATCH_WORKER_REPORT_OUTBOX_JITTER_MS:500}
      poll-batch-size: ${BATCH_WORKER_REPORT_OUTBOX_POLL_BATCH_SIZE:8}
      pause-poll-when-renew-circuit-open: ${BATCH_WORKER_REPORT_OUTBOX_PAUSE_POLL_ON_LEASE_CIRCUIT:true}
      publishing-stale-recover-after-millis: ${BATCH_WORKER_REPORT_OUTBOX_PUBLISHING_STALE_MS:120000}
      stale-publishing-recover-interval-millis: ${BATCH_WORKER_REPORT_OUTBOX_STALE_RECOVER_INTERVAL_MS:60000}
