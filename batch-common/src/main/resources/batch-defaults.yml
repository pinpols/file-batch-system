# ============================================================
# batch-defaults.yml — 共享配置基线
#
# 所有 batch-platform 服务模块通过 spring.config.import 引入本文件。
# 模块自身的 application.yml 值优先级高于此处默认值（可覆盖）。
# 仅包含跨模块重复的配置；模块专属配置保留在各模块的 application.yml。
# ============================================================

# ------------------------------------------------------------------
# 平台数据库（Platform PostgreSQL，所有服务模块共用）
# ------------------------------------------------------------------
spring:
  datasource:
    # 平台库 JDBC URL（所有服务模块共用）
    url: ${BATCH_PLATFORM_DB_URL:jdbc:postgresql://localhost:15432/batch_platform}
    # 平台库用户名
    username: ${BATCH_PLATFORM_DB_USERNAME:batch_user}
    # 平台库密码（生产请通过环境变量/密钥管理注入）
    password: ${BATCH_PLATFORM_DB_PASSWORD:batch_pass_123}
    # JDBC 驱动类
    driver-class-name: org.postgresql.Driver
  kafka:
    # Kafka 集群地址（逗号分隔）
    bootstrap-servers: ${BATCH_KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
  data:
    redis:
      # Redis 连接地址：本地默认走宿主机映射端口；容器内由 compose 覆盖为 redis:6379
      host: ${BATCH_REDIS_HOST:localhost}
      port: ${BATCH_REDIS_PORT:6379}

# ------------------------------------------------------------------
# MyBatis（mapper 扫描路径各模块相同；type-aliases-package 在模块内覆盖）
# ------------------------------------------------------------------
mybatis:
  # mapper XML 统一扫描路径（各服务模块一致）
  mapper-locations: classpath*:mapper/*.xml

# ------------------------------------------------------------------
# Actuator / 可观测性
# ------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  # ── 分布式追踪 ──────────────────────────────────────────────────
  tracing:
    sampling:
      # 生产建议 0.1（10%）；staging/压测设为 1.0；本地默认 1.0 方便调试
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  # ── OTLP 导出（链路 Trace 与日志 → OTel Collector）────────────────────
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/traces
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/logs

# ------------------------------------------------------------------
# 结构化日志（MDC 字段统一：service / tenantId / traceId / requestId / jobInstanceId / fileId）
# 生产/K8s 环境：设 BATCH_LOG_FORMAT=ecs 输出 JSON（Loki / Elasticsearch 可直接解析）
# 本地开发：留空，使用下方 console pattern（可读格式）
# ------------------------------------------------------------------
logging:
  structured:
    format:
      console: ${BATCH_LOG_FORMAT:}    # 生产设为 ecs；本地留空
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{service:-} %X{tenantId:-} %X{traceId:-} %X{requestId:-} %X{jobInstanceId:-} %X{fileId:-}] %logger{40} - %msg%n"

# ------------------------------------------------------------------
# Batch 平台共享配置
# ------------------------------------------------------------------
batch:
  # 安全 / KMS（orchestrator + worker + console 共用）
  security:
    # 测试/演示模式开关：开启后可放宽部分校验（按实现约定）
    testing-open: ${BATCH_SECURITY_TESTING_OPEN:false}
    # demo 模式：控制台以 admin 身份放开权限，并在控制台异常响应中包含堆栈信息（便于前端联调）。
    demo-open: ${BATCH_SECURITY_DEMO_OPEN:false}
    kms:
      # 默认密钥引用（key ref）
      default-key-ref: ${BATCH_SECURITY_KMS_DEFAULT_KEY_REF:DEFAULT_TEST}
      keys:
        # 具体密钥内容（Base64 等形式；生产请避免明文出现在仓库）
        DEFAULT_TEST: ${BATCH_SECURITY_KMS_KEYS_DEFAULT_TEST:AAAAAAAAAAAAAAAAAAAAAA==}

  # MinIO 对象存储（orchestrator + 所有 worker + console）
  storage:
    minio:
      # MinIO 访问地址（http/https）
      endpoint: ${BATCH_MINIO_ENDPOINT:http://localhost:19000}
      # MinIO 访问密钥 ID
      access-key: ${BATCH_MINIO_ACCESS_KEY:minioadmin}
      # MinIO 秘密访问密钥
      secret-key: ${BATCH_MINIO_SECRET_KEY:minioadmin123}
      # 默认 bucket
      bucket: ${BATCH_MINIO_BUCKET:batch-dev}

  # Orchestrator API 地址（trigger + 所有 worker 模块使用）
  orchestrator:
    # Orchestrator 基础地址（trigger/worker 客户端调用）
    base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:18082}

  # 业务数据库（import / export / dispatch worker 使用）
  datasource:
    business:
      # 业务库 JDBC URL（worker 侧使用）
      url: ${BATCH_BUSINESS_DB_URL:jdbc:postgresql://localhost:15432/batch_business}
      # 业务库用户名
      username: ${BATCH_BUSINESS_DB_USERNAME:batch_user}
      # 业务库密码（生产请通过环境变量/密钥管理注入）
      password: ${BATCH_BUSINESS_DB_PASSWORD:batch_pass_123}
      # 业务 schema（用于 SQL 拼接/校验等）
      schema: ${BATCH_BUSINESS_DB_SCHEMA:biz}

  # Kafka Topic 名称（orchestrator 发布，worker 消费）
  mq:
    topics:
      # Import 派发 Topic
      import-dispatch: ${BATCH_TOPIC_IMPORT_DISPATCH:batch.task.dispatch.import}
      # Export 派发 Topic
      export-dispatch: ${BATCH_TOPIC_EXPORT_DISPATCH:batch.task.dispatch.export}
      # Dispatch 派发 Topic
      dispatch-dispatch: ${BATCH_TOPIC_DISPATCH_DISPATCH:batch.task.dispatch.dispatch}
      # 任务结果 Topic（worker → orchestrator）
      task-result: ${BATCH_TOPIC_TASK_RESULT:batch.task.result}
      # 任务重试 Topic
      task-retry: ${BATCH_TOPIC_TASK_RETRY:batch.task.retry}
      # 死信 Topic（无法处理/超过重试）
      dead-letter: ${BATCH_TOPIC_DEAD_LETTER:batch.task.dead-letter}

  # Worker 通用配置（import / export / dispatch 共用）
  worker:
    lease:
      # 租约续约间隔（毫秒）：worker 定期刷新租约防止被回收
      renew-interval-millis: ${BATCH_WORKER_LEASE_RENEW_INTERVAL_MILLIS:10000}
    task-client:
      # worker 调用 orchestrator 的 base-url（默认同 orchestrator.base-url）
      base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:18082}
