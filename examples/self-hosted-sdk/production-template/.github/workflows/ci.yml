# batch-worker-sdk-template — 示范 CI(template 自带,不进主仓 CI)
#
# 租户 fork 后:这份 workflow 会随 fork 一起带走,在租户自己 repo 上跑。
# 主仓不消费 — 主仓 .github/workflows/ 与本文件完全无关。
#
# 跑两件事:
#   1) mvn -B verify(单测 + 集成测,如租户后续加 *IT.java)
#   2) docker build(确认 Dockerfile 没坏)
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: mvn verify
        run: mvn -B -ntp verify

      - name: docker build
        run: docker build -t batch-worker-sdk-template:ci .
