groups:
  - name: batch-platform
    rules:
      - alert: BatchServiceDown
        expr: up{job=~"batch-(console-api|trigger|orchestrator|worker-import|worker-export|worker-process|worker-dispatch)"} == 0
        for: 2m
        labels:
          severity: critical
          team: batch-platform
          alert_group: platform
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus target {{ $labels.instance }} for {{ $labels.job }} is not scraping successfully."

      - alert: BatchSlaViolationsPresent
        expr: batch_job_sla_violation_count > 0
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: sla
        annotations:
          summary: "SLA violations detected"
          description: "At least one SLA violation is still outstanding."

      - alert: BatchAlertEventsGrowing
        expr: increase(batch_alert_events_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: alerting
        annotations:
          summary: "Batch alert events are still being emitted"
          description: "Alert event total increased over the last 10 minutes."

      - alert: BatchDispatchCircuitsOpen
        expr: batch_dispatch_circuits_open > 0
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: dispatch
        annotations:
          summary: "Dispatch circuit breaker is open"
          description: "One or more dispatch channels are currently in cooldown."

      - alert: BatchDispatchFailureRateHigh
        expr: sum(rate(batch_dispatch_deliveries_total{result="failure"}[5m])) / clamp_min(sum(rate(batch_dispatch_deliveries_total[5m])), 1) > 0.2
        for: 10m
        labels:
          severity: critical
          team: batch-platform
          alert_group: dispatch
        annotations:
          summary: "Dispatch failure ratio is high"
          description: "Failure ratio over the last 5 minutes is above 20%."

      - alert: BatchHeapUsageHigh
        expr: sum by (job) (jvm_memory_used_bytes{area="heap"}) / clamp_min(sum by (job) (jvm_memory_max_bytes{area="heap"}), 1) > 0.85
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: capacity
        annotations:
          summary: "Heap usage is high"
          description: "Heap usage exceeds 85% for one or more batch services."

      # 需 kafka-exporter（如 danielqsj/kafka-exporter）或 Prometheus Kafka 适配器
      # 暴露 kafka_consumergroup_lag 指标。各 batch worker 使用的消费组为
      # batch-worker-import、batch-worker-export、batch-worker-process、batch-worker-dispatch。
      - alert: BatchKafkaConsumerLagHigh
        expr: kafka_consumergroup_lag{consumergroup=~"batch-worker-(import|export|process|dispatch)"} > 1000
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: kafka
        annotations:
          summary: "Kafka consumer lag is high for {{ $labels.consumergroup }}"
          description: "Consumer group {{ $labels.consumergroup }} topic {{ $labels.topic }} partition {{ $labels.partition }} lag exceeds 1000 messages for 10 minutes."

      - alert: BatchTaskClaimLatencyHigh
        expr: histogram_quantile(0.95, sum by (le, job) (rate(batch_task_claim_duration_seconds_bucket[5m]))) > 2
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: task
        annotations:
          summary: "Task claim latency is high for {{ $labels.job }}"
          description: "P95 worker claim latency stayed above 2 seconds for 10 minutes. Check DB locks, worker_registry, and task assignment contention."

      - alert: BatchOutboxPublishLatencyHigh
        expr: histogram_quantile(0.95, sum by (le, job) (rate(batch_outbox_publish_duration_seconds_bucket[5m]))) > 5
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: outbox
        annotations:
          summary: "Outbox publish latency is high"
          description: "P95 outbox publish batch latency stayed above 5 seconds for 10 minutes. Check Kafka acknowledgements, producer pool saturation, and DB update latency."

      - alert: BatchPipelineStepExecutionLatencyHigh
        expr: histogram_quantile(0.95, sum by (le, job) (rate(batch_pipeline_step_execution_duration_seconds_bucket[5m]))) > 60
        for: 15m
        labels:
          severity: warning
          team: batch-platform
          alert_group: worker
        annotations:
          summary: "Pipeline step execution latency is high for {{ $labels.job }}"
          description: "P95 worker pipeline step execution stayed above 60 seconds for 15 minutes. Inspect slow plugins, datasource latency, and file/object storage dependencies."

      - alert: BatchRedisMemoryUsageHigh
        expr: redis_memory_max_bytes > 0 and redis_memory_used_bytes / redis_memory_max_bytes > 0.80
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: redis
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage has exceeded 80% for 10 minutes. Check replay buffer retention, session keys, and cache TTL settings."

      - alert: BatchRedisConnectedClientsHigh
        expr: redis_connected_clients > 200
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: redis
        annotations:
          summary: "Redis connected clients are high"
          description: "Redis connected clients stayed above 200 for 10 minutes. Check SSE fanout load, exporter connections, and leaked clients."

      - alert: BatchConsoleRealtimeReplayCursorMissGrowing
        expr: sum by (stream) (increase(batch_console_realtime_replay_cursor_miss_total[10m])) > 5
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: realtime
        annotations:
          summary: "Console realtime replay cursor misses are growing"
          description: "Replay cursor misses for stream {{ $labels.stream }} exceeded 5 in the last 10 minutes. Replay TTL or buffer size may be insufficient."

      - alert: BatchConsoleRealtimeReplayDecodeFailures
        expr: sum by (stream) (increase(batch_console_realtime_replay_decode_failures_total[10m])) > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: realtime
        annotations:
          summary: "Console realtime replay decode failures detected"
          description: "Replay buffer decode failures were observed for stream {{ $labels.stream }} in the last 10 minutes."

      - alert: BatchConsoleRealtimePubSubDecodeFailures
        expr: increase(batch_console_realtime_pubsub_decode_failures_total[10m]) > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: realtime
        annotations:
          summary: "Console realtime Pub/Sub decode failures detected"
          description: "At least one Redis Pub/Sub payload failed to decode in the last 10 minutes."

      - alert: BatchConsoleRealtimePubSubHandleFailures
        expr: sum by (stream, eventType) (increase(batch_console_realtime_pubsub_handle_failures_total[10m])) > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: realtime
        annotations:
          summary: "Console realtime Pub/Sub handling failures detected"
          description: "Pub/Sub handling failures were observed for stream {{ $labels.stream }} eventType {{ $labels.eventType }} in the last 10 minutes."

      # ── Outbox / DLQ 积压告警（BatchBacklogMetricsScheduler 每 30 秒采样） ──────────
      # 触发 → 人工：kubectl / make ops-inspect 看堆积明细
      #         → 无根因消退则 scripts/ops/heal-stuck-outbox.sh / heal-dead-letters.sh
      # 禁止配自动 heal：隐藏真实故障（见 docs/runbook/troubleshooting-decision-tree.md）
      - alert: BatchOutboxBacklogHigh
        expr: batch_outbox_pending_events > 5000
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: outbox
        annotations:
          summary: "Outbox pending events backlog is high"
          description: "Outbox NEW+FAILED events stayed above 5000 for 5 minutes. Check Kafka health, circuit breaker state, and orchestrator poll scheduler."

      - alert: BatchOutboxBacklogCritical
        expr: batch_outbox_pending_events > 20000
        for: 2m
        labels:
          severity: critical
          team: batch-platform
          alert_group: outbox
        annotations:
          summary: "Outbox pending events backlog is critical"
          description: "Outbox NEW+FAILED events exceeded 20000 for 2 minutes — downstream workers are starving. Escalate immediately."

      # resetStalePublishing 正常会每轮清 0。长期 >0 意味着 poll 本身挂了或锁永久持有。
      - alert: BatchOutboxStalePublishingStuck
        expr: batch_outbox_publishing_stale_events > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: outbox
        annotations:
          summary: "Outbox events stuck in PUBLISHING state"
          description: "{{ $value }} Outbox events remain in PUBLISHING beyond timeout for 5 minutes. resetStalePublishing is not running — check orchestrator poll scheduler and ShedLock state for lock name 'outbox_poll'."

      - alert: BatchDeadLetterBacklogHigh
        expr: batch_dead_letter_tasks_pending > 100
        for: 30m
        labels:
          severity: warning
          team: batch-platform
          alert_group: dlq
        annotations:
          summary: "Dead letter tasks backlog is growing"
          description: "{{ $value }} dead letter tasks in NEW+FAILED state for 30 minutes. Investigate root cause before running scripts/ops/heal-dead-letters.sh."

      # ── ADR-010 trigger 异步解耦专项告警 ────────────────────────────────────
      # 配合 docs/runbook/trigger-async-launch-rollout.md §灰度切换 SOP, 告警阈值与
      # 验收指标(batch.trigger.outbox.publish.lag p99 < 5s)对齐. 三条告警覆盖:
      #   - 投递管道堆积(产出 > 消费)
      #   - consumer 失败暴增
      #   - GIVE_UP 数据 — 任意 1 条都需运维介入

      # relay 投出去的速率 > orchestrator 消费速率超过 5/s 持续 10min,
      # 说明 trigger_outbox 在堆积或 consumer 反压.
      - alert: TriggerOutboxBacklogGrowing
        expr: rate(batch_trigger_launch_published_total[5m])
              - rate(batch_trigger_launch_consumed_total[5m]) > 5
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: trigger-async
        annotations:
          summary: "Trigger outbox backlog is growing (publish > consume)"
          description: "trigger publish 速率超过 consumer {{ $value | humanize }}/s 持续 10min. orchestrator consumer 可能滞后 / lag 过大. 检查 batch.trigger.outbox.publish.lag 指标 + Kafka consumer group orchestrator-trigger-launch."

      # consumer 端 launch 失败(非 rate_limited)率超过 1/s 持续 5min — 可能是
      # LaunchApplicationService 内部异常 / DB 连接池耗尽 / orchestrator 崩溃风暴.
      - alert: TriggerLaunchFailureSpike
        expr: rate(batch_trigger_launch_failed_total{reason!="rate_limited"}[5m]) > 1
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: trigger-async
        annotations:
          summary: "Trigger launch failure rate is high"
          description: "trigger launch 失败率 {{ $value | humanize }}/s (非限流原因) 持续 5min. 检查 orchestrator 日志 + DB / Kafka 健康. 失败的 envelope 会留在 Kafka topic 不丢, 但 trigger_request 状态可能错乱."

      # outbox 行被标 GIVE_UP — 通常是 payload 反序列化失败 / 重试上限耗尽,
      # 任意 1 条都需要运维介入(数据问题, 等不到自愈).
      - alert: TriggerOutboxGiveUp
        expr: increase(batch_trigger_outbox_give_up_total[1h]) > 0
        for: 1m
        labels:
          severity: critical
          team: batch-platform
          alert_group: trigger-async
        annotations:
          summary: "Trigger outbox events marked GIVE_UP"
          description: "{{ $value | humanize }} trigger_outbox_event(s) 在过去 1h 进入 GIVE_UP 状态. 通常是 payload 反序列化失败或重试上限耗尽 — 需要人工查 last_error + 修源端配置 / 删 zombie 行. 参考 docs/runbook/trigger-async-launch-rollout.md §回滚."

      # ── ADR §5.11 webhook durability ────────────────────────────────────
      # WebhookDeliveryRelay 把 EXHAUSTED 行重投到 absolute-max-attempts 仍失败 → GIVE_UP,
      # 任意 1 条都需运维介入(订阅 URL 失效 / 持续 5xx / payload 数据问题).
      - alert: WebhookDeliveryGiveUp
        expr: increase(batch_webhook_delivery_give_up_total[1h]) > 0
        for: 1m
        labels:
          severity: warning
          team: batch-platform
          alert_group: webhook
        annotations:
          summary: "Webhook delivery rows marked GIVE_UP"
          description: "{{ $value | humanize }} webhook_delivery_log 行在过去 1h 进入 GIVE_UP 状态. 检查对应 subscription_id 的 callback URL 健康 + last response_body. 必要时 disable 订阅或修业务方接收端."
