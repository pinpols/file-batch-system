groups:
  - name: batch-platform
    rules:
      - alert: BatchServiceDown
        expr: up{job=~"batch-(console-api|trigger|orchestrator|worker-import|worker-export|worker-process|worker-dispatch|worker-atomic)"} == 0
        for: 2m
        labels:
          severity: critical
          team: batch-platform
          alert_group: platform
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus target {{ $labels.instance }} for {{ $labels.job }} is not scraping successfully."

      - alert: BatchSlaViolationsPresent
        expr: batch_job_sla_violation_count > 0
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: sla
        annotations:
          summary: "SLA violations detected"
          description: "At least one SLA violation is still outstanding."

      - alert: BatchAlertEventsGrowing
        expr: increase(batch_alert_events_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: alerting
        annotations:
          summary: "Batch alert events are still being emitted"
          description: "Alert event total increased over the last 10 minutes."

      - alert: BatchJobDefinitionFailingRepeatedly
        # 同一 (tenant, jobCode) 1h 内失败 >= 5 次 → 配置异常 / 模板坏 / 资源缺,
        # 持续 trigger 只会生成脏 job_instance + 污染日志,人工介入禁用或修
        expr: sum by (tenant, jobCode) (increase(batch_job_failure_total[1h])) >= 5
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: job
        annotations:
          summary: "Job {{ $labels.tenant }}/{{ $labels.jobCode }} 1h 内失败 {{ $value | humanize }} 次"
          description: "同一 job_definition 短时间持续失败,通常意味着配置错误(模板缺密钥 / 资源不存在 / 数据 schema 不匹配)。请到 console 查看实例日志并禁用该定义,避免 trigger 持续放炮生成脏数据。"

      - alert: BatchDispatchCircuitsOpen
        expr: batch_dispatch_circuits_open > 0
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: dispatch
        annotations:
          summary: "Dispatch circuit breaker is open"
          description: "One or more dispatch channels are currently in cooldown."

      - alert: BatchDispatchFailureRateHigh
        expr: sum(rate(batch_dispatch_deliveries_total{result="failure"}[5m])) / clamp_min(sum(rate(batch_dispatch_deliveries_total[5m])), 1) > 0.2
        for: 10m
        labels:
          severity: critical
          team: batch-platform
          alert_group: dispatch
        annotations:
          summary: "Dispatch failure ratio is high"
          description: "Failure ratio over the last 5 minutes is above 20%."

      - alert: BatchHeapUsageHigh
        expr: sum by (job) (jvm_memory_used_bytes{area="heap"}) / clamp_min(sum by (job) (jvm_memory_max_bytes{area="heap"}), 1) > 0.85
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: capacity
        annotations:
          summary: "Heap usage is high"
          description: "Heap usage exceeds 85% for one or more batch services."

      # 需 kafka-exporter（如 danielqsj/kafka-exporter）或 Prometheus Kafka 适配器
      # 暴露 kafka_consumergroup_lag 指标。各 batch worker 使用的消费组为
      # batch-worker-import、batch-worker-export、batch-worker-process、batch-worker-dispatch、batch-worker-atomic。
      - alert: BatchKafkaConsumerLagHigh
        expr: kafka_consumergroup_lag{consumergroup=~"batch-worker-(import|export|process|dispatch)"} > 1000
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: kafka
        annotations:
          summary: "Kafka consumer lag is high for {{ $labels.consumergroup }}"
          description: "Consumer group {{ $labels.consumergroup }} topic {{ $labels.topic }} partition {{ $labels.partition }} lag exceeds 1000 messages for 10 minutes."

      - alert: BatchTaskClaimLatencyHigh
        expr: histogram_quantile(0.95, sum by (le, job) (rate(batch_task_claim_duration_seconds_bucket[5m]))) > 2
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: task
        annotations:
          summary: "Task claim latency is high for {{ $labels.job }}"
          description: "P95 worker claim latency stayed above 2 seconds for 10 minutes. Check DB locks, worker_registry, and task assignment contention."

      - alert: BatchOutboxPublishLatencyHigh
        expr: histogram_quantile(0.95, sum by (le, job) (rate(batch_outbox_publish_duration_seconds_bucket[5m]))) > 5
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: outbox
        annotations:
          summary: "Outbox publish latency is high"
          description: "P95 outbox publish batch latency stayed above 5 seconds for 10 minutes. Check Kafka acknowledgements, producer pool saturation, and DB update latency."

      - alert: BatchPipelineStepExecutionLatencyHigh
        expr: histogram_quantile(0.95, sum by (le, job) (rate(batch_pipeline_step_execution_duration_seconds_bucket[5m]))) > 60
        for: 15m
        labels:
          severity: warning
          team: batch-platform
          alert_group: worker
        annotations:
          summary: "Pipeline step execution latency is high for {{ $labels.job }}"
          description: "P95 worker pipeline step execution stayed above 60 seconds for 15 minutes. Inspect slow plugins, datasource latency, and file/object storage dependencies."

      - alert: BatchRedisMemoryUsageHigh
        expr: redis_memory_max_bytes > 0 and redis_memory_used_bytes / redis_memory_max_bytes > 0.80
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: redis
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage has exceeded 80% for 10 minutes. Check replay buffer retention, session keys, and cache TTL settings."

      - alert: BatchRedisConnectedClientsHigh
        expr: redis_connected_clients > 200
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: redis
        annotations:
          summary: "Redis connected clients are high"
          description: "Redis connected clients stayed above 200 for 10 minutes. Check SSE fanout load, exporter connections, and leaked clients."

      - alert: BatchConsoleRealtimeReplayCursorMissGrowing
        expr: sum by (stream) (increase(batch_console_realtime_replay_cursor_miss_total[10m])) > 5
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: realtime
        annotations:
          summary: "Console realtime replay cursor misses are growing"
          description: "Replay cursor misses for stream {{ $labels.stream }} exceeded 5 in the last 10 minutes. Replay TTL or buffer size may be insufficient."

      - alert: BatchConsoleRealtimeReplayDecodeFailures
        expr: sum by (stream) (increase(batch_console_realtime_replay_decode_failures_total[10m])) > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: realtime
        annotations:
          summary: "Console realtime replay decode failures detected"
          description: "Replay buffer decode failures were observed for stream {{ $labels.stream }} in the last 10 minutes."

      - alert: BatchConsoleRealtimePubSubDecodeFailures
        expr: increase(batch_console_realtime_pubsub_decode_failures_total[10m]) > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: realtime
        annotations:
          summary: "Console realtime Pub/Sub decode failures detected"
          description: "At least one Redis Pub/Sub payload failed to decode in the last 10 minutes."

      - alert: BatchConsoleRealtimePubSubHandleFailures
        expr: sum by (stream, eventType) (increase(batch_console_realtime_pubsub_handle_failures_total[10m])) > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: realtime
        annotations:
          summary: "Console realtime Pub/Sub handling failures detected"
          description: "Pub/Sub handling failures were observed for stream {{ $labels.stream }} eventType {{ $labels.eventType }} in the last 10 minutes."

      # ── Outbox / DLQ 积压告警（BatchBacklogMetricsScheduler 每 30 秒采样） ──────────
      # 触发 → 人工：kubectl / make ops-inspect 看堆积明细
      #         → 无根因消退则 scripts/ops/heal-stuck-outbox.sh / heal-dead-letters.sh
      # 禁止配自动 heal：隐藏真实故障（见 docs/runbook/troubleshooting-decision-tree.md）
      - alert: BatchOutboxBacklogHigh
        expr: batch_outbox_pending_events > 5000
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: outbox
        annotations:
          summary: "Outbox pending events backlog is high"
          description: "Outbox NEW+FAILED events stayed above 5000 for 5 minutes. Check Kafka health, circuit breaker state, and orchestrator poll scheduler."

      - alert: BatchOutboxBacklogCritical
        expr: batch_outbox_pending_events > 20000
        for: 2m
        labels:
          severity: critical
          team: batch-platform
          alert_group: outbox
        annotations:
          summary: "Outbox pending events backlog is critical"
          description: "Outbox NEW+FAILED events exceeded 20000 for 2 minutes — downstream workers are starving. Escalate immediately."

      # resetStalePublishing 正常会每轮清 0。长期 >0 意味着 poll 本身挂了或锁永久持有。
      - alert: BatchOutboxStalePublishingStuck
        expr: batch_outbox_publishing_stale_events > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: outbox
        annotations:
          summary: "Outbox events stuck in PUBLISHING state"
          description: "{{ $value }} Outbox events remain in PUBLISHING beyond timeout for 5 minutes. resetStalePublishing is not running — check orchestrator poll scheduler and ShedLock state for lock name 'outbox_poll'."

      # 2026-05-01 加 — outbox 事件转入 GIVE_UP 终态(5 次重试耗尽后 markGiveUp 触发)。
      # 稳态应为 0(任何转入都意味着事件最终丢投到 Kafka,只能手工 republish);非 0 必须人工介入排查。
      # counter rate 只要在 5min 窗口内有任何增长就触发,无忍耐窗口(5 次失败重试已经给了足够"等等看"的时间)。
      - alert: BatchOutboxEventsGivenUp
        expr: rate(batch_outbox_events_give_up_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          team: batch-platform
          alert_group: outbox
        annotations:
          summary: "Outbox events transitioned to GIVE_UP terminal state"
          description: "{{ $value }} outbox events/sec entered GIVE_UP in last 5min. These events are permanently failed and need ops intervention — check Kafka health, then run scripts/ops/heal-stuck-outbox.sh or POST /internal/outbox/republish."

      - alert: BatchDeadLetterBacklogHigh
        expr: batch_dead_letter_tasks_pending > 100
        for: 30m
        labels:
          severity: warning
          team: batch-platform
          alert_group: dlq
        annotations:
          summary: "Dead letter tasks backlog is growing"
          description: "{{ $value }} dead letter tasks in NEW+FAILED state for 30 minutes. Investigate root cause before running scripts/ops/heal-dead-letters.sh."

      - alert: BatchWorkerStaleOnlinePresent
        expr: batch_worker_registry_stale_online_count > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: worker
        annotations:
          summary: "ONLINE workers have stale heartbeats"
          description: "{{ $value }} ONLINE worker(s) exceeded heartbeat timeout. Check WorkerHeartbeatTimeoutScheduler and worker connectivity."

      - alert: BatchWorkerDrainOverduePresent
        expr: batch_worker_registry_draining_overdue_count > 0
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: worker
        annotations:
          summary: "DRAINING workers passed drain deadline"
          description: "{{ $value }} DRAINING worker(s) are past drain_deadline_at. Check takeover scheduler or run ops drain healing after root-cause review."

      - alert: BatchDecommissionedWorkerActiveClaims
        expr: batch_worker_registry_decommissioned_active_claims_count > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: worker
        annotations:
          summary: "DECOMMISSIONED workers still own active tasks"
          description: "{{ $value }} decommissioned worker(s) still have CREATED/READY/RUNNING task claims. Reclaim affected tasks before scaling further."

      - alert: BatchInvalidWorkerCapabilityTags
        expr: batch_worker_capability_tags_invalid_count > 0
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: worker
        annotations:
          summary: "Worker capability_tags contain invalid JSON shapes"
          description: "{{ $value }} active worker(s) have capability_tags that selector treats as no capability. Fix worker registration payload."

      - alert: BatchTerminalInstanceActiveChildren
        expr: batch_job_instance_terminal_active_children_count > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: task
        annotations:
          summary: "Terminal job instances still have active children"
          description: "{{ $value }} terminal job_instance(s) still have active partition/task rows. JobInstanceTerminalChildStateReconciler is missing a path or failed."

      # ── ADR-010 trigger 异步解耦专项告警 ────────────────────────────────────
      # 异步路径已于 2026-05-02 固化为唯一链路（无开关）. 告警阈值与
      # 验收指标(batch.trigger.outbox.publish.latency p99 < 5s)对齐. 三条告警覆盖:
      #   - 投递管道堆积(产出 > 消费)
      #   - consumer 失败暴增
      #   - GIVE_UP 数据 — 任意 1 条都需运维介入

      # relay 投出去的速率 > orchestrator 消费速率超过 5/s 持续 10min,
      # 说明 trigger_outbox 在堆积或 consumer 反压.
      - alert: TriggerOutboxBacklogGrowing
        expr: rate(batch_trigger_outbox_publish_latency_seconds_count[5m])
              - rate(batch_trigger_launch_consumed_total[5m]) > 5
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: trigger-async
        annotations:
          summary: "Trigger outbox backlog is growing (publish > consume)"
          description: "TriggerOutboxRelay 投递速率(batch_trigger_outbox_publish_latency_seconds_count)超过 orchestrator consumer 消费速率(batch_trigger_launch_consumed_total){{ $value | humanize }}/s 持续 10min. consumer 可能滞后 / lag 过大. 检查 batch.trigger.outbox.publish.latency p99 + Kafka consumer group orchestrator-trigger-launch."

      - alert: TriggerOutboxPendingHigh
        expr: batch_trigger_outbox_pending_events > 1000
        for: 10m
        labels:
          severity: warning
          team: batch-platform
          alert_group: trigger-async
        annotations:
          summary: "Trigger outbox pending backlog is high"
          description: "{{ $value }} trigger_outbox_event rows are NEW+FAILED. Check Kafka producer and TriggerOutboxRelay logs."

      - alert: TriggerOutboxStalePublishing
        expr: batch_trigger_outbox_publishing_stale_events > 0
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: trigger-async
        annotations:
          summary: "Trigger outbox rows stuck in PUBLISHING"
          description: "{{ $value }} trigger_outbox_event rows stayed PUBLISHING past timeout. TriggerOutboxRelay stale reset is not clearing them."

      # consumer 端 launch 失败(非 rate_limited)率超过 1/s 持续 5min — 可能是
      # LaunchApplicationService 内部异常 / DB 连接池耗尽 / orchestrator 崩溃风暴.
      - alert: TriggerLaunchFailureSpike
        expr: rate(batch_trigger_launch_failed_total{reason!="rate_limited"}[5m]) > 1
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: trigger-async
        annotations:
          summary: "Trigger launch failure rate is high"
          description: "trigger launch 失败率 {{ $value | humanize }}/s (非限流原因) 持续 5min. 检查 orchestrator 日志 + DB / Kafka 健康. 失败的 envelope 会留在 Kafka topic 不丢, 但 trigger_request 状态可能错乱."

      # outbox 行被标 GIVE_UP — 通常是 payload 反序列化失败 / 重试上限耗尽,
      # 任意 1 条都需要运维介入(数据问题, 等不到自愈).
      - alert: TriggerOutboxGiveUp
        expr: increase(batch_trigger_outbox_give_up_total[1h]) > 0
        for: 1m
        labels:
          severity: critical
          team: batch-platform
          alert_group: trigger-async
        annotations:
          summary: "Trigger outbox events marked GIVE_UP"
          description: "{{ $value | humanize }} trigger_outbox_event(s) 在过去 1h 进入 GIVE_UP 状态. 通常是 payload 反序列化失败或重试上限耗尽 — 需要人工查 last_error + 修源端配置 / 删 zombie 行."

      # ── ADR §5.11 webhook durability ────────────────────────────────────
      # WebhookDeliveryRelay 把 EXHAUSTED 行重投到 absolute-max-attempts 仍失败 → GIVE_UP,
      # 任意 1 条都需运维介入(订阅 URL 失效 / 持续 5xx / payload 数据问题).
      - alert: WebhookDeliveryGiveUp
        expr: increase(batch_webhook_delivery_give_up_total[1h]) > 0
        for: 1m
        labels:
          severity: warning
          team: batch-platform
          alert_group: webhook
        annotations:
          summary: "Webhook delivery rows marked GIVE_UP"
          description: "{{ $value | humanize }} webhook_delivery_log 行在过去 1h 进入 GIVE_UP 状态. 检查对应 subscription_id 的 callback URL 健康 + last response_body. 必要时 disable 订阅或修业务方接收端."

      # ── PostgreSQL Replication ──────────────────────────────────────────
      # 本地 dev env 主从断了 11 天没人发现(BE 一直读旧数据),pg_stat_replication 空 +
      # replay_lag 巨大 → 必须主动监控。postgres-exporter 已采集 pg_replication_lag_seconds
      # 和 pg_replication_slots metrics(v0.16+ 默认开启)。
      #
      # 触发场景:
      #   - 主库重启后 replica 连不回来
      #   - WAL 段被清(主从断开太久) → recovery 永久卡
      #   - 网络阻塞 / 从库 disk 慢

      - alert: PostgresReplicationStopped
        # 主库 pg_stat_replication 表为空 = 没有任何 active replica 连接
        # 持续 1min 视为真断(避免 reconnect 抖动误报)
        expr: pg_stat_replication_count == 0
        for: 1m
        labels:
          severity: critical
          team: batch-platform
          alert_group: db
        annotations:
          summary: "PostgreSQL replication has zero active replicas"
          description: "主库无任何 active replica 连接超过 1min。从库可能断连、WAL 已被清、network 阻塞。读写分离会持续提供 stale 数据。立刻查 docker logs postgres-replica + 重建从库 base backup。"

      - alert: PostgresReplicationLagHigh
        expr: pg_replication_lag > 30
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: db
        annotations:
          summary: "PostgreSQL replication lag > 30s on {{ $labels.instance }}"
          description: "从库 {{ $labels.instance }} 落后主库 {{ $value | humanize }}s,持续 5min。可能 disk IO 慢 / 大事务复制中。BE 应回退读主库(已配 lag-aware circuit breaker 兜底,验证生效)。"

      - alert: PostgresReplicationLagCritical
        # replay_lag > 5min = read 严重过期,业务读到旧数据有风险
        expr: pg_replication_lag > 300
        for: 1m
        labels:
          severity: critical
          team: batch-platform
          alert_group: db
        annotations:
          summary: "PostgreSQL replication lag > 5min on {{ $labels.instance }}"
          description: "从库严重滞后 {{ $value | humanize }}s,业务可能读到 5min 前的数据。立刻让 BE 全切主库读 + 排查从库 IO/CPU/network。"

      - alert: PostgresReplicationSlotInactive
        # replication slot 存在但 active=false:从库连接断了但 slot 还在保留 WAL → 主库 WAL 堆积风险
        expr: pg_replication_slots_active == 0
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: db
        annotations:
          summary: "PostgreSQL replication slot {{ $labels.slot_name }} inactive"
          description: "Slot {{ $labels.slot_name }} 存在但无 active replica 连接,主库 WAL 会持续累积到 slot 被 drop。检查从库连接 + 必要时 SELECT pg_drop_replication_slot('{{ $labels.slot_name }}')。"

  - name: batch.sre
    rules:
      - alert: HikariCpConnectionExhausted
        # 等待连接的线程数 > 10 持续 5m → 池过小或上游慢查询堆积,业务侧会感知到延迟
        expr: hikaricp_connections_pending > 10
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: infrastructure
        annotations:
          summary: "HikariCP pool {{ $labels.pool }} on {{ $labels.application }} pending {{ $value }} connections"
          description: "连接池长期有 >10 个线程在等连接,通常意味着池容量不足或下游 SQL 慢。检查 pool size + 慢 SQL,必要时扩池或定位阻塞查询。"

      - alert: HikariCpAcquireTimeout
        # 拿连接超时(SQLTransientConnectionException);任何持续非零都意味着请求被直接 5xx
        expr: rate(hikaricp_connections_timeout_total[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
          team: batch-platform
          alert_group: infrastructure
        annotations:
          summary: "HikariCP pool {{ $labels.pool }} on {{ $labels.application }} acquire timeout {{ $value | humanize }}/s"
          description: "线程在 connectionTimeout 内拿不到连接,请求会直接 fail。立刻排查池容量 / 数据库可用性 / 是否有泄漏的连接未归还。"

      - alert: HttpServerErrorRateHigh
        # 全局 5xx 占比 > 5% → 服务整体异常,需立即介入
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          team: batch-platform
          alert_group: http
        annotations:
          summary: "HTTP 5xx ratio {{ $value | humanizePercentage }} > 5%"
          description: "近 5min HTTP 5xx 占比超过 5%。结合 grafana-dashboard-batch-sre 中按 uri 分组的 P99 / 5xx 占比定位异常端点。"
