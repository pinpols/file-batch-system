global:
  resolve_timeout: 5m

route:
  receiver: batch-default
  group_by: [alertname, team, alert_group, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: batch-pager
    - matchers:
        - alert_group="dispatch"
      receiver: batch-dispatch
    - matchers:
        - alert_group="sla"
      receiver: batch-sla
    - matchers:
        - alert_group="freshness"
      receiver: batch-freshness
    - matchers:
        - alert_group="capacity"
      receiver: batch-sre

receivers:
  - name: batch-default
    webhook_configs:
      - url: http://host.docker.internal:19001/alert
        send_resolved: true
  - name: batch-pager
    webhook_configs:
      - url: http://host.docker.internal:19001/pager
        send_resolved: true
  - name: batch-dispatch
    webhook_configs:
      - url: http://host.docker.internal:19001/dispatch
        send_resolved: true
  - name: batch-sla
    webhook_configs:
      - url: http://host.docker.internal:19001/sla
        send_resolved: true
  - name: batch-freshness
    webhook_configs:
      - url: http://host.docker.internal:19001/freshness
        send_resolved: true
  - name: batch-sre
    webhook_configs:
      - url: http://host.docker.internal:19001/sre
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname, team, alert_group]
