# ============================================================
# OpenTelemetry 采集器（Collector）— batch-platform 流水线配置
#
# 数据流：
#   应用（OTLP HTTP/gRPC）→ Collector → Jaeger（链路）
#                                     → Loki（日志）
#   指标：仍由 Prometheus 抓取（/actuator/prometheus），保持不变
#
# 本文件挂载到 Collector 容器的 /etc/otelcol/config.yaml
# ============================================================

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

# ── 接收器（Receivers）──────────────────────────────────────────
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317   # 应用 → Collector（gRPC）
      http:
        endpoint: 0.0.0.0:4318   # 应用 → Collector（HTTP）；Spring Boot 默认走此端口

# ── 处理器（Processors）──────────────────────────────────────────
processors:
  # 内存保护：超出 384MiB 触发 GC，超出 512MiB 开始丢弃（优先丢低优先级数据）
  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 1s

  # 批量发送，降低下游写入压力
  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # 为所有遥测数据注入部署环境标签
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT:-local}
        action: upsert
      - key: service.namespace
        value: batch-platform
        action: upsert

# ── 导出器（Exporters）────────────────────────────────────────────
exporters:
  # 链路 → Jaeger（Jaeger 1.35+ 原生支持 OTLP gRPC 4317）
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # 日志 → Loki（Loki 2.9+ 原生支持 OTLP HTTP /otlp/v1/logs）
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # 调试：将所有遥测数据打印到 Collector 自身日志（生产可移除）
  debug:
    verbosity: basic

# ── 服务（Service）────────────────────────────────────────────────
service:
  extensions: [health_check, pprof]
  telemetry:
    logs:
      level: warn
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/jaeger, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/loki, debug]
