# Grafana Loki 3.x 本地单节点（monolithic）配置。
# 关键差异 vs in-image 默认：
#   - allow_structured_metadata=true → OTLP 结构化字段（traceId / tenantId / 业务上下文）保留为 metadata
#   - schema v13 是 structured metadata 的最低要求
#   - retention 7 天与 Prometheus 对齐
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 168h          # 7 天
  ingestion_rate_mb: 16           # 本地容量小，给 16 MiB/s 已足够
  ingestion_burst_size_mb: 32
  max_query_length: 168h
  max_query_parallelism: 32
  reject_old_samples: false       # 本地调试允许旧时间戳

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-cache
  enable_api: true

analytics:
  reporting_enabled: false
