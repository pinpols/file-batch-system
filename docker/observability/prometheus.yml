global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/batch.yml

scrape_configs:
  # Java 应用：由 prometheus-entrypoint.sh 根据 BATCH_DEPLOY_MODE 自动生成 targets 文件
  #   container 模式 → 容器名:容器端口（Docker 网络内直连）
  #   local 模式     → host.docker.internal:宿主机端口
  - job_name: batch-apps
    metrics_path: /actuator/prometheus
    file_sd_configs:
      - files: ['/etc/prometheus/targets/app-targets.json']
        refresh_interval: 30s

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ['otel-collector:8888']
