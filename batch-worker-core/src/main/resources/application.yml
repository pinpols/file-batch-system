# batch-worker-core 是库模块（无 @SpringBootApplication），本文件仅承载 worker 子域的默认值。
# Kafka bootstrap-servers / batch.security.internal-secret / actuator exposure 等共享键
# 已在 batch-config-defaults/batch-defaults.yml 由各 worker-* 模块通过 spring.config.import 引入；
# 不再在此重复声明（详见 ADR-029）。
spring:
  application:
    name: batch-worker-core

batch:
  worker:
    heartbeat-interval-seconds: ${BATCH_WORKER_HEARTBEAT_INTERVAL_SECONDS:15}
    graceful-shutdown:
      timeout-seconds: ${BATCH_WORKER_GRACEFUL_SHUTDOWN_TIMEOUT_SECONDS:120}
    max-concurrent-tasks: ${BATCH_WORKER_MAX_CONCURRENT_TASKS:8}
    stale-temp-file-hours: ${BATCH_WORKER_STALE_TEMP_FILE_HOURS:6}
