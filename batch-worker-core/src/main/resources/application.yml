spring:
  application:
    name: batch-worker-core
  kafka:
    bootstrap-servers: ${BATCH_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

batch:
  worker:
    heartbeat-interval-seconds: ${BATCH_WORKER_HEARTBEAT_INTERVAL_SECONDS:15}
