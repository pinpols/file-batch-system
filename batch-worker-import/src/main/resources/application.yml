server:
  port: ${BATCH_WORKER_IMPORT_PORT:8083}

spring:
  application:
    name: batch-worker-import
  main:
    web-application-type: none
  datasource:
    url: ${BATCH_PLATFORM_DB_URL:jdbc:postgresql://localhost:15432/batch_platform}
    username: ${BATCH_PLATFORM_DB_USERNAME:batch_user}
    password: ${BATCH_PLATFORM_DB_PASSWORD:batch_pass_123}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${BATCH_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.batch.worker.imports.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

batch:
  orchestrator:
    base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:8082}
  worker:
    type: IMPORT
    lease:
      renew-interval-millis: ${BATCH_WORKER_LEASE_RENEW_INTERVAL_MILLIS:10000}
    task-client:
      base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:8082}
    import:
      worker-code: ${BATCH_WORKER_IMPORT_CODE:import-node-1}
      worker-type: IMPORT
      default-stage: RECEIVE
      batch-size: 100
      tenant-id: ${BATCH_WORKER_IMPORT_TENANT_ID:default-tenant}
      heartbeat-interval-millis: ${BATCH_WORKER_IMPORT_HEARTBEAT_INTERVAL_MILLIS:15000}
      topic: ${BATCH_TOPIC_IMPORT_DISPATCH:batch.task.dispatch.import}
      consumer-group-id: ${BATCH_WORKER_IMPORT_CONSUMER_GROUP_ID:batch-worker-import}
      scanner:
        enabled: ${BATCH_WORKER_IMPORT_SCANNER_ENABLED:true}
        poll-interval-millis: ${BATCH_WORKER_IMPORT_SCANNER_POLL_INTERVAL_MILLIS:30000}
        batch-size: ${BATCH_WORKER_IMPORT_SCANNER_BATCH_SIZE:200}
        prefix: ${BATCH_WORKER_IMPORT_SCANNER_PREFIX:ingress/}
        require-done-file: ${BATCH_WORKER_IMPORT_SCANNER_REQUIRE_DONE_FILE:false}
        stability-window-seconds: ${BATCH_WORKER_IMPORT_SCANNER_STABILITY_WINDOW_SECONDS:30}
        source-type: ${BATCH_WORKER_IMPORT_SCANNER_SOURCE_TYPE:SYSTEM}
        default-biz-type: ${BATCH_WORKER_IMPORT_SCANNER_DEFAULT_BIZ_TYPE:IMPORT_SCAN}
  datasource:
    business:
      url: ${BATCH_BUSINESS_DB_URL:jdbc:postgresql://localhost:15432/batch_business}
      username: ${BATCH_BUSINESS_DB_USERNAME:batch_user}
      password: ${BATCH_BUSINESS_DB_PASSWORD:batch_pass_123}
      schema: ${BATCH_BUSINESS_DB_SCHEMA:biz}
  storage:
    minio:
      endpoint: ${BATCH_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${BATCH_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${BATCH_MINIO_SECRET_KEY:minioadmin123}
      bucket: ${BATCH_MINIO_BUCKET:batch-dev}
