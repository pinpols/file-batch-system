server:
  port: ${BATCH_WORKER_IMPORT_PORT:8083}

spring:
  application:
    name: batch-worker-import
  main:
    web-application-type: none
  datasource:
    url: ${BATCH_PLATFORM_DB_URL:jdbc:postgresql://localhost:15432/batch_platform}
    username: ${BATCH_PLATFORM_DB_USERNAME:batch_user}
    password: ${BATCH_PLATFORM_DB_PASSWORD:batch_pass_123}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${BATCH_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.batch.worker.imports.domain

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

batch:
  orchestrator:
    base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:8082}
  worker:
    type: IMPORT
    lease:
      renew-interval-millis: ${BATCH_WORKER_LEASE_RENEW_INTERVAL_MILLIS:10000}
    task-client:
      base-url: ${BATCH_ORCHESTRATOR_BASE_URL:http://localhost:8082}
    import:
      worker-code: ${BATCH_WORKER_IMPORT_CODE:import-node-1}
      worker-type: IMPORT
      tenant-id: ${BATCH_WORKER_IMPORT_TENANT_ID:default-tenant}
      heartbeat-interval-millis: ${BATCH_WORKER_IMPORT_HEARTBEAT_INTERVAL_MILLIS:15000}
      topic: ${BATCH_TOPIC_IMPORT_DISPATCH:batch.task.dispatch.import}
      consumer-group-id: ${BATCH_WORKER_IMPORT_CONSUMER_GROUP_ID:batch-worker-import}
      skip:
        enabled: ${BATCH_WORKER_IMPORT_SKIP_ENABLED:false}
        threshold-mode: ${BATCH_WORKER_IMPORT_SKIP_THRESHOLD_MODE:ABSOLUTE}
        max-skip-count: ${BATCH_WORKER_IMPORT_SKIP_MAX_SKIP_COUNT:0}
        max-skip-rate: ${BATCH_WORKER_IMPORT_SKIP_MAX_SKIP_RATE:0.0}
        skip-error-codes: ${BATCH_WORKER_IMPORT_SKIP_ERROR_CODES:IMPORT_PARSE_LINE_INVALID,IMPORT_PARSE_JSON_INVALID,IMPORT_PARSE_TYPE_INVALID,IMPORT_VALIDATE_REQUIRED,IMPORT_VALIDATE_DUPLICATE,IMPORT_VALIDATE_TYPE_INVALID,IMPORT_VALIDATE_STATUS_INVALID,IMPORT_VALIDATE_NULL,IMPORT_VALIDATE_LENGTH,IMPORT_VALIDATE_RANGE,IMPORT_VALIDATE_REGEX,IMPORT_VALIDATE_ALLOWED_VALUES,IMPORT_VALIDATE_UNIQUE}
        skip-action: ${BATCH_WORKER_IMPORT_SKIP_ACTION:CONTINUE}
        error-sink-type: ${BATCH_WORKER_IMPORT_ERROR_SINK_TYPE:BOTH}
        error-output-retention-days: ${BATCH_WORKER_IMPORT_ERROR_OUTPUT_RETENTION_DAYS:7}
      scanner:
        enabled: ${BATCH_WORKER_IMPORT_SCANNER_ENABLED:true}
        poll-interval-millis: ${BATCH_WORKER_IMPORT_SCANNER_POLL_INTERVAL_MILLIS:30000}
        batch-size: ${BATCH_WORKER_IMPORT_SCANNER_BATCH_SIZE:200}
        prefix: ${BATCH_WORKER_IMPORT_SCANNER_PREFIX:ingress/}
        require-done-file: ${BATCH_WORKER_IMPORT_SCANNER_REQUIRE_DONE_FILE:false}
        stability-window-seconds: ${BATCH_WORKER_IMPORT_SCANNER_STABILITY_WINDOW_SECONDS:30}
        source-type: ${BATCH_WORKER_IMPORT_SCANNER_SOURCE_TYPE:SYSTEM}
        default-biz-type: ${BATCH_WORKER_IMPORT_SCANNER_DEFAULT_BIZ_TYPE:IMPORT_SCAN}
        arrival:
          enabled: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_ENABLED:false}
          file-group-code: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_FILE_GROUP_CODE:}
          wait-file-group-mode: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_WAIT_FILE_GROUP_MODE:ALL_OF}
          required-file-set: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_REQUIRED_FILE_SET:}
          arrival-timeout-action: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_TIMEOUT_ACTION:MANUAL_CONFIRM}
          expected-arrival-delay-seconds: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_EXPECTED_DELAY_SECONDS:0}
          latest-tolerable-delay-seconds: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_LATEST_TOLERABLE_DELAY_SECONDS:600}
          trigger-on-complete: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_TRIGGER_ON_COMPLETE:true}
          allow-empty-run: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_ALLOW_EMPTY_RUN:false}
          allow-skip-biz-date: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_ALLOW_SKIP_BIZ_DATE:false}
          notify-manual: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_NOTIFY_MANUAL:true}
          notify-channels: ${BATCH_WORKER_IMPORT_SCANNER_ARRIVAL_NOTIFY_CHANNELS:}
  datasource:
    business:
      url: ${BATCH_BUSINESS_DB_URL:jdbc:postgresql://localhost:15432/batch_business}
      username: ${BATCH_BUSINESS_DB_USERNAME:batch_user}
      password: ${BATCH_BUSINESS_DB_PASSWORD:batch_pass_123}
      schema: ${BATCH_BUSINESS_DB_SCHEMA:biz}
  storage:
    minio:
      endpoint: ${BATCH_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${BATCH_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${BATCH_MINIO_SECRET_KEY:minioadmin123}
      bucket: ${BATCH_MINIO_BUCKET:batch-dev}
