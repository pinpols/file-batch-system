server:
  port: 18083

spring:
  main:
    # 关掉懒加载：@KafkaListener 的 container bean 在 lazy 模式下启动期不实例化，
    # 导致 consumer 不订阅 topic、consumer group 永远不出现。
    lazy-initialization: false
  datasource:
    url: jdbc:postgresql://localhost:15432/batch_platform
    username: batch_user
    password: batch_pass_123
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: localhost:19092
  data:
    redis:
      host: localhost
      port: 16379
      repositories:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus


batch:
  shedlock:
    auto-create: true
  security:
    bypass-mode: true
    kms:
      default-key-ref: DEFAULT_TEST
      keys:
        DEFAULT_TEST: AAAAAAAAAAAAAAAAAAAAAA==
  orchestrator:
    base-url: http://localhost:18082
  worker:
    registry:
      # 本地联调：orchestrator 可能比 worker 晚启动，不 fail-fast 改为心跳重试注册
      fail-fast-on-startup: false
    type: IMPORT
    lease:
      renew-interval-millis: 10000
    task-client:
      base-url: http://localhost:18082
    import:
      worker-code: import-node-1
      worker-type: IMPORT
      tenant-id: default-tenant
      heartbeat-interval-millis: 15000
      topic: batch.task.dispatch.import
      consumer-group-id: batch-worker-import
      # worker_registry.capability_tags；让 selector 能匹配带 resource_tag 的 queue（见 DefaultWorkerSelector）
      capability-tags:
        - ingest
      file-processing:
        streaming-enabled: true
        page-size: 1000
        fetch-size: 1000
        # 2026-06 调优:与 application.yml 默认对齐(瓶颈在 app/JDBC 往返+commit 次数,非 PG 写能力)
        chunk-size: 2000
      skip:
        enabled: false
        threshold-mode: ABSOLUTE
        max-skip-count: 0
        max-skip-rate: 0.0
        skip-error-codes: IMPORT_PARSE_LINE_INVALID,IMPORT_PARSE_JSON_INVALID,IMPORT_PARSE_TYPE_INVALID,IMPORT_VALIDATE_REQUIRED,IMPORT_VALIDATE_DUPLICATE,IMPORT_VALIDATE_TYPE_INVALID,IMPORT_VALIDATE_STATUS_INVALID,IMPORT_VALIDATE_NULL,IMPORT_VALIDATE_LENGTH,IMPORT_VALIDATE_RANGE,IMPORT_VALIDATE_REGEX,IMPORT_VALIDATE_ALLOWED_VALUES,IMPORT_VALIDATE_UNIQUE
        skip-action: CONTINUE
        error-sink-type: BOTH
        error-output-retention-days: 7
      scanner:
        enabled: true
        poll-interval-millis: 30000
        batch-size: 200
        prefix: ingress/
        require-done-file: false
        stability-window-seconds: 30
        source-type: SYSTEM
        default-biz-type: IMPORT_SCAN
        arrival:
          enabled: false
          file-group-code:
          wait-file-group-mode: ALL_OF
          required-file-set:
          arrival-timeout-action: MANUAL_CONFIRM
          expected-arrival-delay-seconds: 0
          latest-tolerable-delay-seconds: 600
          trigger-on-complete: true
          allow-empty-run: false
          allow-skip-biz-date: false
          notify-manual: true
          notify-channels:
  datasource:
    business:
      # P1-17 reWriteBatchedInserts=true 与 batch-defaults.yml:275 对齐(Import LOAD batchUpdate 收益最大);
      # 本地 profile 覆盖 URL 加 stringtype 时勿再丢该参数。
      url: jdbc:postgresql://localhost:15432/batch_business?stringtype=unspecified&reWriteBatchedInserts=true
      username: batch_user
      password: batch_pass_123
      schema: biz
  # 对象存储配置统一走 batch-defaults.yml 的 batch.storage.s3.*（endpoint/access-key/bucket
  # 本地默认已对齐 minio:19000/minioadmin/batch-dev），secret-key 从 .env 的
  # BATCH_S3_SECRET_KEY 单点注入，不在各模块 application-local.yml 重复配置（避免扩散）。
