# 专用 Task SPI Worker 配置(ADR-029)。
#
# 安全定位:dual-use(RCE 级)能力隔离进程。部署时 spring.datasource 应指向**独立低权限 datasource**
# (不连业务库 —— 本 worker 只需平台库做 claim/lease/report,sql/proc executor 要库时另配低权限连接)。
# 独立 K8s serviceaccount / 网络策略 / seccomp 由部署层(PR-3)下放。
server:
  port: ${BATCH_WORKER_SPI_PORT:18086}

spring:
  application:
    name: batch-worker-spi
  flyway:
    enabled: false
  config:
    import: "classpath:batch-defaults.yml"
  kafka:
    listener:
      concurrency: ${BATCH_WORKER_SPI_KAFKA_CONCURRENCY:2}
    consumer:
      max-poll-records: ${BATCH_WORKER_SPI_KAFKA_MAX_POLL_RECORDS:5}
      metadata-max-age-ms: ${BATCH_WORKER_SPI_KAFKA_METADATA_MAX_AGE_MS:30000}
  datasource:
    hikari:
      maximum-pool-size: ${BATCH_WORKER_SPI_PLATFORM_DB_MAX_POOL_SIZE:6}
      minimum-idle: ${BATCH_WORKER_SPI_PLATFORM_DB_MIN_IDLE:2}
      connection-timeout: ${BATCH_WORKER_SPI_PLATFORM_DB_CONNECTION_TIMEOUT_MS:3000}

batch:
  worker:
    # worker_type=SPI(ADR-029 专属类型,对应 batch.task.dispatch.spi topic)
    type: SPI
    max-concurrent-tasks: ${BATCH_WORKER_SPI_MAX_CONCURRENT_TASKS:4}
    kafka:
      subscribe-mode: ${BATCH_WORKER_KAFKA_SUBSCRIBE_MODE:PATTERN}
      tenant-allowlist: ${BATCH_WORKER_KAFKA_TENANT_ALLOWLIST:}
    # 本 worker 的全部配置都在 batch.worker.spi 下:
    #   - SpiWorkerConfiguration 绑 worker-code/worker-type/topic/... (身份/注册)
    #   - BatchWorkerSpiProperties 绑 enabled-types(注册哪些 SPI taskType)
    # 两个 @ConfigurationProperties 同前缀共存,子键不冲突。
    spi:
      worker-code: ${BATCH_WORKER_SPI_CODE:spi-node-1}
      worker-type: SPI
      tenant-id: ${BATCH_WORKER_SPI_TENANT_ID:default-tenant}
      heartbeat-interval-millis: ${BATCH_WORKER_SPI_HEARTBEAT_INTERVAL_MILLIS:15000}
      topic: ${BATCH_TOPIC_DISPATCH_SPI:batch.task.dispatch.spi}
      consumer-group-id: ${BATCH_WORKER_SPI_CONSUMER_GROUP_ID:batch-worker-spi}
      # 能力标签:声明本 worker 处理哪些 SPI taskType,orchestrator 按 resource_tag/capability 匹配
      capability-tags: ${BATCH_WORKER_SPI_CAPABILITY_TAGS:}
      # 注册哪些 SPI taskType(空=全注册)
      enabled-types: ${BATCH_WORKER_SPI_ENABLED_TYPES:}
    # dual-use 执行器:默认全关,按需 + 配白名单/schema/超时再开(见 ADR-029)
    executors:
      shell:
        enabled: ${BATCH_WORKER_SPI_SHELL_ENABLED:false}
      stored-proc:
        enabled: ${BATCH_WORKER_SPI_STORED_PROC_ENABLED:false}
      sql:
        enabled: ${BATCH_WORKER_SPI_SQL_ENABLED:false}
      http:
        enabled: ${BATCH_WORKER_SPI_HTTP_ENABLED:false}
