# 阶段 1 · PG HA(Zalando postgres-operator = Patroni)。
# 一个 CR 提供:Patroni 主备 + 自动 failover(K8s 原生 DCS,免 etcd) + 内置 PgBouncer(P1-2)
#   + WAL 归档/逻辑备份到 MinIO(P0-3 基础)。
# 前置:已装 zalando postgres-operator。Citus(阶段4)= 同 CR 加 citus + 增 numberOfInstances 的 worker。
#
# 占位符:STORAGE_CLASS / 镜像版本 / 实例数 / 资源 / MinIO 凭据 secret。apply 前必改。
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: batch-pg
  namespace: batch-data
spec:
  teamId: "batch"
  postgresql:
    version: "17"
    parameters:
      # 与本仓 batch-defaults / Citus 前瞻一致的关键参数
      max_connections: "400"             # 配合 worker max_connections ≥ PgBouncer ≥ app 池峰值和
      # 上 Citus 时由 operator 注入 citus.* GUC;单机阶段无需
  # 主备:1 主 + 2 备(故障域散开,见 podAntiAffinity)
  numberOfInstances: 3
  enableMasterLoadBalancer: false
  enableReplicaLoadBalancer: false

  # 同步复制:RPO≈0(按写延迟容忍调;去掉则异步,failover 可能丢最后几笔,靠 outbox republish + CLAIM 幂等兜)
  synchronous_mode: true
  synchronous_mode_strict: false

  volume:
    size: 100Gi
    storageClass: STORAGE_CLASS        # ← 改成集群真实 storageClass

  resources:
    requests: { cpu: "1", memory: 2Gi }
    limits: { cpu: "2", memory: 4Gi }

  # 故障域反亲和:三实例散在不同 node,否则 HA 名存实亡
  enablePodAntiAffinity: true
  podAntiAffinityTopologyKey: kubernetes.io/hostname

  # 内置 PgBouncer(transaction mode)= P1-2 连接扇出;app 连 <cluster>-pooler svc
  # ✅ transaction 模式对本仓 RLS 安全:RlsTenantSessionSupport 用 set_config('app.tenant_id',?,true)
  #    = 事务内(SET LOCAL),随事务提交/回滚自动 reset,不跨会话残留 → 与 tx-pooling 兼容。
  # ⚠️ 但 transaction 模式不兼容服务端预编译语句缓存:Hikari 须关 server-side prepared
  #    (dataSourceProperties prepareThreshold=0,或 JDBC preferQueryMode=simple ——
  #    Citus 路径已用 simple;单机 PG 走 pooler 时需确认同样设置),否则报
  #    "prepared statement does not exist"。
  enableConnectionPooler: true            # 主连接池(读写)
  connectionPooler:
    numberOfInstances: 2
    mode: "transaction"
    resources:
      requests: { cpu: "250m", memory: 256Mi }
      limits: { cpu: "500m", memory: 512Mi }

  # 业务库与平台库:operator 建库 + 用户(密码进 Secret <user>.batch-pg.credentials...)
  databases:
    batch_platform: batch_app
    batch_business: batch_app
  users:
    batch_app:
      - superuser            # 平台需建表/扩展;生产可收敛权限
      - createdb

  # P0-3 备份:WAL 归档 + 逻辑备份到 S3 兼容存储。
  # 🔴 生产铁律:备份目标必须是**集群外独立故障域**(异地 S3 / 另一存储栈),
  #    **不要**指向本集群内的 minio.minio.svc——那和应用对象存储同故障域,
  #    集群级灾难会同时带走数据与备份。集群内 MinIO 仅 dev/staging 可用。
  enableLogicalBackup: true
  logicalBackupSchedule: "0 2 * * *"      # 每日 02:00 UTC,避开归档/清理高峰
  # WAL 连续归档(PITR)由 operator 的 WAL-E/WAL-G 配置驱动,在 operator configmap 配 endpoint+凭据:
  #   - 生产:AWS_S3_ENDPOINT=<集群外/异地 S3>(独立故障域)
  #   - dev/staging:AWS_S3_ENDPOINT=http://minio.minio.svc:9000(集群内,仅图省事)
  # 备份保留策略(base 份数 / PITR 窗口)在 operator configmap 设,别用默认无限堆。
  # 备份新鲜度由 prometheus PostgresBackupStale 告警兜底(>26h critical)。
