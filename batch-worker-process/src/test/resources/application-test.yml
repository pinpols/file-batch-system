spring:
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

# 集成测常用 platform PG：未必迁出 batch.process_staging；禁用孤儿清理调度避免调度线程刷 ERROR。
batch:
  scheduling:
    # IT 不验证 Spring @Scheduled 线程池的优雅收尾；关闭时立即取消，避免 surefire fork 退出超时。
    wait-for-tasks-to-complete-on-shutdown: false
    await-termination-seconds: 1
  worker:
    registry:
      # 该配置测试只验证 YAML 绑定，不依赖真实 orchestrator；避免 ApplicationReady 时连本地 18082 注册。
      fail-fast-on-startup: false
    process:
      staging-cleanup:
        enabled: false
