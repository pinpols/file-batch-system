# gitleaks 配置:沿用默认规则集,补充本仓库的路径排除。
# 默认规则集仍生效,这里只通过 allowlist 把已审计的非真实凭据和 build artifact 路径排除。

[extend]
useDefault = true

[allowlist]
description = "build artifacts + 测试 fixture + 文档示例(已审计,见 docs/analysis/security-scan-2026-05-16.md)"
paths = [
    '''(.*/)?target/.*''',
    '''(.*/)?node_modules/.*''',
    '''(.*/)?dist/.*''',
    '''(.*/)?build/.*''',
    # 本地开发 profile RSA 私钥,生产由 Helm Secret 注入覆盖
    '''batch-console-api/src/main/resources/application-local\.yml''',
    # 测试 fixture(batch-worker[-/]import 同时覆盖嵌套前 batch-worker-import/ 旧路径与嵌套后 batch-worker/import/ 新路径)
    '''batch-worker[-/]import/src/test/resources/fixtures/test-rsa-private-pkcs8\.pem''',
    # 文档示例
    '''docs/runbook/realtime-sse-verification\.md''',
    # 测试代码:PEM header/footer 字面量(用于 strip 解析,非真私钥)
    '''batch-worker[-/]import/src/test/java/io/github/pinpols/batch/worker/imports/preprocess/ImportPreprocessPipelineRsaTest\.java''',
    # 测试代码:JWT 测试 fixture STRONG_SECRET 字面量(非真实凭据,shallow-clone CI 误判 generic-api-key)
    '''batch-console-api/src/test/java/io/github/pinpols/batch/console/domain/rbac/support/ConsoleJwtServiceTest\.java''',
    # 测试代码:FilesystemObjectStore/EncryptingObjectStore/Console FS presign 端点的 HMAC fixture
    # ("test-presign-secret-1234567890",非真实凭据,generic-api-key 误判)
    '''batch-common/src/test/java/io/github/pinpols/batch/common/storage/FilesystemObjectStoreTest\.java''',
    '''batch-common/src/test/java/io/github/pinpols/batch/common/storage/EncryptingObjectStoreTest\.java''',
    '''batch-console-api/src/test/java/io/github/pinpols/batch/console/domain/file/web/ConsoleFilesystemPresignDownloadControllerTest\.java''',
    # 同一测试 fixture 的历史包名路径(gitleaks 全历史扫描会命中旧提交)
    '''batch-common/src/test/java/com/example/batch/common/storage/FilesystemObjectStoreTest\.java''',
    '''batch-common/src/test/java/com/example/batch/common/storage/EncryptingObjectStoreTest\.java''',
    '''batch-console-api/src/test/java/com/example/batch/console/domain/file/web/ConsoleFilesystemPresignDownloadControllerTest\.java''',
    '''batch-console-api/src/test/java/com/example/batch/console/domain/rbac/support/ConsoleJwtServiceTest\.java''',
    '''batch-console-api/src/test/java/com/example/batch/console/support/auth/ConsoleJwtServiceTest\.java''',
]
regexes = [
    # 幂等键 header value(`idem-*` 形态),不是 API key,被 generic-api-key 规则误报。
    # 例:ConsoleHttpIntegrationTest 用 "idem-approval-001" 触幂等链路。
    '''idem-[a-z0-9-]+''',
    # sdk-orchestrator-e2e CI 占位 internal secret(非真实凭据,仅供 compose 插值补齐启动)。
    '''ci-e2e-internal-secret-[0-9a-f]+''',
]
